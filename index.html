social y transportistas urbanos.<\/p>", "clave": "La solicitud de devolución es formal y única por período: mes, base y valor de IVA, con firma (Art. 178)."}, {"titulo": "Devolución de IVA a personas adultas mayores (Art. 181)", "html": "<p>Derecho por adquisición de <strong>bienes y servicios de primera necesidad<\/strong> de uso o consumo personal, en <strong>establecimientos autorizados<\/strong> por el SRI:<\/p><ul><li>Se reconoce mediante acto administrativo emitido en término <strong>no mayor a 60 días<\/strong>, o por el <strong>mecanismo automático<\/strong> que el SRI establezca por resolución.<\/li><li>Tope mensual: la <strong>tarifa de IVA vigente aplicada a dos (2) salarios básicos unificados<\/strong> vigentes al 1 de enero del año de la adquisición.<\/li><li>Vencido el término, el SRI paga <strong>intereses<\/strong> sobre los valores reconocidos.<\/li><li>Si se devolvió de más, el SRI <strong>reliquida<\/strong> y cobra o compensa con devoluciones futuras.<\/li><li><strong>Art. 181.3<\/strong>: los establecimientos autorizados los califica el SRI de entre contribuyentes al día en sus declaraciones de IVA de los <strong>últimos 12 meses<\/strong>; no se admiten solicitudes de calificación.<\/li><\/ul>", "clave": "Adultos mayores: devolución hasta el IVA de 2 SBU mensuales, reconocida en máximo 60 días (Art. 181)."}, {"titulo": "Devolución de IVA a personas con discapacidad y sustitutos (Art. 177)", "html": "<p>Requisitos y reglas específicas:<\/p><ul><li>La persona con discapacidad debe estar <strong>calificada por la autoridad sanitaria nacional<\/strong> (Sistema Nacional de Salud); el <strong>sustituto<\/strong>, certificado por la autoridad de inclusión económica y social o del trabajo.<\/li><li>Aplica la <strong>proporcionalidad<\/strong> del Reglamento a la Ley Orgánica de Discapacidades según el grado de discapacidad.<\/li><li>El monto devuelto al sustituto y a la persona con discapacidad <strong>en conjunto<\/strong> no supera el máximo aplicable a la persona con discapacidad.<\/li><li>Para los bienes de los numerales 1 al 8 del <strong>Art. 74 de la Ley Orgánica de Discapacidades<\/strong> (uso personal y exclusivo) <strong>no aplica el límite<\/strong> de base imponible máxima de consumo mensual.<\/li><li>Vencido el término legal, se pagan <strong>intereses<\/strong>; devoluciones indebidas se reintegran con intereses y multa.<\/li><\/ul>", "clave": "Discapacidad: calificación sanitaria previa, proporcionalidad por grado y tope conjunto con el sustituto (Art. 177)."}, {"titulo": "Devolución a exportadores y proveedores directos", "html": "<p><strong>Exportadores de bienes (Art. 172)<\/strong>:<\/p><ul><li>Requisito previo: estar inscritos en el <strong>RUC<\/strong> y constar en el <strong>catastro de exportadores<\/strong> del SRI.<\/li><li>La devolución de un período <strong>no puede exceder el 12% del valor en aduana<\/strong> de las exportaciones de ese período; el saldo se recupera con exportaciones futuras.<\/li><li>El SRI puede acreditar un <strong>porcentaje provisional<\/strong> antes de la resolución definitiva.<\/li><\/ul><p><strong>Proveedores directos de exportadores (Art. 173)<\/strong>: devolución del IVA pagado en lo que fabrican y venden al exportador con tarifa 0%; tope del <strong>12% de las transferencias a exportadores<\/strong> del período.<\/p><p><strong>Exportadores de servicios<\/strong>: devolución en la proporción del <strong>ingreso neto de divisas<\/strong> al Ecuador, con tope del 12% del valor exportado.<\/p>", "clave": "Exportadores: devolución con tope del 12% del valor en aduana del período y catastro previo (Art. 172)."}, {"titulo": "Otras devoluciones con plazos que debes memorizar", "html": "<p>Plazos especiales de reintegro:<\/p><table><tr><th>Beneficiario<\/th><th>Plazo / regla clave<\/th><\/tr><tr><td>Vivienda de interés social<\/td><td>Reintegro sin intereses en máximo <strong>90 días<\/strong> con nota de crédito<\/td><\/tr><tr><td>Producciones audiovisuales y cinematográficas<\/td><td>Devolución del <strong>50%<\/strong> del IVA en máximo <strong>90 días<\/strong><\/td><\/tr><tr><td>Buses urbanos (chasis y carrocerías) y tricimotos<\/td><td>Devolución en máximo <strong>30 días<\/strong>; el activo debe prestar el servicio al menos <strong>5 años<\/strong><\/td><\/tr><tr><td>Zonas Francas<\/td><td>Devolución sin intereses en máximo <strong>90 días<\/strong><\/td><\/tr><tr><td>Turismo receptivo (Art. 154)<\/td><td>Devolución del crédito no compensado; tope <strong>12%<\/strong> de los paquetes facturados<\/td><\/tr><tr><td>Misiones diplomáticas (Art. 179)<\/td><td>Según convenios y <strong>reciprocidad internacional<\/strong><\/td><\/tr><\/table>", "clave": "Vivienda social y audiovisuales: 90 días; buses y tricimotos: 30 días con permanencia del activo por 5 años."}, {"titulo": "RIMPE: sujetos, exclusiones y permanencia", "html": "<p>Título del RALRTI sobre el <strong>Régimen Simplificado para Emprendedores y Negocios Populares<\/strong>:<\/p><ul><li><strong>Art. 215<\/strong>: se sujetan las personas naturales y sociedades residentes y establecimientos permanentes que cumplan las condiciones de la LRTI.<\/li><li><strong>Art. 216<\/strong>: no pueden acogerse quienes realicen las actividades excluidas del literal d) del Art. 97.4 LRTI; la prohibición <strong>no alcanza a las Unidades Económicas Populares<\/strong>. Tampoco entran los inscritos en el RUC <strong>sin actividad económica registrada<\/strong>.<\/li><li><strong>Art. 217<\/strong>: permanencia máxima de <strong>tres (3) períodos fiscales anuales consecutivos<\/strong>; luego pasa al régimen general. Los <strong>negocios populares se mantienen<\/strong> mientras cumplan las condiciones.<\/li><li>Iniciar actividades después del 1 de enero cuenta como <strong>ejercicio fiscal completo<\/strong>.<\/li><li><strong>Art. 219<\/strong>: si se suspende el RUC y se reinicia <strong>en el mismo ejercicio<\/strong>, se mantiene en RIMPE; si reinicia en otro ejercicio, ya <strong>no puede volver<\/strong> al régimen.<\/li><\/ul>", "clave": "RIMPE emprendedor dura máximo 3 ejercicios consecutivos; el negocio popular permanece mientras cumpla condiciones (Art. 217)."}, {"titulo": "RIMPE: categorías, umbrales y recategorización", "html": "<p>Umbrales operativos que se consultan a diario (Arts. 221 y 230):<\/p><table><tr><th>Situación<\/th><th>Consecuencia<\/th><\/tr><tr><td>Negocio popular supera <strong>USD 20.000<\/strong><\/td><td>Actualiza RUC, declara según el régimen que corresponda y grava la tarifa general de IVA en sus ventas<\/td><\/tr><tr><td>Negocio popular entre <strong>20.000 y 300.000<\/strong><\/td><td>Se recategoriza; liquida el IR con las reglas y tarifas de <strong>RIMPE Emprendedor<\/strong><\/td><\/tr><tr><td>Contribuyente RIMPE supera <strong>USD 300.000<\/strong><\/td><td>Liquida el IR conforme al <strong>régimen general<\/strong>, sin perjuicio de su exclusión posterior<\/td><\/tr><\/table><ul><li>El SRI puede <strong>incluir, recategorizar o excluir<\/strong> de oficio en cualquier momento, notificando al contribuyente (Art. 221).<\/li><li>Los deberes del nuevo régimen son exigibles desde el <strong>mes siguiente<\/strong> a la actualización del RUC.<\/li><\/ul>", "clave": "Umbrales RIMPE: 20.000 (negocio popular) y 300.000 (tope del régimen); el SRI recategoriza de oficio (Arts. 221 y 230)."}, {"titulo": "RIMPE: deberes formales y comprobantes de venta", "html": "<p>Deberes formales (Arts. 222 a 224):<\/p><ul><li>Emitir comprobantes de venta, retención y documentos complementarios; <strong>solicitar comprobantes<\/strong> por sus compras.<\/li><li>Negocios populares: <strong>registro de ingresos y egresos<\/strong>; emprendedores llevan contabilidad solo si cumplen los presupuestos generales.<\/li><li>Solo los <strong>negocios populares<\/strong> pueden emitir <strong>notas de venta<\/strong> (o facturas, a su elección); al perder esa condición deben darlas de baja.<\/li><li>Todos los comprobantes incluyen la leyenda <strong>Contribuyente Régimen RIMPE<\/strong>.<\/li><li>Conservar documentos de sustento por un período <strong>no inferior a siete años<\/strong>.<\/li><li>Excluido del régimen, el contribuyente <strong>no puede emitir<\/strong> los comprobantes no utilizados.<\/li><\/ul>", "clave": "Notas de venta solo para negocios populares; leyenda Contribuyente Régimen RIMPE y archivo por 7 años (Arts. 223-224)."}, {"titulo": "RIMPE: renta anual hasta junio e IVA semestral", "html": "<p><strong>Impuesto a la Renta (Arts. 228 a 230)<\/strong>:<\/p><ul><li>Base imponible: <strong>ingresos brutos gravados<\/strong> menos descuentos y devoluciones; se excluyen loterías, dividendos, rendimientos financieros, herencias y pensiones jubilares (tributan por el régimen general).<\/li><li>Del impuesto causado se descuentan créditos tributarios, pero <strong>no aplica la rebaja por gastos personales<\/strong> (Art. 228).<\/li><li>Declaración y pago <strong>anual hasta el mes de junio<\/strong>, obligatoria aun sin valores (Art. 230).<\/li><\/ul><p><strong>IVA (Art. 236)<\/strong>: declaración <strong>semestral acumulada<\/strong> según noveno dígito: semestre enero-junio se paga en <strong>julio<\/strong> (del 10 al 28) y julio-diciembre en <strong>enero<\/strong>. Puede optar por declaraciones mensuales.<\/p><p><strong>Retenciones (Arts. 231-232)<\/strong>: los RIMPE <strong>no son agentes de retención<\/strong> de IR salvo excepciones; las retenciones que efectúen se declaran <strong>semestralmente<\/strong>; las que les practiquen constituyen <strong>crédito tributario<\/strong>.<\/p>", "clave": "RIMPE: renta anual hasta junio, IVA semestral en julio y enero, sin rebaja de gastos personales (Arts. 228-236)."}]}], "banco": [{"tipo": "om", "pregunta": "Una persona natural con cédula cuyo noveno dígito es 5 acude a ventanilla el 2 de marzo y pregunta hasta cuándo puede presentar su declaración anual de Impuesto a la Renta sin sanciones. ¿Qué le responde?", "opciones": ["Hasta el 10 de marzo", "Hasta el 18 de marzo", "Hasta el 18 de abril", "Hasta el 28 de marzo"], "correcta": 1, "feedback": "Art. 72 numeral 2 del RALRTI: para personas naturales el plazo inicia el 1 de febrero y, con noveno dígito 5, vence el 18 de marzo.", "tema": "Plazos de declaración"}, {"tipo": "om", "pregunta": "El contador de una compañía anónima con RUC terminado en noveno dígito 0 consulta la fecha máxima para declarar el Impuesto a la Renta de la sociedad. ¿Cuál es la respuesta correcta?", "opciones": ["28 de marzo", "20 de abril", "28 de abril", "10 de abril"], "correcta": 2, "feedback": "Art. 72 numeral 1 del RALRTI: las sociedades declaran del 10 al 28 de abril según el noveno dígito; el dígito 0 vence el 28 de abril.", "tema": "Plazos de declaración"}, {"tipo": "om", "pregunta": "Un contribuyente con domicilio principal en la provincia de Galápagos, noveno dígito 3, pregunta cuándo vence su declaración mensual de IVA. ¿Qué le indica?", "opciones": ["El 14 del mes siguiente, según su noveno dígito", "El 20 del mes siguiente, como el sector público", "Hasta el 28 del mes siguiente, sin atender al noveno dígito", "El último día hábil del mismo mes"], "correcta": 2, "feedback": "Arts. 72, 102 y 158 del RALRTI: los contribuyentes con domicilio principal en Galápagos pueden declarar hasta el 28 del mes siguiente sin atender al noveno dígito del RUC.", "tema": "Plazos de declaración"}, {"tipo": "om", "pregunta": "Una consultora que presta servicios gravados con tarifa distinta de 0% tiene RUC con noveno dígito 3. ¿Hasta qué día debe presentar su declaración mensual de IVA?", "opciones": ["10 del mes siguiente", "14 del mes siguiente", "16 del mes siguiente", "28 del mismo mes"], "correcta": 1, "feedback": "Art. 158 del RALRTI: la declaración mensual de IVA se paga el mes siguiente según el noveno dígito; el dígito 3 vence el día 14.", "tema": "Plazos de declaración"}, {"tipo": "om", "pregunta": "Un agricultor que vende exclusivamente productos gravados con tarifa 0% de IVA pregunta cuándo debe declarar el semestre de enero a junio. ¿Qué le responde?", "opciones": ["En junio, con su noveno dígito", "En julio, según su noveno dígito", "En enero del año siguiente", "No está obligado a declarar IVA"], "correcta": 1, "feedback": "Art. 158 del RALRTI: quienes transfieren bienes solo con tarifa 0% declaran semestralmente; el semestre enero-junio se declara en julio, del 10 al 28 según el noveno dígito.", "tema": "Plazos de declaración"}, {"tipo": "om", "pregunta": "El vencimiento de la declaración de un contribuyente cae el 28 del mes, que es feriado nacional, y el siguiente día hábil ya corresponde al mes posterior. ¿Cuál es la regla aplicable?", "opciones": ["Se traslada al siguiente día hábil del nuevo mes", "Se adelanta al último día hábil del mes de vencimiento", "Se concede automáticamente una prórroga de 8 días", "Debe pagar con intereses desde el 28"], "correcta": 1, "feedback": "Arts. 72 y 158 del RALRTI: el vencimiento en feriado pasa al siguiente día hábil, pero si con ello cambia de mes, la fecha se adelanta al último día hábil del mes de vencimiento.", "tema": "Plazos de declaración"}, {"tipo": "om", "pregunta": "Un contribuyente pregunta cómo operan actualmente los gastos personales en su Impuesto a la Renta. La respuesta técnica correcta es:", "opciones": ["Se restan de la base imponible antes de aplicar la tabla", "Constituyen una rebaja del impuesto causado, aplicable antes de imputar créditos tributarios", "Son un crédito tributario reembolsable en efectivo", "Solo aplican para trabajadores en relación de dependencia"], "correcta": 1, "feedback": "Art. 34 del RALRTI: las personas naturales gozan de una rebaja del Impuesto a la Renta causado, aplicable antes de imputar los créditos tributarios, calculada sobre la Canasta Familiar Básica de enero.", "tema": "Gastos personales"}, {"tipo": "om", "pregunta": "¿Cuál de los siguientes NO es un rubro de gastos personales reconocido por el Art. 34 del RALRTI?", "opciones": ["Turismo nacional en establecimientos registrados", "Vestimenta", "Transporte público y combustible", "Alimentación"], "correcta": 2, "feedback": "Art. 34 del RALRTI: los rubros son vivienda, salud, alimentación, vestimenta, turismo y educación (incluye arte y cultura). El transporte y el combustible no constan como rubro.", "tema": "Gastos personales"}, {"tipo": "om", "pregunta": "Un padre pregunta hasta qué edad puede considerar a su hijo sin discapacidad como carga familiar para la rebaja de gastos personales.", "opciones": ["Hasta los 18 años", "Hasta el año en que cumpla 21 años", "Hasta los 25 años si estudia", "Sin límite de edad si vive con él"], "correcta": 1, "feedback": "Art. 34 del RALRTI: los hijos sin condición de discapacidad pueden considerarse cargas familiares hasta el año en que cumplan 21 años.", "tema": "Gastos personales"}, {"tipo": "om", "pregunta": "Una carga familiar registrada empezó a percibir ingresos gravados este año. ¿En qué caso conserva su calidad de carga?", "opciones": ["Si sus ingresos no superan un salario básico unificado del ejercicio", "Si sus ingresos no superan tres canastas básicas", "Nunca; pierde la calidad con cualquier ingreso", "Solo si es hijo menor de 18 años"], "correcta": 0, "feedback": "Art. 34 del RALRTI: no deja de ser carga quien percibe ingresos gravados, siempre que no superen un salario básico unificado del ejercicio fiscal que se liquida.", "tema": "Gastos personales"}, {"tipo": "om", "pregunta": "Un trabajador en relación de dependencia pregunta en qué mes debe entregar a su empleador la proyección de gastos personales.", "opciones": ["Enero", "Febrero", "Marzo", "Diciembre del año anterior"], "correcta": 1, "feedback": "Art. 104 del RALRTI: los trabajadores presentan a su empleador, dentro del mes de febrero de cada año, la proyección de los gastos personales del ejercicio en curso.", "tema": "Gastos personales"}, {"tipo": "om", "pregunta": "Para obtener la alícuota mensual de retención del trabajador, el empleador toma el impuesto proyectado, resta la rebaja por gastos personales proyectados y divide el resultado para:", "opciones": ["12", "11", "13", "10"], "correcta": 1, "feedback": "Art. 104 del RALRTI: al impuesto proyectado se le resta la rebaja por la proyección de gastos personales y se divide para 11, pues en enero el empleador se abstiene de retener.", "tema": "Retenciones en la fuente"}, {"tipo": "om", "pregunta": "Una empresa recibió el comprobante de venta de su proveedor y pregunta el plazo máximo para entregarle el comprobante de retención.", "opciones": ["24 horas", "Cinco días de recibido el comprobante de venta", "Diez días hábiles", "Hasta el fin del mes en curso"], "correcta": 1, "feedback": "Art. 97 del RALRTI: los agentes de retención deben extender el comprobante de retención dentro del plazo máximo de cinco días de recibido el comprobante de venta.", "tema": "Comprobantes de retención"}, {"tipo": "om", "pregunta": "¿Qué retención mensual establece el Art. 92.1 del RALRTI para las instituciones financieras bajo control de la Superintendencia de Bancos y las empresas de telefonía móvil?", "opciones": ["1% sobre ingresos gravados", "1,5% sobre ingresos brutos", "1,75% sobre el total de sus ingresos gravados del mes", "2% sobre utilidades"], "correcta": 2, "feedback": "Art. 92.1 del RALRTI: deben efectuar una retención mensual del 1,75% sobre el total de sus ingresos gravados del mes (1,5% para contratos de hidrocarburos y transporte de crudo).", "tema": "Retenciones en la fuente"}, {"tipo": "om", "pregunta": "Un proveedor emite una sola factura con bienes y servicios sujetos a distintos porcentajes de retención, sin separar los valores. ¿Cómo debe retener el agente?", "opciones": ["Aplica el porcentaje promedio", "Aplica el porcentaje más bajo", "Aplica el porcentaje de retención más alto sobre todo el valor", "No retiene hasta que se corrija la factura"], "correcta": 2, "feedback": "Art. 113 del RALRTI: si los valores no se encuentran separados en la factura, se aplica el porcentaje de retención más alto.", "tema": "Retenciones en la fuente"}, {"tipo": "om", "pregunta": "Un contribuyente no pudo compensar su crédito tributario de IVA. ¿Dentro de qué plazo puede utilizarlo o solicitar su devolución antes de tener que cargarlo al gasto?", "opciones": ["Un año desde la declaración", "Tres años desde el pago", "Cinco años contados desde la fecha de exigibilidad de la declaración", "Siete años desde la emisión de la factura"], "correcta": 2, "feedback": "Art. 153 del RALRTI: el crédito tributario de IVA puede ser utilizado o solicitado en devolución hasta dentro de cinco años desde la exigibilidad de la declaración; vencido el plazo se carga al gasto.", "tema": "Crédito tributario IVA"}, {"tipo": "om", "pregunta": "Un exportador de banano solicita la devolución del IVA de un período. ¿Cuál es el límite máximo que el SRI puede devolverle por ese período?", "opciones": ["El 100% del IVA pagado sin límite", "El 12% del valor en aduana de las exportaciones efectuadas en ese período", "El 15% del total de sus ventas locales", "Dos salarios básicos unificados mensuales"], "correcta": 1, "feedback": "Art. 172 del RALRTI: la devolución a exportadores no puede exceder el 12% del valor en aduana de las exportaciones del período; el saldo se recupera con exportaciones futuras.", "tema": "Devoluciones de IVA"}, {"tipo": "om", "pregunta": "Un negocio popular RIMPE supera los USD 20.000 de ingresos durante el ejercicio corriente. ¿Qué debe hacer?", "opciones": ["Nada, permanece igual hasta que el SRI lo notifique", "Actualizar su RUC, declarar según el régimen que corresponda y gravar la tarifa general de IVA en sus ventas", "Salir inmediatamente del RIMPE al régimen general", "Suspender su RUC y reiniciar actividades"], "correcta": 1, "feedback": "Art. 221 del RALRTI: el negocio popular que supere USD 20.000 debe actualizar su RUC para declarar según el régimen correspondiente y gravar la tarifa de IVA en sus ventas; el IR se liquida con las reglas de RIMPE Emprendedor (Art. 230).", "tema": "RIMPE"}, {"tipo": "vf", "pregunta": "Los intereses pagados en libretas de ahorro a la vista pertenecientes a personas naturales están sujetos a retención en la fuente por rendimientos financieros.", "correcta": false, "feedback": "Falso. Art. 109 del RALRTI: no son objeto de retención los intereses pagados en libretas de ahorro a la vista de personas naturales.", "tema": "Retenciones en la fuente"}, {"tipo": "vf", "pregunta": "En los pagos de remuneraciones correspondientes al mes de enero, el empleador debe abstenerse de practicar la retención de Impuesto a la Renta a sus trabajadores.", "correcta": true, "feedback": "Verdadero. Art. 104 del RALRTI: la retención se practica desde los pagos de febrero; respecto de enero el empleador se abstiene de retener, por eso la alícuota se divide para 11.", "tema": "Retenciones en la fuente"}, {"tipo": "vf", "pregunta": "El comprobante de retención entregado por el empleador puede constituirse en la declaración de Impuesto a la Renta del trabajador que percibe ingresos de un solo empleador y no tiene valores que reliquidar por gastos personales.", "correcta": true, "feedback": "Verdadero. Art. 96 del RALRTI: en ese caso el comprobante de retención del empleador se constituye en la declaración del trabajador.", "tema": "Retenciones en la fuente"}, {"tipo": "vf", "pregunta": "Si un agente de retención no efectuó retenciones durante un mes, queda liberado de presentar la declaración de retenciones de ese período.", "correcta": false, "feedback": "Falso. Art. 100 del RALRTI: aunque no realice retenciones en uno o varios períodos, el agente está obligado a declarar; solo se exceptúa al empleador cuyos trabajadores no superan la fracción básica con tarifa 0.", "tema": "Retenciones en la fuente"}, {"tipo": "vf", "pregunta": "La devolución mensual de IVA a una persona adulta mayor no puede superar el monto equivalente a la tarifa de IVA vigente aplicada a la sumatoria de dos salarios básicos unificados.", "correcta": true, "feedback": "Verdadero. Art. 181 del RALRTI: el tope mensual es la tarifa de IVA vigente aplicada a dos SBU vigentes al 1 de enero del año de la adquisición.", "tema": "Devoluciones de IVA"}, {"tipo": "vf", "pregunta": "El sustituto de una persona con discapacidad no tiene derecho a la devolución del IVA; el beneficio es exclusivo del titular de la discapacidad.", "correcta": false, "feedback": "Falso. Art. 177 del RALRTI: el sustituto certificado por la autoridad competente sí accede a la devolución, pero el monto conjunto con la persona con discapacidad no puede superar el máximo aplicable a esta.", "tema": "Devoluciones de IVA"}, {"tipo": "vf", "pregunta": "La permanencia de un contribuyente en el Régimen RIMPE como emprendedor no puede superar tres períodos fiscales anuales consecutivos.", "correcta": true, "feedback": "Verdadero. Art. 217 del RALRTI: la permanencia máxima es de tres períodos fiscales anuales consecutivos; los negocios populares se mantienen mientras cumplan las condiciones.", "tema": "RIMPE"}, {"tipo": "vf", "pregunta": "Los contribuyentes sujetos al RIMPE pueden aplicar la rebaja por gastos personales contra su impuesto a la renta causado.", "correcta": false, "feedback": "Falso. Art. 228 del RALRTI: del impuesto causado en RIMPE se descuentan los créditos tributarios a que haya lugar, pero no la rebaja por gastos personales.", "tema": "RIMPE"}, {"tipo": "vf", "pregunta": "Los pagos superiores a mil dólares a un mismo proveedor dentro de un mes fiscal que no se realicen a través del sistema financiero no dan derecho a crédito tributario de IVA.", "correcta": true, "feedback": "Verdadero. Art. 157 numeral 4 del RALRTI: sin bancarización, las adquisiciones que en conjunto superen USD 1.000 al mismo proveedor o sus partes relacionadas en el mes no generan crédito tributario.", "tema": "Crédito tributario IVA"}, {"tipo": "vf", "pregunta": "Las Instituciones del Estado exentas del Impuesto a la Renta declaran y pagan las retenciones efectuadas hasta el día 20 del mes inmediato siguiente.", "correcta": true, "feedback": "Verdadero. Art. 103 del RALRTI: las Instituciones del Estado y empresas públicas exentas declaran y pagan sus retenciones hasta el día veinte (20) del mes siguiente.", "tema": "Retenciones en la fuente"}, {"tipo": "completar", "pregunta": "Una persona natural cuyo noveno dígito del RUC es 1 debe presentar su declaración anual de Impuesto a la Renta hasta el ____ de marzo.", "respuestas": ["10", "diez", "10 de marzo"], "feedback": "Art. 72 numeral 2 del RALRTI: con noveno dígito 1, la declaración de personas naturales vence el 10 de marzo.", "tema": "Plazos de declaración"}, {"tipo": "completar", "pregunta": "Para calcular la rebaja por gastos personales se considera el valor de la Canasta Familiar Básica vigente al mes de ____ del ejercicio fiscal que se liquida.", "respuestas": ["enero"], "feedback": "Art. 34 del RALRTI: se toma la Canasta Familiar Básica vigente al mes de enero del ejercicio fiscal respecto del cual se liquida el impuesto.", "tema": "Gastos personales"}, {"tipo": "completar", "pregunta": "Para la rebaja de gastos personales en el Régimen Especial de Galápagos, la canasta familiar básica se multiplica por el índice ____.", "respuestas": ["ipceg", "de precios al consumidor espacial de galapagos"], "feedback": "Art. 34 del RALRTI: en Galápagos la canasta se multiplica por el Índice de Precios al Consumidor Espacial de Galápagos (IPCEG).", "tema": "Gastos personales"}, {"tipo": "completar", "pregunta": "La retención en la fuente debe realizarse al momento del pago o ____ en cuenta, lo que suceda primero.", "respuestas": ["credito", "el credito", "credito en cuenta"], "feedback": "Art. 95 del RALRTI: la retención se realiza al momento del pago o crédito en cuenta, lo que suceda primero, entendiéndose efectuada dentro de cinco días del comprobante de venta.", "tema": "Retenciones en la fuente"}, {"tipo": "completar", "pregunta": "Los comprobantes de retención del IVA que justifican el crédito tributario deben conservarse en los archivos del contribuyente por el plazo de ____ años.", "respuestas": ["7", "siete"], "feedback": "Art. 156 del RALRTI: el contribuyente debe mantener los comprobantes de retención del IVA por el plazo de siete años.", "tema": "Crédito tributario IVA"}, {"tipo": "completar", "pregunta": "Los contribuyentes sujetos al Régimen RIMPE declaran y pagan su impuesto a la renta anual hasta el mes de ____.", "respuestas": ["junio"], "feedback": "Art. 230 del RALRTI: el resultado de la liquidación anual del RIMPE se declara y paga hasta el mes de junio, conforme las resoluciones del SRI.", "tema": "RIMPE"}, {"tipo": "completar", "pregunta": "El derecho a la devolución del IVA de las personas adultas mayores se reconoce mediante acto administrativo emitido en un término no mayor a ____ días.", "respuestas": ["60", "sesenta"], "feedback": "Art. 181 del RALRTI: el acto administrativo de devolución a adultos mayores se emite en un término no mayor a sesenta (60) días; vencido, se pagan intereses.", "tema": "Devoluciones de IVA"}, {"tipo": "completar", "pregunta": "Los comprobantes de venta emitidos por los sujetos pasivos del RIMPE deben incluir la leyenda Contribuyente Régimen ____.", "respuestas": ["rimpe"], "feedback": "Art. 223 del RALRTI: los comprobantes de venta y documentos complementarios del régimen incluyen la leyenda Contribuyente Régimen RIMPE.", "tema": "RIMPE"}]}, {"id": "vehiculos", "titulo": "Régimen Tributario Vehicular (Impuesto, Exoneraciones y Registro ANT-SRI)", "icono": "🚗", "descripcion": "Estudio integral del Impuesto Anual sobre la Propiedad de Vehículos Motorizados (IPVM): base imponible, tarifas y depreciación según el Decreto Ejecutivo 2085; exoneraciones y rebajas conforme la Resolución NAC-DGERCGC23-00000030; y el flujo de información ANT-SRI para bloqueos, bajas y reactivaciones según la Resolución NAC-DGERCGC20-00000068.", "tiempoMaxMin": 120, "dia": "Día 3 — jueves 16 de julio", "lecciones": [{"id": "l1", "titulo": "IPVM: base imponible, avalúo, depreciación, tarifas y pago", "duracionMin": 30, "slides": [{"titulo": "Marco normativo y naturaleza del impuesto", "html": "<p>El Impuesto Anual sobre la Propiedad de los Vehículos Motorizados (IPVM) grava la propiedad de vehículos destinados al transporte terrestre de personas o carga, de uso particular o de servicio público.<\/p><ul><li>Creado por la <strong>Ley 2001-41<\/strong> de Reforma Tributaria (R.O. Suplemento 325, <strong>14 de mayo de 2001<\/strong>).<\/li><li>Reglamentado por el <strong>Decreto Ejecutivo 2085<\/strong> (R.O. 460, <strong>23 de noviembre de 2001<\/strong>), vigente desde el <strong>1 de enero de 2002<\/strong>.<\/li><li>Última reforma relevante: <strong>Decreto Ejecutivo 1114<\/strong> (R.O. Suplemento 260, 4 de agosto de 2020), que modernizó el registro y la determinación.<\/li><li>Es un impuesto <strong>anual<\/strong>, administrado por el SRI y de determinación <strong>directa, anual y masiva<\/strong> en el registro tributario.<\/li><\/ul>", "clave": "El IPVM nace de la Ley 2001-41 y se reglamenta por el Decreto Ejecutivo 2085, profundamente reformado por el D.E. 1114 de 2020."}, {"titulo": "El Registro Tributario Vehicular (Art. 1 del Reglamento)", "html": "<p>Por disposición reformatoria del D.E. 1114, donde la norma decía <em>Base Nacional de Datos de Vehículos<\/em> debe leerse <strong>Registro Tributario Vehicular<\/strong>.<\/p><ul><li>El SRI mantiene este registro con información del <strong>organismo nacional de control de tránsito y transporte terrestre<\/strong> (ANT) y de terceros.<\/li><li>La <strong>veracidad, oportunidad y actualización<\/strong> de la información es responsabilidad de la entidad o sujeto que la reporta.<\/li><li>El <strong>sujeto pasivo tiene la obligación de verificar<\/strong> la información de sus vehículos y solicitar correcciones a la Administración Tributaria, previo y/o posterior al pago.<\/li><li>Sobre este registro el SRI ejerce sus facultades legales dentro de los plazos de la normativa vigente.<\/li><\/ul>", "clave": "El Registro Tributario Vehicular es la base de administración del IPVM; quien reporta responde por la información y el contribuyente debe verificarla."}, {"titulo": "Avalúo y base imponible: reglas de valoración (Art. 2)", "html": "<p>El SRI determina los avalúos <strong>hasta el 31 de diciembre de cada año<\/strong> y los incorpora al registro tributario. Reglas principales:<\/p><ul><li>Importadores, fabricantes y ensambladores informan al SRI, <strong>antes de la comercialización<\/strong>, los <strong>precios de venta al público incluidos impuestos<\/strong>: ese precio es la base imponible del año informado y el <em>valor base<\/em> para ejercicios siguientes.<\/li><li>Si varios importadores informan precios distintos para una misma marca, tipo y clase, el SRI toma el <strong>precio más alto<\/strong>.<\/li><li>Vehículos discontinuados: se toma el precio del <strong>último año de fabricación o ingreso al país<\/strong>; si es anterior al año 2000, se convierte a dólares a la cotización del <strong>15 de diciembre del año anterior<\/strong>.<\/li><li>Importación a título personal sin categorización existente: base imponible = <strong>valor CIF más impuestos, tasas y tributos al comercio exterior<\/strong>, sin considerar exoneraciones ni tarifas diferenciadas.<\/li><\/ul>", "clave": "La base imponible es el precio de venta al público informado por importadores y fabricantes; ante varios precios, se toma el más alto."}, {"titulo": "Depreciación anual y valor residual (Art. 2, numeral 3)", "html": "<p>Para modelos de años anteriores, el avalúo se obtiene aplicando depreciación sobre el avalúo original:<\/p><ul><li>Depreciación del <strong>20% anual<\/strong> respecto del avalúo original.<\/li><li>El valor residual <strong>no puede ser inferior al 10%<\/strong> del avalúo original.<\/li><\/ul><table><tr><th>Antigüedad<\/th><th>Depreciación acumulada<\/th><th>Avalúo (original US$ 20.000)<\/th><\/tr><tr><td>1 año<\/td><td><strong>20%<\/strong><\/td><td>16.000<\/td><\/tr><tr><td>2 años<\/td><td><strong>40%<\/strong><\/td><td>12.000<\/td><\/tr><tr><td>3 años<\/td><td><strong>60%<\/strong><\/td><td>8.000<\/td><\/tr><tr><td>4 años<\/td><td><strong>80%<\/strong><\/td><td>4.000<\/td><\/tr><tr><td>5 años o más<\/td><td>tope<\/td><td><strong>2.000 (piso del 10%)<\/strong><\/td><\/tr><\/table><p>El piso del 10% también aplica a vehículos discontinuados (Art. 2, numeral 4).<\/p>", "clave": "Depreciación del 20% anual sobre el avalúo original, con piso de valor residual del 10%."}, {"titulo": "Tabla de tarifas progresivas por avalúo (Art. 5, Ley 2001-41)", "html": "<p>La cuantía del IPVM se calcula con una tabla progresiva sobre el avalúo (base imponible), prevista en la <strong>Ley de Reforma Tributaria<\/strong>:<\/p><table><tr><th>Avalúo desde (US$)<\/th><th>Hasta (US$)<\/th><th>Sobre fracción básica (US$)<\/th><th>% sobre excedente<\/th><\/tr><tr><td>0<\/td><td>4.000<\/td><td>0<\/td><td><strong>0,5%<\/strong><\/td><\/tr><tr><td>4.001<\/td><td>8.000<\/td><td>20<\/td><td><strong>1,0%<\/strong><\/td><\/tr><tr><td>8.001<\/td><td>12.000<\/td><td>60<\/td><td><strong>2,0%<\/strong><\/td><\/tr><tr><td>12.001<\/td><td>16.000<\/td><td>140<\/td><td><strong>3,0%<\/strong><\/td><\/tr><tr><td>16.001<\/td><td>20.000<\/td><td>260<\/td><td><strong>4,0%<\/strong><\/td><\/tr><tr><td>20.001<\/td><td>24.000<\/td><td>420<\/td><td><strong>5,0%<\/strong><\/td><\/tr><tr><td>24.001<\/td><td>en adelante<\/td><td>620<\/td><td><strong>6,0%<\/strong><\/td><\/tr><\/table><p><em>Ejemplo:<\/em> avalúo de US$ 15.000 → 140 + 3% de 3.000 = <strong>US$ 230<\/strong> de impuesto anual.<\/p>", "clave": "Tarifa progresiva de 0,5% a 6% por tramos de avalúo: impuesto = fracción básica + porcentaje sobre el excedente."}, {"titulo": "Pago del impuesto: vehículos usados y nuevos (Art. 10)", "html": "<p>El IPVM se paga en las instituciones financieras autorizadas, <strong>en forma previa a la matriculación<\/strong>.<\/p><ul><li>Vehículos ya matriculados: se presenta la <strong>matrícula del año anterior<\/strong>.<\/li><li>Vehículos nuevos: el impuesto se paga <strong>antes de que el concesionario entregue el vehículo<\/strong>.<\/li><li>Adquisición entre el <strong>1 de enero y el 31 de marzo<\/strong>: se paga el <strong>100%<\/strong> del impuesto anual.<\/li><li>Adquisición <strong>a partir del segundo trimestre<\/strong>: pago proporcional = impuesto anual <strong>dividido para 12 y multiplicado por los meses que falten<\/strong> para terminar el año, <strong>incluyendo el mes de adquisición<\/strong>.<\/li><li>Los concesionarios que entreguen vehículos sin comprobante de pago son sancionados por <strong>falta reglamentaria<\/strong> según el Código Tributario.<\/li><\/ul><p><em>Ejemplo:<\/em> compra en mayo con impuesto anual de US$ 240 → 240/12 × 8 meses (mayo a diciembre) = <strong>US$ 160<\/strong>.<\/p>", "clave": "Vehículo nuevo comprado desde el segundo trimestre paga proporcionalmente por los meses restantes, incluido el mes de compra."}, {"titulo": "Casos especiales de pago y responsabilidad solidaria (Arts. 10 y 14)", "html": "<ul><li>Importación directa no habitual: el impuesto se paga <strong>antes de que el vehículo salga del distrito aduanero<\/strong>; en el traslado debe portar la <strong>guía de movilización<\/strong>, el comprobante de pago y los documentos de importación.<\/li><li>Compra de un vehículo cuyo anterior propietario estaba <strong>exento<\/strong>: el nuevo propietario paga en proporción al período entre la <strong>fecha de adquisición y el fin del año<\/strong>.<\/li><li><strong>Responsabilidad solidaria (Art. 14)<\/strong>: quien adquiere un vehículo con impuestos impagos de períodos anteriores responde solidariamente por las obligaciones adeudadas y por determinaciones posteriores.<\/li><li>El adquirente conserva el <strong>derecho a repetir<\/strong> el pago contra el anterior propietario.<\/li><\/ul>", "clave": "El comprador de un vehículo con deudas de IPVM es responsable solidario, con derecho a repetir contra el vendedor."}, {"titulo": "Vencimiento, exigibilidad, intereses y cobro (Arts. 10, 11, 12 y 13)", "html": "<ul><li><strong>Vencimiento<\/strong>: el <strong>último día hábil del ejercicio fiscal<\/strong> al que corresponde el tributo, con el cierre anual del sistema del SRI (fechas publicadas en la web y en la Gaceta Tributaria Digital).<\/li><li><strong>Exigibilidad<\/strong>: desde el <strong>primer día hábil del ejercicio siguiente<\/strong>, con la apertura del sistema; desde entonces corren <strong>intereses de mora<\/strong> conforme el Código Tributario.<\/li><li>El SRI puede cobrar incluso por la <strong>vía coactiva<\/strong>: las determinaciones de este impuesto son <strong>títulos ejecutivos suficientes<\/strong>.<\/li><li>Los bancos recaudadores depositan en el Banco Central y el SRI transfiere a la Cuenta Corriente Única del Tesoro en un plazo máximo de <strong>24 horas<\/strong> (Art. 11).<\/li><li>El impuesto es exigible para la <strong>matrícula, su renovación anual y el certificado de revisión vehicular<\/strong> (Art. 12); los vehículos impagos pueden ser <strong>retirados de circulación<\/strong> (Art. 13).<\/li><\/ul>", "clave": "El IPVM vence el último día hábil del ejercicio fiscal y es exigible con intereses desde el primer día hábil del ejercicio siguiente."}, {"titulo": "Determinación del impuesto (Art. 16) y determinación posterior", "html": "<ul><li>El SRI determina la obligación de <strong>forma directa<\/strong> en el registro tributario, de manera <strong>anual y masiva<\/strong>, con la apertura del sistema <strong>en enero<\/strong>.<\/li><li>La <strong>notificación<\/strong> de la determinación se realiza a través de la <strong>Gaceta Tributaria<\/strong>; para vehículos nuevos, el impuesto se determina <strong>al momento de la venta<\/strong>.<\/li><li>Dentro de los plazos de <strong>caducidad del numeral 2 del Art. 94 del Código Tributario<\/strong>, el SRI puede realizar una <strong>determinación posterior<\/strong> en el registro, con los intereses respectivos.<\/li><li>La determinación posterior procede <strong>por una sola vez respecto de cada elemento, rubro o aspecto<\/strong> considerado.<\/li><li>Estos actos gozan de <strong>presunción de legalidad y legitimidad<\/strong> y admiten recursos administrativos y jurisdiccionales.<\/li><\/ul>", "clave": "La determinación del IPVM es directa, anual y masiva en el registro tributario, notificada por la Gaceta Tributaria."}, {"titulo": "Transferencia de dominio de vehículos usados (Art. 5)", "html": "<p>Para transferir el dominio por compraventa de un vehículo usado, este debe estar <strong>matriculado<\/strong> y con el IPVM <strong>pagado hasta el año de la transferencia<\/strong>. Procedimiento:<\/p><ol><li><strong>Reconocimiento de firmas<\/strong> del comprador y vendedor ante Notario o Juez de lo Civil, en el contrato de compraventa.<\/li><li>El nuevo propietario paga el impuesto del <strong>1% a la compra de vehículos usados<\/strong> (Ley del Fondo de Vialidad para la Provincia de Loja - FONDVIAL).<\/li><li>La tarifa se aplica sobre el <strong>valor de la transacción<\/strong>, siempre que <strong>no sea inferior al avalúo<\/strong> del registro; caso contrario, se aplica sobre el <strong>avalúo<\/strong>.<\/li><li>Con el comprobante de pago se solicita al organismo de tránsito el <strong>registro del cambio de propietario<\/strong>.<\/li><\/ol>", "clave": "La compraventa de un vehículo usado exige impuestos al día y el pago del 1% sobre el mayor valor entre transacción y avalúo."}]}, {"id": "l2", "titulo": "Exoneraciones, rebajas y rebajas especiales del IPVM", "duracionMin": 30, "slides": [{"titulo": "Fundamento legal de las exoneraciones", "html": "<ul><li>El <strong>Art. 32 del Código Tributario<\/strong>: solo por <strong>disposición expresa de ley<\/strong> se establecen exenciones, especificando requisitos, tributos, y si son totales o parciales, permanentes o temporales.<\/li><li>Las exenciones del IPVM están en el <strong>Art. 6 de la Ley de Reforma Tributaria<\/strong>; las rebajas en los <strong>Arts. 7 y 9<\/strong>; y su desarrollo en los <strong>Arts. 7, 8, 9 y 9.1 del Reglamento<\/strong>.<\/li><li>El procedimiento operativo está en la <strong>Resolución NAC-DGERCGC23-00000030<\/strong> (Cuarto R.O. Suplemento 421, <strong>20 de octubre de 2023<\/strong>), que derogó la Resolución NAC-DGERCGC19-00000032.<\/li><li>El SRI verifica que el vehículo esté en su base y que <strong>no exista otra exoneración registrada por el mismo período<\/strong> (Art. 2 de la Resolución).<\/li><li>Los requisitos básicos constan en la sección de <strong>requisitos para trámites<\/strong> del portal <em>www.sri.gob.ec<\/em> (Art. 3).<\/li><\/ul>", "clave": "Las exoneraciones del IPVM solo existen por ley expresa (Art. 32 CT) y se tramitan según la Resolución NAC-DGERCGC23-00000030."}, {"titulo": "Exención total: sector público y entidades de beneficencia", "html": "<p>Están exentos por el <strong>Art. 6, literales a) y d)<\/strong> de la Ley de Reforma Tributaria:<\/p><ul><li>Entidades y organismos del <strong>sector público<\/strong> (Art. 225 de la Constitución), <strong>excepto las empresas públicas<\/strong>.<\/li><li>La <strong>Cruz Roja Ecuatoriana<\/strong>, la <strong>Sociedad de Lucha Contra el Cáncer (SOLCA)<\/strong> y la <strong>Junta de Beneficencia de Guayaquil<\/strong>.<\/li><li>La solicitud de registro se presenta <strong>por una sola vez<\/strong>, antes de la primera matriculación, y se mantiene vigente mientras se conserve la <strong>propiedad del vehículo y el RUC activo<\/strong> (Art. 4.1 de la Resolución 30).<\/li><li>Al transferir el vehículo, la entidad informa al SRI en el plazo de <strong>quince días<\/strong> (Art. 7.1 del Reglamento).<\/li><li>Matiz de maestría: por el <strong>Art. 41 de la Ley Orgánica de Empresas Públicas<\/strong>, estas aplican el régimen tributario del sector público (incluidas exoneraciones) si están inscritas en el RUC, llevan contabilidad y cumplen los deberes formales.<\/li><\/ul>", "clave": "Sector público (excepto empresas públicas por la Ley 41), Cruz Roja, SOLCA y Junta de Beneficencia gozan de exención total con solicitud por una sola vez."}, {"titulo": "Exención: diplomáticos y vehículos en turismo o tránsito aduanero", "html": "<ul><li><strong>Diplomáticos y organismos internacionales<\/strong>: exoneración bajo condiciones de <strong>reciprocidad<\/strong> y conforme convenios internacionales (Ley sobre Inmunidades, Privilegios y Franquicias Diplomáticas).<\/li><li>La solicitud la presenta el <strong>Ministerio de Relaciones Exteriores y Movilidad Humana<\/strong> desde el portal transaccional del SRI, <strong>por una sola vez<\/strong>; para funcionarios diplomáticos rige <strong>hasta el término de sus funciones<\/strong>.<\/li><li>El Ministerio debe <strong>informar al SRI<\/strong> si el beneficiario pierde el derecho.<\/li><li><strong>Turismo o tránsito aduanero<\/strong>: exentos si la permanencia en el país <strong>no supera los tres meses<\/strong>; la certificación la confiere la autoridad aduanera.<\/li><li>Si la permanencia <strong>supera los tres meses, causa de inmediato el impuesto<\/strong> y el vehículo no puede salir del país sin el comprobante de pago (Art. 7.4 del Reglamento).<\/li><\/ul>", "clave": "La exención diplomática opera por reciprocidad vía Cancillería; la de turismo caduca a los tres meses de permanencia."}, {"titulo": "Exención: choferes profesionales y operadoras de transporte", "html": "<p>Exentos por el <strong>Art. 6, literal c)<\/strong>: vehículos de servicio público de choferes profesionales (<strong>un vehículo por titular<\/strong>) y los de operadoras de transporte público de pasajeros y taxis legalmente constituidas.<\/p><ul><li>Requisitos del chofer profesional (Art. 4.3 de la Resolución 30): <strong>licencia de chofer profesional<\/strong>, <strong>documento habilitante vigente<\/strong> emitido por la autoridad de tránsito donde consten vehículo y propietario, y <strong>RUC con actividad de transporte<\/strong> según la modalidad autorizada.<\/li><li>Requisitos de operadoras (Art. 4.4): <strong>permiso de operación vigente<\/strong> y RUC con actividad de transporte.<\/li><li>La exoneración se registra <strong>por el tiempo del permiso de operación<\/strong> o hasta su revocatoria.<\/li><li>Si se incumple algún requisito, el impuesto se calcula <strong>en proporción<\/strong> desde la fecha del incumplimiento, <strong>sin necesidad de acto administrativo<\/strong>, más intereses.<\/li><li>Cambio de vehículo beneficiario: la solicitud debe hacerse <strong>previo al pago del impuesto<\/strong>; caso contrario el cambio rige <strong>desde el año siguiente<\/strong>.<\/li><\/ul>", "clave": "Choferes profesionales (un vehículo por titular) y operadoras se exoneran con título habilitante vigente y RUC con actividad de transporte."}, {"titulo": "Exoneración de vehículos eléctricos de uso particular", "html": "<p>Incorporada a la Resolución 30 por la <strong>Resolución NAC-DGERCGC25-00000038<\/strong> (R.O. Suplemento 167, 19 de noviembre de 2025). Aplica a eléctricos de uso particular, <strong>con excepción de motocicletas<\/strong>.<\/p><ul><li>Fabricantes e importadores reportan al SRI, <strong>hasta el 30 de noviembre de cada año<\/strong>, las características de motorización de cada vehículo.<\/li><li>Vehículo eléctrico: propulsado <strong>exclusivamente por energía eléctrica<\/strong>, batería cargada solo con esa fuente, <strong>sin emisiones contaminantes directas<\/strong> ni autogeneración con combustión interna (D.G. Séptima).<\/li><li>Régimen transitorio 2025: adquiridos <strong>antes del 14 de julio de 2025<\/strong> pagan proporcionalmente <strong>de enero a junio<\/strong> (impuesto/12 × 6, o por los meses desde la adquisición hasta junio).<\/li><li>Adquiridos <strong>desde el 14 de julio de 2025<\/strong>: <strong>exoneración total<\/strong>, sin pago en 2025 ni en períodos posteriores.<\/li><li>Si la convalidación determina que el vehículo no es realmente eléctrico, el SRI determina los <strong>períodos indebidamente exonerados<\/strong> más intereses, sin acto administrativo.<\/li><\/ul>", "clave": "Los vehículos 100% eléctricos particulares adquiridos desde el 14 de julio de 2025 tienen exoneración total del IPVM."}, {"titulo": "Rebaja del 80%: transporte y actividades productivas (Art. 7 Ley; Art. 5 Resolución)", "html": "<p>Tienen rebaja del <strong>80% del impuesto causado<\/strong>:<\/p><ul><li>Vehículos de <strong>servicio público de transporte de personas o carga<\/strong> no contemplados en la exención del literal c) del Art. 6.<\/li><li>Vehículos de <strong>una tonelada o más<\/strong> de personas naturales o empresas que los usen <strong>exclusivamente en actividades productivas o de comercio<\/strong>: transporte de trabajadores, materias primas, productos industrializados, alimentos, combustibles y agua.<\/li><\/ul><p>Requisitos para el caso productivo (Art. 5.2 de la Resolución 30):<\/p><ul><li><strong>RUC<\/strong> con la actividad productiva o de comercio registrada; uso <strong>directo y exclusivo<\/strong> en dicha actividad (distinta al transporte público o comercial).<\/li><li>Características del vehículo <strong>relacionadas con la actividad<\/strong>; declaraciones y anexos <strong>al día<\/strong>; autorización vigente de <strong>comprobantes de venta<\/strong>.<\/li><li>La solicitud se presenta <strong>en cada ejercicio fiscal<\/strong>, salvo <strong>grandes contribuyentes<\/strong>, cuyo registro se mantiene vigente mientras conserven tal calidad.<\/li><\/ul>", "clave": "La rebaja es del 80% para transporte público no exento y para vehículos de una tonelada o más de uso productivo exclusivo, con solicitud anual."}, {"titulo": "Rebaja especial: personas adultas mayores (Art. 9 Ley de Reforma Tributaria)", "html": "<ul><li>Para establecer la base imponible se aplica una rebaja especial del <strong>70% de una fracción básica gravada con tarifa cero<\/strong> de impuesto a la renta de personas naturales.<\/li><li>La rebaja <strong>se reduce cada año<\/strong> en los mismos porcentajes de depreciación del impuesto (20%), hasta llegar al <strong>porcentaje del valor residual<\/strong>.<\/li><li>Beneficio a razón de <strong>un solo vehículo por cada titular<\/strong>.<\/li><li>La solicitud se presenta <strong>por una sola vez<\/strong> y el registro se mantiene mientras el beneficiario conserve la propiedad del vehículo (Art. 7.2 de la Resolución 30).<\/li><li>Matiz de maestría: la exoneración general del <strong>Art. 14 de la Ley Orgánica de las Personas Adultas Mayores<\/strong> no aplica a este impuesto; sobre impuestos nacionales del SRI solo rigen los <strong>beneficios expresamente señalados en las leyes tributarias<\/strong>.<\/li><\/ul>", "clave": "El adulto mayor rebaja de la base imponible el 70% de una fracción básica de IR, para un solo vehículo, con solicitud por una sola vez."}, {"titulo": "Rebaja especial: personas con discapacidad (Art. 73 LOD; Art. 7 Resolución)", "html": "<ul><li>Rebaja de la base imponible de <strong>una fracción básica gravada con tarifa cero<\/strong> de IR (completa, no el 70%), ajustada por los porcentajes de depreciación hasta el valor residual.<\/li><li>Aplica a <strong>un solo vehículo por persona natural o jurídica<\/strong>; el solicitante debe tener la <strong>calificación de discapacidad<\/strong> otorgada por la autoridad competente.<\/li><li>Vehículo de tercero destinado al traslado: si el propietario es <strong>padre, madre, tutor o curador<\/strong>, presenta el documento que acredite su calidad; si <strong>no<\/strong> lo es, presenta además una <strong>declaración juramentada<\/strong> de que el vehículo se destina al traslado de la persona con discapacidad.<\/li><li><strong>No se registra simultáneamente<\/strong> el beneficio a dos o más vehículos vinculados a la misma persona con discapacidad.<\/li><li>El registro para vehículos de terceros se solicita <strong>en cada ejercicio fiscal<\/strong>; el SRI toma el <strong>porcentaje de discapacidad<\/strong> informado a la fecha del registro.<\/li><li>Si la solicitud se presenta <strong>a partir del segundo trimestre<\/strong>, el beneficio se aplica <strong>proporcionalmente por meses<\/strong> (Art. 9.1 del Reglamento).<\/li><\/ul>", "clave": "La rebaja por discapacidad es de una fracción básica completa de IR, para un solo vehículo, y exige calificación previa; con terceros no familiares requiere declaración juramentada."}, {"titulo": "Procedimiento: exoneración automática y solicitud (Art. 15 Reglamento; Art. 8 Resolución)", "html": "<ul><li>El SRI <strong>puede aplicar la exoneración de manera automática<\/strong> actualizando el catastro tributario vehicular, verificando condiciones con catastros de instituciones competentes y bases internas; el beneficio se <strong>renueva automáticamente<\/strong> mientras se cumplan las condiciones.<\/li><li>Si no es automática, se presenta <strong>solicitud<\/strong>; aceptada, <strong>no se requiere petición adicional<\/strong> para renovar en períodos que cumplan condiciones.<\/li><li>Puede registrarse la exención o reducción aun si el documento habilitante está <strong>en trámite<\/strong>, contando desde la fecha de compra (mercado local), de la liquidación de tributos (importados), del mes siguiente a la caducidad del habilitante, o del inicio del trámite certificado.<\/li><li>El beneficio debe solicitarse dentro de <strong>180 días hábiles<\/strong> desde esa fecha, plazo en el cual debe presentarse el <strong>título habilitante<\/strong>; si no se presenta, el SRI liquida el impuesto con intereses, sin perjuicio de volver a solicitar el registro.<\/li><li>Las solicitudes se presentan en <strong>cualquier oficina del SRI<\/strong> o por los <strong>canales en línea<\/strong> (D.G. Segunda); pueden ser <strong>masivas<\/strong> por operadoras para todos los vehículos de sus socios (Art. 6).<\/li><\/ul>", "clave": "La exoneración puede ser automática o por solicitud; con habilitante en trámite hay 180 días hábiles para presentarlo."}, {"titulo": "Control posterior y pérdida del beneficio", "html": "<ul><li>El sujeto pasivo debe <strong>comunicar al SRI en el término de 30 días hábiles<\/strong> desde que dejó de cumplir las condiciones del beneficio (Art. 15 del Reglamento).<\/li><li>Si el SRI verifica <strong>pérdida de propiedad<\/strong> (traspaso de dominio, fallecimiento del beneficiario) o incumplimiento de condiciones, <strong>modifica el registro sin acto administrativo<\/strong>; el propietario paga los períodos no exonerados <strong>más intereses<\/strong> (D.G. Sexta de la Resolución 30).<\/li><li>El SRI puede registrar <strong>de oficio<\/strong> la exoneración total o parcial con la información de sus bases y de otras entidades (D.G. Primera).<\/li><li>Cambio de tipo de exoneración sobre un mismo vehículo: se solicita <strong>previo al pago<\/strong>; caso contrario, el cambio rige <strong>desde el año siguiente<\/strong> (D.G. Cuarta).<\/li><li>Los registros de exoneración pueden abarcar <strong>uno o varios períodos fiscales<\/strong> verificados (D.G. Tercera).<\/li><\/ul>", "clave": "Quien pierde las condiciones del beneficio debe comunicarlo en 30 días hábiles; el SRI ajusta el registro sin acto administrativo y cobra con intereses."}]}, {"id": "l3", "titulo": "Registro vehicular e intercambio de información ANT-SRI", "duracionMin": 30, "slides": [{"titulo": "Marco normativo del intercambio ANT-SRI", "html": "<ul><li><strong>Resolución NAC-DGERCGC20-00000068<\/strong> (Segundo R.O. Suplemento 349, <strong>14 de diciembre de 2020<\/strong>): norma la información que la ANT transmite al SRI para el registro de <strong>bloqueos, desbloqueos, bajas y reactivaciones<\/strong> de registros vehiculares.<\/li><li>Base legal: <strong>Art. 13.1<\/strong> (no sujeción) y <strong>Art. 13.2<\/strong> (bloqueo y baja de oficio) de la Ley de Reforma Tributaria, agregados por la <strong>Ley Orgánica de Simplificación y Progresividad Tributaria<\/strong> (R.O. Suplemento 111, 31 de diciembre de 2019).<\/li><li>La <strong>ANT<\/strong> (Agencia Nacional de Regulación y Control del Transporte Terrestre, Tránsito y Seguridad Vial) es el ente de regulación, planificación y control del tránsito (Art. 16 LOTTTSV).<\/li><li>Para estos efectos, <strong>baja<\/strong> comprende indistintamente los procesos de <strong>baja, borrado y eliminación<\/strong> de registros de vehículos.<\/li><\/ul>", "clave": "La Resolución NAC-DGERCGC20-00000068 regula qué información y en qué plazos transmite la ANT al SRI sobre bloqueos, bajas y reactivaciones."}, {"titulo": "Ingreso de información al registro (Art. 3 del Reglamento)", "html": "<p>Para el ingreso de información de vehículos y propietarios se observan estas reglas:<\/p><ul><li>La <strong>autoridad aduanera<\/strong> ingresa la información de los vehículos importados, con indicación del <strong>régimen aduanero<\/strong> de internación.<\/li><li>Las <strong>fabricantes o ensambladoras nacionales<\/strong> ingresan la información de los vehículos que salen de los recintos fabriles.<\/li><li>Importadores y ensambladoras ingresan la información de los <strong>nuevos propietarios<\/strong>, quienes pagan el impuesto <strong>antes de retirar el vehículo<\/strong> del distribuidor.<\/li><li>Vehículos sin registro y sin información disponible: el tenedor obtiene <strong>sentencia judicial<\/strong> que declare la propiedad para su ingreso a la base.<\/li><li>Identificación del propietario: consta su <strong>RUC<\/strong>; las personas naturales sin actividad gravada solo requieren <strong>cédula de ciudadanía o identidad<\/strong>.<\/li><\/ul>", "clave": "Aduana, ensambladoras e importadores alimentan el registro; el propietario se identifica con RUC o, si no genera ingresos gravados, con cédula."}, {"titulo": "Modificación de características del vehículo (Art. 4 del Reglamento)", "html": "<p>Para cambios que afecten la <strong>identidad o el avalúo<\/strong> del vehículo (adición de carrocerías u otros elementos para usos especiales):<\/p><ol><li><strong>Autorización previa<\/strong> del organismo de tránsito competente, solicitada por el propietario <strong>antes del cambio<\/strong>.<\/li><li>Efectuados los cambios, el propietario <strong>comunica<\/strong> al organismo de tránsito, que ingresa la información al registro.<\/li><li>El propietario informa al <strong>SRI el costo de los cambios<\/strong>, adjuntando copia de las <strong>facturas<\/strong>.<\/li><\/ol><p>Esa información se considera para modificar el avalúo <strong>del año siguiente<\/strong> a aquel en que se operó el cambio.<\/p>", "clave": "Las modificaciones que alteran el avalúo requieren autorización previa de tránsito y se informan al SRI con facturas; afectan el avalúo del año siguiente."}, {"titulo": "Bloqueo y baja de oficio de vehículos (Art. 6 del Reglamento)", "html": "<ul><li>La ANT bloquea o suspende temporalmente <strong>de oficio<\/strong> los vehículos sin registro de matriculación, transacción u otro proceso administrativo o de control durante <strong>tres (3) años<\/strong> desde la última transacción o matriculación.<\/li><li>Se consideran <em>transacciones<\/em>: matriculación, renovación, revisión vehicular, determinación tributaria, sanciones, transacciones comerciales y todo registro que evidencie la existencia del vehículo.<\/li><li>Si después se verifica la propiedad, existencia o uso, el registro se <strong>reactiva<\/strong> y los valores pendientes se pagan <strong>en forma íntegra<\/strong>.<\/li><li>Se dan de <strong>baja<\/strong>: los registros bloqueados por un lapso continuo de <strong>tres (3) años<\/strong> y los vehículos <strong>perdidos, robados, chatarrizados<\/strong> o con pérdida definitiva determinada.<\/li><li>La ANT puede establecer <strong>otros casos<\/strong> de bloqueo o suspensión temporal de oficio.<\/li><\/ul>", "clave": "Tres años sin transacciones producen bloqueo de oficio; tres años continuos de bloqueo, o la pérdida definitiva, producen la baja del registro."}, {"titulo": "No sujeción y extinción de deudas vehiculares", "html": "<ul><li><strong>Art. 13.1 de la Ley de Reforma Tributaria<\/strong>: no están sujetos al IPVM los vehículos <strong>eliminados del Registro Único Vehicular<\/strong>, en los casos y condiciones del reglamento, <strong>siempre que exista la notificación al SRI<\/strong> por parte del organismo de control de tránsito.<\/li><li>El <strong>Art. 17 del Reglamento<\/strong> remite a resolución del SRI la información y el procedimiento para aplicar la no sujeción.<\/li><li><strong>Disposición Transitoria Segunda de la Ley Orgánica de Simplificación y Progresividad Tributaria<\/strong>: extinción de valores pendientes por tributos de matriculación vehicular de vehículos bloqueados por ser <strong>robados, hurtados, chatarrizados, desguazados, desarmados, no susceptibles de reparación, perdidos o destruidos por desastres naturales<\/strong>.<\/li><li>También aplica a <strong>transferencias de dominio no registradas por seis (6) años o más<\/strong>.<\/li><\/ul>", "clave": "La eliminación del Registro Único Vehicular notificada al SRI genera no sujeción; la ley dispuso además la extinción de deudas de vehículos robados o chatarrizados."}, {"titulo": "Procedimiento de transmisión de la información ANT-SRI (Art. 2 de la Resolución 68)", "html": "<ul><li>Regla general: la ANT informa al SRI de manera <strong>electrónica y automática<\/strong> el bloqueo, desbloqueo, baja y reactivación de registros.<\/li><li><strong>Automática<\/strong>: transmisión mediante medios tecnológicos (servicio web, vistas materializadas u otros similares) que permiten transmitir la información <strong>al instante<\/strong>.<\/li><li><strong>Electrónica<\/strong>: transmisión mediante medios digitales de gestión documental del Gobierno Nacional, como el <strong>Sistema de Gestión Documental Quipux<\/strong>.<\/li><li>Si no puede ser automática: plazo de <strong>cinco (5) días hábiles<\/strong> desde conocido el hecho, por vía electrónica.<\/li><li>Procesos de <strong>revisión masivos<\/strong>: la ANT remite la base de registros <strong>hasta el quinto día del mes siguiente<\/strong> a aquel en que se cumplieron los presupuestos legales.<\/li><li>La comunicación electrónica se dirige entre <strong>máximas autoridades<\/strong>, con posibilidad de <strong>delegación<\/strong> formalmente comunicada.<\/li><\/ul>", "clave": "La transmisión ANT-SRI es electrónica y automática; si no es automática, hay cinco días hábiles, y los procesos masivos se reportan hasta el quinto día del mes siguiente."}, {"titulo": "Contenido de la información y definiciones (Art. 3 de la Resolución 68)", "html": "<p>El reporte de la ANT al SRI debe contener el siguiente detalle:<\/p><table><tr><th>#<\/th><th>Dato<\/th><\/tr><tr><td>1<\/td><td><strong>Placa<\/strong><\/td><\/tr><tr><td>2<\/td><td><strong>RAMV / CPN<\/strong><\/td><\/tr><tr><td>3<\/td><td><strong>Chasis / VIN<\/strong><\/td><\/tr><tr><td>4<\/td><td><strong>Tipo de solicitud<\/strong>: bloqueo, desbloqueo, baja o reactivación<\/td><\/tr><tr><td>5<\/td><td><strong>Fecha<\/strong> del evento, acorde a la fecha en que ocurrió<\/td><\/tr><\/table><ul><li><strong>Desbloqueo<\/strong>: activación del registro de un vehículo previamente <strong>bloqueado<\/strong>.<\/li><li><strong>Reactivación<\/strong>: activación del registro de un vehículo previamente <strong>dado de baja<\/strong>.<\/li><\/ul>", "clave": "El reporte ANT contiene placa, RAMV/CPN, chasis/VIN, tipo de solicitud y fecha; desbloqueo revierte un bloqueo y reactivación revierte una baja."}, {"titulo": "Responsabilidades y atención al ciudadano", "html": "<ul><li>Es responsabilidad de la <strong>ANT<\/strong> verificar que la información reportada al SRI sea <strong>veraz, oportuna y actualizada<\/strong> (D.G. Primera de la Resolución 68).<\/li><li>El SRI <strong>únicamente consigna<\/strong> en su registro tributario vehicular la información de bloqueos, desbloqueos, bajas y reactivaciones procedente de la <strong>Dirección Nacional de la ANT<\/strong> (D.G. Segunda).<\/li><li>Los ciudadanos y entidades deben canalizar sus requerimientos sobre estos registros <strong>ante la ANT<\/strong>, que de ser procedentes los informa al SRI.<\/li><li>En ventanilla: si un contribuyente reclama por un vehículo robado o chatarrizado que sigue generando impuesto, se le orienta a gestionar el <strong>bloqueo o baja ante la ANT<\/strong>; el SRI actualizará su registro con esa notificación.<\/li><li>La transferencia de competencias del registro hacia la ANT se ordenó con cronograma y plazo improrrogable de <strong>nueve (9) meses<\/strong> (D.G. Tercera del Reglamento, reformada en 2021).<\/li><\/ul>", "clave": "La ANT es la única fuente válida de bloqueos y bajas para el SRI: los requerimientos ciudadanos sobre esos registros se gestionan ante la ANT."}]}], "banco": [{"tipo": "om", "pregunta": "Un contribuyente consulta el avalúo de su vehículo modelo 2023, cuyo avalúo original fue de US$ 20.000, para el ejercicio fiscal 2026 (3 años de antigüedad). ¿Cuál es la base imponible aplicando la depreciación reglamentaria?", "opciones": ["US$ 8.000", "US$ 12.000", "US$ 4.000", "US$ 2.000"], "correcta": 0, "feedback": "Art. 2, numeral 3 del Reglamento (D.E. 2085): depreciación del 20% anual sobre el avalúo original. Tres años = 60% de depreciación: 20.000 - 12.000 = US$ 8.000, superior al piso del 10% (2.000).", "tema": "Base imponible y depreciación"}, {"tipo": "om", "pregunta": "Un vehículo del año 2012 tuvo un avalúo original de US$ 15.000. Un ciudadano pregunta cuál es su avalúo actual, considerando que la depreciación acumulada ya supera el límite. ¿Qué valor debe informarse?", "opciones": ["US$ 0, porque está totalmente depreciado", "US$ 1.500, el valor residual mínimo del 10%", "US$ 3.000, el 20% del avalúo original", "US$ 750, el 5% del avalúo original"], "correcta": 1, "feedback": "Art. 2, numeral 3 del Reglamento: el valor residual no puede ser inferior al 10% del avalúo original. 10% de 15.000 = US$ 1.500.", "tema": "Base imponible y depreciación"}, {"tipo": "om", "pregunta": "Dos importadores informan precios distintos de venta al público para un vehículo de idéntica marca, tipo, clase y demás características: US$ 22.000 y US$ 24.500. ¿Qué avalúo registra el SRI?", "opciones": ["El promedio: US$ 23.250", "El menor: US$ 22.000, por favorabilidad al contribuyente", "El mayor: US$ 24.500", "El que fije la ANT en el Registro Único Vehicular"], "correcta": 2, "feedback": "Art. 2, numeral 2 del Reglamento: si respecto de características exactamente iguales existe distinta información de precios por haber varios importadores, el SRI considera el precio más alto.", "tema": "Base imponible y depreciación"}, {"tipo": "om", "pregunta": "Un ciudadano compra un vehículo nuevo en un concesionario el 10 de mayo. El impuesto anual calculado sobre el avalúo es de US$ 240. ¿Cuánto debe pagar antes de retirar el vehículo?", "opciones": ["US$ 240, siempre se paga el año completo", "US$ 140, por los 7 meses posteriores a la compra", "US$ 160, por 8 meses incluyendo mayo", "US$ 120, la mitad del impuesto anual"], "correcta": 2, "feedback": "Art. 10, numeral 2, literal b) del Reglamento: adquirido a partir del segundo trimestre, el impuesto se divide para 12 y se multiplica por los meses que falten para terminar el año, incluyendo el mes de adquisición: 240/12 × 8 = US$ 160.", "tema": "Pago del impuesto"}, {"tipo": "om", "pregunta": "Un turista extranjero ingresó su vehículo al país con certificación aduanera de turismo. Al cuarto mes de permanencia consulta si mantiene la exención. ¿Qué debe informársele?", "opciones": ["Mantiene la exención mientras el vehículo esté a su nombre", "Al superar los tres meses causa de inmediato el impuesto y el vehículo no puede salir del país sin el comprobante de pago", "Puede solicitar una prórroga de tres meses adicionales al SRI", "Solo paga el impuesto si decide matricular el vehículo en Ecuador"], "correcta": 1, "feedback": "Art. 7, numeral 4 del Reglamento y Art. 6, literal b) de la Ley de Reforma Tributaria: la exención por turismo o tránsito aduanero rige si la permanencia no supera tres meses; superado ese plazo causa de inmediato el impuesto.", "tema": "Exoneraciones"}, {"tipo": "om", "pregunta": "Una persona de 68 años solicita la rebaja especial del IPVM para su único vehículo. ¿Cómo se aplica el beneficio sobre la base imponible?", "opciones": ["Exoneración total del impuesto por ser adulto mayor", "Rebaja del 50% del impuesto causado", "Rebaja del 70% de una fracción básica gravada con tarifa cero de impuesto a la renta, que se reduce cada año según la depreciación hasta el valor residual", "Rebaja de una fracción básica completa de impuesto a la renta, sin ajuste anual"], "correcta": 2, "feedback": "Art. 9, primer inciso, de la Ley de Reforma Tributaria: rebaja especial del 70% de una fracción básica gravada con tarifa cero de IR, reducida cada año en los porcentajes de depreciación hasta el valor residual, a razón de un solo vehículo por titular.", "tema": "Rebajas especiales"}, {"tipo": "om", "pregunta": "Una persona con discapacidad calificada ya tiene registrada la rebaja especial sobre un vehículo de su propiedad y solicita aplicarla también a un segundo vehículo familiar. ¿Procede la solicitud?", "opciones": ["Sí, porque la Ley Orgánica de Discapacidades no limita el número de vehículos", "No: el beneficio aplica a un solo vehículo y no se registra simultáneamente a dos o más vehículos vinculados a la misma persona con discapacidad", "Sí, siempre que el segundo vehículo valga menos que una fracción básica", "Solo si el segundo vehículo es conducido exclusivamente por la persona con discapacidad"], "correcta": 1, "feedback": "Art. 73 de la Ley Orgánica de Discapacidades y Art. 7, numeral 1 de la Resolución NAC-DGERCGC23-00000030: la medida aplica a un (1) solo vehículo por persona natural o jurídica y no se registra simultáneamente a dos o más vehículos vinculados a la misma persona con discapacidad.", "tema": "Rebajas especiales"}, {"tipo": "om", "pregunta": "Un vecino, que no es padre, madre, tutor ni curador, destina su vehículo al traslado de una persona con discapacidad y solicita la rebaja especial. ¿Qué requisito adicional debe presentar?", "opciones": ["Un contrato notariado de comodato del vehículo", "Una declaración juramentada de la persona con discapacidad, su padre, madre, tutor, curador o equivalente, señalando que el vehículo se destina a su traslado", "Un certificado de convivencia emitido por el GAD municipal", "Ninguno adicional: basta la calificación de discapacidad"], "correcta": 1, "feedback": "Art. 7, numeral 1, literal b) de la Resolución NAC-DGERCGC23-00000030: el propietario que no sea padre, madre, tutor, curador o equivalente presenta una declaración juramentada que señale que el vehículo está destinado al traslado de la persona con discapacidad. Además, este registro se solicita en cada ejercicio fiscal.", "tema": "Rebajas especiales"}, {"tipo": "om", "pregunta": "Un comerciante con RUC activo solicita la rebaja del 80% para una camioneta de 0,8 toneladas que usa exclusivamente para transportar mercadería de su negocio. ¿Procede el beneficio?", "opciones": ["Sí, porque el uso es exclusivamente comercial", "Sí, pero solo por el 40% del impuesto", "No, porque el vehículo no alcanza el peso mínimo de una tonelada exigido por la ley", "No, porque la rebaja del 80% solo aplica a operadoras de transporte público"], "correcta": 2, "feedback": "Art. 7 de la Ley de Reforma Tributaria y Art. 5, numeral 2 de la Resolución NAC-DGERCGC23-00000030: la rebaja del 80% para uso productivo o de comercio exige vehículos de una tonelada o más. Con 0,8 toneladas no se cumple el presupuesto legal.", "tema": "Rebajas del 80%"}, {"tipo": "om", "pregunta": "Un taxista compró un vehículo nuevo y su permiso de operación aún está en trámite en la autoridad de tránsito. ¿Dentro de qué plazo debe solicitar el registro de la exención y presentar el título habilitante?", "opciones": ["30 días hábiles desde la compra", "90 días calendario desde la matriculación", "180 días hábiles contados desde la fecha de compra en el mercado local", "Hasta el 31 de diciembre del año siguiente"], "correcta": 2, "feedback": "Art. 8 de la Resolución NAC-DGERCGC23-00000030: la exención se registra si se solicita dentro de 180 días hábiles desde la fecha aplicable (compra en mercado local, liquidación de tributos, caducidad del habilitante o inicio del trámite), plazo dentro del cual debe presentarse el título habilitante; caso contrario el SRI liquida el impuesto con intereses.", "tema": "Procedimiento de exoneración"}, {"tipo": "om", "pregunta": "Un vehículo no registra matriculación, transacciones ni procesos administrativos o de control. ¿Cuándo procede su bloqueo de oficio y cuándo su baja?", "opciones": ["Bloqueo al año; baja a los dos años de bloqueo", "Bloqueo a los tres años desde la última transacción o matriculación; baja tras tres años continuos de bloqueo o por pérdida definitiva", "Bloqueo a los cinco años; baja a los diez años", "Bloqueo y baja simultáneos a los seis años"], "correcta": 1, "feedback": "Art. 6 del Reglamento (sustituido por el Art. 125 del D.E. 1114): bloqueo o suspensión temporal de oficio tras tres (3) años sin transacción; baja para los registros bloqueados por un lapso continuo de tres (3) años y para vehículos perdidos, robados, chatarrizados o con pérdida definitiva.", "tema": "Registro ANT-SRI"}, {"tipo": "om", "pregunta": "La ANT dio de baja el registro de un vehículo chatarrizado, pero la transmisión automática al SRI no está disponible. ¿En qué plazo y por qué medio debe informar?", "opciones": ["10 días calendario, mediante oficio físico", "5 días hábiles desde conocido el hecho, de manera electrónica mediante el Sistema de Gestión Documental Quipux", "48 horas, mediante correo electrónico institucional", "Hasta el cierre del ejercicio fiscal, por cualquier medio"], "correcta": 1, "feedback": "Art. 2 de la Resolución NAC-DGERCGC20-00000068: si la transmisión no puede ser automática, la ANT informa en el plazo de cinco (5) días hábiles desde conocido el hecho, de manera electrónica, es decir, mediante el Sistema de Gestión Documental Quipux.", "tema": "Registro ANT-SRI"}, {"tipo": "om", "pregunta": "¿Cuál de los siguientes datos NO forma parte del detalle mínimo que la ANT debe reportar al SRI para el registro de bloqueos, desbloqueos, bajas y reactivaciones?", "opciones": ["Placa", "Chasis / VIN", "Avalúo comercial del vehículo", "Fecha del bloqueo, desbloqueo, baja o reactivación"], "correcta": 2, "feedback": "Art. 3 de la Resolución NAC-DGERCGC20-00000068: el detalle es placa, RAMV/CPN, chasis/VIN, tipo de solicitud (bloqueo, desbloqueo, baja o reactivación) y fecha del evento. El avalúo comercial no forma parte del reporte.", "tema": "Registro ANT-SRI"}, {"tipo": "om", "pregunta": "Un contribuyente pregunta desde cuándo genera intereses de mora el IPVM no pagado del ejercicio 2025. ¿Qué debe responderle el funcionario?", "opciones": ["Desde el 1 de abril del mismo ejercicio", "Desde la fecha de matriculación del vehículo", "Desde el primer día hábil del ejercicio siguiente, con la apertura del sistema del SRI, momento en que el impuesto se vuelve exigible", "Nunca, porque el IPVM no genera intereses"], "correcta": 2, "feedback": "Art. 10, numerales 5 y 6 del Reglamento: el plazo de pago vence el último día hábil del ejercicio fiscal (cierre del sistema); a partir del primer día hábil del ejercicio siguiente, con la apertura del sistema, el impuesto es exigible y se causan intereses de mora conforme el Código Tributario.", "tema": "Pago del impuesto"}, {"tipo": "om", "pregunta": "En la venta de un vehículo usado, el contrato de compraventa señala US$ 6.000, pero el avalúo del registro es US$ 9.000. ¿Sobre qué valor se liquida el impuesto del 1% a la compra de vehículos usados?", "opciones": ["Sobre US$ 6.000, el valor pactado por las partes", "Sobre US$ 9.000, porque el valor de la transacción no puede ser inferior al avalúo del registro", "Sobre US$ 7.500, el promedio de ambos valores", "No se paga este impuesto si el vehículo tiene más de cinco años"], "correcta": 1, "feedback": "Art. 5, numeral 2 del Reglamento: el 1% (Ley del Fondo de Vialidad para la Provincia de Loja) se aplica sobre el valor de la transacción siempre que no sea inferior al avalúo del registro; caso contrario, se aplica sobre dicho avalúo.", "tema": "Transferencia de dominio"}, {"tipo": "om", "pregunta": "Un ciudadano adquirió un automóvil 100% eléctrico de uso particular el 20 de agosto de 2025. ¿Qué tratamiento tiene en el IPVM?", "opciones": ["Paga el impuesto proporcional de agosto a diciembre de 2025", "Paga el 50% del impuesto de 2025 y queda exonerado desde 2026", "Exoneración total: no paga el impuesto en 2025 ni en períodos posteriores", "Paga el impuesto completo de 2025 y solicita devolución en 2026"], "correcta": 2, "feedback": "Disposición Transitoria Segunda de la Resolución NAC-DGERCGC23-00000030 (agregada por la Resolución No. 38 de 2025): los vehículos 100% eléctricos adquiridos desde el 14 de julio de 2025 tienen exoneración total y no pagan el impuesto en 2025 ni en los períodos posteriores.", "tema": "Exoneraciones"}, {"tipo": "om", "pregunta": "Un chofer profesional exonerado vende su taxi y compra otro. Quiere trasladar la exoneración al nuevo vehículo, pero el impuesto de este ya está por pagarse. ¿Qué debe advertirle el funcionario de asistencia?", "opciones": ["Que el cambio es automático al matricular el nuevo vehículo", "Que debe presentar la solicitud de cambio antes del pago del impuesto; si la presenta después, el beneficio en el nuevo vehículo regirá desde el año siguiente", "Que la exoneración no es trasladable a otro vehículo bajo ninguna circunstancia", "Que debe esperar tres años para volver a solicitar la exoneración"], "correcta": 1, "feedback": "Art. 4, numeral 3 de la Resolución NAC-DGERCGC23-00000030: la solicitud de cambio de vehículo beneficiario debe realizarse previo al pago del impuesto; caso contrario, el cambio del beneficio se registra a partir del año siguiente. La misma regla aplica a adultos mayores y personas con discapacidad (Art. 7).", "tema": "Procedimiento de exoneración"}, {"tipo": "vf", "pregunta": "Según el artículo 6 de la Ley de Reforma Tributaria, los vehículos de propiedad de las empresas públicas están expresamente incluidos en la exención prevista para las entidades del sector público.", "correcta": false, "feedback": "Falso. El literal a) del Art. 6 de la Ley de Reforma Tributaria exceptúa expresamente a las empresas públicas de la exención del sector público. No obstante, el Art. 41 de la Ley Orgánica de Empresas Públicas les extiende el régimen tributario del sector público (incluidas exoneraciones) si están inscritas en el RUC, llevan contabilidad y cumplen sus deberes formales.", "tema": "Exoneraciones"}, {"tipo": "vf", "pregunta": "Quien adquiere un vehículo cuyo anterior propietario no pagó el IPVM de varios períodos es responsable solidario de esas obligaciones, sin perjuicio de su derecho a repetir el pago contra el anterior propietario.", "correcta": true, "feedback": "Verdadero. Art. 14 del Reglamento (sustituido por el Art. 132 del D.E. 1114): el adquirente responde solidariamente por las obligaciones adeudadas y las determinaciones posteriores, con derecho a repetir contra el anterior propietario.", "tema": "Pago del impuesto"}, {"tipo": "vf", "pregunta": "La rebaja especial del IPVM para adultos mayores debe solicitarse cada año para mantener su vigencia.", "correcta": false, "feedback": "Falso. Art. 7, numeral 2 de la Resolución NAC-DGERCGC23-00000030: la solicitud se presenta por una sola vez y el registro se mantiene vigente en los siguientes períodos fiscales mientras el beneficiario conserve la propiedad del vehículo.", "tema": "Rebajas especiales"}, {"tipo": "vf", "pregunta": "La solicitud de la reducción del 80% del IPVM para vehículos de una tonelada o más destinados a actividades productivas debe presentarse en cada ejercicio fiscal, salvo el caso de los grandes contribuyentes.", "correcta": true, "feedback": "Verdadero. Art. 5, numeral 2 de la Resolución NAC-DGERCGC23-00000030: la solicitud se presenta en cada ejercicio fiscal; para los contribuyentes catastrados como grandes contribuyentes, el registro se mantiene vigente mientras conserven tal calidad y cumplan las condiciones, sin acto administrativo.", "tema": "Rebajas del 80%"}, {"tipo": "vf", "pregunta": "En la Resolución NAC-DGERCGC20-00000068, el desbloqueo es el proceso por el cual se activa el registro de un vehículo que fue previamente dado de baja.", "correcta": false, "feedback": "Falso. Art. 3 de la Resolución NAC-DGERCGC20-00000068: el desbloqueo es la activación del registro de un vehículo previamente bloqueado; la reactivación es la activación del registro de un vehículo previamente dado de baja.", "tema": "Registro ANT-SRI"}, {"tipo": "vf", "pregunta": "Es obligación del sujeto pasivo verificar la información que consta en el Registro Tributario Vehicular respecto de los vehículos a su nombre y solicitar cualquier corrección a la Administración Tributaria, previo y/o posterior al pago.", "correcta": true, "feedback": "Verdadero. Art. 1 del Reglamento (sustituido por el Art. 124 del D.E. 1114): sin perjuicio de la responsabilidad de quien reporta, el sujeto pasivo debe verificar la información de sus vehículos y solicitar correcciones previo y/o posterior al pago.", "tema": "Registro Tributario Vehicular"}, {"tipo": "vf", "pregunta": "Si la solicitud de la rebaja especial por discapacidad se presenta a partir del segundo trim
