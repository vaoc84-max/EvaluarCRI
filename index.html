naciones ambientales<\/td><td>100% adicional, máx. <strong>10% de ingresos brutos anuales<\/strong> del ejercicio anterior<\/td><td>26<\/td><\/tr><\/table>", "clave": "Memorice: viajes 3%, indirectos del exterior 5%, incobrables 1%/10%, vehículos USD 35.000 (Art. 10)."}, {"titulo": "Deducciones adicionales por empleo (Art. 10 núms. 9, 9.1, 9.2 y 9.3)", "html": "<table><tr><th>Supuesto<\/th><th>Deducción adicional<\/th><\/tr><tr><td>Pagos a personas con discapacidad o trabajadores con cónyuge o hijos con discapacidad<\/td><td><strong>150%<\/strong><\/td><\/tr><tr><td>Nueva plaza de trabajo para contratación de mujeres<\/td><td>Hasta <strong>140%<\/strong> (12, 24 o 36 meses según % de la nómina)<\/td><\/tr><tr><td>Incremento neto de empleo de jóvenes 18-29 años y obligados a pagar pensiones alimenticias<\/td><td><strong>50%<\/strong><\/td><\/tr><tr><td>Jóvenes 18-29 graduados de instituciones públicas; sectores construcción y agricultura<\/td><td><strong>75%<\/strong><\/td><\/tr><tr><td>Personas que cumplieron pena privativa de libertad mayor a 1 año (o cónyuges)<\/td><td><strong>75%<\/strong> (50% si estuvieron privadas de libertad sin sentencia)<\/td><\/tr><\/table><p>Estas deducciones <strong>no son acumulables entre sí<\/strong> y exigen estar al día con SRI, IESS y Ministerio del Trabajo.<\/p>", "clave": "Discapacidad 150%, mujeres hasta 140%, jóvenes 50%-75%, construcción/agricultura 75% (Art. 10 núms. 9 a 9.3)."}, {"titulo": "Otras deducciones adicionales (Art. 10)", "html": "<ul><li><strong>Seguros médicos privados y/o medicina prepagada<\/strong> para la totalidad de los trabajadores: <strong>100% adicional<\/strong> (num. 12).<\/li><li><strong>Depreciación de maquinaria y tecnología limpia<\/strong> (energías renovables, producción más limpia): <strong>100% adicional<\/strong>, sin superar el <strong>5% de los ingresos totales<\/strong> (num. 7).<\/li><li><strong>Publicidad y patrocinio<\/strong> a deportistas, estudiantes de bajos recursos, entidades educativas y entidades de lucha contra la desnutrición: <strong>150% adicional<\/strong> (num. 19); los comercializadores de <strong>alimentos ultraprocesados no pueden deducir publicidad<\/strong>.<\/li><li><strong>Compras a organizaciones de la EPS-microempresas:<\/strong> deducción adicional de hasta <strong>10%<\/strong> (num. 24).<\/li><li><strong>Eventos artísticos y culturales y aportes al fomento de las artes:<\/strong> hasta <strong>150% adicional<\/strong> (núms. 22 y 23).<\/li><li><strong>Seguros de crédito para exportación:<\/strong> 50% adicional (num. 4).<\/li><\/ul>", "clave": "Seguros médicos del personal 100% adicional; publicidad de ultraprocesados no es deducible (Art. 10 núms. 12 y 19)."}, {"titulo": "Rebaja por gastos personales (Art. innumerado post Art. 10)", "html": "<p>Las personas naturales gozan de una <strong>rebaja del IR causado<\/strong> (no una deducción de la base) por gastos personales:<\/p><ul><li><strong>Sin cargas familiares:<\/strong> 18% del menor valor entre los gastos declarados y <strong>7 canastas familiares básicas<\/strong>.<\/li><li><strong>Con cargas familiares:<\/strong> <strong>18%<\/strong> del menor valor entre gastos declarados y el número de canastas según la tabla de cargas.<\/li><li><strong>Con o a cargo de personas con discapacidad o enfermedades catastróficas, raras o huérfanas:<\/strong> 18% del menor valor entre gastos y <strong>100 canastas<\/strong>.<\/li><li>Rubros: vestimenta, educación, alimentación, salud (incluye <strong>gastos médicos de mascotas<\/strong>), vivienda, turismo nacional, pensiones alimenticias, arte y cultura e intereses de préstamos quirografarios e hipotecarios. Se excluye el IVA e ICE.<\/li><li>Si la rebaja supera el impuesto causado, <strong>no hay pago en exceso ni devolución<\/strong>. Cargas: padres, cónyuge e hijos hasta 21 años o con discapacidad, sin ingresos gravados.<\/li><\/ul>", "clave": "La rebaja de gastos personales es el 18% del menor valor entre gastos y canastas básicas (7, tabla o 100), y no genera devolución."}, {"titulo": "Amortización de pérdidas (Art. 11) y amortización de intangibles (Art. 12)", "html": "<ul><li>Sociedades y PN obligadas a llevar contabilidad pueden compensar pérdidas con utilidades gravables de los <strong>5 períodos impositivos siguientes<\/strong>.<\/li><li>Límite anual: <strong>25% de las utilidades<\/strong> obtenidas en cada período.<\/li><li>En liquidación de la sociedad, el saldo es deducible <strong>en su totalidad<\/strong> en el ejercicio de terminación.<\/li><li>No se aceptan pérdidas por enajenación de activos entre <strong>partes relacionadas<\/strong> o con parientes hasta 4º de consanguinidad / 2º de afinidad; las rentas del trabajo en relación de dependencia <strong>no se afectan con pérdidas<\/strong>.<\/li><li><strong>Art. 12:<\/strong> intangibles se amortizan en el plazo del contrato o en <strong>20 años<\/strong>; no es deducible el deterioro de intangibles con vida útil indefinida.<\/li><\/ul>", "clave": "Pérdidas: compensables en 5 años, máximo 25% de las utilidades de cada ejercicio (Art. 11)."}, {"titulo": "Tarifa de personas naturales 2026 (Art. 36 lit. a)", "html": "<p>Tabla progresiva del año <strong>2026<\/strong> (9 tramos):<\/p><table><tr><th>Fracción básica USD<\/th><th>Exceso hasta USD<\/th><th>Imp. fracción básica<\/th><th>% fracción excedente<\/th><\/tr><tr><td>0<\/td><td>12.208<\/td><td>0<\/td><td><strong>0%<\/strong><\/td><\/tr><tr><td>12.208<\/td><td>15.549<\/td><td>0<\/td><td>5%<\/td><\/tr><tr><td>15.549<\/td><td>20.188<\/td><td>167<\/td><td>10%<\/td><\/tr><tr><td>20.188<\/td><td>26.700<\/td><td>631<\/td><td>12%<\/td><\/tr><tr><td>26.700<\/td><td>35.136<\/td><td>1.412<\/td><td>15%<\/td><\/tr><tr><td>35.136<\/td><td>46.575<\/td><td>2.678<\/td><td>20%<\/td><\/tr><tr><td>46.575<\/td><td>62.005<\/td><td>4.965<\/td><td>25%<\/td><\/tr><tr><td>62.005<\/td><td>82.679<\/td><td>8.823<\/td><td>30%<\/td><\/tr><tr><td>82.679<\/td><td>109.956<\/td><td>15.025<\/td><td>35%<\/td><\/tr><tr><td>109.956<\/td><td>En adelante<\/td><td>24.572<\/td><td><strong>37%<\/strong><\/td><\/tr><\/table><p>Los rangos se actualizan cada año según la variación del <strong>IPC urbano del INEC al 30 de noviembre<\/strong>.<\/p>", "clave": "2026: fracción básica desgravada USD 12.208 y tarifa marginal máxima 37% (Art. 36 lit. a)."}, {"titulo": "Herencias, legados, donaciones y loterías (Art. 36 lits. c y d)", "html": "<ul><li>Grava los incrementos patrimoniales a <strong>título gratuito<\/strong>; tabla progresiva propia 2026: 0% hasta <strong>USD 78.527<\/strong> y tarifa máxima del <strong>35%<\/strong>.<\/li><li>Beneficiarios dentro del <strong>primer grado de consanguinidad<\/strong> con el causante: tarifas <strong>reducidas a la mitad<\/strong>.<\/li><li>Hecho generador: la <strong>aceptación expresa o tácita<\/strong>. Plazo de declaración de herencias: <strong>6 meses<\/strong> desde la aceptación; donaciones: en forma <strong>previa<\/strong> a la inscripción de la escritura.<\/li><li>No sujetos: seguros de vida a beneficiarios de la póliza y becas de estudio.<\/li><li><strong>Loterías y premios (lit. c):<\/strong> los beneficiarios pagan un impuesto único del <strong>15%<\/strong> sobre cada premio que sobrepase una fracción básica desgravada (excepto JBG y Fe y Alegría); operadoras de pronósticos deportivos: tarifa <strong>15%<\/strong>.<\/li><\/ul>", "clave": "Herencias: tabla propia con 0% hasta 78.527 USD, mitad de tarifa para primer grado; premios de loterías 15% (Art. 36)."}, {"titulo": "Tarifa de sociedades (Art. 37)", "html": "<ul><li><strong>Tarifa general: 25%<\/strong> sobre la base imponible para sociedades constituidas en Ecuador, sucursales y establecimientos permanentes.<\/li><li><strong>+3 puntos (28%)<\/strong> cuando: a) la sociedad incumple el deber de informar su composición societaria; o b) tiene titular en <strong>paraíso fiscal<\/strong> con beneficiario efectivo residente en Ecuador. Si esa participación es <strong>igual o superior al 50%<\/strong>, los 3 puntos aplican a toda la base; si es menor, en proporción.<\/li><li><strong>Rebaja de 3 puntos (22%)<\/strong> para <strong>micro y pequeñas empresas<\/strong> y <strong>exportadores habituales<\/strong> que mantengan o incrementen empleo.<\/li><li>Préstamos a socios o accionistas se consideran <strong>pago de dividendos anticipados<\/strong>: retención con la tarifa de sociedades.<\/li><\/ul>", "clave": "Sociedades: 25% general; 28% con paraísos fiscales o falta de información societaria; 22% micro/pequeñas y exportadores habituales (Art. 37)."}, {"titulo": "Reducciones por inversión y estabilidad (Arts. 37.1, 37.2, 37.3)", "html": "<ul><li><strong>Art. 37.1:<\/strong> reducción del <strong>10%<\/strong> de la tarifa por reinversión de utilidades en programas prioritarios de discapacidad, deporte, cultura, ciencia y tecnología (<strong>8%<\/strong> en el resto de programas).<\/li><li><strong>Art. 37.2:<\/strong> reducción de <strong>3 puntos porcentuales hasta por 15 años<\/strong> para nuevas inversiones productivas; la reducción acumulada no excede el monto de la inversión.<\/li><li><strong>Art. 37.3:<\/strong> reducción especial de <strong>hasta 5 puntos<\/strong> para sociedades que suscriban <strong>contratos de inversión<\/strong> (COPCI).<\/li><li><strong>Estabilidad tributaria:<\/strong> régimen general de IR estable por <strong>5 años<\/strong> a cambio de <strong>+2 puntos<\/strong> de tarifa.<\/li><li><strong>Impuesto único del 10%<\/strong> a la utilidad en enajenación de acciones de sociedades ecuatorianas; en bolsa de valores hay exención de hasta 50 fracciones básicas y tarifa del 5% sobre el exceso en ciertos casos (Art. 9 num. 24).<\/li><\/ul>", "clave": "Nuevas inversiones: -3 puntos hasta 15 años; con contrato de inversión hasta -5 puntos; enajenación de acciones: impuesto único 10% (Arts. 37.2, 37.3)."}, {"titulo": "Dividendos (Art. 39.2) y utilidades no distribuidas (Art. 39.2.1)", "html": "<table><tr><th>Situación de la distribución<\/th><th>Tarifa<\/th><\/tr><tr><td>Regla general (impuesto único sobre el monto distribuido)<\/td><td><strong>12%<\/strong><\/td><\/tr><tr><td>Distribución a no residentes<\/td><td><strong>10%<\/strong><\/td><\/tr><tr><td>No residente pero beneficiario efectivo residente en Ecuador<\/td><td><strong>12%<\/strong><\/td><\/tr><tr><td>Paraíso fiscal en la cadena + beneficiario efectivo residente<\/td><td><strong>14%<\/strong><\/td><\/tr><tr><td>Incumplimiento del deber de informar composición societaria<\/td><td><strong>14%<\/strong><\/td><\/tr><\/table><ul><li>La sociedad actúa como <strong>agente de retención del 100%<\/strong> del impuesto al momento de la distribución.<\/li><li>Persona natural residente: <strong>franja exenta de 3 salarios básicos unificados<\/strong> por cada sociedad y período fiscal.<\/li><li>Distribución a <strong>sociedades residentes o EP en Ecuador: no gravada<\/strong>.<\/li><li><strong>Art. 39.2.1:<\/strong> pago a cuenta sobre utilidades acumuladas no distribuidas hasta el 31 de julio, compensable con retenciones por dividendos.<\/li><\/ul>", "clave": "Dividendos: impuesto único 12% (10% a no residentes, 14% con paraíso fiscal o falta de información) y franja exenta de 3 SBU (Art. 39.2)."}]}, {"id": "l3", "titulo": "Declaración, retenciones en la fuente y anticipos", "duracionMin": 40, "slides": [{"titulo": "Declaración del IR y declaración patrimonial (Arts. 40 y 40-A)", "html": "<ul><li>Las declaraciones del IR se presentan <strong>anualmente<\/strong> en los lugares y fechas determinados por el reglamento (según el <strong>noveno dígito del RUC o cédula<\/strong>: personas naturales en marzo y sociedades en abril).<\/li><li>Si terminan las actividades antes de finalizar el ejercicio, procede la <strong>declaración anticipada<\/strong> y luego la cancelación del RUC o la suspensión de actividades; aplica también a la PN que se ausente del país más allá del cierre del ejercicio.<\/li><li><strong>Art. 40-A:<\/strong> las personas naturales presentarán una <strong>declaración de su patrimonio<\/strong> conforme a las condiciones del reglamento.<\/li><li>La enajenación de acciones debe informarse al SRI; la falta de presentación se sanciona con multa del <strong>5% del valor real de la transacción<\/strong>.<\/li><\/ul>", "clave": "El IR se declara anualmente conforme al reglamento; existe además declaración patrimonial para PN (Arts. 40 y 40-A)."}, {"titulo": "Anticipo voluntario del IR (Art. 41)", "html": "<p>Desde la reforma de 2019-2021, el anticipo dejó de ser obligatorio:<\/p><ul><li>El pago del impuesto <strong>podrá anticiparse de forma voluntaria<\/strong>.<\/li><li>Equivale al <strong>50% del impuesto a la renta causado del ejercicio fiscal anterior, menos las retenciones en la fuente<\/strong> efectuadas en dicho ejercicio.<\/li><li>El valor anticipado constituye <strong>crédito tributario<\/strong> para el pago del IR.<\/li><li>Fórmula: <strong>Anticipo = 50% × IR causado (t-1) − retenciones (t-1)<\/strong>.<\/li><\/ul>", "clave": "El anticipo de IR es voluntario: 50% del impuesto causado del año anterior menos retenciones, y es crédito tributario (Art. 41)."}, {"titulo": "Quiénes no están obligados a declarar (Art. 42)", "html": "<ul><li>Contribuyentes <strong>domiciliados en el exterior<\/strong> sin representante en el país y cuyos ingresos estén sujetos íntegramente a retención en la fuente.<\/li><li>Personas naturales cuyos ingresos brutos no excedan la <strong>fracción básica no gravada<\/strong> del Art. 36 (USD 12.208 en 2026).<\/li><li>Otros que establezca el Reglamento.<\/li><li><strong>Todas las demás personas están obligadas a declarar<\/strong>, aun cuando la totalidad de sus rentas sean ingresos exentos.<\/li><li><strong>Art. 42.1:<\/strong> fideicomisos mercantiles con actividad empresarial declaran y pagan como sociedades; los que no la desarrollan presentan solo <strong>declaración informativa<\/strong>.<\/li><\/ul>", "clave": "No declaran: no residentes con retención total e ingresos bajo la fracción básica; los demás declaran incluso con rentas exentas (Art. 42)."}, {"titulo": "Retención en relación de dependencia (Art. 43)", "html": "<ul><li>Los <strong>empleadores<\/strong> (personas naturales o sociedades) actúan como agentes de retención sobre los pagos a trabajadores en relación de dependencia.<\/li><li>La retención se calcula con base en las <strong>tarifas del Art. 36<\/strong> (tabla progresiva anual), proyectando la renta del ejercicio conforme al procedimiento reglamentario.<\/li><li>El comprobante de retención por rentas del trabajo se entrega <strong>en enero de cada año<\/strong> respecto de las rentas del año precedente (Art. 50).<\/li><li>Para el trabajador, esta retención es <strong>crédito tributario<\/strong> imputable a su declaración anual.<\/li><\/ul>", "clave": "El empleador retiene mensualmente según la tabla del Art. 36 y entrega el comprobante anual en enero (Arts. 43 y 50)."}, {"titulo": "Rendimientos financieros y otras retenciones (Arts. 44 y 45)", "html": "<ul><li><strong>Art. 44:<\/strong> las entidades que paguen o acrediten <strong>intereses o rendimientos financieros<\/strong> actúan como agentes de retención.<\/li><li><strong>Art. 45:<\/strong> los contribuyentes <strong>calificados por el SRI<\/strong> como agentes de retención retienen sobre cualquier otro ingreso gravado; el SRI fija los porcentajes, que <strong>no podrán ser superiores al 10%<\/strong> del pago o crédito.<\/li><li>Intereses y comisiones en operaciones de crédito <strong>entre instituciones del sistema financiero<\/strong>: retención del <strong>1%<\/strong>.<\/li><li>No procede retención en pagos al patrimonio de propósito exclusivo en procesos de <strong>titularización<\/strong>.<\/li><\/ul>", "clave": "Retenciones señaladas por el SRI: máximo 10%; entre instituciones financieras la retención es del 1% (Art. 45)."}, {"titulo": "Grandes contribuyentes: autorretención (Art. 45)", "html": "<ul><li>Las sociedades calificadas como <strong>Grandes Contribuyentes no son sujetas de retención<\/strong> por ningún agente, salvo excepciones (contratos petroleros con el Estado, contratos con gobierno central, GAD y seguridad social).<\/li><li>Deben efectuar una <strong>autorretención mensual del IR<\/strong> sobre el total de sus ingresos gravados del mes, excluyendo los ya retenidos.<\/li><li>El porcentaje lo fija el SRI en función de la <strong>tasa impositiva efectiva<\/strong> de su actividad económica; constituye <strong>crédito tributario<\/strong>.<\/li><li>Comisionistas: la autorretención se calcula sobre el valor de la <strong>comisión<\/strong>.<\/li><\/ul>", "clave": "Grandes Contribuyentes: no se les retiene, pero se autorretienen mensualmente según su tasa impositiva efectiva (Art. 45)."}, {"titulo": "Crédito tributario por retenciones y devolución (Arts. 46 y 47)", "html": "<ul><li>Los valores retenidos son <strong>crédito tributario<\/strong>: se restan del impuesto causado en la declaración anual (Art. 46).<\/li><li>Si las retenciones superan el impuesto causado o no existe impuesto causado, el contribuyente puede (Art. 47): solicitar el <strong>pago en exceso<\/strong>, presentar reclamo de <strong>pago indebido<\/strong>, o usarlo como crédito tributario <strong>sin intereses<\/strong> en ejercicios posteriores <strong>hasta dentro de 3 años<\/strong> desde la declaración.<\/li><li>Si el SRI determina un crédito menor o inexistente, se paga lo utilizado con intereses <strong>más un recargo del 100%<\/strong> del impuesto con el que se pretendió perjudicar al Estado.<\/li><\/ul>", "clave": "Retenciones en exceso: devolución o crédito tributario hasta 3 años; uso indebido genera recargo del 100% (Art. 47)."}, {"titulo": "Pagos al exterior y no residentes (Arts. 39, 48 y 49)", "html": "<ul><li><strong>Art. 48:<\/strong> quienes realicen pagos o créditos en cuenta al exterior que constituyan rentas gravadas actúan como <strong>agentes de retención<\/strong>; incluye reembolsos de honorarios, comisiones y regalías.<\/li><li><strong>Art. 39:<\/strong> ingresos de no residentes sin porcentaje específico pagan la <strong>tarifa general de sociedades (25%)<\/strong>, retenida en la fuente; si el perceptor está en <strong>paraíso fiscal<\/strong>, se retiene la <strong>máxima tarifa de personas naturales (37%)<\/strong>.<\/li><li><strong>Art. 49:<\/strong> el impuesto pagado en el exterior por residentes es <strong>crédito tributario<\/strong> hasta la cuota que corresponda al impuesto atribuible a dichos ingresos en Ecuador.<\/li><li>Espectáculos artísticos pagados al exterior por prestadores turísticos: retención del <strong>15%<\/strong> (Art. 39.3).<\/li><\/ul>", "clave": "Pagos al exterior: retención del 25% (tarifa de sociedades); a paraísos fiscales, 37% (Arts. 39 y 48)."}, {"titulo": "Obligaciones y sanciones de los agentes de retención (Art. 50)", "html": "<ul><li>La retención se efectúa al momento del <strong>pago o crédito en cuenta, lo que suceda primero<\/strong>.<\/li><li>El comprobante de retención se entrega dentro de <strong>5 días<\/strong> de recibido el comprobante de venta.<\/li><li>Declaración y depósito de los valores retenidos: <strong>mensual<\/strong>.<\/li><li><strong>Sanciones:<\/strong> no retener o retener parcialmente → multa igual al <strong>valor total de las retenciones no efectuadas<\/strong> más intereses de mora (sin eximir la responsabilidad solidaria); falta de entrega del comprobante → multa del <strong>5% del monto de la retención<\/strong>; retraso en la entrega de tributos retenidos → intereses de mora y sanciones del Código Tributario.<\/li><\/ul>", "clave": "Retención al pago o crédito en cuenta (lo primero); no retener cuesta el 100% de lo no retenido; no entregar comprobante, el 5% (Art. 50)."}, {"titulo": "Cuadro resumen: plazos y créditos", "html": "<table><tr><th>Obligación<\/th><th>Periodicidad / plazo<\/th><th>Norma<\/th><\/tr><tr><td>Declaración anual del IR<\/td><td>Anual (marzo PN / abril sociedades, según 9º dígito, vía reglamento)<\/td><td>Art. 40<\/td><\/tr><tr><td>Anticipo voluntario<\/td><td>50% IR causado t-1 menos retenciones<\/td><td>Art. 41<\/td><\/tr><tr><td>Declaración de retenciones y depósito<\/td><td><strong>Mensual<\/strong><\/td><td>Art. 50<\/td><\/tr><tr><td>Comprobante de retención<\/td><td><strong>5 días<\/strong>; relación de dependencia: enero<\/td><td>Art. 50<\/td><\/tr><tr><td>Uso del crédito por retenciones<\/td><td>Hasta <strong>3 años<\/strong><\/td><td>Art. 47<\/td><\/tr><tr><td>Autorretención grandes contribuyentes<\/td><td>Mensual<\/td><td>Art. 45<\/td><\/tr><\/table>", "clave": "Retenciones: declaración mensual, comprobante en 5 días, crédito tributario utilizable hasta 3 años."}]}, {"id": "l4", "titulo": "Impuesto al Valor Agregado (IVA)", "duracionMin": 55, "slides": [{"titulo": "Objeto y concepto de transferencia (Arts. 52 y 53)", "html": "<p><strong>Art. 52:<\/strong> el IVA grava el valor de la <strong>transferencia de dominio o la importación de bienes muebles de naturaleza corporal<\/strong> en todas sus etapas de comercialización, los <strong>derechos de autor, de propiedad industrial y derechos conexos<\/strong>, y el valor de los <strong>servicios prestados<\/strong>.<\/p><ul><li><strong>Art. 53 - Transferencia:<\/strong> todo acto o contrato que transfiera el dominio de bienes muebles corporales, <strong>aun a título gratuito<\/strong>.<\/li><li>La venta de bienes recibidos en <strong>consignación<\/strong> y el <strong>arrendamiento mercantil<\/strong> con opción de compra.<\/li><li>El <strong>uso o consumo personal<\/strong> por el sujeto pasivo de los bienes de su producción o venta (autoconsumo).<\/li><\/ul>", "clave": "El IVA grava transferencias e importaciones de bienes muebles corporales, derechos de PI y servicios, incluso a título gratuito (Arts. 52-53)."}, {"titulo": "Transferencias que NO son objeto del IVA (Art. 54)", "html": "<p>No se causa IVA (no sujeción, distinta de la tarifa 0%):<\/p><ul><li><strong>Aportes en especie<\/strong> a sociedades.<\/li><li><strong>Adjudicaciones por herencia<\/strong> o por liquidación de sociedades, incluida la sociedad conyugal.<\/li><li>Transferencias de <strong>empresas y establecimientos de comercio<\/strong> (Código de Comercio).<\/li><li><strong>Fusiones, escisiones y transformaciones<\/strong> de sociedades.<\/li><li><strong>Donaciones al sector público<\/strong> y a instituciones privadas sin fines de lucro.<\/li><li><strong>Cesión de acciones<\/strong>, participaciones sociales y demás títulos valores.<\/li><li>Cuotas de <strong>condominios<\/strong> y de gastos comunes en urbanizaciones.<\/li><\/ul>", "clave": "Aportes en especie, herencias, fusiones, donaciones al sector público, cesión de acciones y cuotas de condominio no son objeto de IVA (Art. 54)."}, {"titulo": "Bienes con tarifa 0% (Art. 55)", "html": "<ul><li><strong>Alimentos en estado natural<\/strong> (agrícolas, avícolas, pecuarios, de la pesca); refrigeración, pilado, faenamiento, cortado y empaque no se consideran procesamiento.<\/li><li><strong>Leches<\/strong> (natural, pasteurizada, en polvo, maternizadas), quesos y yogures; <strong>pan, azúcar, panela, sal, manteca, fideos, harinas, aceites comestibles<\/strong> (excepto oliva) y enlatados nacionales de atún, macarela, sardina y trucha.<\/li><li>Semillas certificadas, fertilizantes, plaguicidas, <strong>tractores hasta 300 hp<\/strong> y maquinaria agropecuaria; <strong>medicamentos de uso humano<\/strong> y sus materias primas y envases.<\/li><li><strong>Papel bond, papel periódico y libros<\/strong>; energía eléctrica; lámparas y focos ya no constan; <strong>los que se exporten<\/strong>.<\/li><li><strong>Vehículos eléctricos<\/strong> para uso particular, transporte público y de carga; baterías y cargadores para híbridos y eléctricos; equipos de generación solar fotovoltaica.<\/li><li>Toallas sanitarias, tampones, copas menstruales y pañales populares; importación de <strong>combustibles derivados de hidrocarburos<\/strong>; envíos por Tráfico Postal hasta el <strong>5% de la fracción básica<\/strong>.<\/li><\/ul>", "clave": "Tarifa 0%: alimentos naturales, medicinas, libros, exportaciones, energía eléctrica, vehículos eléctricos (Art. 55)."}, {"titulo": "IVA reducido: 5% materiales de construcción y 8% turismo", "html": "<ul><li><strong>Art. innumerado post 55 (Ley de marzo 2024):<\/strong> la tarifa del IVA será del <strong>5% en las transferencias locales de materiales de construcción<\/strong>.<\/li><li>El IVA pagado y no compensado en la elaboración o comercialización de materiales de construcción con tarifa 5% puede registrarse como <strong>gasto deducible<\/strong> del IR del ejercicio.<\/li><li><strong>Art. innumerado post 65:<\/strong> el Presidente, previo dictamen del Ministerio de Economía y Finanzas, puede reducir al <strong>8%<\/strong> la tarifa para <strong>servicios turísticos durante feriados<\/strong> nacionales o locales y los fines de semana adyacentes.<\/li><\/ul>", "clave": "Tarifas especiales: 5% materiales de construcción y hasta 8% en servicios turísticos por feriados (reforma 2024)."}, {"titulo": "Servicios con tarifa 0% (Art. 56)", "html": "<ul><li><strong>Transporte<\/strong> nacional terrestre y acuático de pasajeros y carga; transporte internacional de carga.<\/li><li><strong>Salud<\/strong> y fabricación de medicamentos; <strong>educación en todos los niveles<\/strong>; guarderías y hogares de ancianos; religiosos; funerarios.<\/li><li><strong>Arrendamiento de inmuebles destinados exclusivamente a vivienda<\/strong>; servicios públicos de energía eléctrica, agua potable, alcantarillado y recolección de basura.<\/li><li>Servicios administrativos del Estado; bursátiles; <strong>los que se exporten<\/strong> (4 condiciones: exportador residente, beneficiario no residente, uso íntegro en el extranjero y que el pago no sea costo o gasto en Ecuador).<\/li><li><strong>Paquetes de turismo receptivo<\/strong> a no residentes; peaje y pontazgo; aerofumigación; servicios de <strong>artesanos calificados<\/strong>; seguros de vida, salud, medicina prepagada, desgravamen y SOAT.<\/li><li><strong>Alojamiento turístico a turistas extranjeros<\/strong> (permanencia menor a 90 días, establecimientos registrados).<\/li><\/ul>", "clave": "Servicios 0%: transporte, salud, educación, vivienda, exportación de servicios, turismo receptivo y alojamiento a extranjeros (Art. 56)."}, {"titulo": "Tarifa general del IVA (Art. 65)", "html": "<ul><li>El Art. 65 fija la tarifa general en <strong>13%<\/strong>, pero faculta al Presidente de la República, previo dictamen favorable del ente rector de las finanzas públicas, a modificarla: <strong>nunca inferior al 13% ni mayor al 15%<\/strong>.<\/li><li><strong>Decreto Ejecutivo 198 (marzo 2024):<\/strong> elevó la tarifa general del 13% <strong>al 15% desde el 1 de abril de 2024<\/strong>.<\/li><li><strong>Decreto Ejecutivo 470 (diciembre 2024):<\/strong> mantuvo el <strong>15% para el año 2025<\/strong>.<\/li><li>El IVA es un impuesto <strong>plurifásico no acumulativo<\/strong>: se aplica en todas las etapas pero solo sobre el valor agregado, gracias al mecanismo del crédito tributario.<\/li><\/ul>", "clave": "Tarifa general: 13% legal, modulable por decreto entre 13% y 15%; vigente 15% desde abril 2024 (Art. 65)."}, {"titulo": "Base imponible del IVA (Arts. 58, 59 y 60)", "html": "<ul><li><strong>General (Art. 58):<\/strong> valor total de los bienes o servicios, calculado sobre sus precios de venta o de prestación, <strong>incluyendo impuestos, tasas y demás gastos imputables al precio<\/strong> (el ICE integra la base del IVA).<\/li><li>Solo se deducen: <strong>descuentos y bonificaciones normales<\/strong> que consten en la factura, el valor de <strong>bienes y envases devueltos<\/strong>, y los <strong>intereses y primas de seguros en ventas a plazos<\/strong>.<\/li><li><strong>Importaciones (Art. 59):<\/strong> valor en aduana <strong>más<\/strong> impuestos, aranceles, tasas, derechos y recargos de la declaración de importación.<\/li><li><strong>Casos especiales (Art. 60):<\/strong> permuta, autoconsumo y donaciones → <strong>precios de mercado<\/strong>.<\/li><\/ul>", "clave": "Base del IVA = precio total con impuestos incluidos; solo se restan descuentos facturados, devoluciones e intereses de ventas a plazos (Art. 58)."}, {"titulo": "Hecho generador del IVA (Art. 61)", "html": "<table><tr><th>Operación<\/th><th>Momento del hecho generador<\/th><\/tr><tr><td>Transferencias locales de bienes<\/td><td><strong>Entrega del bien o pago total o parcial, lo que suceda primero<\/strong><\/td><\/tr><tr><td>Prestación de servicios<\/td><td>Prestación efectiva o pago, <strong>a elección del contribuyente<\/strong><\/td><\/tr><tr><td>Avance de obra o etapas<\/td><td>Entrega de cada <strong>certificado de avance de obra<\/strong><\/td><\/tr><tr><td>Autoconsumo<\/td><td>Fecha del <strong>retiro<\/strong> de los bienes<\/td><\/tr><tr><td>Importación de mercaderías<\/td><td><strong>Despacho por la aduana<\/strong><\/td><\/tr><tr><td>Tracto sucesivo<\/td><td>Al cumplirse las condiciones de <strong>cada período<\/strong><\/td><\/tr><tr><td>Servicios digitales importados<\/td><td>El <strong>pago<\/strong> del residente al no residente prestador<\/td><\/tr><\/table>", "clave": "En bienes: entrega o pago, lo primero; en importaciones: despacho aduanero; en servicios digitales: el pago (Art. 61)."}, {"titulo": "Sujetos pasivos del IVA (Art. 63)", "html": "<ul><li><strong>Contribuyentes:<\/strong> quienes realicen <strong>importaciones gravadas<\/strong>.<\/li><li><strong>Agentes de percepción:<\/strong> quienes habitualmente transfieran bienes o presten servicios gravados; también los <strong>no residentes que presten servicios digitales<\/strong> registrados ante el SRI.<\/li><li><strong>Agentes de retención:<\/strong> contribuyentes calificados por el SRI, <strong>emisoras de tarjetas de crédito<\/strong>, empresas de <strong>seguros y reaseguros<\/strong>, importadores de servicios (retienen el <strong>100%<\/strong> del IVA), y Petrocomercial/comercializadoras (IVA presuntivo en combustibles).<\/li><li>Las entidades del <strong>sector público<\/strong>, sus empresas públicas y universidades, cuando actúan como agentes de retención, retienen el <strong>100% del IVA<\/strong> y los valores permanecen en sus cuentas.<\/li><li>Los porcentajes de retención los fija el SRI mediante resolución; los agentes declaran y pagan <strong>mensualmente<\/strong>.<\/li><\/ul>", "clave": "El IVA distingue contribuyentes, agentes de percepción y agentes de retención; el sector público retiene el 100% (Art. 63)."}, {"titulo": "Crédito tributario del IVA (Art. 66)", "html": "<table><tr><th>Situación del sujeto pasivo<\/th><th>Crédito tributario<\/th><\/tr><tr><td>Produce/comercializa bienes o servicios gravados con tarifa distinta de 0%; exporta bienes o servicios; turismo receptivo; venta directa a exportadores<\/td><td><strong>100%<\/strong><\/td><\/tr><tr><td>Ventas en parte 0% y en parte con tarifa distinta de 0%<\/td><td><strong>Proporcional<\/strong> (factor: ventas con derecho / ventas totales), salvo contabilidad diferenciada<\/td><\/tr><tr><td>Ventas exclusivamente con tarifa 0%; entidades del PGE y GAD<\/td><td><strong>Sin derecho<\/strong> a crédito (el IVA pagado es costo o gasto)<\/td><\/tr><\/table><ul><li>El crédito puede usarse <strong>hasta en 5 años<\/strong> desde la exigibilidad de la declaración.<\/li><li>Requisito formal: el IVA debe constar <strong>por separado<\/strong> en comprobantes de venta, documentos de importación y comprobantes de retención.<\/li><\/ul>", "clave": "Crédito total si vendes gravado o exportas; proporcional si mezclas; nulo si solo vendes 0% (Art. 66); uso hasta 5 años."}, {"titulo": "Declaración, liquidación y pago del IVA (Arts. 67-70)", "html": "<ul><li><strong>Declaración mensual<\/strong> dentro del mes siguiente de realizadas las operaciones; si se concedió plazo de un mes o más para el pago, puede declararse en el <strong>mes subsiguiente<\/strong> (Art. 67).<\/li><li><strong>Declaración semestral:<\/strong> quienes exclusivamente transfieran bienes o presten servicios con <strong>tarifa 0% o no gravados<\/strong>, y quienes estén sujetos a la <strong>retención total<\/strong> del IVA causado (salvo que sean agentes de retención).<\/li><li><strong>Liquidación (Art. 68):<\/strong> IVA causado menos crédito tributario. Si hay saldo a favor, se arrastra como <strong>crédito para el mes siguiente<\/strong> (Art. 69); si no podrá compensarse en 6 meses, cabe solicitar devolución por retenciones hasta dentro de <strong>5 años<\/strong>.<\/li><li><strong>Importaciones (Art. 70):<\/strong> el IVA se liquida en la declaración de importación y se paga <strong>previo al despacho<\/strong>; en importación de servicios, el adquirente emite liquidación de compra y retiene el <strong>100%<\/strong>.<\/li><\/ul>", "clave": "IVA: declaración mensual; semestral solo para quienes venden exclusivamente a tarifa 0% o soportan retención total (Art. 67)."}, {"titulo": "Devoluciones de IVA y diferencia conceptual clave", "html": "<ul><li><strong>Exportadores (Art. 72):<\/strong> derecho al reintegro del IVA pagado en bienes exportados y en insumos, <strong>sin intereses, en un tiempo no mayor a 90 días<\/strong>, mediante nota de crédito, cheque u otro medio; se reconocen intereses si se excede el término. Falsedad: multa del <strong>doble<\/strong> del valor pretendido.<\/li><li>Devolución también para <strong>proyectos inmobiliarios<\/strong> y vivienda de interés social (90 días).<\/li><li><strong>Distinción conceptual (pregunta típica de examen):<\/strong><\/li><\/ul><table><tr><th>Categoría<\/th><th>¿Se causa IVA?<\/th><th>¿Da crédito tributario?<\/th><th>Ejemplo<\/th><\/tr><tr><td>No objeto (Art. 54)<\/td><td>No se causa<\/td><td>No aplica<\/td><td>Cesión de acciones, fusiones<\/td><\/tr><tr><td>Tarifa 0% (Arts. 55-56)<\/td><td>Se causa al 0%<\/td><td>Solo si además hay ventas gravadas o exportación<\/td><td>Alimentos naturales, salud, educación<\/td><\/tr><tr><td>Tarifa general<\/td><td>Sí (15% vigente)<\/td><td>Sí, 100%<\/td><td>Bienes y servicios en general<\/td><\/tr><\/table>", "clave": "Tarifa 0% es una operación gravada a tasa cero; no objeto significa que el hecho generador no se verifica (Arts. 54-56, 72)."}]}, {"id": "l5", "titulo": "ICE (nociones generales) y régimen RIMPE", "duracionMin": 50, "slides": [{"titulo": "ICE: objeto y formas de imposición (Art. 75 y ss.)", "html": "<p><strong>Art. 75:<\/strong> el Impuesto a los Consumos Especiales (ICE) se aplica a los <strong>bienes y servicios de procedencia nacional o importados<\/strong> detallados en el Art. 82.<\/p><ul><li><strong>Formas de imposición:<\/strong><\/li><li><strong>Específica:<\/strong> tarifa fija por cada unidad de bien (ej. cigarrillos por unidad, alcohol por litro).<\/li><li><strong>Ad valorem:<\/strong> tarifa porcentual sobre la base imponible.<\/li><li><strong>Mixta:<\/strong> combina las dos anteriores sobre un mismo bien o servicio (ej. bebidas alcohólicas).<\/li><li><strong>No sujeción:<\/strong> adquisiciones y donaciones de bienes al sector público, según resolución del SRI.<\/li><\/ul>", "clave": "El ICE admite tres formas de imposición: específica, ad valorem y mixta (Art. innumerado post 75)."}, {"titulo": "ICE: base imponible (Art. 76)", "html": "<ul><li>Reglas alternativas: <strong>PVP sugerido<\/strong> menos IVA e ICE; <strong>precio de venta del fabricante<\/strong> menos IVA e ICE <strong>más 30% de margen mínimo de comercialización<\/strong>; o <strong>precio ex aduana más 30%<\/strong>.<\/li><li>La base por PVP sugerido <strong>no puede ser inferior<\/strong> al precio del fabricante o ex aduana más el 30% de margen mínimo.<\/li><li>La base del ICE <strong>no considera descuentos<\/strong>, <strong>no incluye el IVA<\/strong> y el impuesto se paga <strong>en una sola etapa<\/strong>.<\/li><li>Bases especiales: cigarrillos → número de unidades; alcohol → litros por grado alcohólico; bebidas alcohólicas → litros de <strong>alcohol puro<\/strong> (específica) y ad valorem sobre el exceso del precio por litro sobre <strong>USD 4,33<\/strong> (valor ajustado anualmente por IPC: <strong>USD 4,72 para 2026<\/strong>); bebidas azucaradas con más de <strong>25 g de azúcar por litro<\/strong> → gramos de azúcar; fundas plásticas → número de fundas.<\/li><\/ul>", "clave": "Base del ICE: PVP o precio fabricante/ex aduana + 30% de margen mínimo; no incluye IVA y se paga en una sola etapa (Art. 76)."}, {"titulo": "ICE: bienes y servicios gravados (Art. 82, ejemplos)", "html": "<ul><li><strong>Grupo I (ad valorem):<\/strong> productos del tabaco, bebidas gaseosas azucaradas, bebidas energizantes, perfumes y aguas de tocador, armas de fuego, focos incandescentes, servicios de <strong>televisión pagada<\/strong> (excluye streaming) y cuotas de <strong>clubes sociales<\/strong>.<\/li><li><strong>Grupo II - vehículos motorizados<\/strong> hasta 3,5 toneladas: tarifas progresivas del <strong>5% al 35%<\/strong> según el PVP (5% hasta USD 20.000; 35% sobre USD 70.000).<\/li><li><strong>Aviones, avionetas, helicópteros<\/strong> (no comerciales), motos acuáticas, yates y barcos de recreo: <strong>10%<\/strong>.<\/li><li>Bebidas alcohólicas y cerveza: imposición <strong>mixta<\/strong> (específica por litro de alcohol puro + ad valorem).<\/li><li>Descuento del <strong>15%<\/strong> del ICE para vehículos de hasta USD 40.000 con al menos 3 elementos de seguridad y emisiones superiores a Euro 3.<\/li><\/ul>", "clave": "Vehículos: ICE progresivo del 5% al 35% según PVP; yates y aeronaves de recreo 10%; alcohol y tabaco con imposición mixta (Art. 82)."}, {"titulo": "ICE: exenciones (Art. 77)", "html": "<ul><li><strong>Alcohol nacional y bebidas alcohólicas artesanales<\/strong> de productos agropecuarios ecuatorianos (cupo anual del SRI; no aplica si tienen menos del <strong>70% de ingredientes nacionales<\/strong>).<\/li><li><strong>Productos destinados a la exportación.<\/strong><\/li><li>Vehículos ortopédicos y no ortopédicos para personas con <strong>discapacidad<\/strong>.<\/li><li><strong>Vehículos motorizados eléctricos e híbridos<\/strong>.<\/li><li><strong>Productos lácteos y sus derivados<\/strong>; focos incandescentes usados como insumos automotrices.<\/li><li>Armas de fuego y vehículos operativos adquiridos por la <strong>fuerza pública<\/strong>; armas deportivas de deportistas autorizados (no enajenables por <strong>5 años<\/strong>).<\/li><\/ul>", "clave": "Exentos de ICE: exportaciones, vehículos eléctricos e híbridos, vehículos para discapacidad, lácteos y alcohol artesanal nacional (Art. 77)."}, {"titulo": "ICE: hecho generador, sujetos y declaración (Arts. 78-83)", "html": "<ul><li><strong>Hecho generador (Art. 78):<\/strong> en bienes nacionales y servicios, la <strong>primera transferencia<\/strong> a título oneroso o gratuito efectuada por el fabricante o prestador; en importados, la <strong>desaduanización<\/strong>; en fundas plásticas, su entrega al adquirente.<\/li><li><strong>Sujeto activo (Art. 79):<\/strong> el Estado a través del SRI.<\/li><li><strong>Sujetos pasivos (Art. 80):<\/strong> contribuyentes (fabricantes, importadores, prestadores de servicios gravados) y agentes de percepción (incluye comercios que entregan fundas plásticas).<\/li><li><strong>Facturación (Art. 81):<\/strong> el ICE consta <strong>por separado<\/strong> en las facturas; en importaciones, en la declaración de importación.<\/li><li><strong>Declaración:<\/strong> mensual dentro del mes siguiente (bienes nacionales y servicios); en importaciones se liquida y paga antes del despacho aduanero.<\/li><\/ul>", "clave": "ICE: hecho generador en la primera transferencia del fabricante o en la desaduanización; declaración mensual (Arts. 78-83)."}, {"titulo": "RIMPE: naturaleza y ámbito subjetivo (Arts. 97.1 y 97.3)", "html": "<p>El <strong>Régimen Simplificado para Emprendedores y Negocios Populares (RIMPE)<\/strong> es un régimen especial de pago del IR (Capítulo V, agregado por la Ley Orgánica para el Desarrollo Económico, 2021).<\/p><ul><li>Se sujetan personas naturales y sociedades con <strong>ingresos brutos anuales hasta USD 300.000<\/strong>.<\/li><li><strong>Negocios populares:<\/strong> personas naturales con ingresos brutos de hasta <strong>USD 20.000<\/strong>.<\/li><li><strong>Emprendedores:<\/strong> todos los demás sujetos del régimen (más de 20.000 y hasta 300.000).<\/li><li><strong>Ingresos brutos<\/strong> = ingresos gravados menos descuentos, devoluciones y (para negocios populares) sueldos de empleados afiliados al IESS.<\/li><li>El impuesto se paga conforme a la <strong>tabla progresiva sobre los ingresos brutos<\/strong> del ejercicio (no sobre utilidad).<\/li><\/ul>", "clave": "RIMPE: hasta USD 300.000 de ingresos brutos; negocio popular es la PN con hasta USD 20.000 (Art. 97.3)."}, {"titulo": "RIMPE: exclusiones (Art. 97.4)", "html": "<p>No pueden acogerse quienes realicen o registren en su RUC, al menos, una de estas actividades:<\/p><ul><li>Las de los <strong>Arts. 28 y 29 LRTI<\/strong> (construcción y urbanización).<\/li><li><strong>Servicios profesionales<\/strong>, mandatos y representaciones, <strong>comisionistas<\/strong>, transporte (<strong>excepto taxis<\/strong>), actividades <strong>agropecuarias<\/strong>, comercializadoras de combustibles, <strong>relación de dependencia<\/strong> y arrendamiento de bienes muebles e inmuebles.<\/li><li>Regímenes especiales de IR; sectores de <strong>hidrocarburos, minería, petroquímica, laboratorios médicos y farmacéuticas, industrias básicas, financiero, EPS y seguros<\/strong>.<\/li><li>Producción, importación o primera etapa de comercialización de bienes o servicios <strong>gravados con ICE<\/strong>.<\/li><li>Tampoco: <strong>artesanos calificados<\/strong>, receptores de <strong>inversión extranjera directa<\/strong> ni asociaciones público-privadas.<\/li><li>Una sola actividad excluida <strong>saca del régimen a todo el contribuyente<\/strong>; percibir dividendos o rendimientos financieros no es causal de exclusión (se liquidan aparte).<\/li><\/ul>", "clave": "Servicios profesionales, transporte (salvo taxis), agropecuarios, arrendamientos, ICE y artesanos están excluidos del RIMPE (Art. 97.4)."}, {"titulo": "RIMPE: vigencia y tarifa (Arts. 97.5 y 97.6)", "html": "<ul><li>El régimen es de <strong>aplicación obligatoria por 3 años<\/strong> contados desde la primera declaración, mientras los ingresos no superen USD 300.000.<\/li><li>Si supera <strong>USD 300.000<\/strong>, liquida sus impuestos en el <strong>régimen general<\/strong>; una vez excluido del RIMPE, <strong>no puede reingresar<\/strong>.<\/li><li>Los <strong>negocios populares se mantienen<\/strong> en el régimen mientras conserven esa condición.<\/li><li><strong>Tarifa (Art. 97.6):<\/strong> tablas progresivas separadas para <strong>negocios populares<\/strong> (cuota fija anual) y <strong>emprendedores<\/strong> (cuota más porcentaje sobre el exceso de ingresos brutos).<\/li><li>Si al cierre del ejercicio los ingresos superan los USD 300.000, declara y paga conforme al <strong>régimen general<\/strong>.<\/li><\/ul>", "clave": "RIMPE es obligatorio por 3 años; quien sale del régimen no puede reingresar (Art. 97.5)."}, {"titulo": "RIMPE: deberes formales e IVA (Arts. 97.7 y 97.9)", "html": "<table><tr><th>Aspecto<\/th><th>Negocio popular<\/th><th>Emprendedor<\/th><\/tr><tr><td>Registro contable<\/td><td><strong>Registro de ingresos y gastos<\/strong><\/td><td>Contabilidad si la norma lo exige; si no, registro de ingresos y gastos<\/td><\/tr><tr><td>Comprobantes<\/td><td><strong>Notas de venta o facturas electrónicas a su elección<\/strong><\/td><td>Comprobantes conforme al reglamento<\/td><\/tr><tr><td>IVA en ventas<\/td><td><strong>Tarifa 0%<\/strong> en bienes, derechos y servicios; <strong>no presentan declaraciones de IVA<\/strong><\/td><td>Gravan con IVA sus operaciones y lo liquidan en los plazos del reglamento<\/td><\/tr><\/table><ul><li>Los sujetos RIMPE <strong>no están obligados a actuar como agentes de retención<\/strong> de IR ni de IVA (Art. 97.7).<\/li><\/ul>", "clave": "Negocios populares: notas de venta, tarifa 0% de IVA y sin declaraciones de IVA; emprendedores sí gravan IVA (Arts. 97.7 y 97.9)."}, {"titulo": "RIMPE: declaración, pago y retenciones (Arts. 97.8 y 97.10)", "html": "<ul><li><strong>Declaración anual del IR RIMPE:<\/strong> se liquida y paga <strong>hasta el mes de junio<\/strong> de cada año fiscal, conforme a las resoluciones del SRI.<\/li><li>El retraso genera las <strong>sanciones e intereses del Código Tributario<\/strong>.<\/li><li><strong>Retenciones (Art. 97.10):<\/strong> los pagos a <strong>negocios populares NO están sujetos a retención<\/strong> en la fuente del IR.<\/li><li>Los pagos a <strong>emprendedores SÍ<\/strong> están sujetos a retención de IR e IVA en los porcentajes que fije el SRI por resolución; esas retenciones constituyen <strong>crédito tributario<\/strong>.<\/li><\/ul>", "clave": "El IR del RIMPE se declara y paga hasta junio; a los negocios populares no se les retiene (Arts. 97.8 y 97.10)."}, {"titulo": "Cuadro final comparativo de regímenes", "html": "<table><tr><th>Elemento<\/th><th>Negocio popular<\/th><th>Emprendedor RIMPE<\/th><th>Régimen general<\/th><\/tr><tr><td>Ingresos brutos<\/td><td>Hasta <strong>USD 20.000<\/strong> (solo PN)<\/td><td>Hasta <strong>USD 300.000<\/strong><\/td><td>Sin límite<\/td><\/tr><tr><td>Base del IR<\/td><td>Ingresos brutos (cuota)<\/td><td>Ingresos brutos (tabla)<\/td><td>Utilidad / base imponible<\/td><\/tr><tr><td>Declaración IR<\/td><td>Anual, hasta <strong>junio<\/strong><\/td><td>Anual, hasta <strong>junio<\/strong><\/td><td>Anual (marzo/abril)<\/td><\/tr><tr><td>IVA<\/td><td><strong>0%<\/strong>, sin declaraciones<\/td><td>Grava y declara IVA<\/td><td>Mensual o semestral<\/td><\/tr><tr><td>Retenciones que soporta<\/td><td><strong>Ninguna<\/strong> en IR<\/td><td>IR e IVA según resolución SRI<\/td><td>Según normativa general<\/td><\/tr><tr><td>Agente de retención<\/td><td>No<\/td><td>No (regla general)<\/td><td>Sí, si es calificado<\/td><\/tr><\/table>", "clave": "Domine el contraste negocio popular vs. emprendedor vs. régimen general: base, IVA, plazos y retenciones."}]}], "banco": [{"tipo": "om", "pregunta": "Una sociedad anónima constituida en Ecuador, sin accionistas en paraísos fiscales y que cumple su deber de informar la composición societaria, aplica sobre su base imponible la tarifa de impuesto a la renta del:", "opciones": ["25%", "22%", "28%", "37%"], "correcta": 0, "feedback": "El Art. 37 de la LRTI fija la tarifa general del 25% para sociedades constituidas en el Ecuador, sucursales y establecimientos permanentes. El 28% aplica solo cuando hay paraísos fiscales en la cadena con beneficiario efectivo residente o incumplimiento del deber de informar.", "tema": "IR - Tarifa sociedades"}, {"tipo": "om", "pregunta": "Una sociedad tiene el 60% de su capital en manos de un titular residente en un paraíso fiscal y el beneficiario efectivo es residente fiscal de Ecuador. ¿Qué tarifa de IR aplica y sobre qué porción de la base imponible?", "opciones": ["28% sobre toda la base imponible", "28% solo sobre el 60% de la base", "25% sobre toda la base imponible", "31% sobre toda la base imponible"], "correcta": 0, "feedback": "Según el Art. 37 LRTI, la tarifa de sociedades más 3 puntos (28%) aplica a TODA la base imponible cuando la participación incursa en la causal es igual o superior al 50%. Si fuera inferior al 50%, los 3 puntos aplicarían solo sobre la proporción correspondiente.", "tema": "IR - Tarifa sociedades"}, {"tipo": "om", "pregunta": "Caso de cálculo: una persona natural tiene en 2026 una base imponible de USD 30.000. Con la tabla del Art. 36 (tramo 26.700-35.136: impuesto sobre fracción básica USD 1.412 y 15% sobre el excedente), su impuesto causado es:", "opciones": ["USD 1.907", "USD 1.412", "USD 2.678", "USD 495"], "correcta": 0, "feedback": "Art. 36 lit. a) LRTI: impuesto = 1.412 + 15% × (30.000 − 26.700) = 1.412 + 495 = USD 1.907.", "tema": "IR - Tarifa personas naturales"}, {"tipo": "om", "pregunta": "La fracción básica desgravada (tarifa 0%) del impuesto a la renta de personas naturales para el año 2026 es de:", "opciones": ["USD 12.208", "USD 11.902", "USD 15.549", "USD 12.500"], "correcta": 0, "feedback": "La tabla del Art. 36 LRTI para el año 2026 fija la primera fracción con tarifa 0% hasta USD 12.208. Los rangos se actualizan anualmente según el IPC urbano del INEC al 30 de noviembre.", "tema": "IR - Tarifa personas naturales"}, {"tipo": "om", "pregunta": "La tarifa marginal máxima de la tabla de impuesto a la renta de personas naturales es del:", "opciones": ["37%", "35%", "30%", "40%"], "correcta": 0, "feedback": "Art. 36 lit. a) LRTI: el último tramo de la tabla (desde USD 109.956 en 2026) grava la fracción excedente con el 37%.", "tema": "IR - Tarifa personas naturales"}, {"tipo": "om", "pregunta": "Una sociedad ecuatoriana distribuye dividendos a un accionista persona natural NO residente, sin paraísos fiscales en la cadena ni beneficiario efectivo residente. La tarifa del impuesto único a la distribución es:", "opciones": ["10%", "12%", "14%", "25%"], "correcta": 0, "feedback": "Art. 39.2 num. 4 LRTI: si la distribución se realiza a no residentes, la tarifa es del 10%. La regla general es 12%; y 14% cuando existe paraíso fiscal en la cadena con beneficiario efectivo residente o cuando se incumple el deber de informar la composición societaria.", "tema": "IR - Dividendos"}, {"tipo": "om", "pregunta": "En la distribución de dividendos, se aplica la tarifa del 14% cuando:", "opciones": ["Existe un residente en paraíso fiscal en la cadena de propiedad y el beneficiario efectivo es residente en Ecuador", "El perceptor es una sociedad residente en Ecuador", "El perceptor es una persona natural residente con ingresos menores a 3 SBU", "La sociedad reinvierte sus utilidades"], "correcta": 0, "feedback": "Art. 39.2 num. 4 LRTI: la tarifa sube al 14% si concurren: a) un residente en paraíso fiscal o jurisdicción de menor imposición en cualquier nivel de la cadena; y b) beneficiario efectivo residente en Ecuador. También aplica 14% si se incumple el deber de informar la composición societaria (num. 5). La distribución a sociedades residentes no está gravada (num. 1).", "tema": "IR - Dividendos"}, {"tipo": "om", "pregunta": "El anticipo del impuesto a la renta previsto en el Art. 41 de la LRTI:", "opciones": ["Es voluntario y equivale al 50% del IR causado del ejercicio anterior menos las retenciones de ese ejercicio", "Es obligatorio y equivale al 50% del IR causado del ejercicio corriente", "Es voluntario y equivale al 100% del IR causado del ejercicio anterior", "Es obligatorio para sociedades y voluntario para personas naturales"], "correcta": 0, "feedback": "Art. 41 LRTI: el pago del impuesto podrá anticiparse de forma voluntaria; equivale al 50% del impuesto a la renta causado del ejercicio fiscal anterior, menos las retenciones en la fuente de dicho ejercicio, y constituye crédito tributario.", "tema": "IR - Anticipo"}, {"tipo": "om", "pregunta": "Respecto de la amortización de pérdidas tributarias de sociedades, el Art. 11 de la LRTI dispone que son compensables:", "opciones": ["Dentro de los 5 períodos siguientes, sin exceder en cada período el 25% de las utilidades", "Dentro de los 3 períodos siguientes, sin exceder el 50% de las utilidades", "Dentro de los 5 períodos siguientes, sin límite anual", "Dentro de los 10 períodos siguientes, sin exceder el 25% de las utilidades"], "correcta": 0, "feedback": "Art. 11 LRTI: las pérdidas se compensan con las utilidades gravables de los cinco períodos impositivos siguientes, sin exceder en cada período del 25% de las utilidades obtenidas. En liquidación, el saldo es deducible en su totalidad.", "tema": "IR - Deducciones"}, {"tipo": "om", "pregunta": "El límite de deducibilidad de los gastos de viaje y estadía necesarios para generar el ingreso es:", "opciones": ["3% del ingreso gravado del ejercicio", "5% del ingreso gravado del ejercicio", "10% de la base imponible", "1% de los ingresos totales"], "correcta": 0, "feedback": "Art. 10 num. 6 LRTI: los gastos de viaje y estadía no podrán exceder del 3% del ingreso gravado del ejercicio; las sociedades nuevas pueden deducir la totalidad durante los dos primeros años de operaciones.", "tema": "IR - Deducciones"}, {"tipo": "om", "pregunta": "La provisión para créditos incobrables es deducible a razón del:", "opciones": ["1% anual sobre los créditos comerciales del ejercicio, sin que la acumulada exceda el 10% de la cartera total", "10% anual sobre la cartera, sin que la acumulada exceda el 25%", "1% anual sobre la cartera total, sin límite acumulado", "5% anual sobre los créditos comerciales concedidos"], "correcta": 0, "feedback": "Art. 10 num. 11 LRTI: la provisión deducible es el 1% anual sobre los créditos comerciales concedidos en el ejercicio y pendientes de recaudación al cierre, y la provisión acumulada no puede exceder del 10% de la cartera total.", "tema": "IR - Deducciones"}, {"tipo": "om", "pregunta": "Un empleador contrata bajo relación de dependencia a una persona con discapacidad debidamente calificada y aporta al IESS por ella. La deducción sobre esas remuneraciones es:", "opciones": ["Con el 150% adicional", "Con el 100% adicional", "Con el 140% adicional", "Con el 75% adicional"], "correcta": 0, "feedback": "Art. 10 num. 9 LRTI: las remuneraciones y beneficios sociales aportados al IESS por pagos a discapacitados o a trabajadores con cónyuge o hijos con discapacidad dependientes se deducen con el 150% adicional. El 140% corresponde a nuevas plazas para mujeres (num. 9.1) y el 50%/75% a jóvenes (num. 9.2).", "tema": "IR - Deducciones adicionales"}, {"tipo": "om", "pregunta": "La rebaja por gastos personales de una persona natural sin cargas familiares equivale al:", "opciones": ["18% del menor valor entre los gastos personales declarados y 7 canastas familiares básicas", "18% del mayor valor entre gastos declarados y 7 canastas básicas", "10% del menor valor entre gastos declarados y 20 canastas básicas", "18% del menor valor entre gastos declarados y 100 canastas básicas"], "correcta": 0, "feedback": "Art. innumerado posterior al Art. 10 LRTI: sin cargas familiares, la rebaja del IR causado es el 18% del menor valor entre los gastos personales declarados y el valor de la canasta familiar básica multiplicado por 7. Las 100 canastas corresponden a personas con o a cargo de personas con discapacidad o enfermedades catastróficas, raras o huérfanas.", "tema": "IR - Gastos personales"}, {"tipo": "om", "pregunta": "En operaciones con partes relacionadas, el monto total del interés neto deducible para sociedades no financieras no debe superar el:", "opciones": ["20% de la utilidad antes de participación laboral más intereses, depreciaciones y amortizaciones", "300% del patrimonio", "20% del patrimonio", "10% de la base imponible"], "correcta": 0, "feedback": "Art. 10 num. 2 LRTI: para sociedades no financieras y personas naturales el interés neto con partes relacionadas no debe superar el 20% de la utilidad antes de participación laboral, más intereses, depreciaciones y amortizaciones. El límite del 300% del patrimonio aplica a bancos, aseguradoras y entidades del sector financiero de la EPS.", "tema": "IR - Subcapitalización"}, {"tipo": "om", "pregunta": "El hecho generador del IVA en las transferencias locales de bienes se verifica:", "opciones": ["En el momento de la entrega del bien o del pago total o parcial, lo que suceda primero", "Siempre en el momento de la emisión de la factura", "Únicamente en el momento del pago total", "Al final del mes en que se realiza la venta"], "correcta": 0, "feedback": "Art. 61 num. 1 LRTI: en las transferencias locales de dominio de bienes, el hecho generador se verifica en el momento de la entrega del bien o en el del pago total o parcial del precio o acreditación en cuenta, lo que suceda primero, debiendo emitirse el comprobante de venta.", "tema": "IVA - Hecho generador"}, {"tipo": "om", "pregunta": "Un contribuyente que exclusivamente produce y vende bienes gravados con tarifa 0% de IVA (sin exportar ni vender a exportadores):", "opciones": ["No tiene derecho a crédito tributario por el IVA pagado en sus adquisiciones", "Tiene derecho al 100% del crédito tributario", "Tiene derecho a crédito tributario proporcional", "Puede pedir devolución del IVA en 90 días"], "correcta": 0, "feedback": "Art. 66 num. 3 lit. a) LRTI: no dan derecho a crédito tributario las adquisiciones de quienes produzcan o vendan bienes o presten servicios gravados en su totalidad con tarifa 0%. El IVA pagado se vuelve costo o gasto. El crédito del 100% requiere ventas gravadas con tarifa distinta de 0%, exportaciones, turismo receptivo o venta directa a exportadores.", "tema": "IVA - Crédito tributario"}, {"tipo": "om", "pregunta": "Deben presentar declaración SEMESTRAL de IVA:", "opciones": ["Quienes exclusivamente transfieran bienes o presten servicios con tarifa 0% o no gravados, y los sujetos a retención total del IVA, salvo que sean agentes de retención", "Todos los sujetos pasivos del RIMPE", "Los exportadores habituales", "Quienes vendan bienes con tarifa 15% por montos menores a USD 20.000 anuales"], "correcta": 0, "feedback": "Art. 67 LRTI: la regla general es la declaración mensual; presentan declaración semestral quienes exclusivamente transfieren bienes o prestan servicios con tarifa cero o no gravados, así como los sujetos a retención total del IVA causado, a menos que sean agentes de retención.", "tema": "IVA - Declaración"}, {"tipo": "om", "pregunta": "La tarifa del IVA aplicable a las transferencias locales de materiales de construcción es del:", "opciones": ["5%", "0%", "8%", "13%"], "correcta": 0, "feedback": "Art. innumerado agregado a continuación del Art. 55 LRTI (Ley publicada en R.O.S. 516, 12-marzo-2024): la tarifa del IVA será del 5% en las transferencias locales de materiales de construcción. El 8% es la tarifa reducible por decreto para servicios turísticos en feriados.", "tema": "IVA - Tarifas"}, {"tipo": "om", "pregunta": "El exportador que pagó IVA en las adquisiciones de bienes que exporta tiene derecho a que ese impuesto le sea reintegrado:", "opciones": ["Sin intereses, en un tiempo no mayor a 90 días, mediante nota de crédito, cheque u otro medio de pago", "Con intereses, dentro de 30 días", "Sin intereses, dentro de 6 meses", "Solo como crédito tributario compensable en 5 años, sin devolución"], "correcta": 0, "feedback": "Art. 72 LRTI: el IVA pagado en actividades de exportación se reintegra sin intereses en un tiempo no mayor a 90 días a través de nota de crédito, cheque u otro medio de pago; se reconocen intereses si vencido ese término no se ha reembolsado.", "tema": "IVA - Devoluciones"}, {"tipo": "om", "pregunta": "En el régimen RIMPE, constituyen negocios populares:", "opciones": ["Las personas naturales con ingresos brutos de hasta USD 20.000", "Las personas naturales y sociedades con ingresos de hasta USD 20.000", "Las personas naturales con ingresos de hasta USD 300.000", "Las microempresas con hasta 9 trabajadores"], "correcta": 0, "feedback": "Art. 97.3 LRTI: dentro del régimen (que abarca PN y sociedades con ingresos brutos anuales de hasta USD 300.000), constituyen negocios populares los sujetos pasivos PERSONAS NATURALES con ingresos brutos de hasta USD 20.000; todos los demás son emprendedores.", "tema": "RIMPE"}, {"tipo": "vf", "pregunta": "Si una actividad económica inicia en marzo, el ejercicio impositivo del impuesto a la renta puede cerrarse doce meses después, en febrero del año siguiente.", "correcta": false, "feedback": "Falso. Art. 7 LRTI: el ejercicio impositivo es anual, del 1 de enero al 31 de diciembre; aunque la actividad inicie después del 1 de enero, el ejercicio se cierra obligatoriamente el 31 de diciembre de cada año.", "tema": "IR - Generalidades"}, {"tipo": "vf", "pregunta": "La décima tercera y la décima cuarta remuneraciones están exentas del impuesto a la renta.", "correcta": true, "feedback": "Verdadero. Art. 9 num. 11 (innumerados) LRTI: las décima tercera y décima cuarta remuneraciones se encuentran expresamente exoneradas del impuesto a la renta.", "tema": "IR - Exenciones"}, {"tipo": "vf", "pregunta": "Los ingresos de las personas mayores de 65 años están exentos hasta un monto equivalente al doble de la fracción básica gravada con tarifa cero.", "correcta": false, "feedback": "Falso. Art. 9 num. 12 LRTI: los mayores de 65 años están exentos hasta UNA fracción básica gravada con tarifa cero; el DOBLE de la fracción básica corresponde a las personas con discapacidad debidamente calificadas. Ambas exoneraciones no se aplican simultáneamente.", "tema": "IR - Exenciones"}, {"tipo": "vf", "pregunta": "La utilidad generada por la enajenación ocasional de inmuebles está exenta del impuesto a la renta hasta por dos enajenaciones por año.", "correcta": true, "feedback": "Verdadero. Art. 9 num. 14 LRTI: están exonerados los ingresos generados por la enajenación ocasional de inmuebles de personas jurídicas o naturales, aplicable hasta por dos (2) enajenaciones por año; es ocasional la que no corresponde al giro ordinario del negocio.", "tema": "IR - Exenciones"}, {"tipo": "vf", "pregunta": "La cesión de acciones y participaciones sociales está gravada con IVA tarifa 0%.", "correcta": false, "feedback": "Falso. Art. 54 num. 6 LRTI: la cesión de acciones, participaciones sociales y demás títulos valores NO es objeto del IVA (no se causa el impuesto); es un supuesto de no sujeción, técnicamente distinto de una operación gravada con tarifa 0%.", "tema": "IVA - No objeto vs 0%"}, {"tipo": "vf", "pregunta": "Cuando las entidades del sector público actúan como agentes de retención del IVA, retienen el cien por ciento (100%) del impuesto.", "correcta": true, "feedback": "Verdadero. Art. 63 LRTI (inciso final): cuando el agente de retención son las entidades y organismos del sector público del Gobierno Central y Descentralizado, sus empresas públicas y las universidades y escuelas politécnicas, retienen el 100% del IVA y los valores permanecen en sus cuentas.", "tema": "IVA - Retenciones"}, {"tipo": "vf", "pregunta": "El crédito tributario de IVA puede ser utilizado hasta en cinco años contados desde la fecha de exigibilidad de la declaración.", "correcta": true, "feedback": "Verdadero. Art. 66 LRTI: el crédito tributario por el IVA pagado en adquisiciones de activos fijos, bienes, materias primas, insumos y servicios podrá ser usado hasta en cinco (5) años contados desde la fecha de exigibilidad de la declaración.", "tema": "IVA - Crédito tributario"}, {"tipo": "vf", "pregunta": "Los negocios populares del RIMPE deben presentar declaraciones semestrales de IVA por sus ventas gravadas con tarifa 0%.", "correcta": false, "feedback": "Falso. Art. 97.9 LRTI: las transferencias y prestaciones efectuadas por negocios populares están gravadas con tarifa 0% de IVA y los negocios populares NO presentan declaraciones de IVA. Los emprendedores, en cambio, sí gravan y liquidan el IVA.", "tema": "RIMPE - IVA"}, {"tipo": "vf", "pregunta": "Los vehículos motorizados eléctricos e híbridos están exentos del ICE.", "correcta": true, "feedback": "Verdadero. Art. 77 num. 4 LRTI: están exentos del ICE los vehículos motorizados eléctricos e híbridos; son eléctricos los propulsados únicamente por energía eléctrica, con carga exclusiva de esa fuente y cero emisiones directas.", "tema": "ICE - Exenciones"}, {"tipo": "vf", "pregunta": "Las sociedades calificadas como Grandes Contribuyentes deben efectuar una autorretención mensual del impuesto a la renta sobre sus ingresos gravados del mes.", "correcta": true, "feedback": "Verdadero. Art. 45 LRTI: los Grandes Contribuyentes no son sujetos de retención (salvo excepciones tasadas) pero deben autorretenerse mensualmente sobre el total de ingresos gravados del mes, en el porcentaje que fije el SRI según la tasa impositiva efectiva de su actividad; esa autorretención es crédito tributario.", "tema": "IR - Retenciones"}, {"tipo": "completar", "pregunta": "El sujeto activo del impuesto a la renta es el Estado, que lo administra a través del ____.", "respuestas": ["servicio de rentas internas", "sri", "el servicio de rentas internas"], "feedback": "Art. 3 LRTI: el sujeto activo es el Estado y lo administrará a través del Servicio de Rentas Internas (SRI). La misma regla aplica al IVA (Art. 62) y al ICE (Art. 79).", "tema": "IR - Sujetos"}, {"tipo": "completar", "pregunta": "Son residentes fiscales del Ecuador las personas naturales cuya permanencia en el país, incluyendo ausencias esporádicas, sea de ____ días calendario o más, consecutivos o no, en el mismo período fiscal.", "respuestas": ["183", "ciento ochenta y tres"], "feedback": "Art. 4.1 lit. a) LRTI: la residencia fiscal se configura con la permanencia de ciento ochenta y tres (183) días calendario o más, consecutivos o no, en el mismo período fiscal, o en un lapso de doce meses dentro de dos períodos fiscales (lit. b).", "tema": "IR - Residencia fiscal"}, {"tipo": "completar", "pregunta": "Mediante Decreto Ejecutivo 198, y dentro del rango permitido por el Art. 65 de la LRTI, la tarifa general del IVA se elevó al ____ por ciento a partir de abril de 2024.", "respuestas": ["15", "15%", "quince"], "feedback": "Art. 65 LRTI: la tarifa legal es 13%, modificable por el Presidente entre el 13% y el 15%; el Decreto Ejecutivo 198 (R.O.S. 520, 18-marzo-2024) la fijó en 15% desde el 1 de abril de 2024 y el Decreto 470 la mantuvo para 2025.", "tema": "IVA - Tarifa"}, {"tipo": "completar", "pregunta": "Las pérdidas tributarias pueden compensarse con las utilidades gravables de los ____ períodos impositivos siguientes.", "respuestas": ["cinco", "5"], "feedback": "Art. 11 LRTI: las sociedades y las personas naturales obligadas a llevar contabilidad pueden compensar pérdidas dentro de los cinco períodos impositivos siguientes, sin exceder en cada período del 25% de las utilidades.", "tema": "IR - Deducciones"}, {"tipo": "completar", "pregunta": "Los valores retenidos en la fuente constituyen crédito ____ para la determinación del impuesto a la renta del contribuyente retenido.", "respuestas": ["tributario"], "feedback": "Art. 46 LRTI: los valores retenidos constituyen crédito tributario para la determinación del IR del contribuyente cuyo ingreso fue objeto de retención, quien puede disminuirlo del total del impuesto causado en su declaración anual.", "tema": "IR - Retenciones"}, {"tipo": "completar", "pregunta": "En el RIMPE, las transferencias de bienes y la prestación de servicios efectuadas por los negocios populares están gravadas con tarifa ____ del IVA.", "respuestas": ["0%", "0", "cero", "cero por ciento"], "feedback": "Art. 97.9 LRTI: la transferencia de dominio de bienes muebles corporales, derechos y la prestación de servicios efectuadas por negocios populares están gravadas con tarifa 0% del IVA, y estos contribuyentes no presentan declaraciones de IVA.", "tema": "RIMPE - IVA"}, {"tipo": "completar", "pregunta": "Para el ICE se pueden aplicar tres formas de imposición: específica, ad valorem y ____.", "respuestas": ["mixta"], "feedback": "Art. innumerado posterior al Art. 75 LRTI: las formas de imposición del ICE son la específica (tarifa fija por unidad), la ad valorem (porcentual sobre la base imponible) y la mixta, que combina las dos anteriores sobre un mismo bien o servicio (por ejemplo, bebidas alcohólicas).", "tema": "ICE - Formas de imposición"}, {"tipo": "completar", "pregunta": "En los bienes de producción nacional, el hecho generador del ICE es la primera ____ efectuada por el fabricante, a título oneroso o gratuito.", "respuestas": ["transferencia"], "feedback": "Art. 78 LRTI: el hecho generador del ICE en bienes de producción nacional y servicios es la primera transferencia, a título oneroso o gratuito, efectuada por el fabricante o el prestador; en mercancías importadas, la desaduanización.", "tema": "ICE - Hecho generador"}]}, {"id": "comprobantes", "titulo": "Reglamento de Comprobantes de Venta, Retención y Documentos Complementarios", "icono": "🧾", "descripcion": "Estudio integral del Decreto Ejecutivo 430 (RO 247, 30-jul-2010, última reforma 09-feb-2024): tipos de comprobantes, autorización y vigencia, requisitos preimpresos y de llenado, documentos complementarios, retenciones, guías de remisión, baja y anulación, con enfoque en casos de asistencia al ciudadano.", "tiempoMaxMin": 120, "dia": "Día 2 — miércoles 15 de julio", "lecciones": [{"id": "l1", "titulo": "Tipos de comprobantes y cuándo se emiten", "duracionMin": 30, "slides": [{"titulo": "Panorama normativo: las tres familias de documentos", "html": "<p>El Reglamento (Decreto Ejecutivo <strong>430<\/strong>, Registro Oficial <strong>247 de 30-jul-2010<\/strong>, última reforma <strong>09-feb-2024<\/strong>) regula tres familias de documentos:<\/p><ul><li><strong>Comprobantes de venta<\/strong> (Art. 1): acreditan la transferencia de bienes, la prestación de servicios u otras transacciones gravadas con tributos.<\/li><li><strong>Documentos complementarios<\/strong> (Art. 2): complementan a los comprobantes de venta.<\/li><li><strong>Comprobantes de retención<\/strong> (Art. 3): acreditan las retenciones de impuestos realizadas por los agentes de retención.<\/li><\/ul><p>Como Especialista de Asistencia al Ciudadano, esta clasificación es la base de toda consulta sobre facturación.<\/p>", "clave": "El reglamento distingue comprobantes de venta, documentos complementarios y comprobantes de retención (Arts. 1-3)."}, {"titulo": "Comprobantes de venta (Art. 1)", "html": "<p>Son comprobantes de venta los siguientes documentos:<\/p><ul><li><strong>a)<\/strong> Facturas;<\/li><li><strong>b)<\/strong> Notas de venta - <strong>RIMPE<\/strong> (literal sustituido por DE 304, dic-2021);<\/li><li><strong>c)<\/strong> Liquidaciones de compra de bienes y prestación de servicios;<\/li><li><strong>d)<\/strong> Tiquetes emitidos por máquinas registradoras;<\/li><li><strong>e)<\/strong> Boletos o entradas a espectáculos públicos;<\/li><li><strong>f)<\/strong> Otros documentos autorizados en el reglamento.<\/li><\/ul><p><em>Ojo:<\/em> la lista es taxativa; los recibos simples o proformas NO son comprobantes de venta.<\/p>", "clave": "Seis categorías de comprobantes de venta; las notas de venta se asocian al Régimen RIMPE (Art. 1)."}, {"titulo": "Documentos complementarios y comprobantes de retención (Arts. 2-3)", "html": "<p><strong>Documentos complementarios<\/strong> (Art. 2):<\/p><ul><li>Notas de <strong>crédito<\/strong>;<\/li><li>Notas de <strong>débito<\/strong>;<\/li><li><strong>Guías de remisión<\/strong>.<\/li><\/ul><p><strong>Comprobantes de retención<\/strong> (Art. 3): documentos que acreditan las retenciones de impuestos realizadas por los agentes de retención conforme a la Ley de Régimen Tributario Interno, el reglamento y las resoluciones del Director General del SRI.<\/p>", "clave": "Los complementarios son tres: notas de crédito, notas de débito y guías de remisión (Art. 2)."}, {"titulo": "Otros documentos autorizados (Art. 4)", "html": "<p>Se consideran documentos autorizados, siempre que identifiquen emisor, adquirente, fecha de emisión y el valor de los tributos por separado:<\/p><ul><li>Documentos de <strong>instituciones del sistema financiero<\/strong> y emisoras/administradoras de tarjetas de crédito bajo control de la Superintendencia de Bancos.<\/li><li><strong>Boletos aéreos<\/strong> o tiquetes electrónicos (IVA con nomenclatura <strong>EC<\/strong>; el adquirente recibe copia indeleble).<\/li><li>Guías aéreas, cartas de porte aéreo y conocimientos de embarque.<\/li><li>Documentos de <strong>instituciones del Estado<\/strong> por servicios administrativos.<\/li><li>La <strong>declaración aduanera<\/strong> y documentos de comercio exterior.<\/li><li>Liquidaciones de PETROECUADOR en contratos de hidrocarburos, y otros autorizados por el SRI.<\/li><\/ul><p>Si el documento no cumple los requisitos, el emisor está obligado a emitir el comprobante de venta correspondiente.<\/p>", "clave": "Los documentos del Art. 4 valen como comprobantes solo si identifican a las partes y desglosan tributos."}, {"titulo": "Obligación de emitir: la regla general (Art. 8)", "html": "<p>Todos los sujetos pasivos están obligados a emitir y entregar comprobantes de venta, <strong>aunque el adquirente no los solicite<\/strong> o exprese que no los requiere. La obligación nace con:<\/p><ul><li>La transferencia de bienes, <strong>incluso a título gratuito o autoconsumo<\/strong>;<\/li><li>La prestación de servicios de cualquier naturaleza;<\/li><li>Operaciones gravadas con <strong>tarifa 0%<\/strong> de IVA.<\/li><\/ul><p>Reglas de monto:<\/p><ul><li>El SRI fija por resolución el <strong>monto mínimo<\/strong> para personas naturales no obligadas a llevar contabilidad y negocios populares RIMPE, con comprobante resumen por las ventas menores.<\/li><li>A <strong>petición del adquirente<\/strong>, se debe emitir por <strong>cualquier monto<\/strong>.<\/li><li>En <strong>combustibles líquidos y gas licuado de petróleo<\/strong>: comprobante por cualquier valor, siempre.<\/li><li>Sociedades y personas naturales obligadas a llevar contabilidad: emiten <strong>siempre, sin importar el monto<\/strong>.<\/li><\/ul>", "clave": "La emisión es obligatoria aun sin pedido del cliente, a título gratuito y con tarifa 0% (Art. 8)."}, {"titulo": "Quién NO emite y plazos de los comprobantes de retención (Art. 8)", "html": "<p>Excepción clave: los <strong>trabajadores en relación de dependencia NO<\/strong> emiten comprobantes de venta por sus remuneraciones.<\/p><p>Comprobantes de retención — momento y plazos:<\/p><ul><li>Se emiten en el momento del <strong>pago o acreditación en cuenta, lo que ocurra primero<\/strong>.<\/li><li>Entrega al proveedor: dentro de los <strong>5 días hábiles<\/strong> siguientes a la presentación del comprobante de venta.<\/li><li>Instituciones del sistema financiero: pueden emitir <strong>un solo comprobante mensual<\/strong> por cliente/proveedor con más de una transacción al mes, disponible dentro de los <strong>5 primeros días del mes siguiente<\/strong>.<\/li><li>Retención de <strong>Impuesto a la Salida de Divisas<\/strong>: comprobante disponible dentro de los <strong>2 días hábiles<\/strong> siguientes a la fecha de retención.<\/li><\/ul>", "clave": "Retención: emitir al pagar o acreditar (lo primero) y entregar en 5 días hábiles; ISD en 2 días hábiles (Art. 8)."}, {"titulo": "Factura vs. nota de venta: comparativo de atención al ciudadano", "html": "<table><tr><th>Aspecto<\/th><th>Factura (Art. 11)<\/th><th>Nota de venta (Art. 12)<\/th><\/tr><tr><td>Quién la emite<\/td><td>Sujetos pasivos en general<\/td><td><strong>Exclusivamente negocios populares del Régimen RIMPE<\/strong><\/td><\/tr><tr><td>Desglose de impuestos<\/td><td>Desglosa IVA cuando el adquirente usa crédito tributario o sustenta gastos personales; sin desglose con consumidores finales<\/td><td>Precio <strong>incluye impuestos<\/strong> (Art. 21)<\/td><\/tr><tr><td>Exportaciones<\/td><td>Sí, se emite en operaciones de exportación<\/td><td>No aplica<\/td><\/tr><tr><td>Sustenta crédito tributario de IVA<\/td><td>Sí (Art. 9)<\/td><td>No (no desglosa IVA)<\/td><\/tr><\/table><p><em>Caso de ventanilla:<\/em> si un negocio popular RIMPE pregunta qué documento emitir, la respuesta es <strong>nota de venta<\/strong> (Art. 12, sustituido por DE 304 de dic-2021).<\/p>", "clave": "Las notas de venta son exclusivas de los negocios populares RIMPE y no desglosan IVA (Arts. 11-12, 21)."}, {"titulo": "Liquidaciones de compra de bienes y prestación de servicios (Art. 13)", "html": "<p>Las emite el <strong>adquirente<\/strong> (no el vendedor) en estos casos:<\/p><ul><li>Servicios de <strong>personas naturales no residentes<\/strong> en el país;<\/li><li>Servicios de <strong>sociedades extranjeras<\/strong> sin domicilio ni establecimiento permanente en Ecuador;<\/li><li>Bienes y servicios de personas naturales no obligadas a llevar contabilidad <strong>sin RUC o con RUC suspendido<\/strong>, que por su nivel cultural o rusticidad no puedan emitir comprobantes;<\/li><li>Compras hechas por un <strong>empleado en relación de dependencia<\/strong> a nombre del empleador (sin retenciones de renta ni IVA para el empleado);<\/li><li>Servicios de <strong>miembros de cuerpos colegiados<\/strong> de elección popular sin RUC activo.<\/li><\/ul><p>Condición para sustentar crédito y gasto: retener el <strong>100% del IVA<\/strong> y el porcentaje de renta, declarar y pagar. Las liquidaciones emitidas a proveedores con <strong>RUC ACTIVO no sustentan<\/strong> crédito tributario ni costos/gastos.<\/p>", "clave": "La liquidación de compra la emite el comprador en casos tasados; exige retener el 100% del IVA (Art. 13)."}, {"titulo": "Tiquetes y boletos: solo consumidor final (Art. 14)", "html": "<ul><li>Los tiquetes de máquinas registradoras y los boletos a espectáculos se usan <strong>únicamente con consumidores finales<\/strong>.<\/li><li><strong>No dan derecho a crédito tributario de IVA ni sustentan costos y gastos<\/strong>, porque no identifican al adquirente.<\/li><li>Si el cliente necesita sustentar costos, gastos o crédito tributario, puede exigir el canje por <strong>factura o nota de venta<\/strong>, y el emisor está obligado a realizar el cambio <strong>de manera inmediata<\/strong>.<\/li><li>Prohibido emitir tiquetes en operaciones de <strong>envío de divisas al exterior a nombre de terceros<\/strong>.<\/li><\/ul><p><em>Caso de ventanilla:<\/em> un contribuyente con tiquete de supermercado que quiere deducir gastos debe pedir el canje inmediato por factura (Art. 14 y Disposición General Primera).<\/p>", "clave": "El tiquete no sustenta nada tributariamente; el cliente puede exigir canje inmediato por factura (Art. 14)."}, {"titulo": "Oportunidad de entrega del comprobante (Art. 17)", "html": "<table><tr><th>Situación<\/th><th>Momento de entrega<\/th><\/tr><tr><td>Regla general<\/td><td>Al efectuarse el acto o celebrarse el contrato<\/td><\/tr><tr><td>Venta por medios electrónicos / teléfono<\/td><td>Junto con el bien o por mensajes de datos<\/td><\/tr><tr><td>Servicios con débito automático o tarjeta<\/td><td>Por cualquier medio, incluso con el estado de cuenta<\/td><\/tr><tr><td>Bienes inmuebles (giro del negocio)<\/td><td>Al percibir el ingreso o al celebrar la escritura pública, <strong>lo que ocurra primero<\/strong><\/td><\/tr><tr><td>Contratos por etapas / tracto sucesivo<\/td><td>Al cumplirse las condiciones de cada período, fase o etapa<\/td><\/tr><tr><td>Servicios continuos (agua, luz, telecomunicaciones)<\/td><td>Generado en sistemas del prestador; se entrega <strong>cuando el usuario lo requiera<\/strong><\/td><\/tr><\/table><p>El SRI puede fijar por resolución general plazos diferentes de emisión y entrega.<\/p>", "clave": "En inmuebles el comprobante se entrega al percibir el ingreso o firmar la escritura, lo que ocurra primero (Art. 17)."}]}, {"id": "l2", "titulo": "Autorización, vigencia y suspensión", "duracionMin": 30, "slides": [{"titulo": "Modalidades de autorización de emisión (Art. 5)", "html": "<p>Los sujetos pasivos solicitan al SRI la autorización para imprimir y emitir sus documentos. Tres modalidades:<\/p><ul><li><strong>Establecimientos gráficos autorizados<\/strong> (impresión física);<\/li><li><strong>Sistemas computarizados<\/strong>, en los términos que establezca el SRI;<\/li><li><strong>Máquinas registradoras<\/strong> para tiquetes, solo de marcas y modelos previamente calificados por el SRI.<\/li><\/ul><p>Reglas complementarias:<\/p><ul><li>Quien emite por sistemas computarizados puede además pedir autorización de
