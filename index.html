estre del año, el beneficio se aplica por la parte proporcional a los meses correspondientes y el impuesto se paga por el resto de meses del ejercicio.", "correcta": true, "feedback": "Verdadero. Art. 9.1 del Reglamento: si la solicitud se presenta a partir del segundo trimestre, o el registro se da de baja o se transfiere el dominio antes de diciembre, el beneficio se aplica proporcionalmente por los meses en que permaneció registrado, pagándose el impuesto por los meses restantes.", "tema": "Rebajas especiales"}, {"tipo": "vf", "pregunta": "El pago del IPVM es exigible únicamente para la obtención de la primera matrícula, pero no para la renovación anual ni para el certificado de revisión vehicular.", "correcta": false, "feedback": "Falso. Art. 12 del Reglamento (sustituido por el Art. 130 del D.E. 1114): el impuesto es exigible para la obtención de la matrícula, la renovación anual de la matrícula y la entrega del certificado de revisión vehicular.", "tema": "Pago del impuesto"}, {"tipo": "vf", "pregunta": "El SRI consigna en su registro tributario vehicular los bloqueos y bajas informados por cualquier GAD municipal o entidad privada que tenga conocimiento del hecho.", "correcta": false, "feedback": "Falso. Disposición General Segunda de la Resolución NAC-DGERCGC20-00000068: el SRI únicamente consigna información de bloqueos, desbloqueos, bajas y reactivaciones procedente de la Dirección Nacional de la Agencia Nacional de Tránsito; los demás requerimientos deben canalizarse ante ese organismo.", "tema": "Registro ANT-SRI"}, {"tipo": "completar", "pregunta": "Para determinar el avalúo de vehículos de modelos de años anteriores, se deduce una depreciación del ____ por ciento anual respecto del avalúo original.", "respuestas": ["20", "veinte", "20%"], "feedback": "Art. 2, numeral 3 del Reglamento del Impuesto Anual a los Vehículos Motorizados: depreciación del veinte por ciento (20%) anual respecto del avalúo original.", "tema": "Base imponible y depreciación"}, {"tipo": "completar", "pregunta": "En la depreciación de vehículos, el valor residual no puede ser inferior al ____ por ciento del avalúo original.", "respuestas": ["10", "diez", "10%"], "feedback": "Art. 2, numerales 3 y 4 del Reglamento: el valor residual no puede ser inferior al diez por ciento (10%) del avalúo original.", "tema": "Base imponible y depreciación"}, {"tipo": "completar", "pregunta": "Por disposición del Decreto Ejecutivo 1114, donde la norma decía Base Nacional de Datos de Vehículos debe leerse ____.", "respuestas": ["registro tributario vehicular", "el registro tributario vehicular"], "feedback": "Disposición reformatoria única del D.E. 1114 (R.O. Suplemento 260, 4 de agosto de 2020): donde diga Base Nacional de Datos de Vehículos se leerá Registro Tributario Vehicular.", "tema": "Registro Tributario Vehicular"}, {"tipo": "completar", "pregunta": "Los vehículos de servicio público no exentos y los de una tonelada o más usados exclusivamente en actividades productivas o de comercio tienen una rebaja del ____ por ciento del impuesto causado.", "respuestas": ["80", "ochenta", "80%"], "feedback": "Art. 7 de la Ley de Reforma Tributaria y Art. 5 de la Resolución NAC-DGERCGC23-00000030: rebaja del ochenta por ciento (80%) del impuesto causado.", "tema": "Rebajas del 80%"}, {"tipo": "completar", "pregunta": "Los vehículos que se encuentran temporalmente en el país por razones de turismo o tránsito aduanero están exentos siempre que su permanencia no sea mayor de ____ meses.", "respuestas": ["tres", "3"], "feedback": "Art. 6, literal b) de la Ley de Reforma Tributaria y Art. 7, numeral 4 del Reglamento: la exención rige si la permanencia no supera los tres meses; superado el plazo, causa de inmediato el impuesto.", "tema": "Exoneraciones"}, {"tipo": "completar", "pregunta": "Cuando la ANT no puede transmitir la información de manera automática, debe hacerlo de manera electrónica mediante el Sistema de Gestión Documental ____.", "respuestas": ["quipux"], "feedback": "Art. 2 de la Resolución NAC-DGERCGC20-00000068: se entiende por electrónica la transmisión mediante medios digitales de gestión documental del Gobierno Nacional, como el Sistema de Gestión Documental Quipux.", "tema": "Registro ANT-SRI"}, {"tipo": "completar", "pregunta": "El sujeto pasivo beneficiario de una exoneración debe comunicar a la administración tributaria que dejó de cumplir las condiciones del beneficio en el término de ____ días hábiles.", "respuestas": ["30", "treinta"], "feedback": "Art. 15, segundo inciso, del Reglamento del Impuesto Anual a los Vehículos Motorizados: el sujeto pasivo debe comunicar al SRI en el término de treinta días hábiles a partir de la fecha en que dejó de cumplir las condiciones.", "tema": "Procedimiento de exoneración"}, {"tipo": "completar", "pregunta": "Para la exoneración de vehículos eléctricos de uso particular, los fabricantes e importadores deben reportar al SRI las características de motorización de cada vehículo hasta el ____ de cada año.", "respuestas": ["30 de noviembre", "treinta de noviembre"], "feedback": "Art. 4, numeral 5, literal a) de la Resolución NAC-DGERCGC23-00000030 (agregado por la Resolución No. 38 de 2025): el reporte de motorización debe presentarse hasta el 30 de noviembre de cada año.", "tema": "Exoneraciones"}]}, {"id": "resoluciones", "titulo": "Resoluciones del SRI (Retenciones, Regímenes Especiales y Trámites)", "icono": "📜", "descripcion": "Estudio de nivel de maestría de las resoluciones clave del SRI: porcentajes de retención de IVA y de renta 2026, régimen simplificado de la Economía Popular y Solidaria, IVA 5% en materiales de construcción, declaraciones sustitutivas y requisitos del RUC.", "tiempoMaxMin": 120, "dia": "Día 3 — jueves 16 de julio", "lecciones": [{"id": "l1", "titulo": "Retenciones de IVA (Res. NAC-DGERCGC20-00000061)", "duracionMin": 30, "slides": [{"titulo": "Marco normativo y ámbito de aplicación", "html": "<p>La Resolución <strong>NAC-DGERCGC20-00000061<\/strong> (29 de septiembre de 2020) fija los porcentajes de retención del IVA.<\/p><ul><li>Base legal: <strong>art. 63 de la LRTI<\/strong>, que faculta al SRI a fijar los porcentajes de retención de IVA mediante resolución.<\/li><li>Se complementa con los <strong>arts. 147, 147.1 y 148 del RLRTI<\/strong> (agentes de retención, servicios digitales y momento de la retención).<\/li><li>El <strong>art. 29 numeral 1 del Código Tributario<\/strong> define a los agentes de retención.<\/li><li><strong>Derogó<\/strong> la Resolución NAC-DGERCGC15-00000284 (R.O. Supl. 473, 6-abr-2015).<\/li><\/ul>", "clave": "La Res. NAC-DGERCGC20-00000061 fija los porcentajes de retención de IVA con base en el art. 63 de la LRTI y derogó la resolución de 2015."}, {"titulo": "Agentes de retención de IVA (art. 2)", "html": "<p>Son agentes de retención de IVA (art. 2):<\/p><ul><li><strong>Contribuyentes especiales<\/strong> y contribuyentes calificados como <strong>agentes de retención<\/strong> por el SRI.<\/li><li><strong>Emisoras de tarjetas de crédito o débito<\/strong> (sean o no especiales), por pagos a proveedores, a establecimientos afiliados y por servicios digitales importados por cuenta de sus clientes.<\/li><li><strong>Empresas de seguros y reaseguros<\/strong>, por todos los pagos a proveedores y por cuenta de terceros.<\/li><li>Sujetos pasivos en la <strong>importación de servicios<\/strong> y quienes emitan <strong>liquidaciones de compra<\/strong> (solo en esas operaciones).<\/li><li>Obligados a retener el <strong>IVA presuntivo<\/strong> (combustibles) y las <strong>entidades del sistema financiero<\/strong> en convenios de recaudación o débito.<\/li><li><strong>Operadores de turismo receptivo<\/strong> calificados como especiales o agentes de retención, en compras vinculadas al paquete turístico.<\/li><\/ul>", "clave": "Retienen IVA: contribuyentes especiales y agentes de retención, tarjetas de crédito/débito, aseguradoras, importadores de servicios, emisores de liquidaciones de compra, sistema financiero y operadores de turismo receptivo."}, {"titulo": "Sujetos a los que NO se retiene IVA (art. 3)", "html": "<p>No procede retención de IVA a (art. 3):<\/p><ul><li><strong>Contribuyentes especiales<\/strong> (salvo los casos previstos en la propia resolución).<\/li><li><strong>Instituciones del Estado<\/strong> y <strong>empresas públicas<\/strong> reguladas por la LOEP.<\/li><li><strong>Compañías de aviación<\/strong> y <strong>agencias de viaje<\/strong> (estas últimas solo por el IVA en venta de pasajes aéreos).<\/li><li>Comercializadores y estaciones de servicio, solo en la <strong>adquisición de combustible<\/strong> derivado de petróleo.<\/li><li>Instituciones del sistema financiero, solo por <strong>servicios financieros gravados<\/strong> con tarifa distinta de 0%.<\/li><li><strong>Voceadores de periódicos y revistas<\/strong> (solo en la adquisición de esos productos) y <strong>exportadores habituales<\/strong> calificados como agentes de retención o especiales.<\/li><\/ul>", "clave": "El art. 3 enumera 10 grupos a los que no se retiene IVA: especiales, Estado, empresas públicas, aviación, agencias de viaje (pasajes), combustibles, financieras, tarjetas (comisión), voceadores y exportadores habituales calificados."}, {"titulo": "Porcentajes a sujetos NO especiales: 30% y 70% (art. 4)", "html": "<p>Cuando el agente de retención paga a sujetos pasivos <strong>no calificados<\/strong> como contribuyentes especiales:<\/p><table><tr><th>Concepto<\/th><th>Retención<\/th><\/tr><tr><td>Transferencia de <strong>bienes<\/strong> gravados con tarifa distinta de 0%<\/td><td><strong>30%<\/strong> del IVA<\/td><\/tr><tr><td><strong>Servicios<\/strong>, derechos, comisiones por intermediación y <strong>contratos de consultoría<\/strong><\/td><td><strong>70%<\/strong> del IVA<\/td><\/tr><\/table><ul><li>Las emisoras de tarjetas aplican los mismos porcentajes a sus establecimientos afiliados no especiales: <strong>30%<\/strong> en bienes y <strong>70%<\/strong> en servicios.<\/li><li>Regla mnemotécnica: <em>bienes 30 — servicios 70<\/em>.<\/li><\/ul>", "clave": "A no especiales: 30% del IVA en bienes y 70% en servicios, derechos, comisiones y consultoría (art. 4)."}, {"titulo": "Retención del 100% del IVA (art. 4, literal c)", "html": "<p>Se retiene el <strong>100%<\/strong> del IVA causado en:<\/p><ul><li><strong>Servicios profesionales<\/strong> prestados por personas naturales <strong>con título de instrucción superior<\/strong> (salvo contratos de consultoría, que van al 70%).<\/li><li><strong>Arrendamiento de inmuebles<\/strong> de personas naturales o sucesiones indivisas <strong>no obligadas a llevar contabilidad<\/strong>.<\/li><li>Operaciones con <strong>liquidaciones de compra<\/strong> de bienes y prestación de servicios (incluye pagos a personas privadas de la libertad y cuotas de arrendamiento a no residentes).<\/li><li><strong>Dietas, honorarios u otros emolumentos<\/strong> a miembros de directorios y cuerpos colegiados, y pagos a miembros de cuerpos colegiados de elección popular.<\/li><li>Adquisiciones de <strong>operadores de turismo receptivo<\/strong> vinculadas al paquete facturado (cuando el proveedor no es especial).<\/li><\/ul>", "clave": "El 100% del IVA se retiene en servicios profesionales con título superior, arriendo de inmuebles de PN no obligadas a llevar contabilidad, liquidaciones de compra y dietas de directorios."}, {"titulo": "Porcentajes ENTRE contribuyentes especiales: 10% y 20% (art. 5)", "html": "<p>Cuando un contribuyente especial paga a <strong>otro contribuyente especial<\/strong>:<\/p><table><tr><th>Concepto<\/th><th>Retención<\/th><\/tr><tr><td>Adquisición de <strong>bienes<\/strong> gravados con tarifa distinta de 0%<\/td><td><strong>10%<\/strong> del IVA<\/td><\/tr><tr><td><strong>Servicios<\/strong>, derechos, comisiones y <strong>consultoría<\/strong><\/td><td><strong>20%<\/strong> del IVA<\/td><\/tr><\/table><ul><li>Las emisoras de tarjetas aplican <strong>10%<\/strong> (bienes) y <strong>20%<\/strong> (servicios) a establecimientos afiliados que sean contribuyentes especiales.<\/li><li>Los operadores de turismo receptivo especiales aplican estos mismos porcentajes cuando compran a otros especiales.<\/li><li>Regla mnemotécnica: entre especiales los porcentajes se reducen a un tercio aproximado: <em>10 en bienes, 20 en servicios<\/em>.<\/li><\/ul>", "clave": "Entre contribuyentes especiales la retención de IVA es 10% en bienes y 20% en servicios y consultoría (art. 5)."}, {"titulo": "Casos especiales: construcción, importación de servicios y combustibles", "html": "<ul><li><strong>Contratos de construcción (art. 7):<\/strong> en todos los casos la retención es del <strong>30%<\/strong> del IVA causado; no se retiene si el constructor es institución del Estado o empresa pública (LOEP).<\/li><li><strong>Importación de servicios (art. 8):<\/strong> el importador retiene el <strong>100%<\/strong> del IVA generado; los contratos de consultoría con no residentes se consideran importación de servicios.<\/li><li><strong>Servicios digitales (art. 9):<\/strong> emisoras de tarjetas e intermediarios de pago retienen el <strong>100%<\/strong> del IVA en importación de servicios digitales de no residentes no registrados que consten en el catastro del SRI.<\/li><li><strong>IVA presuntivo en combustibles (art. 10):<\/strong> Petroecuador y las comercializadoras retienen el <strong>100%<\/strong> del IVA calculado sobre el <strong>margen de comercialización<\/strong> del distribuidor.<\/li><\/ul>", "clave": "Construcción: siempre 30%; importación de servicios y servicios digitales: 100%; IVA presuntivo de combustibles: 100% sobre el margen de comercialización."}, {"titulo": "Exportadores: habituales y de recursos naturales no renovables (arts. 11 y 12)", "html": "<ul><li><strong>Exportadores habituales<\/strong> de bienes y/o servicios calificados como agentes de retención o especiales: retienen el <strong>100%<\/strong> del IVA en todas sus adquisiciones, <strong>incluso a contribuyentes especiales<\/strong>, salvo los casos de los numerales 2 al 9 del art. 3.<\/li><li>Deben constar en el <strong>catastro<\/strong> del portal del SRI e incluir la leyenda <em>Exportador Habitual de Bienes y/o Servicios<\/em> en sus comprobantes.<\/li><li><strong>Exportadores de recursos naturales no renovables (art. 12):<\/strong> retienen <strong>30%<\/strong> en bienes que se exporten, materias primas, insumos y activos fijos empleados en su fabricación y comercialización.<\/li><li>Y retienen <strong>100%<\/strong> en servicios, derechos, comisiones y consultoría empleados en esos bienes exportados.<\/li><\/ul>", "clave": "El exportador habitual calificado retiene el 100% del IVA a todos, incluso a especiales; el exportador de recursos no renovables retiene 30% en bienes y 100% en servicios."}, {"titulo": "Reglas operativas: momento, comprobantes y operaciones mixtas", "html": "<ul><li><strong>Momento de la retención (art. 16):<\/strong> cuando se pague o se acredite en cuenta el IVA, <strong>lo que ocurra primero<\/strong>, en el mismo término que la retención de renta.<\/li><li><strong>Operaciones con distintos porcentajes (art. 15):<\/strong> se retiene cada bien o servicio con su porcentaje; si no se pueden diferenciar, se aplica el <strong>porcentaje mayor<\/strong>.<\/li><li><strong>Transferencias a título gratuito (art. 14):<\/strong> no procede retención si quien transfiere asume, declara y paga el impuesto.<\/li><li><strong>Comprobantes (art. 17):<\/strong> un comprobante por operación; los emisores electrónicos pueden emitir <strong>uno mensual<\/strong> por proveedor cuando no proceda retención; especiales, Estado y empresas públicas pueden emitir uno por <strong>5 días consecutivos<\/strong> por cliente.<\/li><li>En servicios digitales retenidos por el sistema financiero, el <strong>estado de cuenta<\/strong> es el comprobante de retención.<\/li><\/ul>", "clave": "La retención de IVA se hace al pago o acreditación en cuenta (lo primero); en operaciones mixtas indiferenciables se aplica el porcentaje mayor."}]}, {"id": "l2", "titulo": "Retenciones en la fuente de Renta 2026 (Res. NAC-DGERCGC26-00000009)", "duracionMin": 30, "slides": [{"titulo": "Marco normativo y vigencia", "html": "<p>La Resolución <strong>NAC-DGERCGC26-00000009<\/strong> (27 de febrero de 2026) expide los porcentajes de retención en la fuente del impuesto a la renta.<\/p><ul><li>Base legal: <strong>art. 45 LRTI<\/strong> y art. 92 del reglamento; el porcentaje no puede superar el <strong>10%<\/strong> del pago o crédito en cuenta.<\/li><li><strong>Deroga<\/strong> la Resolución NAC-DGERCGC24-00000008 (R.O. Supl. 508, 29-feb-2024).<\/li><li>Aplicable a partir del <strong>1 de marzo de 2026<\/strong>.<\/li><li><strong>Transitoria:<\/strong> los comprobantes de retención del 1 al 15 de marzo de 2026 pueden emitirse hasta el <strong>31 de marzo de 2026<\/strong>.<\/li><\/ul>", "clave": "La Res. NAC-DGERCGC26-00000009 rige desde el 1 de marzo de 2026, deroga la resolución de 2024 y respeta el tope legal del 10%."}, {"titulo": "Retención del 0% (art. 2, numeral 1)", "html": "<p>Casos con retención del <strong>0%<\/strong>:<\/p><ul><li><strong>Intereses pagados a bancos<\/strong> y entidades vigiladas por la Superintendencia de Bancos y de la Economía Popular y Solidaria (distintos de los del literal j del numeral 4). <strong>No se emite comprobante de retención<\/strong>.<\/li><li>Transacciones mediante liquidaciones de compra por actividades de <strong>personas privadas de libertad<\/strong> en programas de reinserción laboral.<\/li><li>Adquisiciones a contribuyentes <strong>RIMPE negocios populares<\/strong>, por sus actividades sujetas al régimen, siempre que emitan <strong>comprobante de venta preimpreso<\/strong>.<\/li><\/ul>", "clave": "0%: intereses a bancos (sin comprobante), personas privadas de libertad en reinserción y RIMPE negocio popular con comprobante preimpreso."}, {"titulo": "Retención del 1% y del 1,75% (art. 2, numerales 2 y 3)", "html": "<table><tr><th>Concepto<\/th><th>Retención<\/th><\/tr><tr><td>Transporte privado de pasajeros; transporte público y privado de carga<\/td><td><strong>1%<\/strong><\/td><\/tr><tr><td>Bienes agrícolas, avícolas, pecuarios, apícolas, cunícolas, bioacuáticos, forestales y carnes en estado natural, comprados <strong>directamente al productor<\/strong><\/td><td><strong>1%<\/strong><\/td><\/tr><tr><td>Adquisiciones a <strong>RIMPE emprendedores<\/strong><\/td><td><strong>1%<\/strong><\/td><\/tr><tr><td>Los mismos bienes agropecuarios comprados a <strong>comercializadores no productores<\/strong><\/td><td><strong>1,75%<\/strong><\/td><\/tr><\/table><ul><li><strong>Excepción banano:<\/strong> la compra local de banano a productores se rige por el porcentaje de la <strong>LRTI y su reglamento<\/strong>, no por esta tabla; a no productores aplica el 1%.<\/li><\/ul>", "clave": "Productos agropecuarios en estado natural: 1% al productor y 1,75% al comercializador; transporte y RIMPE emprendedor: 1%."}, {"titulo": "Retención del 2% (art. 2, numeral 4)", "html": "<p>Principales conceptos al <strong>2%<\/strong>:<\/p><ul><li><strong>Energía eléctrica<\/strong> y adquisición de <strong>todo tipo de bienes muebles de naturaleza corporal<\/strong>.<\/li><li>Pagos de <strong>tarjetas de crédito<\/strong> a establecimientos afiliados y consumos con <strong>tarjetas de débito<\/strong>.<\/li><li>Pagos a compañías de <strong>seguros y reaseguros<\/strong>: sobre el <strong>valor total de las primas<\/strong> facturadas o planilladas.<\/li><li>Cuotas de <strong>arrendamiento mercantil<\/strong> local, incluida la opción de compra.<\/li><li>Actividades de <strong>construcción<\/strong> de obra material inmueble, urbanización o lotización.<\/li><li><strong>Intereses entre entidades financieras<\/strong> vigiladas (lit. j) y pagos de <strong>sistemas auxiliares de pago<\/strong>; los agregadores de pago retienen además el <strong>2%<\/strong> sobre sus ingresos propios.<\/li><\/ul>", "clave": "El 2% cubre energía, bienes muebles corporales, tarjetas, seguros (sobre el total de la prima), arrendamiento mercantil y construcción."}, {"titulo": "Retención del 3% (art. 2, numeral 5 y art. 3)", "html": "<p>Conceptos al <strong>3%<\/strong>:<\/p><ul><li>Servicios de personas naturales donde <strong>prevalece la mano de obra<\/strong> sobre el intelecto.<\/li><li>Intereses reconocidos por <strong>entidades del sector público<\/strong> a los sujetos pasivos.<\/li><li>Facturas de <strong>medios de comunicación<\/strong> y <strong>agencias de publicidad<\/strong>.<\/li><li><strong>Rendimientos financieros<\/strong> pagados por sociedades, sucesiones indivisas o personas naturales residentes (depósitos, pólizas, avales, fianzas), e <strong>intereses y comisiones por ventas a crédito<\/strong> (se suman al valor de la mercadería).<\/li><li>Liquidaciones de compra a personas <strong>sin RUC o con RUC suspendido<\/strong> que por su nivel cultural o rusticidad no pueden emitir comprobantes: 3% sobre el total.<\/li><li><strong>Regla residual (art. 3):<\/strong> todo pago sin porcentaje específico se retiene al <strong>3%<\/strong>.<\/li><\/ul>", "clave": "El 3% aplica a mano de obra, publicidad, rendimientos financieros y, como regla residual, a todo pago sin porcentaje específico."}, {"titulo": "Retención del 5% y del 10% (art. 2, numerales 6 y 7)", "html": "<table><tr><th>Concepto<\/th><th>Retención<\/th><\/tr><tr><td>Servicios profesionales prestados por <strong>sociedades<\/strong> residentes y comisiones a sociedades<\/td><td><strong>5%<\/strong><\/td><\/tr><tr><td>Honorarios a <strong>personas naturales<\/strong> con predominio del intelecto (con o sin título)<\/td><td><strong>10%<\/strong><\/td><\/tr><tr><td>Docencia, <strong>notarios<\/strong>, uso de imagen o renombre (artistas, deportistas, <strong>influencers<\/strong>)<\/td><td><strong>10%<\/strong><\/td><\/tr><tr><td>Regalías y derechos de <strong>propiedad intelectual<\/strong> a residentes<\/td><td><strong>10%<\/strong><\/td><\/tr><tr><td><strong>Arrendamiento de bienes inmuebles<\/strong>, cualquiera sea su denominación contractual<\/td><td><strong>10%<\/strong><\/td><\/tr><\/table><ul><li>Clave del distractor: servicios profesionales de <strong>sociedad = 5%<\/strong>; de <strong>persona natural = 10%<\/strong>.<\/li><\/ul>", "clave": "Sociedades profesionales: 5%; honorarios de personas naturales, docencia, notarios, regalías, imagen/influencers y arriendo de inmuebles: 10%."}, {"titulo": "Tabla resumen de porcentajes de renta 2026", "html": "<table><tr><th>%<\/th><th>Conceptos emblemáticos<\/th><\/tr><tr><td><strong>0%<\/strong><\/td><td>Intereses a bancos; RIMPE negocio popular (preimpreso); privados de libertad<\/td><\/tr><tr><td><strong>1%<\/strong><\/td><td>Transporte; agro al productor; RIMPE emprendedor<\/td><\/tr><tr><td><strong>1,75%<\/strong><\/td><td>Agro a comercializadores no productores<\/td><\/tr><tr><td><strong>2%<\/strong><\/td><td>Bienes muebles; energía; seguros; arrendamiento mercantil; construcción; tarjetas<\/td><\/tr><tr><td><strong>3%<\/strong><\/td><td>Mano de obra; publicidad; rendimientos financieros; residual<\/td><\/tr><tr><td><strong>5%<\/strong><\/td><td>Servicios profesionales y comisiones de sociedades<\/td><\/tr><tr><td><strong>10%<\/strong><\/td><td>Honorarios PN; docencia; notarios; arriendo inmuebles; regalías; influencers<\/td><\/tr><\/table>", "clave": "Memoriza la escalera 0 — 1 — 1,75 — 2 — 3 — 5 — 10 con un concepto ancla por cada porcentaje."}, {"titulo": "Pagos al exterior y convenios de doble imposición (arts. 4 y 9)", "html": "<ul><li><strong>Servicios ocasionales de no residentes (art. 4):<\/strong> se retiene la <strong>tarifa general de impuesto a la renta de sociedades<\/strong> sobre el total del pago.<\/li><li>Si el perceptor reside en <strong>paraísos fiscales<\/strong>, jurisdicciones de menor imposición o regímenes preferentes: retención equivalente a la <strong>máxima tarifa de personas naturales<\/strong>.<\/li><li><strong>Convenios para evitar doble imposición (art. 9):<\/strong> antes de aplicar el convenio, el agente debe verificar la <strong>residencia fiscal<\/strong> del perceptor en el otro Estado contratante.<\/li><li>En procesos de control se debe acreditar el cumplimiento de los supuestos, incluida la residencia fiscal, con los medios probatorios del ordenamiento vigente.<\/li><\/ul>", "clave": "Pagos al exterior: tarifa general de sociedades; a paraísos fiscales: máxima tarifa de personas naturales; con convenio, verificar primero la residencia fiscal."}, {"titulo": "Reglas comunes: pluralidad, excepciones y momento (arts. 5, 6, 8 y 10)", "html": "<ul><li><strong>Pluralidad de porcentajes (art. 5):<\/strong> cada bien o servicio se retiene con su porcentaje; si los valores no están separados, se aplica el <strong>porcentaje más alto<\/strong>.<\/li><li><strong>No procede retención (art. 6):<\/strong> ingresos <strong>exentos<\/strong>; trabajo en <strong>relación de dependencia<\/strong> (régimen propio); pagos de tarjetas a <strong>agregadores de pago<\/strong> y mercados en línea; pagos entre agregadores; compra de <strong>combustible<\/strong>.<\/li><li><strong>Momento (art. 8):<\/strong> al pago o crédito en cuenta, <strong>lo que ocurra primero<\/strong>; agregadores y mercados en línea pueden emitir <strong>un comprobante mensual<\/strong>.<\/li><li><strong>Convenios de débito (art. 10):<\/strong> las entidades financieras retienen renta en pagos amparados en convenios de recaudación o débito, tenga o no el cliente calidad de agente de retención.<\/li><\/ul>", "clave": "Sin valores separados se aplica el porcentaje más alto; no se retiene en ingresos exentos, relación de dependencia ni compra de combustible."}]}, {"id": "l3", "titulo": "Regímenes especiales: Economía Popular y Solidaria e IVA 5% en construcción", "duracionMin": 30, "slides": [{"titulo": "Régimen simplificado EPS: ámbito (Res. NAC-DGERCGC19-00000039, art. 1)", "html": "<p>La Resolución <strong>NAC-DGERCGC19-00000039<\/strong> (8 de agosto de 2019) norma el régimen simplificado del RLRTI para las organizaciones de la <strong>Economía Popular y Solidaria<\/strong>.<\/p><ul><li>También pueden acogerse: <strong>entidades del sector financiero popular y solidario<\/strong> y <strong>organizaciones comunitarias del agua<\/strong> (juntas de agua potable, saneamiento, riego y drenaje).<\/li><li><strong>No pueden acogerse:<\/strong> cooperativas de ahorro y crédito, cajas centrales, asociaciones y mutualistas de ahorro y crédito para la vivienda.<\/li><li>Tampoco las organizaciones públicas o privadas <strong>con finalidad de lucro<\/strong> bajo la figura de organizaciones comunitarias del agua.<\/li><li>Derogó la Resolución NAC-DGERCGC16-00000343.<\/li><\/ul>", "clave": "El régimen simplificado EPS incluye a organizaciones EPS, sector financiero popular y solidario y juntas de agua; excluye a cooperativas de ahorro y crédito, cajas centrales y mutualistas."}, {"titulo": "Límites para integrar el régimen simplificado (art. 2)", "html": "<p>Pueden integrar y permanecer en el régimen las organizaciones con valores acumulados iguales o inferiores a:<\/p><table><tr><th>Rubro<\/th><th>Monto máximo<\/th><\/tr><tr><td>Capital propio al iniciar actividades o al 1 de enero<\/td><td><strong>USD 360.000<\/strong><\/td><\/tr><tr><td>Ingresos anuales del ejercicio fiscal anterior<\/td><td><strong>USD 300.000<\/strong><\/td><\/tr><tr><td>Costos, gastos o egresos anuales del ejercicio anterior<\/td><td><strong>USD 240.000<\/strong><\/td><\/tr><\/table><ul><li>La evaluación se hace <strong>al 1 de enero de cada ejercicio<\/strong>; si se incumple un límite, debe <strong>actualizar el RUC al régimen general<\/strong>.<\/li><li><strong>Capital propio<\/strong> = patrimonio (activos menos pasivos); al iniciar actividades es el único límite verificable.<\/li><\/ul>", "clave": "Límites EPS: capital 360.000, ingresos 300.000 y costos/gastos 240.000 USD; se evalúan al 1 de enero de cada año."}, {"titulo": "Beneficios EPS: contabilidad y actos solidarios (art. 3, num. 1-4)", "html": "<ul><li><strong>No obligadas a llevar contabilidad<\/strong>: llevan registros contables simplificados según su organismo de control, con los requisitos del art. 38 del RLRTI.<\/li><li>Emiten <strong>liquidaciones de compra<\/strong> para sustentar adquisiciones que sean <strong>actos económicos solidarios<\/strong>, incluso si el miembro tiene RUC, con consolidación <strong>anual<\/strong> por miembro.<\/li><li>Las ventas por actos solidarios se sustentan en <strong>una sola factura anual<\/strong> consolidada por miembro; los actos solidarios <strong>no son hechos generadores de tributos<\/strong>.<\/li><li>Las juntas de agua pueden emitir <strong>una factura anual<\/strong> consolidada por cliente por servicios con tarifa 0%.<\/li><li><strong>No están obligadas<\/strong> a emitir comprobantes electrónicos, aunque pueden incorporarse voluntariamente.<\/li><\/ul>", "clave": "Las EPS del régimen simplificado no llevan contabilidad plena, consolidan actos solidarios anualmente y no están obligadas a facturación electrónica."}, {"titulo": "Beneficios EPS: declaraciones de IVA semestrales (art. 3, num. 9)", "html": "<p>Presentan IVA <strong>semestral<\/strong> cuando en el semestre, de manera exclusiva, se cumpla una o varias de estas condiciones:<\/p><ul><li>No hayan efectuado <strong>transacciones<\/strong>.<\/li><li>Sus transacciones sean exclusivamente <strong>actos solidarios<\/strong>.<\/li><li>Comercialicen bienes o servicios con <strong>tarifa 0% de IVA<\/strong>.<\/li><li>No hayan actuado como <strong>agentes de retención<\/strong>.<\/li><\/ul><p>Las semestrales se presentan en <strong>julio y enero<\/strong>. Si comercializan con tarifa gravada (12% en la resolución de 2019) o efectúan retenciones, la declaración es <strong>mensual<\/strong> por esos meses, consolidando los periodos previos del semestre.<\/p>", "clave": "Las EPS declaran IVA semestralmente (julio y enero) si solo tienen actos solidarios, tarifa 0% o no retienen; con tarifa gravada o retenciones, declaran mensualmente."}, {"titulo": "Beneficios EPS: renta y deberes formales (art. 3, num. 5-8 y 10-13)", "html": "<ul><li><strong>No son agentes de retención<\/strong> de renta ni de IVA, salvo los casos del art. 7 del título innumerado del RLRTI.<\/li><li>Microempresas nuevas: <strong>exoneración de impuesto a la renta por 3 años<\/strong> desde el primer ejercicio con ingresos operacionales (Ley de Reactivación).<\/li><li>Deducción adicional de <strong>una fracción básica desgravada<\/strong> de renta de personas naturales para su base imponible (microempresas).<\/li><li>Aplican la <strong>tabla de renta de personas naturales<\/strong> sin superar la tarifa de sociedades menos la rebaja de microempresas.<\/li><li>No presentan <strong>Anexo Transaccional Simplificado<\/strong> ni <strong>Anexo de Accionistas (APS)<\/strong>, salvo periodos con retenciones practicadas (solo ATS de esas operaciones).<\/li><\/ul>", "clave": "Las EPS simplificadas no son agentes de retención, gozan de exoneración de renta por 3 años si son microempresas nuevas y no presentan ATS ni APS salvo excepciones."}, {"titulo": "Traspasos entre regímenes (arts. 5 y 6)", "html": "<ul><li>Los traspasos se hacen <strong>a petición<\/strong> de la organización o <strong>de oficio<\/strong> por el SRI, verificando el cumplimiento de requisitos.<\/li><li><strong>Simplificado a general por superar montos:<\/strong> surte efecto desde el <strong>1 de enero del año siguiente<\/strong> a aquel en que se superaron.<\/li><li><strong>Simplificado a general voluntario:<\/strong> desde la fecha de la petición.<\/li><li><strong>General a simplificado:<\/strong> desde el 1 de enero del año en que se cumplieron los montos, o desde la petición o notificación si se elige fecha posterior.<\/li><li>La tarifa de renta es la del régimen en que se encuentre (o debió encontrarse) el sujeto pasivo al <strong>31 de diciembre<\/strong> del ejercicio declarado.<\/li><li>El SRI puede incluir <strong>de oficio y de manera masiva<\/strong> a entidades que cumplan condiciones (Disposición General Primera).<\/li><\/ul>", "clave": "El traspaso por superar montos opera desde el 1 de enero del año siguiente; el incumplimiento de actualizar el RUC se sanciona y no exime del régimen general."}, {"titulo": "IVA 5% en materiales de construcción: base legal (Res. NAC-DGERCGC24-00000013)", "html": "<p>La Resolución <strong>NAC-DGERCGC24-00000013<\/strong> (28 de marzo de 2024) establece el listado de materiales de construcción cuya transferencia local grava <strong>IVA 5%<\/strong>.<\/p><ul><li>Origen: <strong>Ley Orgánica para Enfrentar el Conflicto Armado Interno, la Crisis Social y Económica<\/strong> (R.O. Supl. 516, 12-mar-2024), que agregó un artículo innumerado tras el <strong>art. 55 de la LRTI<\/strong>.<\/li><li>El <strong>art. 140.2 del RLRTI<\/strong> dispone que la tarifa 5% aplica a los bienes del <strong>listado que expida el SRI<\/strong>, con información del MTOP, MIDUVI y otras entidades.<\/li><li>La Ley de Fortalecimiento de Actividades Turísticas permitió registrar el <strong>IVA pagado y no compensado<\/strong> en la elaboración o comercialización de estos materiales como <strong>gasto deducible<\/strong> en la renta del mismo ejercicio.<\/li><\/ul>", "clave": "El IVA 5% en materiales de construcción nace de la Ley del Conflicto Armado Interno y aplica solo a los bienes del listado expedido por el SRI."}, {"titulo": "Listado de materiales con IVA 5% (art. 1)", "html": "<table><tr><th>Categoría<\/th><th>Subcategorías<\/th><\/tr><tr><td>Acero de refuerzo en barras<\/td><td>Varilla laminada corrugada AS42 de <strong>8, 10 y 12 mm<\/strong><\/td><\/tr><tr><td>Áridos<\/td><td>Arcilla, arena, cal, caliza, pétreos<\/td><\/tr><tr><td>Concreto<\/td><td><strong>Hormigón premezclado<\/strong><\/td><\/tr><tr><td>Conglomerantes<\/td><td><strong>Cemento<\/strong> y sus derivados; residuo cementero<\/td><\/tr><tr><td>Materiales metálicos reciclables<\/td><td>Chatarra ferrosa<\/td><\/tr><tr><td>Morteros<\/td><td>Morteros<\/td><\/tr><tr><td>Precursor de cemento<\/td><td>Clinker, puzolana, yeso<\/td><\/tr><tr><td>Prefabricados de hormigón y arcilla<\/td><td>Adoquín, <strong>bloques, ladrillos<\/strong>, productos de hormigón prefabricado<\/td><\/tr><\/table><p><em>Fuera del listado (tarifa general): pinturas, cerámica, tubería PVC, grifería, cables eléctricos, vidrio.<\/em><\/p>", "clave": "El listado del 5% tiene 8 categorías: varilla corrugada, áridos, hormigón premezclado, cemento, chatarra ferrosa, morteros, precursores (clinker, puzolana, yeso) y prefabricados."}, {"titulo": "Obligaciones operativas del IVA 5% (art. 2 y transitoria)", "html": "<ul><li>Los <strong>agentes de percepción<\/strong> del IVA deben incluir en sus comprobantes electrónicos el <strong>código previsto<\/strong> en la Ficha Técnica de Comprobantes Electrónicos esquema <strong>Off-line<\/strong>.<\/li><li><strong>Disposición Transitoria Única:<\/strong> plazo de <strong>tres meses<\/strong> desde la publicación en el Registro Oficial para adecuar los sistemas de comprobantes electrónicos.<\/li><li>Mientras tanto, podían emitir comprobantes con su <strong>propia codificación<\/strong>.<\/li><li>Aplicación práctica en ventanilla: verificar primero si el bien consta en el <strong>listado taxativo<\/strong>; si no consta, aplica la tarifa general de IVA.<\/li><\/ul>", "clave": "Los agentes de percepción tuvieron 3 meses para adecuar los códigos del IVA 5% en comprobantes electrónicos; la tarifa solo cubre los bienes del listado."}]}, {"id": "l4", "titulo": "Trámites: declaraciones sustitutivas y requisitos del RUC", "duracionMin": 30, "slides": [{"titulo": "Declaraciones sustitutivas: marco general (Res. NAC-DGERCGC16-00000448)", "html": "<p>La Resolución <strong>NAC-DGERCGC16-00000448<\/strong> (R.O. Supl. 873, 31-oct-2016) norma la presentación de declaraciones sustitutivas.<\/p><ul><li>Base: <strong>art. 89 del Código Tributario<\/strong> (la declaración es definitiva y vinculante; errores de hecho o cálculo se rectifican dentro del <strong>año siguiente<\/strong>) y <strong>art. 101 de la LRTI<\/strong>.<\/li><li>Definiciones clave (art. 2): <strong>mayor impuesto a pagar<\/strong>, mayor anticipo, <strong>pago previo<\/strong> y <strong>procesos de control<\/strong>.<\/li><li>Cubre las sustitutivas del propio sujeto pasivo y las presentadas dentro de <strong>procesos de control<\/strong> del SRI.<\/li><\/ul>", "clave": "La Res. NAC-DGERCGC16-00000448 regula las sustitutivas con base en el art. 89 del Código Tributario y el art. 101 de la LRTI."}, {"titulo": "Sustitutivas con mayor valor a pagar (art. 3)", "html": "<ul><li>Son válidas las sustitutivas que registren <strong>mayor valor a pagar<\/strong> por obligaciones fiscales, impuesto, anticipo o retención.<\/li><li>Condición: presentarse <strong>antes de que se inicie una determinación<\/strong> por parte del SRI.<\/li><li>Pueden presentarse <strong>en cualquier tiempo<\/strong> (sin límite de un año).<\/li><li>Definición de mayor impuesto a pagar: tras restar créditos tributarios, exenciones y deducciones, el resultado es <strong>mayor<\/strong> al de la anterior declaración válida.<\/li><\/ul>", "clave": "Si la sustitutiva aumenta el valor a pagar, se puede presentar en cualquier tiempo, siempre antes del inicio de una determinación del SRI."}, {"titulo": "Sustitutivas dentro del año (art. 4)", "html": "<p>Se admiten sustitutivas para corregir errores, <strong>dentro del año<\/strong> posterior a la declaración original válida y sin que el SRI haya establecido y notificado antes el error, cuando:<\/p><ul><li><strong>a)<\/strong> No se modifique la obligación fiscal, el impuesto, anticipo y/o retención a pagar.<\/li><li><strong>b)<\/strong> Se <strong>incremente<\/strong> la pérdida tributaria o el crédito tributario.<\/li><li><strong>c)<\/strong> Existan <strong>diferencias a favor del contribuyente<\/strong>.<\/li><\/ul><p>Ejemplo de ventanilla: un contribuyente que declaró mal un casillero informativo sin cambiar el impuesto puede sustituir <strong>solo dentro del año<\/strong>.<\/p>", "clave": "Las sustitutivas sin mayor valor a pagar (a favor del contribuyente o neutras) solo se admiten dentro del año siguiente y sin error notificado previamente."}, {"titulo": "Otros casos y procesos de control (arts. 5, 6 y 8)", "html": "<ul><li><strong>Art. 5 (cualquier tiempo):<\/strong> disminuir pérdida o crédito tributario; exoneración o reducción del anticipo por ley o decreto; traslado de valores del anticipo; y enmienda de casillas de <strong>pago previo o imputación al pago<\/strong> sin reducir el impuesto.<\/li><li><strong>Art. 6 (procesos de control):<\/strong> se registran <strong>únicamente los rubros requeridos<\/strong> por el SRI; es inválida si registra valores distintos. Plazo: hasta <strong>6 años<\/strong> desde la declaración original.<\/li><li>Tras el <strong>acta borrador de determinación<\/strong>, el sujeto pasivo tiene <strong>20 días<\/strong> improrrogables para aceptar glosas mediante sustitutiva (art. 262 RLRTI).<\/li><li><strong>Art. 8:<\/strong> ante el oficio de corrección de pago previo, hay <strong>10 días hábiles<\/strong> para presentar la sustitutiva con intereses y multas; si no, el SRI recalcula sin que ello constituya determinación.<\/li><li><strong>Art. 7:<\/strong> presentar una sustitutiva obliga a corregir declaraciones, informes y <strong>anexos<\/strong> relacionados. La declaración original en cero que luego se sustituye con valores se considera <strong>no presentada<\/strong> y genera multa.<\/li><\/ul>", "clave": "En procesos de control la sustitutiva llega hasta 6 años y solo sobre los rubros requeridos; acta borrador: 20 días; corrección de pago previo: 10 días hábiles."}, {"titulo": "RUC: inscripción de personas naturales — identificación (Res. NAC-DGERCGC17-00000587, art. 2.I)", "html": "<p>La Resolución <strong>NAC-DGERCGC17-00000587<\/strong> (R.O. Supl. 142, 18-dic-2017, reformada hasta 2025) fija los requisitos de inscripción, actualización y suspensión/cancelación del RUC.<\/p><ul><li><strong>Documento de identificación<\/strong> (uno de): cédula física o digital, licencia de conducir, certificado de votación, exención o pago de multa.<\/li><li><strong>Pasaporte ecuatoriano<\/strong>; o pasaporte y <strong>visa vigente<\/strong> para extranjeros no residentes.<\/li><li><strong>Documento migratorio<\/strong> (solo trámites en la provincia de <strong>Galápagos<\/strong>).<\/li><li><strong>Credencial o certificado de refugiado<\/strong> para extranjeros no residentes.<\/li><li>Recordar: la obligación de inscribirse nace del <strong>art. 3 de la Ley del RUC<\/strong> (actividad económica permanente u ocasional).<\/li><\/ul>", "clave": "Para inscribir el RUC de persona natural sirve cédula, licencia, pasaporte (con visa si es extranjero no residente), documento migratorio en Galápagos o credencial de refugiado."}, {"titulo": "RUC personas naturales: ubicación y documentos por actividad (art. 2.I, lit. b y c)", "html": "<ul><li>Primera opción: informar el <strong>Código Único Electrónico Nacional (CUEN)<\/strong> de la factura de servicio eléctrico.<\/li><li>Alternativas: planillas de agua o teléfono, estados de cuenta, <strong>impuesto predial<\/strong>, contrato de arrendamiento o comodato, patente municipal, permiso de bomberos, certificación de la junta parroquial, entre otros.<\/li><li>Antigüedad máxima del documento: <strong>12 meses<\/strong> anteriores a la solicitud; documentos <strong>anuales<\/strong> valen si son del año en curso o del <strong>año inmediato anterior<\/strong>.<\/li><li>Documentos adicionales según actividad: <strong>artesanos<\/strong> (calificación de la Junta Nacional de Defensa del Artesano o acuerdo interministerial), <strong>profesionales<\/strong> (título profesional), <strong>contadores<\/strong> (título), <strong>notarios<\/strong> (nombramiento del Consejo Nacional de la Judicatura), <strong>transportistas<\/strong> (título habilitante), <strong>menores no emancipados<\/strong> (identificación del representante legal).<\/li><li>Se pueden registrar <strong>establecimientos electrónicos<\/strong> informando la dirección electrónica y las direcciones IP.<\/li><\/ul>", "clave": "El documento de ubicación debe ser de los últimos 12 meses (anuales: año en curso o anterior) y cada actividad exige su documento habilitante propio."}, {"titulo": "RUC: trámites por terceros y sociedades (art. 2.I.d y 2.II)", "html": "<ul><li><strong>Trámite por terceros (personas naturales):<\/strong> copia de identificación del contribuyente + <strong>autorización de terceros generada en línea<\/strong> (o poder especial/general) + original de identificación del tercero.<\/li><li><strong>Sociedades:<\/strong> presentan la <strong>Solicitud de inscripción y actualización general del RUC<\/strong> (reemplaza a los formularios RUC 01-A y 01-B).<\/li><li>Documento de constitución según el tipo: Superintendencia de Compañías → <strong>escritura pública inscrita en el Registro Mercantil<\/strong> (el SRI la obtiene en línea); <strong>SAS<\/strong> → documento privado inscrito en el <strong>Registro de Sociedades<\/strong>; sin fines de lucro → acuerdo ministerial y estatuto; <strong>SEPS<\/strong> → documento de personalidad jurídica y estatuto aprobado.<\/li><li>Sector público → publicación en el <strong>Registro Oficial<\/strong> de la norma de creación; fideicomisos → escritura pública ante notario; sociedad extranjera no domiciliada → <strong>poder<\/strong> legalizado o apostillado y traducido.<\/li><\/ul>", "clave": "Cada tipo de sociedad acredita su existencia con un documento distinto: escritura inscrita, documento privado (SAS), acuerdo ministerial, estatuto SEPS o norma publicada en el Registro Oficial."}, {"titulo": "RUC sociedades: representante legal y actualización (art. 2.II.d y art. 3)", "html": "<ul><li><strong>Nombramiento del representante legal<\/strong> según el tipo: Superintendencia de Compañías → inscrito en el <strong>Registro Mercantil o Registro de Sociedades<\/strong>; sin fines de lucro y SEPS → avalado por el <strong>organismo de control<\/strong>; sector público → acto administrativo; condominios → acta de asamblea con reconocimiento de firmas.<\/li><li><strong>Actualización (art. 3):<\/strong> presentar la documentación que <strong>acredite los cambios<\/strong>, identificación del sujeto pasivo y del compareciente, y autorización cuando corresponda.<\/li><li>Actividades <strong>mineras<\/strong>: para incorporar actividades o establecimientos mineros se exige resolución del derecho minero, certificado de vigencia, o contratos notarizados de cesión, mandato, operación o participación, <strong>inscritos en el Registro Minero<\/strong> (reforma 2025).<\/li><li>El plazo legal general para actualizar datos del RUC ante cambios es de <strong>30 días<\/strong> (Ley del RUC).<\/li><\/ul>", "clave": "El nombramiento del representante legal se acredita según el organismo de control; la actualización exige el documento que respalde cada cambio."}, {"titulo": "RUC: suspensión, cancelación y reglas finales (arts. 4, 4.1 y disposiciones)", "html": "<ul><li><strong>Personas naturales:<\/strong> solicitud de suspensión o cancelación + identificación + documento de respaldo; por terceros se agregan autorización y su identificación (<strong>excepto<\/strong> en cancelación por <strong>fallecimiento<\/strong>).<\/li><li><strong>Sociedades:<\/strong> solicitud de cancelación + identificación + documento que respalde la <strong>enajenación del bien o cancelación<\/strong> según el tipo de sociedad.<\/li><li><strong>Art. 4.1:<\/strong> el contribuyente informa el <strong>cese de actividades<\/strong>; el SRI valida requisitos y verifica que no existan <strong>obligaciones pendientes<\/strong>; si las hay, conmina a cumplirlas sin impedir la emisión del certificado.<\/li><li><strong>Disposición General Primera:<\/strong> si el SRI puede verificar los requisitos con información disponible, <strong>no exige la presentación física<\/strong> de documentos.<\/li><li><strong>Disposición General Segunda:<\/strong> se verifica el cumplimiento del <strong>voto<\/strong> en bases de datos; de no constar, se exige certificado de votación, exención o pago de multa, o el trámite no se atiende favorablemente.<\/li><\/ul>", "clave": "Para suspender o cancelar el RUC se informa el cese de actividades; el SRI verifica obligaciones pendientes y puede validar requisitos con su propia información sin pedir papeles."}]}], "banco": [{"tipo": "om", "pregunta": "Una empresa calificada como contribuyente especial compra escritorios (bienes con tarifa 15% de IVA) a una ferretería que NO es contribuyente especial. ¿Qué porcentaje del IVA debe retener?", "opciones": ["10%", "20%", "30%", "70%"], "correcta": 2, "feedback": "Correcto: 30%. El art. 4 literal a) de la Res. NAC-DGERCGC20-00000061 fija la retención del 30% del IVA en transferencias de bienes gravados cuando el proveedor no es contribuyente especial. El 10% aplicaría solo si el vendedor fuera otro contribuyente especial (art. 5).", "tema": "Retenciones IVA"}, {"tipo": "om", "pregunta": "Un contribuyente especial contrata un servicio de consultoría con otra sociedad que también es contribuyente especial. ¿Qué porcentaje del IVA retiene?", "opciones": ["10%", "20%", "70%", "100%"], "correcta": 1, "feedback": "Correcto: 20%. Según el art. 5 literal b) de la Res. NAC-DGERCGC20-00000061, entre contribuyentes especiales la retención en servicios, derechos, comisiones y consultoría es del 20%. El 70% aplica cuando el proveedor de servicios NO es contribuyente especial (art. 4).", "tema": "Retenciones IVA"}, {"tipo": "om", "pregunta": "Un contribuyente especial adquiere mercadería a otro contribuyente especial. ¿Qué porcentaje del IVA causado se retiene?", "opciones": ["No se retiene nunca a contribuyentes especiales", "10%", "20%", "30%"], "correcta": 1, "feedback": "Correcto: 10%. El art. 5 literal a) de la Res. NAC-DGERCGC20-00000061 establece la retención del 10% del IVA en adquisición de bienes entre contribuyentes especiales. La regla general de no retener a especiales (art. 3 num. 1) tiene como excepción justamente los casos previstos en la propia resolución.", "tema": "Retenciones IVA"}, {"tipo": "om", "pregunta": "Un agente de retención paga a un abogado (persona natural con título universitario) por un patrocinio legal. ¿Qué porcentaje del IVA retiene?", "opciones": ["30%", "70%", "100%", "20%"], "correcta": 2, "feedback": "Correcto: 100%. El art. 4 literal c) numeral i de la Res. NAC-DGERCGC20-00000061 dispone la retención del 100% del IVA en servicios profesionales prestados por personas naturales con título de instrucción superior, salvo contratos de consultoría (que van al 70%).", "tema": "Retenciones IVA"}, {"tipo": "om", "pregunta": "Un municipio suscribe un contrato de construcción con una constructora privada. ¿Qué porcentaje de retención de IVA aplica el municipio al constructor?", "opciones": ["70%, por tratarse de un servicio", "30% del IVA causado en todos los casos", "100%, por ser entidad pública", "No procede retención en contratos de construcción"], "correcta": 1, "feedback": "Correcto: 30%. El art. 7 de la Res. NAC-DGERCGC20-00000061 dispone que en contratos de construcción la retención de IVA es, en todos los casos, del 30% del impuesto causado. Solo no se retiene cuando el constructor es institución del Estado o empresa pública regulada por la LOEP.", "tema": "Retenciones IVA"}, {"tipo": "om", "pregunta": "¿A cuál de los siguientes sujetos pasivos NO se le debe retener IVA según el art. 3 de la Res. NAC-DGERCGC20-00000061?", "opciones": ["Una compañía de aviación", "Una persona natural que arrienda su local comercial", "Una sociedad RIMPE emprendedor", "Un profesional con título universitario"], "correcta": 0, "feedback": "Correcto. El art. 3 numeral 4 de la Res. NAC-DGERCGC20-00000061 incluye a las compañías de aviación entre los sujetos a los que no se realiza retención de IVA, junto con instituciones del Estado, empresas públicas, contribuyentes especiales (regla general), agencias de viaje por pasajes aéreos, entre otros.", "tema": "Retenciones IVA"}, {"tipo": "om", "pregunta": "Un exportador habitual de bienes, calificado como contribuyente especial, compra insumos a otro contribuyente especial. ¿Qué porcentaje de IVA retiene?", "opciones": ["10%, por ser ambos especiales", "30%, porcentaje general de bienes", "100% del IVA en todas sus adquisiciones", "No retiene, porque a los especiales no se les retiene"], "correcta": 2, "feedback": "Correcto: 100%. El art. 11 de la Res. NAC-DGERCGC20-00000061 dispone que los exportadores habituales calificados como agentes de retención o contribuyentes especiales retienen el 100% del IVA en todas sus adquisiciones, inclusive a contribuyentes especiales, salvo los casos de los numerales 2 al 9 del art. 3 o cuando el agente sea exportador de recursos naturales no renovables.", "tema": "Retenciones IVA"}, {"tipo": "om", "pregunta": "Una compañía (agente de retención) paga el arriendo de una oficina a una persona natural no obligada a llevar contabilidad. ¿Qué retenciones aplica?", "opciones": ["100% del IVA y 10% de renta", "70% del IVA y 8% de renta", "30% del IVA y 10% de renta", "100% del IVA y 5% de renta"], "correcta": 0, "feedback": "Correcto. El art. 4 literal c) numeral ii de la Res. NAC-DGERCGC20-00000061 ordena retener el 100% del IVA en arrendamiento de inmuebles de personas naturales no obligadas a llevar contabilidad; y el art. 2 numeral 7 literal g) de la Res. NAC-DGERCGC26-00000009 fija el 10% de retención de renta en arrendamiento de bienes inmuebles.", "tema": "Retenciones IVA"}, {"tipo": "om", "pregunta": "Según la Res. NAC-DGERCGC26-00000009, ¿qué porcentaje de retención de renta aplica a los honorarios de una persona natural que presta servicios donde prevalece el intelecto, sin título profesional?", "opciones": ["3%", "5%", "8%", "10%"], "correcta": 3, "feedback": "Correcto: 10%. El art. 2 numeral 7 literal a) de la Res. NAC-DGERCGC26-00000009 fija el 10% para honorarios, comisiones y demás pagos a personas naturales residentes por servicios con predominio del intelecto, indistintamente de que posea o no título profesional o de la relación del título con la actividad.", "tema": "Retenciones Renta"}, {"tipo": "om", "pregunta": "Una empresa contrata una auditoría con una firma constituida como sociedad residente en Ecuador. ¿Qué porcentaje de retención de renta aplica?", "opciones": ["10%, por ser servicio profesional", "5%", "3%", "2%"], "correcta": 1, "feedback": "Correcto: 5%. El art. 2 numeral 6 literal a) de la Res. NAC-DGERCGC26-00000009 fija el 5% para servicios profesionales prestados por sociedades residentes y establecimientos permanentes. El 10% corresponde a servicios intelectuales de personas naturales, no de sociedades.", "tema": "Retenciones Renta"}, {"tipo": "om", "pregunta": "Según la Res. NAC-DGERCGC26-00000009, ¿qué porcentaje de retención de renta aplica a la adquisición de bienes muebles de naturaleza corporal?", "opciones": ["1%", "1,75%", "2%", "3%"], "correcta": 2, "feedback": "Correcto: 2%. El art. 2 numeral 4 literal i) de la Res. NAC-DGERCGC26-00000009 (vigente desde el 1 de marzo de 2026) ubica la adquisición de todo tipo de bienes muebles de naturaleza corporal en la retención del 2%. El 1,75% quedó reservado para bienes agropecuarios comprados a comercializadores no productores.", "tema": "Retenciones Renta"}, {"tipo": "om", "pregunta": "Un supermercado compra frutas en estado natural directamente a un agricultor y verduras a un intermediario comercializador. ¿Qué retenciones de renta aplica, respectivamente?", "opciones": ["1% y 1,75%", "1,75% y 1%", "1% y 2%", "0% y 1%"], "correcta": 0, "feedback": "Correcto. El art. 2 numeral 2 literal b) de la Res. NAC-DGERCGC26-00000009 fija el 1% para bienes de origen agrícola en estado natural comprados directamente al productor, y el numeral 3 literal a) fija el 1,75% cuando se compran a comercializadores no productores.", "tema": "Retenciones Renta"}, {"tipo": "om", "pregunta": "Una empresa paga un servicio que no consta en ningún porcentaje específico de la Res. NAC-DGERCGC26-00000009. ¿Qué retención de renta aplica?", "opciones": ["No se retiene", "1%", "2%", "3%"], "correcta": 3, "feedback": "Correcto: 3%. El art. 3 de la Res. NAC-DGERCGC26-00000009 dispone que todos los pagos o créditos en cuenta no contemplados en los porcentajes específicos están sujetos a la retención del 3% (regla residual).", "tema": "Retenciones Renta"}, {"tipo": "om", "pregunta": "Un agente de retención compra suministros a un contribuyente RIMPE categorizado como negocio popular, quien entrega un comprobante de venta preimpreso. ¿Qué retención de renta aplica?", "opciones": ["0%", "1%", "1,75%", "3%"], "correcta": 0, "feedback": "Correcto: 0%. El art. 2 numeral 1 literal c) de la Res. NAC-DGERCGC26-00000009 establece retención del 0% en adquisiciones a contribuyentes RIMPE negocios populares por sus actividades sujetas al régimen, siempre que se emita comprobante de venta preimpreso. A los RIMPE emprendedores se les retiene el 1% (numeral 2 literal c).", "tema": "Retenciones Renta"}, {"tipo": "om", "pregunta": "Una asociación de la Economía Popular y Solidaria consulta si puede permanecer en el régimen simplificado: su capital propio al 1 de enero es USD 200.000 y sus ingresos del año anterior fueron USD 320.000. ¿Qué le corresponde?", "opciones": ["Permanecer, porque el capital no supera USD 360.000", "Actualizar su RUC al régimen general, porque los ingresos superan USD 300.000", "Permanecer, porque solo se evalúa el capital propio", "Actualizar el RUC solo si además supera USD 240.000 en gastos"], "correcta": 1, "feedback": "Correcto. El art. 2 de la Res. NAC-DGERCGC19-00000039 fija tres límites: capital propio USD 360.000, ingresos anuales USD 300.000 y costos/gastos USD 240.000. Basta incumplir uno de ellos (aquí los ingresos) para que la organización deba actualizar su RUC al régimen general al evaluar el 1 de enero.", "tema": "Régimen EPS"}, {"tipo": "om", "pregunta": "Un cliente pregunta cuáles de estos materiales pagan IVA 5% según la Res. NAC-DGERCGC24-00000013. ¿Cuál opción es correcta?", "opciones": ["Pintura, cerámica y grifería", "Cemento, hormigón premezclado y varilla corrugada de 12 mm", "Tubería PVC, cables eléctricos y vidrio", "Todo material que se use en una obra de construcción"], "correcta": 1, "feedback": "Correcto. El art. 1 de la Res. NAC-DGERCGC24-00000013 contiene un listado taxativo que incluye cemento y sus derivados, hormigón premezclado y varilla laminada corrugada AS42 de 8, 10 y 12 mm, además de áridos, chatarra ferrosa, morteros, clinker, puzolana, yeso y prefabricados. Pinturas, cerámica, PVC y cables no constan, por lo que pagan la tarifa general.", "tema": "IVA 5% construcción"}, {"tipo": "om", "pregunta": "Un contribuyente detecta en 2026 que en su declaración de IVA de hace 14 meses omitió ventas y debe pagar más impuesto. El SRI no ha iniciado determinación. ¿Puede presentar la sustitutiva?", "opciones": ["No, porque pasó el año desde la declaración original", "Sí, porque las sustitutivas con mayor valor a pagar se presentan en cualquier tiempo", "Solo con autorización expresa del Director Zonal", "Solo dentro de un proceso de control"], "correcta": 1, "feedback": "Correcto. El art. 3 de la Res. NAC-DGERCGC16-00000448 considera válidas las sustitutivas que registren mayor valor a pagar por impuesto, anticipo o retención, presentadas antes del inicio de una determinación, y dispone expresamente que podrán presentarse en cualquier tiempo. El plazo de un año (art. 4) rige para correcciones que no aumentan el valor a pagar.", "tema": "Declaraciones sustitutivas"}, {"tipo": "om", "pregunta": "Un ciudadano acude a inscribir su RUC con su cédula y una planilla de luz emitida hace 15 meses. ¿Qué le falta para que el trámite proceda?", "opciones": ["Nada, la planilla no tiene caducidad", "Un documento de ubicación de los últimos 12 meses o informar el Código Único Electrónico Nacional (CUEN)", "Una escritura pública del inmueble", "La patente municipal, que es obligatoria en todos los casos"], "correcta": 1, "feedback": "Correcto. El art. 2, número I, literal b) de la Res. NAC-DGERCGC17-00000587 exige informar el CUEN o presentar un documento de ubicación correspondiente a cualquiera de los 12 meses anteriores a la solicitud. Una planilla de 15 meses no cumple; los documentos anuales solo valen si son del año en curso o del inmediato anterior.", "tema": "RUC"}, {"tipo": "vf", "pregunta": "A las instituciones del sistema financiero no se les retiene IVA únicamente respecto de los servicios financieros gravados con tarifa diferente de cero por ciento.", "correcta": true, "feedback": "Verdadero. El art. 3 numeral 7 de la Res. NAC-DGERCGC20-00000061 excluye de retención a las instituciones del sistema financiero únicamente respecto de sus servicios financieros gravados con tarifa distinta de 0% de IVA.", "tema": "Retenciones IVA"}, {"tipo": "vf", "pregunta": "Cuando en un mismo comprobante hay bienes y servicios con distintos porcentajes de retención de IVA y no se pueden diferenciar, se aplica el porcentaje menor de la operación.", "correcta": false, "feedback": "Falso. El art. 15 de la Res. NAC-DGERCGC20-00000061 dispone que, de no poderse diferenciar los porcentajes, se aplica el porcentaje MAYOR que se presente en la operación. La misma lógica rige en renta (art. 5 de la Res. NAC-DGERCGC26-00000009: el porcentaje más alto).", "tema": "Retenciones IVA"}, {"tipo": "vf", "pregunta": "Los contribuyentes especiales, las instituciones del Estado y las empresas públicas pueden emitir un solo comprobante de retención por las operaciones realizadas durante cinco días consecutivos respecto de un mismo cliente.", "correcta": true, "feedback": "Verdadero. Así lo dispone el art. 17 de la Res. NAC-DGERCGC20-00000061. Además, las instituciones financieras pueden emitir un solo comprobante mensual por cliente.", "tema": "Retenciones IVA"}, {"tipo": "vf", "pregunta": "Los intereses pagados a bancos vigilados por la Superintendencia de Bancos tienen retención de renta del 0% y no se debe emitir comprobante de retención por ese concepto.", "correcta": true, "feedback": "Verdadero. El art. 2 numeral 1 literal a) de la Res. NAC-DGERCGC26-00000009 fija el 0% para intereses pagados a bancos y entidades vigiladas por la Superintendencia de Bancos y de la Economía Popular y Solidaria, y señala expresamente que los sujetos obligados no deberán emitir el comprobante de retención por este concepto.", "tema": "Retenciones Renta"}, {"tipo": "vf", "pregunta": "La retención de renta del 2% a compañías de seguros y reaseguros se calcula sobre el 10% del valor de las primas facturadas.", "correcta": false, "feedback": "Falso. El art. 2 numeral 4 literal c) de la Res. NAC-DGERCGC26-00000009 dispone que la retención del 2% se efectúa sobre el VALOR TOTAL de las primas o cesión de primas, facturadas o planilladas, no sobre una fracción de ellas.", "tema": "Retenciones Renta"}, {"tipo": "vf", "pregunta": "Las cooperativas de ahorro y crédito pueden acogerse al régimen simplificado de la Economía Popular y Solidaria regulado por la Res. NAC-DGERCGC19-00000039.", "correcta": false, "feedback": "Falso. El art. 1 de la Res. NAC-DGERCGC19-00000039 excluye expresamente del régimen simplificado a las cooperativas de ahorro y crédito, cajas centrales, asociaciones y mutualistas de ahorro y crédito para la vivienda.", "tema": "Régimen EPS"}, {"tipo": "vf", "pregunta": "Las organizaciones EPS del régimen simplificado que cumplen las condiciones presentan sus declaraciones semestrales de IVA en los meses de julio y enero.", "correcta": true, "feedback": "Verdadero. El art. 3 numeral 9 de la Res. NAC-DGERCGC19-00000039 dispone que las declaraciones semestrales se presentan en julio y enero, atendiendo a las fechas de vencimiento del RLRTI, cuando en el semestre solo hubo actos solidarios, tarifa 0%, ausencia de transacciones o no actuaron como agentes de retención.", "tema": "Régimen EPS"}, {"tipo": "vf", "pregunta": "Las declaraciones sustitutivas presentadas dentro de procesos de control de la Administración Tributaria pueden efectuarse hasta dentro de los tres años siguientes a la presentación de la declaración original.", "correcta": false, "feedback": "Falso. El art. 6 de la Res. NAC-DGERCGC16-00000448 establece que las sustitutivas en procesos de control pueden efectuarse hasta dentro de los SEIS años siguientes a la presentación de la declaración original válida, salvo que la normativa señale un plazo distinto, y solo sobre los rubros requeridos por el SRI.", "tema": "Declaraciones sustitutivas"}, {"tipo": "vf", "pregunta": "Si un sujeto pasivo presentó una declaración en su totalidad con valores en cero y luego la sustituye registrando valores reales, la declaración original se considera como no presentada y en la sustitutiva debe calcular la multa correspondiente.", "correcta": true, "feedback": "Verdadero. Conforme a los considerandos de la Res. NAC-DGERCGC16-00000448, que recogen el inciso final de los arts. 72 y 158 del RLRTI, la declaración en cero sustituida con valores que demuestran el hecho generador se considera no presentada y en la sustitutiva debe calcularse la multa conforme a la LRTI.", "tema": "Declaraciones sustitutivas"}, {"tipo": "vf", "pregunta": "Para el RUC, un documento de ubicación que se emite de manera anual (como el impuesto predial) es aceptado si corresponde al año en curso o al año inmediato anterior.", "correcta": true, "feedback": "Verdadero. El art. 2, número I, literal b) de la Res. NAC-DGERCGC17-00000587 dispone que los documentos de emisión anual se aceptan siempre que correspondan al año en curso o al año inmediato anterior; los demás documentos deben ser de los 12 meses previos a la solicitud.", "tema": "RUC"}, {"tipo": "completar", "pregunta": "En los contratos de construcción, el porcentaje de retención en la fuente de IVA será del ____ por ciento del impuesto causado, salvo que el constructor sea una institución del Estado o empresa pública.", "respuestas": ["30", "treinta", "30%"], "feedback": "Art. 7 de la Res. NAC-DGERCGC20-00000061: en todos los casos, en contratos de construcción la retención de IVA es del 30% del impuesto causado; no se retiene si el constructor es institución del Estado o empresa pública regulada por la LOEP.", "tema": "Retenciones IVA"}, {"tipo": "completar", "pregunta": "El importador de servicios efectuará la retención del ____ por ciento del IVA generado, y los contratos de consultoría con no residentes se consideran importación de servicios.", "respuestas": ["100", "cien", "100%"], "feedback": "Art. 8 de la Res. NAC-DGERCGC20-00000061: en la importación de servicios se retiene el 100% del IVA generado, y los contratos de consultoría celebrados con personas no residentes ni establecidas en el Ecuador se consideran importación de servicios.", "tema": "Retenciones IVA"}, {"tipo": "completar", "pregunta": "Todos los pagos o créditos en cuenta no contemplados en los porcentajes específicos de la resolución de retenciones de renta 2026 están sujetos a la retención del ____ por ciento.", "respuestas": ["3", "tres", "3%"], "feedback": "Art. 3 de la Res. NAC-DGERCGC26-00000009: los pagos sin porcentaje específico de retención están sujetos a la retención residual del 3%.", "tema": "Retenciones Renta"}, {"tipo": "completar", "pregunta": "La retención en la fuente de impuesto a la renta por arrendamiento de bienes inmuebles, cualquiera que fuese su denominación o modalidad contractual, es del ____ por ciento.", "respuestas": ["10", "diez", "10%"], "feedback": "Art. 2 numeral 7 literal g) de la Res. NAC-DGERCGC26-00000009: el arrendamiento de bienes inmuebles está sujeto a retención de renta del 10%.", "tema": "Retenciones Renta"}, {"tipo": "completar", "pregunta": "Para integrar el régimen simplificado de la Economía Popular y Solidaria, el capital propio al 1 de enero no debe superar USD ____ .", "respuestas": ["360.000", "360000", "360 000", "trescientos sesenta mil"], "feedback": "Art. 2 de la Res. NAC-DGERCGC19-00000039: los límites son capital propio USD 360.000, ingresos anuales USD 300.000 y costos, gastos o egresos anuales USD 240.000; basta superar uno para pasar al régimen general.", "tema": "Régimen EPS"}, {"tipo": "completar", "pregunta": "La tarifa del IVA en las transferencias locales de los materiales de construcción que constan en el listado del SRI es del ____ por ciento.", "respuestas": ["5", "cinco", "5%"], "feedback": "Res. NAC-DGERCGC24-00000013, art. 1, en concordancia con el artículo innumerado agregado a continuación del art. 55 de la LRTI y el art. 140.2 del RLRTI: la tarifa del IVA es del 5% en las transferencias locales de los materiales de construcción del listado.", "tema": "IVA 5% construcción"}, {"tipo": "completar", "pregunta": "Las declaraciones sustitutivas presentadas dentro de procesos de control del SRI podrán efectuarse hasta dentro de los ____ años siguientes a la presentación de la declaración original válida.", "respuestas": ["6", "seis"], "feedback": "Art. 6 de la Res. NAC-DGERCGC16-00000448: en procesos de control la sustitutiva puede presentarse hasta dentro de los seis años siguientes a la declaración original, únicamente sobre los rubros requeridos por la Administración Tributaria.", "tema": "Declaraciones sustitutivas"}, {"tipo": "completar", "pregunta": "Cuando el SRI notifica el oficio de corrección de pago previo, el sujeto pasivo tiene ____ días hábiles para presentar la declaración sustitutiva recalculando los valores con intereses y multas.", "respuestas": ["10", "diez"], "feedback": "Art. 8 de la Res. NAC-DGERCGC16-00000448: notificado el oficio de corrección del pago previo, el contribuyente tiene diez (10) días hábiles para presentar la sustitutiva; si no lo hace, el SRI recalcula los valores sin que ello constituya ejercicio de la facultad determinadora.", "tema": "Declaraciones sustitutivas"}]}];
const META = new Date('2026-07-16T23:59:59');
const APROBACION = 70;
const PREGUNTAS_POR_INTENTO = 20;
const PREGUNTAS_SIMULACRO = 40;

/* ---------- estado ---------- */
const KEY='aulaSRI_v1';
const store=(()=>{try{const t=window.localStorage;t.setItem('__t','1');t.removeItem('__t');return t}catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v)},removeItem:k=>{delete m[k]}}}})();
let S; try{S=JSON.parse(store.getItem(KEY)||'null')}catch(e){S=null}
S = S || {vistas:{},intentos:{},tiempo:{}};
function save(){try{store.setItem(KEY,JSON.stringify(S))}catch(e){}}

/* ---------- util ---------- */
const $=s=>document.querySelector(s);
const app=$('#app');
function norm(t){return (t||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9ñ%$ ]/g,' ').replace(/\s+/g,' ').trim()}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function fmt(s){s=Math.max(0,Math.round(s));const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;return (h?h+'h ':'')+String(m).padStart(2,'0')+'m '+String(x).padStart(2,'0')+'s'}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

/* ---------- countdown global ---------- */
setInterval(()=>{
  const ms=META-new Date();
  const el=$('#countdown');
  if(ms<=0){el.innerHTML='<strong>¡Meta cumplida!</strong>16 de julio';return}
  const d=Math.floor(ms/864e5),h=Math.floor(ms%864e5/36e5),m=Math.floor(ms%36e5/6e4);
  el.innerHTML=`<strong>${d}d ${h}h ${m}m</strong>para el 16 de julio`;
},1000);

/* ---------- temporizador por curso ---------- */
let tick=null, cursoActivo=null;
function startTimer(cid){
  stopTimer();
  cursoActivo=cid;
  tick=setInterval(()=>{
    S.tiempo[cid]=(S.tiempo[cid]||0)+1;
    if(S.tiempo[cid]%15===0)save();
    const c=CURSOS.find(x=>x.id===cid);
    const rest=c.tiempoMaxMin*60-S.tiempo[cid];
    const box=$('#timerbox');
    if(box){
      box.className='timerbox'+(rest<0?' excedido':'');
      box.innerHTML= rest>=0
        ? `⏱️ Tiempo restante del módulo: <strong>${fmt(rest)}</strong> <span class="mini">(límite ${c.tiempoMaxMin} min — ¡mantén el ritmo!)</span>`
        : `🚨 Límite superado en <strong>${fmt(-rest)}</strong> — pasa a la evaluación y avanza al siguiente módulo.`;
    }
  },1000);
}
function stopTimer(){if(tick){clearInterval(tick);tick=null;save()}cursoActivo=null}

/* ---------- helpers de progreso ---------- */
function vistasDe(c){const v=S.vistas[c.id]||{};return c.lecciones.filter(l=>v[l.id]).length}
function mejorNota(cid){const a=S.intentos[cid]||[];return a.length?Math.max(...a.map(x=>x.nota)):null}

/* ---------- DASHBOARD ---------- */
function dashboard(){
  stopTimer();
  const dias={};
  CURSOS.forEach(c=>{(dias[c.dia]=dias[c.dia]||[]).push(c)});
  let done=0, totalL=0;
  CURSOS.forEach(c=>{done+=vistasDe(c);totalL+=c.lecciones.length});
  const aprobados=CURSOS.filter(c=>(mejorNota(c.id)||0)>=APROBACION).length;

  let html=`<div class="card">
    <h2 style="color:var(--azul);font-size:1.1rem">📋 Tu plan hasta el 16 de julio</h2>
    <p class="mini" style="margin:6px 0 10px">Progreso general: <b>${done}/${totalL}</b> lecciones · <b>${aprobados}/${CURSOS.length}</b> evaluaciones aprobadas (≥ ${APROBACION}/100)</p>
    <div class="prog"><div style="width:${Math.round(done/totalL*100)}%"></div></div>
    <p class="mini">Cada módulo tiene un <b>tiempo máximo de estudio</b>. Al agotarse, rinde la evaluación y avanza — cubrir todo el temario vale más que perfeccionar un solo tema.</p>
  </div>`;

  for(const dia in dias){
    html+=`<div class="dia-titulo">${esc(dia)}</div><div class="grid">`;
    dias[dia].forEach(c=>{
      const v=vistasDe(c), n=mejorNota(c.id);
      const usado=S.tiempo[c.id]||0, rest=c.tiempoMaxMin*60-usado;
      html+=`<div class="card curso-card" onclick="curso('${c.id}')">
        <div class="ico">${c.icono}</div>
        <h3>${esc(c.titulo)}</h3>
        <p class="mini">${esc(c.descripcion)}</p>
        <div class="prog"><div style="width:${Math.round(v/c.lecciones.length*100)}%"></div></div>
        <p class="mini">${v}/${c.lecciones.length} lecciones · ${c.banco.length} preguntas en banco</p>
        <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
          <span class="pill pill-azul">⏱ ${c.tiempoMaxMin} min</span>
          ${rest<0?'<span class="pill pill-rojo">Tiempo excedido</span>':usado>0?`<span class="pill pill-ambar">${fmt(rest)} restante</span>`:''}
          ${n!==null?`<span class="pill ${n>=APROBACION?'pill-verde':'pill-rojo'}">Mejor nota: ${n}/100</span>`:'<span class="pill pill-ambar">Sin evaluar</span>'}
        </div>
      </div>`;
    });
    html+='</div>';
  }

  html+=`<div class="dia-titulo">Examen final</div>
  <div class="card" style="background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff">
    <h3 style="font-size:1.05rem">🏆 Simulacro general del concurso</h3>
    <p style="font-size:.85rem;margin:6px 0 12px;opacity:.9">${PREGUNTAS_SIMULACRO} preguntas aleatorias de todas las materias, como en la prueba técnica real. Ríndelo cuando termines los 6 módulos.</p>
    ${(S.intentos['SIM']||[]).length?`<span class="pill" style="background:rgba(255,255,255,.2);color:#fff">Mejor nota: ${mejorNota('SIM')}/100 · ${(S.intentos['SIM']||[]).length} intento(s)</span><br><br>`:''}
    <button class="btn" style="background:#fff;color:var(--azul)" onclick="quiz('SIM')">Rendir simulacro</button>
  </div>`;
  app.innerHTML=html;
  window.scrollTo(0,0);
}

/* ---------- CURSO ---------- */
function curso(cid){
  const c=CURSOS.find(x=>x.id===cid);
  startTimer(cid);
  const v=S.vistas[cid]||{};
  const intentos=S.intentos[cid]||[];
  let html=`<div class="breadcrumb"><a onclick="dashboard()">🏠 Inicio</a> › ${esc(c.titulo)}</div>
  <div id="timerbox" class="timerbox">⏱️ Tiempo restante del módulo: <strong>—</strong></div>
  <div class="card">
    <span style="font-size:1.6rem">${c.icono}</span>
    <h2 style="color:var(--azul);font-size:1.15rem;margin:4px 0">${esc(c.titulo)}</h2>
    <p class="mini">${esc(c.descripcion)} · ${esc(c.dia)}</p>
  </div>
  <h3 style="margin:16px 0 10px;font-size:.95rem">📚 Lecciones</h3>`;
  c.lecciones.forEach((l,i)=>{
    html+=`<div class="leccion-item ${v[l.id]?'vista':''}" onclick="leccion('${cid}','${l.id}')">
      <div class="check">${v[l.id]?'✓':i+1}</div>
      <div style="flex:1"><b style="font-size:.93rem">${esc(l.titulo)}</b>
      <div class="mini">${l.slides.length} slides · ~${l.duracionMin} min</div></div>
      <button class="btn btn-s" style="padding:6px 12px;font-size:.78rem" onclick="event.stopPropagation();presentar('${cid}','${l.id}',0)">🖥️ Presentar</button>
    </div>`;
  });
  const todas=vistasDe(c)===c.lecciones.length;
  html+=`<div class="card" style="margin-top:16px">
    <h3 style="font-size:.95rem;margin-bottom:6px">📝 Evaluación del módulo</h3>
    <p class="mini">${PREGUNTAS_POR_INTENTO} preguntas aleatorias del banco de ${c.banco.length} (opción múltiple, verdadero/falso y completar). Aprobación: ${APROBACION}/100. Puedes repetirla: las preguntas cambian.</p>
    ${intentos.length?`<div style="margin:10px 0">${intentos.map((a,i)=>`<span class="pill ${a.nota>=APROBACION?'pill-verde':'pill-rojo'}" style="margin-right:6px">Intento ${i+1}: ${a.nota}/100</span>`).join('')}</div>`:''}
    <button class="btn btn-p" style="margin-top:8px" onclick="quiz('${cid}')" ${todas?'':'title="Sugerencia: completa las lecciones primero"'}>${intentos.length?'Repetir evaluación':'Rendir evaluación'}</button>
    ${!todas?'<p class="mini" style="margin-top:6px">💡 Aún tienes lecciones pendientes, pero puedes evaluarte cuando quieras.</p>':''}
  </div>`;
  app.innerHTML=html;
  window.scrollTo(0,0);
}

/* ---------- LECCIÓN (slides estilo NotebookLM) ---------- */
const ICONOS=[
  [/plazo|dia|dias|mes|meses|fecha|termino|vencimiento|anual/,'⏱️'],
  [/sancion|multa|clausura|infraccion|pena|prision|defraudacion/,'⚠️'],
  [/requisito|documento|formulario|cedula|solicitud|tramite/,'📄'],
  [/tarifa|porcentaje|%|tabla|fraccion|avaluo|base imponible|calculo/,'📊'],
  [/exencion|exonera|exent|rebaja|deduccion|deducible|devolucion|credito/,'✅'],
  [/declaracion|comprobante|factura|retencion|nota de venta|liquidacion|guia/,'🧾'],
  [/ruc|registro|inscripcion|actualizacion|suspension|cancelacion/,'🪪'],
  [/impuesto|tributo|iva|renta|ice|pago|interes|recaudacion/,'💰'],
  [/sujeto|contribuyente|persona|sociedad|agente|responsable|tercera edad|discapacidad/,'👤'],
  [/administracion|sri|autoridad|facultad|determinacion|control|notificacion/,'🏛️'],
  [/reclamo|recurso|apelacion|impugnacion|consulta|revision/,'📮'],
  [/vehiculo|automotor|ant|matricula/,'🚗']
];
function iconFor(t){t=norm(t);for(const[r,i]of ICONOS)if(r.test(t))return i;return'🔹'}
function nlm(html){
  try{
    const doc=new DOMParser().parseFromString('<div id="r">'+html+'</div>','text/html');
    const root=doc.getElementById('r');
    root.querySelectorAll('#r > ul').forEach(ul=>{
      const items=[...ul.children].filter(x=>x.tagName==='LI');
      if(items.length<2)return;
      const grid=doc.createElement('div');grid.className='nlm-grid';
      items.forEach(li=>{
        const card=doc.createElement('div');card.className='nlm-card';
        card.innerHTML='<span class="nlm-ico">'+iconFor(li.textContent)+'</span><div>'+li.innerHTML+'</div>';
        grid.appendChild(card);
      });
      ul.replaceWith(grid);
    });
    return root.innerHTML;
  }catch(e){return html}
}
let slideIdx=0;
function leccion(cid,lid){
  slideIdx=0;
  renderSlide(cid,lid);
}
function renderSlide(cid,lid){
  const c=CURSOS.find(x=>x.id===cid);
  const l=c.lecciones.find(x=>x.id===lid);
  const s=l.slides[slideIdx];
  const ultima=slideIdx===l.slides.length-1;
  app.innerHTML=`<div class="breadcrumb"><a onclick="dashboard()">🏠</a> › <a onclick="curso('${cid}')">${esc(c.titulo)}</a> › ${esc(l.titulo)}</div>
  <div id="timerbox" class="timerbox">⏱️ …</div>
  <div class="slide-shell">
    <div class="slide">
      <div class="kicker">${c.icono} ${esc(c.titulo)} · ${esc(l.titulo)}</div>
      <h2>${esc(s.titulo)}</h2>
      <div class="slide-body">${nlm(s.html)}</div>
      ${s.clave?`<div class="clave">💡 <b>Punto clave:</b> ${esc(s.clave)}</div>`:''}
    </div>
    <div class="slide-prog"><div style="width:${Math.round((slideIdx+1)/l.slides.length*100)}%"></div></div>
    <div class="slide-nav">
      <button class="btn btn-s" onclick="mover(-1,'${cid}','${lid}')" ${slideIdx===0?'disabled':''}>← Anterior</button>
      <div class="slide-dots">Slide ${slideIdx+1} de ${l.slides.length}<br><a style="color:var(--azul2);cursor:pointer;font-weight:700;font-size:.82rem" onclick="presentar('${cid}','${lid}',${slideIdx})">🖥️ Modo presentación</a></div>
      ${ultima
        ?`<button class="btn btn-g" onclick="finLeccion('${cid}','${lid}')">Terminar lección ✓</button>`
        :`<button class="btn btn-p" onclick="mover(1,'${cid}','${lid}')">Siguiente →</button>`}
    </div>
  </div>`;
  window.scrollTo(0,0);
}
function mover(d,cid,lid){slideIdx+=d;renderSlide(cid,lid)}
function finLeccion(cid,lid){
  (S.vistas[cid]=S.vistas[cid]||{})[lid]=true;save();
  curso(cid);
}
document.addEventListener('keydown',e=>{
  if(DK)return;
  const c=cursoActivo;if(!c)return;
  if(e.key==='ArrowRight'){const b=[...document.querySelectorAll('.slide-nav .btn')].pop();if(b&&!b.disabled&&b.textContent.includes('Siguiente'))b.click()}
  if(e.key==='ArrowLeft'){const b=document.querySelector('.slide-nav .btn');if(b&&!b.disabled)b.click()}
});

/* ---------- MODO PRESENTACIÓN ---------- */
let DK=null;
