el cheque.", "correcta": true, "feedback": "Verdadero. Así lo dispone el Art. 43: el pago con cheque no certificado solo extingue la obligación al hacerse efectivo. Las notas de crédito del mismo sujeto activo y la dación en pago de bonos o títulos valor también son medios admitidos.", "tema": "Extinción - pago"}, {"tipo": "vf", "pregunta": "La orden de determinación notificada interrumpe la caducidad, pero queda sin efecto si los actos de fiscalización no se inician dentro de 20 días hábiles o si, iniciados, se suspenden por más de 15 días consecutivos.", "correcta": true, "feedback": "Verdadero. El Art. 95 establece que la orden de determinación no produce efecto legal alguno si la fiscalización no inicia en 20 días hábiles desde su notificación o si se suspende por más de 15 días consecutivos, aunque el sujeto activo puede emitir una nueva orden mientras no haya operado la caducidad.", "tema": "Caducidad"}, {"tipo": "vf", "pregunta": "En virtud de la analogía pueden colmarse vacíos legales e incluso crearse tributos o exenciones cuando la ley no los previó.", "correcta": false, "feedback": "Falso. El Art. 14 admite la analogía como procedimiento para colmar vacíos de la ley, pero prohíbe expresamente que mediante ella se creen tributos, exenciones o las demás materias reservadas a la ley (Art. 4).", "tema": "Fundamentos"}, {"tipo": "vf", "pregunta": "Las notificaciones por la prensa se hacen por tres veces en días distintos y surten efecto desde el día hábil siguiente al de la última publicación.", "correcta": true, "feedback": "Verdadero. El Art. 111 exige tres publicaciones en días distintos en un periódico de mayor circulación (o la Gaceta Tributaria Digital, según el Art. 107 y la Disposición General Segunda) y las notificaciones surten efecto desde el día hábil siguiente a la última publicación.", "tema": "Notificaciones"}, {"tipo": "vf", "pregunta": "Para sancionar las contravenciones y faltas reglamentarias basta la transgresión de la norma, sin que sea necesario demostrar dolo o culpa del infractor.", "correcta": true, "feedback": "Verdadero. El Art. 316 consagra un régimen de responsabilidad objetiva: para la sanción de contravenciones y faltas reglamentarias basta la transgresión de la norma. El dolo es relevante en la defraudación, que desde 2014 se juzga conforme al COIP.", "tema": "Infracciones y sanciones"}, {"tipo": "vf", "pregunta": "La absolución de las consultas presentadas por federaciones y asociaciones gremiales sobre el sentido o alcance de la ley tributaria es vinculante para la administración.", "correcta": false, "feedback": "Falso. Según el Art. 135, solo la absolución de consultas de sujetos pasivos con interés propio y directo es vinculante para la administración; las absoluciones a federaciones, gremios, cámaras y entidades del sector público tienen carácter meramente informativo.", "tema": "Consultas"}, {"tipo": "vf", "pregunta": "Si la administración no resuelve el reclamo dentro del plazo de 120 días hábiles, el silencio administrativo se considera aceptación tácita de la reclamación.", "correcta": true, "feedback": "Verdadero. El Art. 104, en concordancia con el Art. 132, dispone que la falta de resolución en el plazo de 120 días hábiles se considera aceptación tácita del reclamo. Además, una resolución expresa íntegramente negativa dictada después del plazo no surte efecto alguno (Art. 134).", "tema": "Reclamos"}, {"tipo": "vf", "pregunta": "La sanción de clausura de un establecimiento puede extenderse hasta por seis meses cuando la infracción es grave.", "correcta": false, "feedback": "Falso. El artículo innumerado agregado a continuación del Art. 329 dispone que, salvo casos especiales previstos en la ley, la clausura de un establecimiento no podrá exceder de tres meses, y conlleva la suspensión de todas las actividades en el establecimiento clausurado.", "tema": "Infracciones y sanciones"}, {"tipo": "completar", "pregunta": "Cuando la liquidación corresponde al contribuyente, la obligación tributaria es exigible desde el ____ del plazo fijado para la presentación de la declaración respectiva.", "respuestas": ["vencimiento", "el vencimiento"], "feedback": "Art. 19 regla 1a: si la liquidación debe efectuarla el contribuyente o responsable, la obligación es exigible desde el vencimiento del plazo para presentar la declaración; si liquida la administración, desde el día siguiente a la notificación.", "tema": "Obligación tributaria"}, {"tipo": "completar", "pregunta": "Sólo mediante disposición expresa de ____ se pueden establecer exenciones tributarias.", "respuestas": ["ley", "la ley", "una ley"], "feedback": "Art. 32: las exenciones solo se establecen por disposición expresa de ley, que debe especificar los requisitos, los tributos que comprende y si es total o parcial, permanente o temporal. Es manifestación del principio de reserva de ley (Art. 4).", "tema": "Exenciones"}, {"tipo": "completar", "pregunta": "Los plazos o términos establecidos por días en las normas tributarias se entienden siempre referidos a días ____.", "respuestas": ["habiles", "hábiles"], "feedback": "Art. 12 numeral 2: los plazos en días son siempre días hábiles; los plazos en años y meses son continuos y fenecen el día equivalente; y todo plazo que vence en día inhábil se prorroga al primer día hábil siguiente.", "tema": "Fundamentos"}, {"tipo": "completar", "pregunta": "El sujeto pasivo puede rectificar los errores de hecho o de cálculo de su declaración dentro del ____ siguiente a su presentación, siempre que la administración no haya notificado antes el error.", "respuestas": ["año", "ano", "un año", "un ano", "año siguiente", "ano siguiente"], "feedback": "Art. 89: la declaración es definitiva y vinculante, pero los errores de hecho o de cálculo pueden rectificarse dentro del año siguiente a la presentación, salvo que la administración ya hubiere establecido y notificado el error.", "tema": "Determinación"}, {"tipo": "completar", "pregunta": "La acción de pago indebido o de pago en exceso prescribe en el plazo de ____ años contados desde la fecha del pago.", "respuestas": ["tres", "3"], "feedback": "Art. 305: la acción de pago indebido o del pago en exceso prescribe en tres años desde la fecha del pago; la prescripción se interrumpe con la presentación del reclamo o de la demanda.", "tema": "Pago indebido"}, {"tipo": "completar", "pregunta": "Se extingue por ____ la obligación tributaria cuando el acreedor de ésta se convierte en deudor de dicha obligación, como consecuencia de la transmisión o transferencia de los bienes o derechos que originen el tributo.", "respuestas": ["confusion", "confusión"], "feedback": "Art. 53: la confusión opera cuando la calidad de acreedor y deudor se reúnen en el mismo sujeto, por ejemplo cuando el municipio adquiere el inmueble que adeudaba impuesto predial. Es uno de los seis modos de extinción del Art. 37.", "tema": "Extinción"}, {"tipo": "completar", "pregunta": "En el embargo, el ejecutor preferirá en primer lugar el ____, seguido de metales preciosos, títulos de acciones y valores fiduciarios.", "respuestas": ["dinero", "el dinero", "efectivo"], "feedback": "Art. 166: el orden de preferencia del embargo inicia con el dinero, sigue con metales preciosos, títulos de acciones y valores fiduciarios, joyas y objetos de arte, frutos o rentas, bienes dados en prenda o hipoteca, créditos o derechos, y termina con bienes raíces y empresas.", "tema": "Procedimiento coactivo"}, {"tipo": "completar", "pregunta": "La base para las posturas en el remate será del 75% del avalúo de los bienes en el primer señalamiento y del ____ por ciento en el segundo señalamiento.", "respuestas": ["50", "cincuenta"], "feedback": "Art. 185 (sustituido en 2021): la base de las posturas es el 75% del avalúo en el primer señalamiento y el 50% en el segundo. Además, las posturas deben acompañar al menos el 10% del valor de la oferta (Art. 188).", "tema": "Procedimiento coactivo"}]}, {"id": "ruc", "titulo": "Ley del RUC y su Reglamento", "icono": "🪪", "descripcion": "Dominio integral de la Ley del Registro Único de Contribuyentes (Codificación 2004-022) y su Reglamento (Decreto Ejecutivo 2167): obligados, estructura del número, plazos, estados del registro y régimen punitivo, con enfoque en la atención al contribuyente.", "tiempoMaxMin": 120, "dia": "Día 1 — martes 14 de julio", "lecciones": [{"id": "l1", "titulo": "Concepto del RUC y obligados a inscribirse", "duracionMin": 30, "slides": [{"titulo": "¿Qué es el RUC? (Art. 1 Ley)", "html": "<p>El Registro Único de Contribuyentes es la puerta de entrada al sistema tributario ecuatoriano.<\/p><ul><li><strong>Función<\/strong>: registrar e <strong>identificar<\/strong> a los contribuyentes con fines impositivos.<\/li><li><strong>Objeto<\/strong>: proporcionar información a la Administración Tributaria.<\/li><li>Es un <em>instrumento<\/em>, no un impuesto: su tenencia no genera por sí misma obligaciones de pago, pero sí deberes formales.<\/li><li>Base normativa: Codificación 22, R.O. Suplemento 398 de <strong>12-08-2004<\/strong>; última reforma <strong>20-12-2023<\/strong>.<\/li><\/ul>", "clave": "El RUC registra e identifica contribuyentes con fines impositivos y provee información a la Administración Tributaria (Art. 1 Ley)."}, {"titulo": "Administración del registro (Art. 2 Ley y Art. 1 Reglamento)", "html": "<p>La administración del RUC corresponde a una sola institución.<\/p><ul><li>El RUC es administrado por el <strong>Servicio de Rentas Internas (SRI)<\/strong>.<\/li><li>Todas las instituciones del Estado, empresas particulares y personas naturales están <strong>obligadas a prestar colaboración<\/strong> al SRI en el tiempo y condiciones que este requiera.<\/li><li>El Reglamento (Art. 1) precisa que la administración se ejerce mediante <strong>cinco procesos<\/strong>: <em>catastro, inscripción, actualización, suspensión y cancelación<\/em>.<\/li><\/ul>", "clave": "El SRI administra el RUC mediante cinco procesos: catastro, inscripción, actualización, suspensión y cancelación."}, {"titulo": "Obligados a inscribirse (Art. 3 Ley, inciso 1)", "html": "<p>La regla general es amplia: la inscripción se realiza <strong>por una sola vez<\/strong>.<\/p><ul><li>Personas <strong>naturales y jurídicas<\/strong>, entes sin personalidad jurídica, <strong>nacionales y extranjeras<\/strong>.<\/li><li>Que inicien o realicen actividades económicas en el país en forma <strong>permanente u ocasional<\/strong>.<\/li><li>O que sean <strong>titulares de bienes o derechos<\/strong> que generen ganancias, beneficios, remuneraciones, honorarios y otras rentas sujetas a tributación en el Ecuador.<\/li><li>La ocasionalidad <em>no exime<\/em> de la obligación: basta realizar actividad económica gravada.<\/li><\/ul>", "clave": "Toda persona natural o jurídica, nacional o extranjera, con actividad económica permanente u ocasional en Ecuador debe inscribirse por una sola vez (Art. 3 Ley)."}, {"titulo": "Obligados del sector público y entes sin fines de lucro (Art. 3 Ley)", "html": "<p>La obligación no distingue fin de lucro ni naturaleza pública o privada.<\/p><ul><li>Las <strong>entidades del sector público<\/strong> están obligadas a inscribirse.<\/li><li>También las <strong>Fuerzas Armadas y la Policía Nacional<\/strong>.<\/li><li>Toda entidad, <strong>fundación, cooperativa, corporación<\/strong> o entes similares, cualquiera sea su denominación, <strong>tengan o no fines de lucro<\/strong>.<\/li><li>Aplicación práctica: una fundación sin fines de lucro que atiende en ventanilla debe tener RUC aunque no pague impuesto a la renta.<\/li><\/ul>", "clave": "Sector público, Fuerzas Armadas, Policía Nacional y entes con o sin fines de lucro están obligados a inscribirse (Art. 3 Ley)."}, {"titulo": "Caso especial: sociedades extranjeras con inmuebles (Art. 3 Ley)", "html": "<p>Reforma de 2016 orientada al control de paraísos fiscales.<\/p><ul><li>Sociedades extranjeras domiciliadas en <strong>paraísos fiscales<\/strong> o cualquier otra jurisdicción, <strong>propietarias de bienes inmuebles<\/strong> en el Ecuador, deben inscribirse <strong>aunque los inmuebles no generen rentas<\/strong> sujetas a tributación.<\/li><li><strong>Notarios y registradores de la propiedad<\/strong> no podrán celebrar escrituras públicas ni realizar inscripciones sin el cumplimiento previo de este requisito.<\/li><li>El SRI fija por <strong>resolución<\/strong> las condiciones, obligaciones formales y excepciones.<\/li><\/ul>", "clave": "Sociedades extranjeras dueñas de inmuebles en Ecuador deben inscribirse aunque no generen rentas; notarios y registradores exigen el requisito (Art. 3 Ley)."}, {"titulo": "No obligados y facultativos (Art. 3 Ley)", "html": "<p>Dos grupos quedan fuera de la obligación, con matices distintos.<\/p><table><tr><th>Sujeto<\/th><th>Situación<\/th><\/tr><tr><td>No residentes cuya actividad <strong>exclusiva<\/strong> sea invertir en <strong>activos financieros<\/strong> en el país<\/td><td><strong>No obligados<\/strong> a inscribirse; el SRI controla vía los responsables que intervienen (reforma 2021)<\/td><\/tr><tr><td>Organismos internacionales con oficinas en Ecuador; <strong>embajadas, consulados y oficinas comerciales<\/strong> de países con relaciones diplomáticas<\/td><td><strong>No obligados<\/strong>, pero <em>podrán inscribirse voluntariamente<\/em> si lo consideran conveniente<\/td><\/tr><\/table>", "clave": "Inversores no residentes en activos financieros y misiones diplomáticas no están obligados; las misiones pueden inscribirse voluntariamente (Art. 3 Ley)."}, {"titulo": "Inscripción de oficio (Art. 3 Ley)", "html": "<p>Si el obligado no cumple, la Administración actúa por él.<\/p><ul><li>Si un obligado no se inscribe en el <strong>plazo del Art. 4<\/strong> (30 días), el <strong>Director General del SRI<\/strong> asignará <strong>de oficio<\/strong> el número de inscripción.<\/li><li>La asignación de oficio se realiza <strong>sin perjuicio de las sanciones<\/strong> por la omisión.<\/li><li>En las inscripciones de oficio, la <strong>administración llena los formularios<\/strong> correspondientes (Art. 4 Ley).<\/li><\/ul>", "clave": "Ante la omisión del obligado, el Director General del SRI asigna de oficio el número, sin perjuicio de sanciones (Art. 3 Ley)."}, {"titulo": "Catastro y sujetos no residentes (Arts. 2, 2.1 y 6.1 Reglamento)", "html": "<p>Figuras complementarias incorporadas por el Decreto Ejecutivo 1114 (2020).<\/p><ul><li><strong>Catastro<\/strong>: el SRI puede catastrar a personas naturales y sociedades que, <em>sin cumplir las condiciones para inscribirse<\/em>, requieran una identificación para fines impositivos por razones de control.<\/li><li><strong>Entes desconcentrados<\/strong> que constituyan entes contables independientes podrán inscribirse por separado, presentando el acto que avale la desconcentración.<\/li><li><strong>No residentes<\/strong>: el SRI regula por resolución sus procesos de catastro, inscripción, actualización, suspensión y cancelación (Art. 2.1).<\/li><li><strong>Prestadores de servicios digitales no residentes<\/strong>: pueden registrarse en el RUC y dicho registro <strong>no constituye establecimiento permanente<\/strong> (Art. 6.1).<\/li><\/ul>", "clave": "El catastro identifica a quienes no califican para inscripción; el registro de prestadores digitales no residentes no crea establecimiento permanente."}, {"titulo": "Empresas unipersonales pequeñas y responsabilidad (Arts. 4 y 9 Ley)", "html": "<p>Dos reglas clave para la atención en ventanilla.<\/p><ul><li>Personas naturales que operan como empresas unipersonales con <strong>capital en giro de hasta USD 400<\/strong> se consideran <strong>únicamente personas naturales<\/strong> para efectos de la Ley; el SRI califica estos casos conforme al Reglamento.<\/li><li>Los obligados a inscribirse son <strong>responsables de la veracidad<\/strong> de la información consignada, para todos los efectos jurídicos (Art. 9 Ley).<\/li><li>En responsables por representación se aplica el <strong>Art. 26 del Código Tributario<\/strong>.<\/li><li>El Reglamento (Art. 9) extiende la responsabilidad directa a representantes legales, agentes de retención públicos y quienes informan por delegación o mandato.<\/li><\/ul>", "clave": "Empresas unipersonales con capital en giro hasta USD 400 se tratan como personas naturales; el inscrito responde por la veracidad de sus datos (Arts. 4 y 9 Ley)."}]}, {"id": "l2", "titulo": "Estructura del número RUC, certificado y uso obligatorio", "duracionMin": 30, "slides": [{"titulo": "Sistema de numeración (Art. 5 Ley)", "html": "<p>La Ley delega el diseño del número al SRI, con una excepción clave.<\/p><ul><li>El SRI establece el <strong>sistema de numeración<\/strong> para personas jurídicas, entes sin personalidad jurídica y empresas unipersonales, nacionales y extranjeras, públicas o privadas.<\/li><li><strong>Excepción legal<\/strong>: para las personas naturales que no constituyan empresas unipersonales, el número de identificación tributaria es el <strong>número de la cédula de identidad y/o ciudadanía<\/strong>.<\/li><\/ul>", "clave": "El SRI define la numeración, pero para personas naturales el número parte de la cédula de identidad o ciudadanía (Art. 5 Ley)."}, {"titulo": "Estructura de 13 dígitos (Art. 3 Reglamento)", "html": "<p>El número de registro tiene una anatomía fija.<\/p><ul><li>Compuesto por <strong>13 dígitos<\/strong>, <strong>sin letras ni caracteres especiales<\/strong>.<\/li><li><strong>Dos primeros dígitos<\/strong>: la provincia donde se obtuvo la cédula (ecuatoriano o extranjero residente), donde se inscribió el extranjero no residente o donde se inscribió la sociedad.<\/li><li><strong>Tres últimos dígitos<\/strong>: <strong>001<\/strong> (cero cero uno) para <em>todos<\/em> los contribuyentes.<\/li><\/ul>", "clave": "El RUC siempre tiene 13 dígitos: los 2 primeros identifican la provincia y los 3 últimos son 001 (Art. 3 Reglamento)."}, {"titulo": "Personas naturales vs. sociedades: tabla comparativa (Art. 3 Reglamento)", "html": "<p>Distinción imprescindible para la atención al contribuyente.<\/p><table><tr><th>Tipo de sujeto<\/th><th>Composición del número<\/th><\/tr><tr><td>Persona natural nacional o extranjero <strong>residente<\/strong><\/td><td><strong>10 dígitos de la cédula<\/strong> de identidad o ciudadanía + <strong>001<\/strong><\/td><\/tr><tr><td>Persona natural extranjera <strong>sin cédula<\/strong><\/td><td>Número <strong>asignado por el SRI<\/strong> con mecanismos de control<\/td><\/tr><tr><td>Todo tipo de <strong>sociedad<\/strong><\/td><td>Número <strong>asignado por el SRI<\/strong> con mecanismos de control<\/td><\/tr><\/table><p>Ejemplo práctico: cédula 1712345678 emitida en Pichincha genera el RUC <strong>1712345678001<\/strong>.<\/p>", "clave": "Persona natural residente: cédula + 001; extranjeros sin cédula y sociedades: número asignado por el SRI (Art. 3 Reglamento)."}, {"titulo": "Otorgamiento y naturaleza del certificado (Arts. 7 y 8 Ley)", "html": "<p>El certificado materializa la inscripción.<\/p><ul><li>El número de inscripción se otorga <strong>a la presentación de la solicitud<\/strong>, mediante un <strong>certificado de inscripción<\/strong>; igual en inscripciones de oficio (Art. 7).<\/li><li>El certificado es un documento <strong>público, intransferible y personal<\/strong> (Art. 8).<\/li><li>El Reglamento (Art. 4) remite el contenido del certificado a una <strong>resolución de carácter general<\/strong> del SRI.<\/li><li>El certificado se entrega al momento del registro de la <strong>información completa<\/strong>; en procesos electrónicos el SRI fija procedimiento (Art. 7 Reglamento).<\/li><\/ul>", "clave": "El certificado de inscripción se otorga con la solicitud y es un documento público, intransferible y personal (Arts. 7 y 8 Ley)."}, {"titulo": "Sucursales, agencias y establecimientos (Art. 6 Ley y Art. 7 Reglamento)", "html": "<p>La inscripción cubre toda la estructura del negocio.<\/p><ul><li>Al inscribir la <strong>matriz<\/strong> se deben registrar también las <strong>sucursales, agencias y otros establecimientos permanentes<\/strong>; los nuevos se registran al constituirse (Art. 6 Ley).<\/li><li>Se inscriben inclusive <strong>oficinas administrativas, almacenes de depósito<\/strong> de materias primas o mercancías y cualquier lugar donde se realicen las actividades declaradas (Art. 7 Reglamento).<\/li><li>Incluye las <strong>direcciones IP y direcciones electrónicas<\/strong>: asociadas a un establecimiento físico o registradas como <strong>establecimiento electrónico independiente<\/strong> (reforma 2024).<\/li><li>La inscripción puede realizarse en <strong>cualquier oficina del SRI a nivel nacional<\/strong>.<\/li><\/ul>", "clave": "Matriz, sucursales, depósitos e incluso direcciones IP y electrónicas deben inscribirse; el trámite procede en cualquier oficina del SRI (Art. 6 Ley y Art. 7 Reglamento)."}, {"titulo": "Documentos donde debe constar el RUC (Art. 10 Ley)", "html": "<p>El Art. 10 lista 19 literales (a-s). Los más consultados en ventanilla:<\/p><ul><li><strong>Facturas, notas de venta, recibos<\/strong> y demás documentos contables por actos de comercio o servicios (literal o).<\/li><li><strong>Declaraciones y comprobantes de pago<\/strong> de toda clase de tributos (literal m).<\/li><li>Licencias de conductores, matrículas de comerciantes e industriales, cédulas de agricultores.<\/li><li>Registros de importadores y exportadores; permisos de importación y pólizas de exportación.<\/li><li>Planillas de sueldos, catastro de la propiedad, certificado de no adeudar al Estado.<\/li><li><strong>Etiquetas y envases<\/strong> de productos que físicamente lo permitan (literal s).<\/li><\/ul><p>El SRI puede, por <strong>resolución<\/strong>, extender la obligatoriedad a otros documentos u objetos (Art. 23 Ley).<\/p>", "clave": "El número de RUC debe constar en facturas, declaraciones, matrículas, planillas y hasta etiquetas; el SRI puede ampliar la lista por resolución (Arts. 10 y 23 Ley)."}, {"titulo": "Exigencia del documento de inscripción (Art. 13 Ley)", "html": "<p>Funcionarios públicos y privados actúan como filtro de cumplimiento.<\/p><ul><li>Están <strong>obligados a exigir<\/strong> el documento que acredite la inscripción en casos como:<\/li><li><strong>Constitución, reforma o liquidación de sociedades<\/strong> de cualquier clase.<\/li><li><strong>Apertura de cuentas corrientes<\/strong> y tramitación de préstamos en instituciones financieras.<\/li><li>Permisos de importación, pólizas de exportación, pedimentos de aduana y retiro de equipajes y paquetes postales.<\/li><li>Actuaciones ante <strong>notarios y registradores de la propiedad<\/strong>; concesión de matrículas de comercio, industria y agricultura.<\/li><li>Recepción de <strong>declaraciones y pagos de tributos<\/strong>; concesión de visas de salida del país; afiliación a gremios y cámaras.<\/li><\/ul>", "clave": "Funcionarios públicos y privados deben exigir el RUC en trámites societarios, financieros, aduaneros y notariales (Art. 13 Ley)."}, {"titulo": "Uso del número en datos y ante SRI y SENAE (Arts. 11 y 12 Ley; Art. 5 Reglamento)", "html": "<ul><li>Quienes usen <strong>procesamiento automático de datos<\/strong> en materias tributarias deben hacer constar el RUC en todos los formularios de procesamiento (Art. 11 Ley).<\/li><li>Los emisores de los documentos del Art. 10 deben incluir <strong>número de inscripción, nombres o razón social y domicilio fiscal<\/strong> de quien emite y/o recibe (Art. 12 Ley).<\/li><li>El número debe constar en <strong>lugar visible<\/strong> de los documentos (Art. 5 Reglamento).<\/li><li>Todos los inscritos deben consignar su RUC en la documentación o trámites ante el <strong>SRI y el SENAE<\/strong> (Art. 5 Reglamento).<\/li><\/ul>", "clave": "El RUC debe constar en lugar visible, en formularios de procesamiento de datos y en todo trámite ante SRI y SENAE (Arts. 11-12 Ley; Art. 5 Reglamento)."}, {"titulo": "Duplicado y copia del certificado (Art. 16 Ley y Art. 17.1 Reglamento)", "html": "<p>Dos vías según la norma aplicable, tema frecuente en asistencia al ciudadano.<\/p><table><tr><th>Norma<\/th><th>Supuesto<\/th><th>Requisito<\/th><\/tr><tr><td><strong>Art. 16 Ley<\/strong><\/td><td>Destrucción, sustracción, pérdida o desaparición<\/td><td>Solicitud + demostrar haber <strong>publicado por la prensa por dos veces<\/strong> la pérdida<\/td><\/tr><tr><td><strong>Art. 17.1 Reglamento<\/strong><\/td><td>Extravío, destrucción o simple necesidad de copia<\/td><td>Obtenerlo <strong>previa actualización o verificación de datos<\/strong>, por la <strong>página web<\/strong> o en cualquier oficina del SRI<\/td><\/tr><\/table>", "clave": "La Ley exige dos publicaciones en prensa para el duplicado; el Reglamento permite obtener la copia en línea u oficinas previa verificación de datos."}]}, {"id": "l3", "titulo": "Plazos: inscripción, inicio de actividades, actualización, suspensión y cancelación", "duracionMin": 30, "slides": [{"titulo": "Plazo de inscripción (Art. 4 Ley)", "html": "<p>El plazo maestro del sistema RUC.<\/p><ul><li>Quienes adquieran la calidad de contribuyentes o las empresas nuevas deben inscribirse dentro de los <strong>30 días siguientes<\/strong> a su <strong>constitución o iniciación real de actividades<\/strong>, según el caso.<\/li><li>La inscripción la solicitan las <strong>personas naturales<\/strong> o los <strong>mandatarios, representantes legales o apoderados<\/strong> de entidades, preferentemente en el <strong>domicilio fiscal<\/strong> del obligado.<\/li><li>La solicitud contiene los datos que señale el Reglamento, en los <strong>formularios oficiales<\/strong>.<\/li><\/ul>", "clave": "La inscripción debe obtenerse dentro de los 30 días siguientes a la constitución o al inicio real de actividades (Art. 4 Ley)."}, {"titulo": "Fecha de inicio de actividades I (Art. 6 Reglamento)", "html": "<p>Determinar la fecha correcta define desde cuándo corren los 30 días.<\/p><table><tr><th>Sujeto<\/th><th>Fecha de inicio de actividades<\/th><\/tr><tr><td><strong>Persona natural<\/strong><\/td><td>Fecha del <strong>primer acto de comercio<\/strong> o de la <strong>primera transacción<\/strong> relativa a la actividad<\/td><\/tr><tr><td><strong>Sociedad privada mercantil<\/strong><\/td><td>Fecha de <strong>inscripción de la escritura de constitución en el Registro Mercantil<\/strong><\/td><\/tr><tr><td><strong>Sociedades civiles y de hecho<\/strong><\/td><td>Fecha de su <strong>constitución<\/strong><\/td><\/tr><\/table>", "clave": "Persona natural: primer acto de comercio; sociedad mercantil: inscripción de la escritura en el Registro Mercantil (Art. 6 Reglamento)."}, {"titulo": "Fecha de inicio de actividades II (Art. 6 Reglamento)", "html": "<table><tr><th>Sujeto<\/th><th>Fecha de inicio de actividades<\/th><\/tr><tr><td><strong>Entidades del sector público<\/strong><\/td><td>Fecha del <strong>Registro Oficial<\/strong> donde se publica la ley de creación, decreto, acuerdo ministerial u ordenanza<\/td><\/tr><tr><td><strong>Unidades contables desconcentradas<\/strong><\/td><td>Fecha de la <strong>resolución o acuerdo de la máxima autoridad<\/strong> que las califica como ente contable<\/td><\/tr><tr><td><strong>Organizaciones sin fines de lucro<\/strong><\/td><td>Fecha de <strong>publicación en el Registro Oficial<\/strong> del acuerdo ministerial o convenio internacional que autoriza su existencia legal<\/td><\/tr><\/table><p>Si el SRI constata actos de comercio <strong>anteriores<\/strong> a la fecha declarada, proceden las <strong>acciones previstas en la ley<\/strong>.<\/p>", "clave": "Para entes públicos y sin fines de lucro la fecha de inicio se ancla a la publicación en el Registro Oficial (Art. 6 Reglamento)."}, {"titulo": "Actualización de la información: hechos a comunicar (Art. 14 Ley)", "html": "<p>Once literales (a-k) que deben comunicarse al SRI dentro del <strong>plazo de 30 días<\/strong> de ocurridos.<\/p><ul><li>Cambio de <strong>denominación o razón social<\/strong>, de <strong>actividad económica<\/strong> y de <strong>domicilio<\/strong>.<\/li><li><strong>Transferencia de bienes o derechos<\/strong> a cualquier título y <strong>cese de actividades<\/strong>.<\/li><li><strong>Aumento o disminución de capitales<\/strong>; establecimiento o supresión de sucursales, agencias o depósitos.<\/li><li>Cambio de <strong>representante legal<\/strong> y de <strong>tipo de empresa<\/strong>.<\/li><li>Obtención, extinción o cancelación de <strong>beneficios de leyes de fomento<\/strong>.<\/li><li>Cláusula residual: <em>cualquier otra modificación<\/em> de los datos de la solicitud de inscripción.<\/li><\/ul>", "clave": "Todo cambio (razón social, actividad, domicilio, capital, representante, cese) se comunica al SRI en 30 días (Art. 14 Ley)."}, {"titulo": "Actualización según el Reglamento (Arts. 11 y 12)", "html": "<ul><li>El plazo reglamentario es de <strong>30 días hábiles<\/strong> contados desde la fecha en que <strong>ocurrieron los hechos<\/strong> (Art. 11).<\/li><li>Si el SRI detecta que la información <strong>difiere de la real<\/strong>: comunica al sujeto pasivo para que actualice (en línea o en oficinas); si no lo hace en el tiempo solicitado, el SRI actualiza <strong>de oficio<\/strong>, sin perjuicio de sanciones.<\/li><li>Tras la actualización de oficio, el certificado se obtiene por los <strong>servicios en línea<\/strong>.<\/li><li>Para actualizar solo se presenta la documentación que <strong>acredite las modificaciones<\/strong>, no la de la inscripción original, salvo documentos que deban renovarse periódicamente (Art. 12).<\/li><li>Se admite la actualización por <strong>Internet<\/strong> y mecanismos de la Ley de Comercio Electrónico.<\/li><\/ul>", "clave": "El Reglamento fija 30 días hábiles para actualizar; si el contribuyente no corrige la información divergente, el SRI actualiza de oficio (Arts. 11-12 Reglamento)."}, {"titulo": "Suspensión para personas naturales (Art. 13 Reglamento)", "html": "<p>Cese <strong>temporal<\/strong> de la actividad económica.<\/p><ul><li>La persona natural debe informar la suspensión dentro de los <strong>30 días hábiles<\/strong> siguientes de <strong>cesada la actividad<\/strong>.<\/li><li>Efecto: <strong>no se continúan generando obligaciones tributarias formales<\/strong>.<\/li><li>Previo a la suspensión: <strong>dar de baja<\/strong> comprobantes de venta y de retención no utilizados; concluye la autorización de máquinas registradoras, puntos de venta y establecimientos gráficos.<\/li><li>Antes de emitir el certificado de suspensión, el SRI verifica que <strong>no existan obligaciones pendientes<\/strong>; si las hay, conmina a su cumplimiento sin perder sus facultades de exigirlas después.<\/li><\/ul>", "clave": "La suspensión (cese temporal de persona natural) se informa en 30 días hábiles, previa baja de comprobantes (Art. 13 Reglamento)."}, {"titulo": "Cancelación del registro (Art. 15 Ley y Art. 14 Reglamento)", "html": "<p>La cancelación es el cese <strong>definitivo<\/strong>.<\/p><ul><li>Ley Art. 15: quien termina sus actividades debe <strong>devolver el certificado<\/strong> de inscripción en el plazo de <strong>30 días<\/strong> de cesada la actividad, para la cancelación del registro.<\/li><li>Reglamento Art. 14: en <strong>sociedades<\/strong>, la cancelación procede cuando se ha <strong>extinguido su vida jurídica<\/strong>, según el tipo y naturaleza de la sociedad.<\/li><li>En todo cese: <strong>baja de comprobantes<\/strong> de venta y retención sobrantes y fin de la autorización de máquinas registradoras y puntos de venta.<\/li><li><strong>La cancelación del RUC no implica pérdida de las facultades del SRI<\/strong> (puede seguir determinando y cobrando).<\/li><\/ul>", "clave": "Cese definitivo: devolver el certificado en 30 días; en sociedades la cancelación exige extinción de la vida jurídica y no elimina las facultades del SRI."}, {"titulo": "Trámites por terceras personas (Art. 17 Reglamento)", "html": "<p>Escenario habitual en ventanilla de asistencia al ciudadano.<\/p><ul><li><strong>Personas naturales<\/strong>: carta de autorización suscrita por el sujeto pasivo con nombres, cédula y firma, más los datos de quien realiza el trámite; si el sujeto reside en el <strong>exterior<\/strong>, la firma se reconoce ante el <strong>cónsul ecuatoriano<\/strong>.<\/li><li>Se presenta original y copia de cédula y <strong>certificado de votación<\/strong> del último proceso electoral (del sujeto pasivo y del tercero).<\/li><li><strong>Límite<\/strong>: el tercero no puede tramitar el RUC de <strong>más de 3 sujetos pasivos en un mismo período de 3 meses<\/strong>; el límite no aplica a apoderados con poder notariado ni a estudios jurídicos o profesionales del derecho.<\/li><li><strong>Sociedades<\/strong>: carta de autorización simple (con logotipo si lo tiene) firmada por el representante legal o agente de retención, más copias de cédulas y certificado de votación del tercero.<\/li><\/ul>", "clave": "Un tercero sin poder notariado solo puede tramitar el RUC de hasta 3 sujetos pasivos en 3 meses (Art. 17 Reglamento)."}, {"titulo": "Requisitos, notarios y responsables (Arts. 8, 9 y 10 Reglamento)", "html": "<ul><li><strong>Requisitos de inscripción y actualización<\/strong>: los que señale el SRI <strong>mediante resolución<\/strong> (Arts. 8 y 12); técnica de remisión normativa muy usada en el Reglamento.<\/li><li><strong>Notarios<\/strong>: entregan en <strong>medio magnético<\/strong> la información de escrituras de constitución, modificación o cierre de sociedades no sujetas al control de las Superintendencias (Compañías, Bancos, Economía Popular y Solidaria) (Art. 10).<\/li><li><strong>Responsables de la información<\/strong>: sujeto pasivo, representantes legales, agentes de retención del sector público y delegados o mandatarios; la información puede ser <strong>verificada en cualquier tiempo<\/strong> por el SRI (Art. 9).<\/li><\/ul>", "clave": "Los requisitos concretos se fijan por resolución del SRI; los notarios reportan en medio magnético las escrituras de sociedades no controladas por superintendencias."}, {"titulo": "Mapa de plazos: síntesis para el examen", "html": "<table><tr><th>Trámite<\/th><th>Plazo<\/th><th>Fundamento<\/th><\/tr><tr><td>Inscripción inicial<\/td><td><strong>30 días<\/strong> desde constitución o inicio real de actividades<\/td><td>Art. 4 Ley<\/td><\/tr><tr><td>Actualización de información<\/td><td><strong>30 días<\/strong> (Ley) / <strong>30 días hábiles<\/strong> (Reglamento) desde el hecho<\/td><td>Art. 14 Ley; Art. 11 Reglamento<\/td><\/tr><tr><td>Suspensión (persona natural, cese temporal)<\/td><td><strong>30 días hábiles<\/strong> desde el cese<\/td><td>Art. 13 Reglamento<\/td><\/tr><tr><td>Devolución del certificado por cese definitivo<\/td><td><strong>30 días<\/strong> desde el cese<\/td><td>Art. 15 Ley<\/td><\/tr><tr><td>Inscripción de establecimiento no inscrito (previo a clausura)<\/td><td><strong>3 días<\/strong><\/td><td>Art. 19 Ley<\/td><\/tr><tr><td>Remisión de la apelación al Director General<\/td><td>Término de <strong>3 días<\/strong><\/td><td>Art. 21 Ley<\/td><\/tr><\/table>", "clave": "Regla mnemotécnica: casi todo es 30 días; las excepciones de 3 días son la inscripción previa a clausura y la remisión de la apelación."}]}, {"id": "l4", "titulo": "Estados del RUC, actuaciones de oficio y régimen punitivo", "duracionMin": 30, "slides": [{"titulo": "Estados del RUC: visión de conjunto", "html": "<p>De los procesos del Art. 1 del Reglamento derivan los estados del registro que se explican al contribuyente.<\/p><table><tr><th>Estado<\/th><th>Significado<\/th><th>Norma base<\/th><\/tr><tr><td><strong>Activo<\/strong><\/td><td>Inscripción vigente; genera obligaciones formales<\/td><td>Arts. 3-4 Ley<\/td><\/tr><tr><td><strong>Suspendido<\/strong><\/td><td>Cese <strong>temporal<\/strong> de actividades (persona natural) o suspensión <strong>de oficio<\/strong><\/td><td>Arts. 13 y 15 Reglamento<\/td><\/tr><tr><td><strong>Cancelado<\/strong><\/td><td>Cese <strong>definitivo<\/strong>: extinción de la sociedad, fallecimiento o salida del país del extranjero no residente<\/td><td>Arts. 14 y 16 Reglamento<\/td><\/tr><\/table><p>La suspensión detiene la generación de <strong>obligaciones formales<\/strong>; la cancelación cierra el registro pero <strong>no extingue las facultades del SRI<\/strong>.<\/p>", "clave": "Activo, suspendido y cancelado: la suspensión es temporal, la cancelación definitiva, y ninguna limita las facultades del SRI."}, {"titulo": "Suspensión de oficio: causales 1 a 3 (Art. 15 Reglamento)", "html": "<p>El SRI puede suspender la inscripción sin petición del contribuyente.<\/p><ul><li><strong>1.<\/strong> Cuando el Director del SRI competente verifica que el contribuyente <strong>no tiene ningún local o actividad<\/strong> en la dirección del RUC.<\/li><li><strong>2.<\/strong> Cuando no ha presentado declaraciones por <strong>más de 12 meses consecutivos<\/strong>, o en tal período las declaraciones <strong>no registren actividad económica<\/strong>.<\/li><li><strong>3.<\/strong> Cuando no exista <strong>evidencia de la existencia real<\/strong> del sujeto pasivo: sin servicios públicos contratados (luz, teléfono, agua), sin inmuebles ni vehículos a su nombre, sin inscripción patronal en el IESS, ni locales en las direcciones del RUC.<\/li><\/ul>", "clave": "Procede la suspensión de oficio sin local verificable, sin declaraciones por más de 12 meses o sin evidencia de existencia real (Art. 15 Reglamento)."}, {"titulo": "Suspensión de oficio: causales 4 a 6 y levantamiento (Art. 15 Reglamento)", "html": "<ul><li><strong>4.<\/strong> Establecimiento <strong>clausurado por 3 meses o más<\/strong>, según el Código Tributario.<\/li><li><strong>5.<\/strong> Detección de <strong>empresas inexistentes, fantasmas o supuestas<\/strong>, o de <strong>transacciones inexistentes<\/strong>, en los términos del Reglamento para la Aplicación de la LRTI.<\/li><li><strong>6.<\/strong> Otros casos que el SRI establezca mediante <strong>resolución de carácter general<\/strong>.<\/li><li><strong>Levantamiento<\/strong>: la suspensión se mantiene hasta que el sujeto pasivo <strong>actualice la información y desvirtúe la causal<\/strong>.<\/li><\/ul>", "clave": "Clausura de 3 meses o más y empresas fantasmas también causan suspensión; esta dura hasta actualizar datos y desvirtuar la causal (Art. 15 Reglamento)."}, {"titulo": "Cancelación de oficio (Arts. 14 y 16 Reglamento)", "html": "<ul><li>El SRI cancela de oficio la inscripción de una <strong>persona natural<\/strong> al constatar su <strong>fallecimiento<\/strong> o la <strong>salida del país del extranjero no residente<\/strong>.<\/li><li>En <strong>sociedades<\/strong>: al constatar su <strong>extinción<\/strong>, sin perjuicio de acciones legales contra el <strong>último representante legal o liquidador<\/strong>; también al verificar la inscripción del acto que disponga la cancelación según la naturaleza jurídica.<\/li><li>Las <strong>instituciones públicas y órganos de control<\/strong> deben mantener informado al SRI.<\/li><li>El procedimiento se fija en resolución del <strong>Director General del SRI<\/strong>.<\/li><\/ul>", "clave": "Fallecimiento, salida del extranjero no residente o extinción de la sociedad habilitan la cancelación de oficio (Arts. 14 y 16 Reglamento)."}, {"titulo": "Régimen punitivo: infracciones (Arts. 17 y 19 Ley)", "html": "<p>Las infracciones a la Ley del RUC son la <strong>defraudación, las contravenciones y las faltas reglamentarias<\/strong>, conforme al Código Tributario (Art. 17).<\/p><p>Casos especiales de <strong>contravención<\/strong> (Art. 19):<\/p><ol><li>No solicitar la inscripción dentro del <strong>plazo legal<\/strong>.<\/li><li>No utilizar el número de RUC en los documentos del <strong>Art. 10<\/strong>.<\/li><li><strong>Permitir<\/strong> el uso del propio número a terceras personas.<\/li><li><strong>Utilizar<\/strong> el número concedido a otro contribuyente.<\/li><li><strong>Ocultar<\/strong> la existencia de sucursales, agencias u otros establecimientos.<\/li><li><strong>Retener indebidamente<\/strong> el número luego de haberse cancelado.<\/li><\/ol>", "clave": "Seis contravenciones típicas: no inscribirse a tiempo, no usar el número, prestarlo, usar el ajeno, ocultar sucursales y retenerlo tras la cancelación (Art. 19 Ley)."}, {"titulo": "Clausura por falta de inscripción (Art. 19 Ley y Art. 19.1 Reglamento)", "html": "<p>Reformas de diciembre 2023 (Ley) y febrero 2024 (Reglamento).<\/p><ul><li>Al establecimiento <strong>no inscrito<\/strong> en el RUC se le concede un plazo de <strong>3 días<\/strong> para inscribirse; caso contrario se impone la <strong>clausura, física o electrónica<\/strong> (términos de la Ley para la Reforma de las Finanzas Públicas).<\/li><li>La <strong>reapertura o reactivación no procede<\/strong> hasta que se efectúe la inscripción.<\/li><li>El levantamiento de la sanción es <strong>automático<\/strong> al inscribirse, <strong>sin necesidad de notificación<\/strong> de acto alguno.<\/li><li>Mientras tanto, el contribuyente está <strong>impedido de retirar sellos o avisos<\/strong> de clausura y de realizar cualquier actividad en el establecimiento, bajo <strong>acciones penales<\/strong> por incumplimiento.<\/li><\/ul>", "clave": "Sin inscripción en 3 días procede la clausura física o electrónica; el levantamiento es automático al inscribirse (Art. 19 Ley; Art. 19.1 Reglamento)."}, {"titulo": "Competencia sancionadora y procedimiento (Arts. 20 y 21 Ley)", "html": "<table><tr><th>Materia<\/th><th>Autoridad competente<\/th><\/tr><tr><td><strong>Delitos tributarios<\/strong><\/td><td><strong>Función Judicial<\/strong> (jurisdicción penal, Art. 394 Código Tributario)<\/td><\/tr><tr><td><strong>Contravenciones, faltas reglamentarias y administrativas<\/strong><\/td><td><strong>Director General del SRI<\/strong>, mediante resolución escrita<\/td><\/tr><\/table><ul><li>La resolución administrativa detalla <strong>hechos, antecedentes y circunstancias<\/strong>; el SRI <strong>oye al acusado<\/strong> antes de sancionar, considerando atenuantes, agravantes o eximentes (Art. 383 Código Tributario).<\/li><li><strong>Apelación<\/strong>: ante el Director General del SRI; se presenta ante el funcionario que levantó el acta, quien la remite con sus antecedentes en el término de <strong>3 días<\/strong>.<\/li><\/ul>", "clave": "Los delitos los juzga la Función Judicial; las contravenciones y faltas las sanciona el Director General del SRI, con apelación remitida en 3 días (Arts. 20-21 Ley)."}, {"titulo": "Carácter de la información del RUC (Art. 19 Reglamento)", "html": "<p>Distinción esencial al responder consultas ciudadanas sobre datos.<\/p><ul><li>La información que el SRI determine <strong>mediante resolución de carácter general<\/strong> es <strong>pública<\/strong> y se publica en la <strong>página web institucional<\/strong>.<\/li><li>La información registrada en la <strong>base de datos<\/strong> es <strong>confidencial<\/strong> y de <strong>uso exclusivo<\/strong> para fines de la Administración Tributaria.<\/li><li>Aplicación práctica: en ventanilla se puede orientar sobre la consulta pública de RUC en línea, pero no revelar datos confidenciales de terceros.<\/li><\/ul>", "clave": "Lo publicado por resolución en la web del SRI es público; la base de datos del RUC es confidencial y de uso exclusivo tributario (Art. 19 Reglamento)."}, {"titulo": "Casos prácticos de ventanilla: repaso integrador", "html": "<ol><li><strong>Emprendedor que vendió por primera vez hace 45 días y no tiene RUC<\/strong>: incumplió el plazo de <strong>30 días<\/strong> (Art. 4 Ley); debe inscribirse de inmediato; incurrió en contravención (Art. 19 numeral 1 Ley) y el número puede asignarse de oficio.<\/li><li><strong>Sociedad que cambió de representante legal hace 2 meses<\/strong>: incumplió la actualización de <strong>30 días<\/strong> (Art. 14 literal h Ley); debe actualizar presentando solo los documentos del cambio (Art. 12 Reglamento).<\/li><li><strong>Persona natural que cierra temporalmente su negocio<\/strong>: suspensión en <strong>30 días hábiles<\/strong>, previa <strong>baja de comprobantes<\/strong> (Art. 13 Reglamento).<\/li><li><strong>Heredero que informa el fallecimiento del titular<\/strong>: procede la <strong>cancelación<\/strong>, incluso de oficio si el SRI constata el deceso (Arts. 14 y 16 Reglamento).<\/li><li><strong>Local clausurado por no tener RUC<\/strong>: se levanta <strong>automáticamente<\/strong> al inscribirse, sin notificación (Art. 19.1 Reglamento).<\/li><\/ol>", "clave": "Cada consulta se resuelve identificando el proceso (inscripción, actualización, suspensión, cancelación), su plazo y su fundamento normativo."}]}], "banco": [{"tipo": "om", "pregunta": "Una compañía anónima inscribió su escritura de constitución en el Registro Mercantil el 1 de junio. ¿Hasta cuándo debe obtener su inscripción en el RUC?", "opciones": ["Dentro de los 15 días siguientes", "Dentro de los 30 días siguientes a la inscripción de la escritura", "Dentro de los 60 días siguientes", "Antes de emitir su primera factura, sin plazo fijo"], "correcta": 1, "feedback": "El Art. 4 de la Ley del RUC ordena obtener la inscripción dentro de los 30 días siguientes a la constitución o iniciación real de actividades; el Art. 6 del Reglamento fija como fecha de inicio de la sociedad mercantil la inscripción de la escritura en el Registro Mercantil.", "tema": "Plazos de inscripción"}, {"tipo": "om", "pregunta": "¿Qué institución administra el Registro Único de Contribuyentes?", "opciones": ["El Ministerio de Economía y Finanzas", "La Superintendencia de Compañías", "El Servicio de Rentas Internas", "El Registro Civil"], "correcta": 2, "feedback": "El Art. 2 de la Ley del RUC dispone que el registro será administrado por el Servicio de Rentas Internas; el Art. 1 del Reglamento añade que lo hace mediante catastro, inscripción, actualización, suspensión y cancelación.", "tema": "Disposiciones generales"}, {"tipo": "om", "pregunta": "Un ciudadano ecuatoriano con cédula 0912345678 solicita su RUC como persona natural. ¿Cuál será su número de registro?", "opciones": ["Un número secuencial asignado por el SRI", "0912345678 seguido de 001", "0912345678 seguido del código de su actividad económica", "Los 10 dígitos de su cédula sin agregados"], "correcta": 1, "feedback": "Según el Art. 3 del Reglamento, para las personas naturales, nacionales y extranjeros residentes, el número de registro corresponde a los diez dígitos de su cédula seguidos de 001; concuerda con el Art. 5 de la Ley.", "tema": "Estructura del número RUC"}, {"tipo": "om", "pregunta": "En la estructura del número de RUC, ¿qué representan los dos primeros dígitos?", "opciones": ["El tipo de contribuyente", "El año de inscripción", "La provincia donde se obtuvo la cédula o se inscribió el contribuyente o la sociedad", "El código de la actividad económica principal"], "correcta": 2, "feedback": "El Art. 3 del Reglamento establece que los dos primeros dígitos registran la provincia donde se obtuvo la cédula, donde se inscribió el extranjero no residente o donde se inscribió la sociedad; los tres últimos son 001 para todos.", "tema": "Estructura del número RUC"}, {"tipo": "om", "pregunta": "Una sociedad domiciliada en un paraíso fiscal es propietaria de un departamento en Quito que no genera renta alguna. En ventanilla consulta si debe obtener RUC. La respuesta correcta es:", "opciones": ["No, porque el inmueble no genera rentas gravadas", "No, porque no es residente en el Ecuador", "Sí, está obligada a inscribirse aunque el inmueble no genere rentas sujetas a tributación", "Solo si decide vender el inmueble"], "correcta": 2, "feedback": "El Art. 3 de la Ley del RUC obliga a inscribirse a las sociedades extranjeras domiciliadas en paraísos fiscales o cualquier otra jurisdicción que sean propietarias de inmuebles en el Ecuador, aunque no generen rentas; notarios y registradores no pueden actuar sin este requisito.", "tema": "Obligados a inscribirse"}, {"tipo": "om", "pregunta": "Una sociedad no residente cuya actividad exclusiva en el Ecuador es efectuar inversiones en activos financieros pregunta si debe inscribirse en el RUC. ¿Qué le corresponde informar?", "opciones": ["Que debe inscribirse en 30 días como cualquier sociedad", "Que no está obligada a inscribirse; el SRI controla a través de los sujetos pasivos responsables que intervienen", "Que debe inscribirse solo si sus inversiones superan USD 400", "Que debe catastrarse obligatoriamente"], "correcta": 1, "feedback": "El Art. 3 de la Ley (reformado en 2021) excluye de la obligación a personas naturales y sociedades no residentes cuya actividad exclusiva sea invertir en activos financieros en el país; el SRI puede establecer mecanismos de control sobre los responsables que intervengan.", "tema": "Obligados a inscribirse"}, {"tipo": "om", "pregunta": "¿Con qué capital en giro máximo una persona natural que opera como empresa unipersonal es considerada únicamente persona natural para efectos de la Ley del RUC?", "opciones": ["Hasta USD 400", "Hasta USD 4.000", "Hasta USD 800", "Hasta una fracción básica desgravada de impuesto a la renta"], "correcta": 0, "feedback": "El Art. 4 de la Ley del RUC dispone que las personas naturales que operan como empresas unipersonales con capital en giro de hasta cuatrocientos dólares de los Estados Unidos de América se consideran únicamente personas naturales; el SRI califica estos casos.", "tema": "Obligados a inscribirse"}, {"tipo": "om", "pregunta": "Una compañía cambió su domicilio fiscal el 10 de marzo. ¿En qué plazo debe comunicarlo al SRI según el Reglamento?", "opciones": ["Dentro de 15 días hábiles", "Dentro de 30 días hábiles contados desde que ocurrió el hecho", "Dentro de 90 días calendario", "En la próxima declaración de impuesto a la renta"], "correcta": 1, "feedback": "El Art. 14 de la Ley exige comunicar el cambio de domicilio dentro del plazo de treinta días; el Art. 11 del Reglamento precisa que la actualización se realiza dentro de los 30 días hábiles contados a partir de la fecha en la cual ocurrieron los hechos.", "tema": "Actualización de la información"}, {"tipo": "om", "pregunta": "El SRI detecta un local comercial funcionando sin inscripción en el RUC. ¿Cuál es el procedimiento previsto?", "opciones": ["Clausura inmediata sin plazo alguno", "Multa automática y cierre por 7 días", "Se concede un plazo de 3 días para inscribirse; de no hacerlo, se impone la clausura física o electrónica", "Se concede un plazo de 30 días para inscribirse"], "correcta": 2, "feedback": "El Art. 19 de la Ley del RUC (inciso final sustituido por la Ley publicada en R.O.S. 461 de 20-12-2023) concede al establecimiento no inscrito el plazo de tres días para inscribirse; caso contrario se impone la clausura física o electrónica, y la reapertura no procede hasta la inscripción.", "tema": "Sanciones"}, {"tipo": "om", "pregunta": "¿Por cuánto tiempo sin presentar declaraciones puede el SRI suspender de oficio la inscripción de un contribuyente en el RUC?", "opciones": ["Más de 6 meses consecutivos", "Más de 12 meses consecutivos", "Más de 24 meses consecutivos", "Más de 3 meses consecutivos"], "correcta": 1, "feedback": "El Art. 15 numeral 2 del Reglamento permite la suspensión de oficio cuando el sujeto pasivo no haya presentado las declaraciones por más de doce meses consecutivos, o cuando en tal período las declaraciones no registren actividad económica.", "tema": "Suspensión de oficio"}, {"tipo": "om", "pregunta": "Un tramitador sin poder notariado acude a la ventanilla a realizar trámites de RUC de varias personas naturales. ¿Cuál es el límite reglamentario?", "opciones": ["No puede efectuar trámites de más de 3 sujetos pasivos en un mismo período de 3 meses", "Máximo 5 trámites por mes", "Máximo 1 trámite por día", "No existe límite si presenta cartas de autorización"], "correcta": 0, "feedback": "El Art. 17 literal a) numeral 3 del Reglamento establece que quien realiza trámites de terceros no podrá efectuar los relativos al RUC de más de tres sujetos pasivos en un mismo período de tres meses; el límite no aplica a apoderados con poder notariado ni a estudios jurídicos o profesionales del derecho.", "tema": "Trámites por terceros"}, {"tipo": "om", "pregunta": "Para una fundación sin fines de lucro, ¿cuál es la fecha de inicio de actividades según el Reglamento?", "opciones": ["La fecha de su primera donación recibida", "La fecha de publicación en el Registro Oficial del acuerdo ministerial o convenio internacional que autoriza su existencia legal", "La fecha de apertura de su cuenta bancaria", "La fecha de su primer acto de comercio"], "correcta": 1, "feedback": "El Art. 6 del Reglamento dispone que para las organizaciones y sociedades sin fines de lucro la fecha de inicio de actividades es la de publicación en el Registro Oficial del acuerdo ministerial o convenio internacional que autoriza su existencia legal.", "tema": "Inicio de actividades"}, {"tipo": "om", "pregunta": "¿Quién es competente para resolver administrativamente e imponer sanciones por contravenciones y faltas reglamentarias a la Ley del RUC?", "opciones": ["El juez de contravenciones", "El Ministro de Economía y Finanzas", "El Director General del Servicio de Rentas Internas, mediante resolución escrita", "El Tribunal Distrital de lo Contencioso Tributario"], "correcta": 2, "feedback": "El Art. 20 numeral 2 de la Ley del RUC atribuye al Director General del SRI la competencia para resolver administrativamente e imponer sanciones en materia de contravenciones, faltas reglamentarias y administrativas; los delitos corresponden a la Función Judicial (numeral 1).", "tema": "Sanciones"}, {"tipo": "om", "pregunta": "Según la Ley del RUC, para obtener un duplicado del certificado de inscripción en caso de pérdida, el contribuyente debe:", "opciones": ["Presentar una denuncia ante la Fiscalía", "Presentar una solicitud y demostrar haber publicado por la prensa por dos veces la pérdida del documento", "Esperar 90 días desde la pérdida", "Pagar una multa equivalente a un salario básico"], "correcta": 1, "feedback": "El Art. 16 de la Ley del RUC exige, para el duplicado en casos de destrucción, sustracción, pérdida o desaparición, la presentación de una solicitud y la demostración de haber publicado por la prensa por dos veces la pérdida; el Art. 17.1 del Reglamento facilita hoy la copia vía web u oficinas previa verificación de datos.", "tema": "Certificado de inscripción"}, {"tipo": "om", "pregunta": "Una persona natural cierra temporalmente su restaurante por un viaje de un año. ¿Qué debe hacer respecto de su RUC?", "opciones": ["Cancelar definitivamente su RUC devolviendo el certificado", "Informar la suspensión dentro de los 30 días hábiles de cesada la actividad, dando de baja previamente los comprobantes de venta y retención no utilizados", "No hacer nada, pues las obligaciones formales se suspenden automáticamente", "Solicitar la suspensión solo si el cierre supera los dos años"], "correcta": 1, "feedback": "El Art. 13 del Reglamento ordena que la persona natural que termina temporalmente su actividad informe la suspensión dentro de los 30 días hábiles siguientes, previa baja de comprobantes de venta y retención y conclusión de autorizaciones de máquinas registradoras y puntos de venta.", "tema": "Suspensión del RUC"}, {"tipo": "om", "pregunta": "¿En cuál de los siguientes casos puede el SRI cancelar de oficio el RUC de una persona natural?", "opciones": ["Cuando no presenta declaraciones por 6 meses", "Cuando cambia de domicilio sin avisar", "Cuando constata su fallecimiento o la salida del país del extranjero no residente", "Cuando su establecimiento es clausurado por 3 meses"], "correcta": 2, "feedback": "El Art. 14 del Reglamento faculta al SRI a cancelar de oficio la inscripción de una persona natural cuando constate su fallecimiento o la salida del país del extranjero no residente; el Art. 16 reitera la cancelación de oficio por fallecimiento. La falta de declaraciones y la clausura prolongada son causales de suspensión (Art. 15), no de cancelación.", "tema": "Cancelación de oficio"}, {"tipo": "om", "pregunta": "Conforme al Art. 1 del Reglamento, el SRI administra el RUC mediante los procesos de:", "opciones": ["Inscripción, verificación, clausura y archivo", "Catastro, inscripción, actualización, suspensión y cancelación", "Registro, control, sanción y depuración", "Inscripción, actualización y baja definitiva"], "correcta": 1, "feedback": "El Art. 1 del Reglamento (reformado por el Decreto Ejecutivo 1114 de 2020) señala que el SRI administra el RUC mediante los procesos de catastro, inscripción, actualización, suspensión y cancelación.", "tema": "Disposiciones generales"}, {"tipo": "vf", "pregunta": "El certificado de inscripción con el número de identificación tributaria es un documento público, intransferible y personal.", "correcta": true, "feedback": "Verdadero. Así lo dispone expresamente el Art. 8 de la Ley del RUC sobre la intransferibilidad del certificado de inscripción.", "tema": "Certificado de inscripción"}, {"tipo": "vf", "pregunta": "Las embajadas y consulados de países con los que Ecuador mantiene relaciones diplomáticas están obligados a inscribirse en el RUC.", "correcta": false, "feedback": "Falso. El Art. 3 de la Ley del RUC establece que los organismos internacionales, embajadas, consulados y oficinas comerciales no están obligados a inscribirse, aunque podrán hacerlo voluntariamente si lo consideran conveniente.", "tema": "Obligados a inscribirse"}, {"tipo": "vf", "pregunta": "La inscripción en el Registro Único de Contribuyentes debe renovarse cada año.", "correcta": false, "feedback": "Falso. Los Arts. 3 de la Ley y 2 del Reglamento disponen que la inscripción se realiza por una sola vez; lo que existe es el deber de actualizar la información cuando cambie (Art. 14 Ley).", "tema": "Inscripción"}, {"tipo": "vf", "pregunta": "El registro en el RUC de un prestador de servicios digitales no residente constituye un establecimiento permanente en el Ecuador.", "correcta": false, "feedback": "Falso. El Art. 6.1 del Reglamento señala expresamente que dicho registro no constituirá un establecimiento permanente en el país; el SRI regula el proceso por resolución de carácter general.", "tema": "Sujetos no residentes"}, {"tipo": "vf", "pregunta": "La cancelación del RUC implica la pérdida de las facultades del Servicio de Rentas Internas respecto del contribuyente.", "correcta": false, "feedback": "Falso. El Art. 14 del Reglamento dispone de forma expresa que la cancelación del RUC no implica pérdida de las facultades del Servicio de Rentas Internas, que puede seguir ejerciendo control sobre períodos anteriores.", "tema": "Cancelación del RUC"}, {"tipo": "vf", "pregunta": "El SRI puede suspender de oficio el RUC de un contribuyente cuyo establecimiento estuviere clausurado por tres meses o más.", "correcta": true, "feedback": "Verdadero. El Art. 15 numeral 4 del Reglamento incluye como causal de suspensión de oficio que el establecimiento del contribuyente estuviere clausurado por tres meses o más, según lo previsto en el Código Tributario.", "tema": "Suspensión de oficio"}, {"tipo": "vf", "pregunta": "La inscripción en el RUC solo puede realizarse en la oficina del SRI correspondiente al domicilio fiscal del contribuyente.", "correcta": false, "feedback": "Falso. El Art. 7 del Reglamento permite realizar la inscripción en cualquier oficina del SRI a nivel nacional; la Ley (Art. 4) indica que se hará preferentemente, no exclusivamente, en el domicilio fiscal del obligado.", "tema": "Inscripción"}, {"tipo": "vf", "pregunta": "Para levantar la clausura impuesta por falta de inscripción en el RUC se requiere la notificación de un acto administrativo del SRI posterior a la inscripción.", "correcta": false, "feedback": "Falso. El Art. 19.1 del Reglamento (agregado en 2024) dispone que el levantamiento de la sanción procede de manera automática cuando se efectúa la inscripción, sin necesidad de notificación de acto alguno por parte de la Administración Tributaria.", "tema": "Sanciones"}, {"tipo": "vf", "pregunta": "El contribuyente está obligado a inscribir en el RUC las direcciones IP y demás direcciones electrónicas a través de las cuales realiza sus actividades económicas.", "correcta": true, "feedback": "Verdadero. El Art. 7 del Reglamento (con la reforma del Decreto Ejecutivo 157 de 2024) incluye la inscripción de direcciones IP y direcciones electrónicas, ya sea asociadas a un establecimiento físico o como establecimiento electrónico independiente.", "tema": "Inscripción de establecimientos"}, {"tipo": "completar", "pregunta": "Según el Art. 3 del Reglamento, el número de registro está compuesto por ____ dígitos, sin letras o caracteres especiales.", "respuestas": ["trece", "13"], "feedback": "El Art. 3 del Reglamento dispone que el número de registro estará compuesto por trece dígitos, sin letras ni caracteres especiales.", "tema": "Estructura del número RUC"}, {"tipo": "completar", "pregunta": "Los tres últimos dígitos del número de RUC son ____ para todos los contribuyentes.", "respuestas": ["001", "cero cero uno"], "feedback": "El Art. 3 del Reglamento establece que los tres últimos dígitos serán cero cero uno (001) para todos los contribuyentes.", "tema": "Estructura del número RUC"}, {"tipo": "completar", "pregunta": "Los contribuyentes que den por terminadas sus actividades económicas deben devolver el certificado de inscripción en el plazo de ____ días de cesada la actividad.", "respuestas": ["treinta", "30"], "feedback": "El Art. 15 de la Ley del RUC ordena devolver el certificado de registro de inscripción en el plazo de treinta días de cesada la actividad, a fin de proceder a la cancelación del registro.", "tema": "Cancelación del RUC"}, {"tipo": "completar", "pregunta": "En el procedimiento sancionatorio, el funcionario que levantó el acta debe remitir la apelación y sus antecedentes al Director General del SRI dentro del término de ____ días.", "respuestas": ["tres", "3"], "feedback": "El Art. 21 de la Ley del RUC dispone que la apelación se presenta ante el funcionario que levantó el acta de juzgamiento administrativo, quien la remite con sus antecedentes al Director General del SRI dentro del término de tres días.", "tema": "Sanciones"}, {"tipo": "completar", "pregunta": "El RUC es un instrumento que tiene por función registrar e ____ a los contribuyentes con fines impositivos.", "respuestas": ["identificar"], "feedback": "El Art. 1 de la Ley del RUC define al registro como un instrumento cuya función es registrar e identificar a los contribuyentes con fines impositivos, y cuyo objeto es proporcionar información a la Administración Tributaria.", "tema": "Disposiciones generales"}, {"tipo": "completar", "pregunta": "El SRI puede suspender de oficio la inscripción cuando el contribuyente no haya presentado declaraciones por más de ____ meses consecutivos.", "respuestas": ["doce", "12"], "feedback": "El Art. 15 numeral 2 del Reglamento prevé la suspensión de oficio cuando no se hayan presentado las declaraciones por más de doce meses consecutivos, o cuando en tal período no registren actividad económica.", "tema": "Suspensión de oficio"}, {"tipo": "completar", "pregunta": "Si un obligado no se inscribe en el plazo legal, el ____ general del SRI asignará de oficio el correspondiente número de inscripción.", "respuestas": ["director", "director general"], "feedback": "El Art. 3 de la Ley del RUC dispone que, ante la omisión del obligado, el Director General del Servicio de Rentas Internas asignará de oficio el número de inscripción, sin perjuicio de las sanciones aplicables.", "tema": "Inscripción de oficio"}, {"tipo": "completar", "pregunta": "Según el Art. 19 del Reglamento, la información que se registra en la base de datos del RUC es ____ y de uso exclusivo para fines de la Administración Tributaria.", "respuestas": ["confidencial"], "feedback": "El Art. 19 del Reglamento distingue entre la información pública (definida por resolución y publicada en la web institucional) y la información de la base de datos, que es confidencial y de uso exclusivo para fines de la Administración Tributaria.", "tema": "Carácter de la información"}]}, {"id": "lrti", "titulo": "Ley de Régimen Tributario Interno (LRTI)", "icono": "📗", "descripcion": "Estudio de nivel de maestría del Impuesto a la Renta, IVA, ICE y RIMPE conforme a la codificación vigente de la LRTI (última reforma 2026), con tarifas, límites de deducciones, retenciones y plazos de declaración.", "tiempoMaxMin": 240, "dia": "Día 2 — miércoles 15 de julio", "lecciones": [{"id": "l1", "titulo": "Impuesto a la Renta: generalidades, sujetos y exenciones", "duracionMin": 45, "slides": [{"titulo": "Objeto y concepto de renta (Arts. 1 y 2)", "html": "<p>El <strong>Art. 1<\/strong> establece el impuesto a la <strong>renta global<\/strong> que obtengan las personas naturales, las sucesiones indivisas y las sociedades nacionales o extranjeras.<\/p><ul><li>El <strong>Art. 2<\/strong> define renta en dos numerales:<\/li><li><strong>1)<\/strong> Ingresos de <strong>fuente ecuatoriana<\/strong> obtenidos a título gratuito u oneroso, provenientes del trabajo, del capital o de ambas fuentes, en dinero, especies o servicios.<\/li><li><strong>2)<\/strong> Ingresos obtenidos en el <strong>exterior<\/strong> por personas naturales domiciliadas en el país o por sociedades nacionales (criterio de renta mundial, Art. 98).<\/li><li>Combina el criterio de la fuente (territorial) con el de residencia (renta mundial).<\/li><\/ul>", "clave": "El IR grava la renta global: fuente ecuatoriana + renta mundial de residentes (Arts. 1 y 2 LRTI)."}, {"titulo": "Sujetos del impuesto (Arts. 3 y 4)", "html": "<p><strong>Sujeto activo (Art. 3):<\/strong> el Estado, que lo administra a través del <strong>Servicio de Rentas Internas (SRI)<\/strong>.<\/p><ul><li><strong>Sujetos pasivos (Art. 4):<\/strong> personas naturales, sucesiones indivisas y sociedades, nacionales o extranjeras, domiciliadas o no en el país, que obtengan ingresos gravados.<\/li><li>Los obligados a llevar contabilidad pagan el impuesto <strong>en base de los resultados que arroje la misma<\/strong>.<\/li><li><strong>Partes relacionadas (Art. innumerado post 4):<\/strong> participación directa o indirecta en dirección, administración, control o capital; incluye operaciones con <strong>paraísos fiscales<\/strong> y relación por presunción.<\/li><\/ul>", "clave": "El Estado es sujeto activo vía SRI; son sujetos pasivos PN, sucesiones indivisas y sociedades con ingresos gravados (Arts. 3-4)."}, {"titulo": "Residencia fiscal (Arts. 4.1, 4.2 y paraísos fiscales)", "html": "<p><strong>Personas naturales (Art. 4.1):<\/strong> son residentes fiscales cuando su permanencia, incluyendo ausencias esporádicas, sea de <strong>183 días calendario o más<\/strong>, consecutivos o no, en el mismo período fiscal, o en un lapso de 12 meses dentro de dos períodos fiscales.<\/p><ul><li>También si el <strong>núcleo principal de actividades o intereses económicos<\/strong> radica en Ecuador (mayor valor de ingresos o de activos).<\/li><li><strong>Sociedades (Art. 4.2):<\/strong> residencia fiscal cuando han sido <strong>constituidas o creadas en territorio ecuatoriano<\/strong>.<\/li><li><strong>Paraíso fiscal:<\/strong> jurisdicción que cumpla al menos <strong>2 de 3<\/strong> condiciones: tasa efectiva inferior al <strong>60%<\/strong> de la ecuatoriana, actividades sin sustancia en la jurisdicción, o ausencia de intercambio efectivo de información.<\/li><\/ul>", "clave": "Residencia fiscal de PN: 183 días o núcleo de intereses económicos; paraíso fiscal: 2 de 3 condiciones (Art. 4.1 y ss.)."}, {"titulo": "Ejercicio impositivo y reglas especiales (Arts. 5, 6 y 7)", "html": "<p>El <strong>Art. 7<\/strong> dispone que el ejercicio impositivo es <strong>anual<\/strong>: del <strong>1 de enero al 31 de diciembre<\/strong>. Aunque la actividad inicie después del 1 de enero, el ejercicio se cierra <strong>obligatoriamente el 31 de diciembre<\/strong>.<\/p><ul><li><strong>Cónyuges (Art. 5):<\/strong> los ingresos de la sociedad conyugal se imputan <strong>en partes iguales<\/strong>, excepto rentas del trabajo en relación de dependencia y de la actividad profesional, que se atribuyen a quien las percibe.<\/li><li>Las rentas empresariales se atribuyen al cónyuge que ejerza la administración del negocio.<\/li><li><strong>Sucesiones indivisas (Art. 6):<\/strong> se computan como <strong>unidad económica independiente<\/strong>, previa exclusión de gananciales del cónyuge sobreviviente.<\/li><\/ul>", "clave": "El ejercicio impositivo siempre va del 1 de enero al 31 de diciembre (Art. 7 LRTI)."}, {"titulo": "Ingresos de fuente ecuatoriana (Art. 8)", "html": "<p>El <strong>Art. 8<\/strong> enumera, entre otros:<\/p><ul><li>Actividades laborales, profesionales, comerciales, industriales y de servicios realizadas <strong>en territorio ecuatoriano<\/strong> (con excepción de servicios ocasionales de no residentes con permanencia inferior a 6 meses pagados desde el exterior).<\/li><li>Utilidades por enajenación de bienes muebles o inmuebles ubicados en el país y por <strong>enajenación directa o indirecta de acciones<\/strong> de sociedades domiciliadas en Ecuador (numeral 3.1).<\/li><li><strong>Utilidades y dividendos<\/strong> de sociedades constituidas en el país; exportaciones; intereses; <strong>loterías, rifas y apuestas<\/strong> promovidas en Ecuador.<\/li><li>Herencias, legados, donaciones y hallazgos de bienes situados en Ecuador; y el <strong>incremento patrimonial no justificado<\/strong> (numeral 10).<\/li><li>Define <strong>establecimiento permanente<\/strong>: lugar o centro fijo en el país donde una sociedad extranjera efectúe todas o parte de sus actividades.<\/li><\/ul>", "clave": "El Art. 8 incluye el incremento patrimonial no justificado como ingreso de fuente ecuatoriana."}, {"titulo": "Exenciones I: dividendos, sector público y sin fines de lucro (Art. 9)", "html": "<p>El <strong>Art. 9<\/strong> exonera exclusivamente, entre otros:<\/p><ul><li><strong>Num. 1:<\/strong> dividendos y utilidades, calculados después del pago del IR, distribuidos por sociedades residentes <strong>a favor de otras sociedades nacionales<\/strong>. La capitalización de utilidades no se considera distribución.<\/li><li><strong>Num. 2:<\/strong> ingresos de las <strong>instituciones del Estado<\/strong> y empresas públicas reguladas por la LOEP.<\/li><li><strong>Num. 3 y 4:<\/strong> los exonerados por <strong>convenios internacionales<\/strong> y, bajo reciprocidad, los de estados extranjeros y organismos internacionales.<\/li><li><strong>Num. 5:<\/strong> instituciones privadas <strong>sin fines de lucro<\/strong>, siempre que sus bienes e ingresos se destinen a sus fines específicos; deben estar inscritas en el RUC, llevar contabilidad y cumplir deberes formales.<\/li><\/ul>", "clave": "Dividendos entre sociedades nacionales y los ingresos del Estado están exentos (Art. 9 núms. 1 y 2)."}, {"titulo": "Exenciones II: rentas laborales y prestaciones sociales (Art. 9)", "html": "<ul><li><strong>Décima tercera y décima cuarta remuneraciones:<\/strong> exentas.<\/li><li><strong>Prestaciones del IESS<\/strong>, pensiones patronales jubilares, prestaciones del ISSFA e ISSPOL y pensionistas del Estado (num. 7).<\/li><li><strong>Becas<\/strong> para estudios, especialización o capacitación otorgadas por el Estado, empleadores u organismos internacionales.<\/li><li><strong>Bonificación de desahucio e indemnización por despido intempestivo<\/strong> exentas en la parte que <strong>no exceda<\/strong> lo determinado por el Código del Trabajo; el exceso forma parte de la renta global.<\/li><li><strong>Viáticos<\/strong> de funcionarios del Estado y gastos de viaje, hospedaje y alimentación soportados del sector privado (num. 11).<\/li><li><strong>Intereses por depósitos de ahorro a la vista<\/strong> de personas naturales (num. 6) y la <strong>Compensación Económica para el salario digno<\/strong> (num. 18).<\/li><\/ul>", "clave": "Décima tercera y cuarta, prestaciones del IESS, becas y desahucio dentro del límite legal están exentos (Art. 9)."}, {"titulo": "Exenciones III: tercera edad, discapacidad y enajenación ocasional (Art. 9)", "html": "<table><tr><th>Beneficiario<\/th><th>Monto exento (Art. 9 num. 12)<\/th><\/tr><tr><td>Personas mayores de 65 años<\/td><td><strong>1 fracción básica<\/strong> gravada con tarifa cero<\/td><\/tr><tr><td>Personas con discapacidad calificada<\/td><td><strong>Doble de la fracción básica<\/strong> gravada con tarifa cero<\/td><\/tr><tr><td>Sustituto único de la persona con discapacidad<\/td><td>Hasta el mismo monto, si el titular no lo ejerce<\/td><\/tr><\/table><ul><li>Las exoneraciones del numeral 12 <strong>no se aplican simultáneamente<\/strong>: se toma la más beneficiosa.<\/li><li><strong>Num. 14:<\/strong> exenta la <strong>enajenación ocasional de inmuebles<\/strong>, aplicable hasta por <strong>2 enajenaciones por año<\/strong> (la que no corresponde al giro ordinario del negocio).<\/li><li><strong>Num. 16:<\/strong> indemnizaciones por seguros, <strong>excepto lucro cesante<\/strong>.<\/li><\/ul>", "clave": "Tercera edad: 1 fracción básica exenta; discapacidad: el doble; enajenación ocasional de inmuebles: hasta 2 por año (Art. 9)."}, {"titulo": "Exenciones IV: rendimientos financieros y economía popular (Art. 9)", "html": "<ul><li><strong>Num. 15.1:<\/strong> rendimientos por <strong>depósitos a plazo fijo<\/strong> e inversiones en renta fija negociadas en bolsas de valores del país, emitidos a <strong>180 días calendario o más<\/strong> y en posesión del tenedor al menos 180 días continuos.<\/li><li>La exención no aplica si el perceptor es <strong>deudor directo o indirecto<\/strong> de la institución (salvo deudas por tarjetas de crédito) ni entre <strong>partes relacionadas<\/strong>.<\/li><li><strong>Num. 15:<\/strong> fideicomisos mercantiles que no desarrollen actividades empresariales, fondos de inversión y fondos complementarios (con retención al beneficiario y declaración informativa).<\/li><li><strong>Núms. 19 y 20:<\/strong> ingresos de organizaciones de la <strong>Economía Popular y Solidaria<\/strong> cuando reinvierten sus utilidades; se <strong>excluye a las Cooperativas de Ahorro y Crédito<\/strong>, que tributan como sociedades.<\/li><li><strong>Num. 10:<\/strong> premios de loterías o sorteos de la <strong>Junta de Beneficencia de Guayaquil y Fe y Alegría<\/strong>.<\/li><\/ul>", "clave": "Depósitos a plazo fijo exentos si se emiten y mantienen al menos 180 días (Art. 9 num. 15.1)."}, {"titulo": "Zonas francas y nuevas inversiones (Arts. innumerados post 9)", "html": "<ul><li><strong>Zonas Francas:<\/strong> usuarios y operadores gozan de tarifa <strong>0% de IR por los primeros 5 años<\/strong> desde que generen ingresos y luego tarifa fija del <strong>15%<\/strong> por el tiempo restante de su declaratoria.<\/li><li><strong>Energías renovables no convencionales, gas natural e hidrógeno verde:<\/strong> exoneración de IR por <strong>10 años<\/strong> desde el primer año con ingresos atribuibles a la nueva inversión.<\/li><li><strong>Turismo:<\/strong> exoneración de IR por <strong>7 años<\/strong> para nuevas inversiones de al menos <strong>USD 100.000<\/strong>, destinando al menos el 10% al turismo rural.<\/li><li>En todos los casos, la exoneración acumulada <strong>no puede exceder el monto de la inversión<\/strong>.<\/li><\/ul>", "clave": "Zonas francas: 0% de IR por 5 años y luego 15%; renovables 10 años; turismo 7 años (Arts. innumerados post Art. 9)."}, {"titulo": "Síntesis de la lección: mapa del Título Primero", "html": "<table><tr><th>Tema<\/th><th>Norma<\/th><th>Idea fuerza<\/th><\/tr><tr><td>Objeto<\/td><td>Art. 1<\/td><td>Renta global<\/td><\/tr><tr><td>Concepto de renta<\/td><td>Art. 2<\/td><td>Fuente ecuatoriana + renta mundial<\/td><\/tr><tr><td>Sujetos<\/td><td>Arts. 3-4<\/td><td>Estado (SRI) / PN, sucesiones, sociedades<\/td><\/tr><tr><td>Residencia<\/td><td>Art. 4.1<\/td><td><strong>183 días<\/strong> o núcleo económico<\/td><\/tr><tr><td>Ejercicio<\/td><td>Art. 7<\/td><td><strong>1 ene - 31 dic<\/strong><\/td><\/tr><tr><td>Fuente ecuatoriana<\/td><td>Art. 8<\/td><td>10 numerales + EP<\/td><\/tr><tr><td>Exenciones<\/td><td>Art. 9<\/td><td>Taxativas (exclusivamente)<\/td><\/tr><\/table><p><em>Recuerde:<\/em> las exenciones del Art. 9 son taxativas; toda otra renta se presume gravada.<\/p>", "clave": "El Art. 9 usa la palabra exclusivamente: la lista de exenciones es cerrada."}]}, {"id": "l2", "titulo": "Impuesto a la Renta: deducciones, rebajas y tarifas", "duracionMin": 50, "slides": [{"titulo": "Regla general de deducciones (Art. 10)", "html": "<p>Para determinar la base imponible se deducen los gastos e inversiones efectuados <strong>con el propósito de obtener, mantener y mejorar<\/strong> los ingresos de fuente ecuatoriana <strong>que no estén exentos<\/strong>.<\/p><ul><li>Los costos y gastos deben estar <strong>sustentados en comprobantes de venta<\/strong> válidos (num. 1).<\/li><li>Son deducibles impuestos, tasas y aportes a la seguridad social soportados por la actividad, <strong>excluyendo intereses y multas por mora<\/strong> y el propio impuesto a la renta (num. 3).<\/li><li>Remuneraciones y beneficios sociales solo son deducibles si el empleador <strong>cumplió con el IESS<\/strong> a la fecha de presentación de la declaración (num. 9).<\/li><\/ul>", "clave": "Regla de oro del Art. 10: gasto deducible = necesario para obtener, mantener y mejorar ingresos gravados y debidamente sustentado."}, {"titulo": "Intereses y subcapitalización (Art. 10 num. 2)", "html": "<ul><li>Son deducibles los intereses de deudas contraídas con motivo del giro del negocio.<\/li><li><strong>Bancos, aseguradoras y entidades del sector financiero de la EPS:<\/strong> los créditos externos con partes relacionadas no pueden superar el <strong>300% del patrimonio<\/strong>.<\/li><li><strong>Otras sociedades y personas naturales:<\/strong> el <strong>interés neto<\/strong> en operaciones con partes relacionadas no puede superar el <strong>20% de la utilidad antes de participación laboral más intereses, depreciaciones y amortizaciones<\/strong> (EBITDA fiscal).<\/li><li>Los intereses sobre el exceso <strong>no son deducibles<\/strong>, ni los de créditos externos <strong>no registrados en el Banco Central del Ecuador<\/strong>.<\/li><li>Leasing: no deducible si el bien fue de propiedad del mismo sujeto pasivo o de parientes hasta 4º de consanguinidad / 2º de afinidad (lease back), o con plazo inferior a la vida útil.<\/li><\/ul>", "clave": "Límite de subcapitalización: interés neto con relacionadas hasta 20% del EBITDA; bancos: crédito relacionado hasta 300% del patrimonio (Art. 10.2)."}, {"titulo": "Límites cuantitativos de deducciones (Art. 10)", "html": "<table><tr><th>Gasto<\/th><th>Límite<\/th><th>Numeral<\/th><\/tr><tr><td>Gastos de viaje y estadía<\/td><td><strong>3% del ingreso gravado<\/strong> (sociedades nuevas: 100% los 2 primeros años)<\/td><td>6<\/td><\/tr><tr><td>Gastos indirectos asignados desde el exterior por relacionadas<\/td><td><strong>5% de la base imponible<\/strong> + el valor de dichos gastos<\/td><td>6-A<\/td><\/tr><tr><td>Provisión créditos incobrables<\/td><td><strong>1% anual<\/strong> de créditos comerciales del ejercicio; acumulada máx. <strong>10% de la cartera total<\/strong><\/td><td>11<\/td><\/tr><tr><td>Vehículos (depreciación, leasing, intereses, tributos)<\/td><td>No deducibles si el avalúo supera <strong>USD 35.000<\/strong> (salvo blindados, 100% eléctricos, exonerados)<\/td><td>18<\/td><\/tr><tr><td>Do
