function presentar(cid,lid,idx){
  const c=CURSOS.find(x=>x.id===cid), l=c.lecciones.find(x=>x.id===lid);
  DK={cid,lid,i:idx?Math.min(idx+1,l.slides.length):0};
  const ov=document.createElement('div');ov.className='deck';ov.id='deck';
  ov.innerHTML='<div class="deck-stage" id="dkstage"></div><div class="deck-bar"><button class="dbtn" onclick="cerrarDeck()">✕ Salir</button><button class="dbtn" onclick="dkNav(-1)">◀</button><span id="dkn"></span><button class="dbtn" onclick="dkNav(1)">▶</button><span class="mini" style="color:#64748b">← → o toca la slide</span></div>';
  document.body.appendChild(ov);
  document.getElementById('dkstage').addEventListener('click',()=>dkNav(1));
  let tx=0;
  ov.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
  ov.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(dx<-40)dkNav(1);else if(dx>40)dkNav(-1)},{passive:true});
  window.addEventListener('resize',fitDeck);
  document.addEventListener('keydown',dkKeys,true);
  try{if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{})}catch(e){}
  renderDeck();
}
function dkKeys(e){
  if(!DK)return;
  if(e.key==='Escape')cerrarDeck();
  else if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown')dkNav(1);
  else if(e.key==='ArrowLeft'||e.key==='PageUp')dkNav(-1);
  else return;
  e.preventDefault();e.stopImmediatePropagation();
}
function dkNav(d){
  const l=CURSOS.find(x=>x.id===DK.cid).lecciones.find(x=>x.id===DK.lid);
  const n=DK.i+d, max=l.slides.length+1;
  if(n<0)return;
  if(n>max){cerrarDeck();return}
  DK.i=n;renderDeck();
}
function cerrarDeck(){
  if(!DK)return;
  const l=CURSOS.find(x=>x.id===DK.cid).lecciones.find(x=>x.id===DK.lid);
  if(DK.i>=l.slides.length){(S.vistas[DK.cid]=S.vistas[DK.cid]||{})[DK.lid]=true;save()}
  const cid=DK.cid;DK=null;
  const ov=document.getElementById('deck');if(ov)ov.remove();
  document.removeEventListener('keydown',dkKeys,true);
  window.removeEventListener('resize',fitDeck);
  try{if(document.fullscreenElement)document.exitFullscreen().catch(()=>{})}catch(e){}
  curso(cid);
}
function renderDeck(){
  const c=CURSOS.find(x=>x.id===DK.cid), l=c.lecciones.find(x=>x.id===DK.lid);
  const N=l.slides.length, st=document.getElementById('dkstage');
  let inner;
  if(DK.i===0){
    inner=`<div class="dk-title"><div class="dk-ico">${c.icono}</div><div class="dk-kick">${esc(c.titulo)}</div><h1>${esc(l.titulo)}</h1><p>${N} slides · ~${l.duracionMin} min · Aula SRI</p><p class="dk-hint">Toca la slide o usa → para avanzar</p></div>`;
  }else if(DK.i>N){
    (S.vistas[DK.cid]=S.vistas[DK.cid]||{})[DK.lid]=true;save();
    inner=`<div class="dk-title"><div class="dk-ico">🎉</div><h1>Lección completada</h1><p>${esc(l.titulo)}</p><p class="dk-hint">Avanza una vez más para volver al curso y rendir la evaluación</p></div>`;
  }else{
    const s=l.slides[DK.i-1];
    inner=`<div class="dk-slide"><div class="dk-kick">${c.icono} ${esc(c.titulo)} · ${esc(l.titulo)}</div><h1>${esc(s.titulo)}</h1><div class="dk-body">${nlm(s.html)}</div>${s.clave?`<div class="dk-clave">💡 ${esc(s.clave)}</div>`:''}<div class="dk-num">${DK.i} / ${N}</div></div>`;
  }
  st.innerHTML=inner+`<div class="dk-prog" style="width:${Math.round(DK.i/(N+1)*100)}%"></div>`;
  document.getElementById('dkn').textContent=DK.i===0?'Portada':DK.i>N?'Fin':DK.i+' / '+N;
  fitDeck();
}
function fitDeck(){
  const st=document.getElementById('dkstage');if(!st)return;
  const s=Math.min((window.innerWidth-16)/1280,(window.innerHeight-84)/720);
  st.style.transform='translate(-50%,-50%) scale('+s+')';
}

/* ---------- QUIZ ---------- */
let Q=null;
function quiz(cid){
  let banco,titulo,n;
  if(cid==='SIM'){
    banco=CURSOS.flatMap(c=>c.banco.map(q=>({...q,__curso:c.titulo})));
    titulo='Simulacro general del concurso';n=PREGUNTAS_SIMULACRO;
    stopTimer();
  }else{
    const c=CURSOS.find(x=>x.id===cid);
    banco=c.banco.map(q=>({...q,__curso:c.titulo}));titulo='Evaluación: '+c.titulo;n=PREGUNTAS_POR_INTENTO;
    startTimer(cid);
  }
  Q={cid,titulo,items:shuffle(banco).slice(0,n).map(q=>({...q,resp:null}))};
  let html=`<div class="breadcrumb"><a onclick="dashboard()">🏠</a> › ${cid==='SIM'?'':`<a onclick="curso('${cid}')">Curso</a> › `}${esc(titulo)}</div>
  ${cid!=='SIM'?'<div id="timerbox" class="timerbox">⏱️ …</div>':''}
  <div class="card"><b>${esc(titulo)}</b><p class="mini">${Q.items.length} preguntas · Aprobación: ${APROBACION}/100 · Responde todas y pulsa Calificar.</p></div>`;
  Q.items.forEach((q,i)=>{
    html+=`<div class="q-card" id="qc${i}">
      <div class="q-num">Pregunta ${i+1} · ${q.tipo==='om'?'Opción múltiple':q.tipo==='vf'?'Verdadero / Falso':'Completar'}${q.__curso&&cid==='SIM'?' · '+esc(q.__curso):''}</div>
      <div class="q-preg">${esc(q.pregunta)}</div>`;
    if(q.tipo==='om'){
      q.opciones.forEach((o,j)=>{
        html+=`<label class="opt" onclick="marcar(${i},${j},this)"><input type="radio" name="q${i}"><span>${esc(o)}</span></label>`;
      });
    }else if(q.tipo==='vf'){
      html+=`<label class="opt" onclick="marcar(${i},true,this)"><input type="radio" name="q${i}"><span>Verdadero</span></label>
             <label class="opt" onclick="marcar(${i},false,this)"><input type="radio" name="q${i}"><span>Falso</span></label>`;
    }else{
      html+=`<input type="text" placeholder="Escribe tu respuesta…" oninput="Q.items[${i}].resp=this.value">`;
    }
    html+='</div>';
  });
  html+=`<div style="text-align:center;margin-top:18px"><button class="btn btn-p" style="font-size:1.05rem;padding:13px 34px" onclick="calificar()">📊 Calificar evaluación</button></div>`;
  app.innerHTML=html;
  window.scrollTo(0,0);
}
function marcar(i,val,el){
  Q.items[i].resp=val;
  el.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  el.querySelector('input').checked=true;
}
function calificar(){
  const sin=Q.items.filter(q=>q.resp===null||q.resp==='').length;
  if(sin>0 && !confirm(`Tienes ${sin} pregunta(s) sin responder. Se calificarán como incorrectas. ¿Continuar?`))return;
  stopTimer();
  let ok=0;const temas={};
  Q.items.forEach(q=>{
    let bien=false;
    if(q.tipo==='om')bien=q.resp===q.correcta;
    else if(q.tipo==='vf')bien=q.resp===q.correcta;
    else if(q.tipo==='completar'){
      const r=norm(q.resp||'');
      bien=q.respuestas.some(a=>{const na=norm(a);return na===r||(na.length>3&&r.includes(na))});
    }
    q.__ok=bien;if(bien)ok++;
    const t=q.tema||'General';
    temas[t]=temas[t]||{ok:0,tot:0};temas[t].tot++;if(bien)temas[t].ok++;
  });
  const nota=Math.round(ok/Q.items.length*100);
  const key=Q.cid;
  (S.intentos[key]=S.intentos[key]||[]).push({fecha:new Date().toISOString().slice(0,10),nota});save();

  const debiles=Object.entries(temas).filter(([,v])=>v.ok/v.tot<0.7).sort((a,b)=>a[1].ok/a[1].tot-b[1].ok/b[1].tot);
  const color=nota>=90?'var(--verde)':nota>=APROBACION?'var(--azul2)':'var(--rojo)';
  let html=`<div class="breadcrumb"><a onclick="dashboard()">🏠 Inicio</a> › Resultados</div>
  <div class="card nota-hero">
    <div class="nota-circ" style="background:${color}"><span class="n">${nota}</span><span style="font-size:.75rem">/100</span></div>
    <h2 style="font-size:1.2rem;color:${color}">${nota>=90?'¡Excelente! Nivel de concurso':nota>=APROBACION?'Aprobado — sigue puliendo':'Aún no alcanzas el mínimo'}</h2>
    <p class="mini" style="margin-top:6px">${ok} de ${Q.items.length} correctas · ${esc(Q.titulo)} · Aprobación: ${APROBACION}/100</p>
  </div>
  <div class="card">
    <h3 style="font-size:.95rem;margin-bottom:10px">🎯 Feedback: rendimiento por tema</h3>`;
  Object.entries(temas).sort((a,b)=>a[1].ok/a[1].tot-b[1].ok/b[1].tot).forEach(([t,v])=>{
    const p=Math.round(v.ok/v.tot*100);
    html+=`<div class="tema-row"><span class="tname">${esc(t)}</span>
      <div class="prog"><div style="width:${p}%;background:${p>=70?'var(--verde)':p>=50?'var(--ambar)':'var(--rojo)'}"></div></div>
      <b style="width:70px;text-align:right;font-size:.82rem">${v.ok}/${v.tot} (${p}%)</b></div>`;
  });
  if(debiles.length){
    html+=`<div style="margin-top:12px;padding:12px;background:var(--ambar2);border-radius:10px;font-size:.87rem">
      <b>📌 Debes reforzar:</b> ${debiles.map(([t])=>esc(t)).join(' · ')}.<br>
      <span class="mini">Vuelve a las lecciones de estos temas antes de repetir la evaluación.</span></div>`;
  }else{
    html+=`<div style="margin-top:12px;padding:12px;background:var(--verde2);border-radius:10px;font-size:.87rem"><b>✅ Dominas todos los temas evaluados.</b> Continúa con el siguiente módulo del plan.</div>`;
  }
  html+=`</div><h3 style="margin:16px 0 10px;font-size:.95rem">🔍 Revisión de respuestas</h3>`;
  Q.items.forEach((q,i)=>{
    let correcta='';
    if(q.tipo==='om')correcta=q.opciones[q.correcta];
    else if(q.tipo==='vf')correcta=q.correcta?'Verdadero':'Falso';
    else correcta=q.respuestas[0];
    let tuResp = q.resp===null||q.resp===''?'(sin respuesta)': q.tipo==='om'?q.opciones[q.resp]: q.tipo==='vf'?(q.resp?'Verdadero':'Falso'):q.resp;
    html+=`<div class="q-card ${q.__ok?'ok':'mal'}">
      <div class="q-num">${q.__ok?'✅':'❌'} Pregunta ${i+1} · ${esc(q.tema||'')}</div>
      <div class="q-preg">${esc(q.pregunta)}</div>
      <div style="font-size:.87rem">Tu respuesta: <b>${esc(String(tuResp))}</b>${q.__ok?'':` · Correcta: <b>${esc(String(correcta))}</b>`}</div>
      <div class="fb ${q.__ok?'ok':'mal'}">${esc(q.feedback)}</div>
    </div>`;
  });
  html+=`<div style="text-align:center;margin:18px 0">
    ${Q.cid!=='SIM'?`<button class="btn btn-s" onclick="curso('${Q.cid}')">↩ Volver al curso</button> `:''}
    <button class="btn btn-p" onclick="quiz('${Q.cid}')">🔁 Nuevo intento</button>
    <button class="btn btn-s" onclick="dashboard()">🏠 Inicio</button>
  </div>`;
  app.innerHTML=html;
  window.scrollTo(0,0);
}

dashboard();
</script>
</body>
</html>
