<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula SRI · Especialista de Asistencia al Ciudadano</title>
<style>
:root{
  --azul:#1e3a8a; --azul2:#2563eb; --azul3:#dbeafe; --fondo:#f1f5f9; --card:#ffffff;
  --texto:#0f172a; --gris:#64748b; --verde:#059669; --verde2:#d1fae5; --rojo:#dc2626;
  --rojo2:#fee2e2; --ambar:#d97706; --ambar2:#fef3c7; --borde:#e2e8f0; --radio:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--fondo);color:var(--texto);line-height:1.55}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:14px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:1.05rem;font-weight:700;flex:1;min-width:200px}
header .sub{font-size:.75rem;opacity:.85;display:block}
#countdown{background:rgba(255,255,255,.15);border-radius:10px;padding:6px 12px;font-size:.8rem;text-align:center}
#countdown strong{display:block;font-size:1rem}
main{max-width:980px;margin:0 auto;padding:18px 14px 60px}
.btn{display:inline-block;border:none;cursor:pointer;border-radius:10px;padding:10px 18px;font-size:.95rem;font-weight:600;transition:.15s}
.btn-p{background:var(--azul2);color:#fff}.btn-p:hover{background:var(--azul)}
.btn-s{background:#fff;color:var(--azul2);border:1.5px solid var(--azul2)}.btn-s:hover{background:var(--azul3)}
.btn-g{background:var(--verde);color:#fff}
.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:var(--card);border:1px solid var(--borde);border-radius:var(--radio);padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(15,23,42,.06)}
.mini{font-size:.78rem;color:var(--gris)}
.pill{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:99px}
.pill-azul{background:var(--azul3);color:var(--azul)}
.pill-verde{background:var(--verde2);color:var(--verde)}
.pill-ambar{background:var(--ambar2);color:var(--ambar)}
.pill-rojo{background:var(--rojo2);color:var(--rojo)}
.prog{height:8px;background:var(--borde);border-radius:99px;overflow:hidden;margin:8px 0}
.prog>div{height:100%;background:var(--verde);border-radius:99px;transition:.3s}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.curso-card{cursor:pointer;transition:.15s;position:relative}
.curso-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,23,42,.12)}
.curso-card .ico{font-size:1.9rem}
.curso-card h3{font-size:1rem;margin:6px 0 4px;color:var(--azul)}
.dia-titulo{margin:22px 0 10px;font-size:.85rem;font-weight:800;color:var(--azul);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--azul3);padding-bottom:5px}
.breadcrumb{font-size:.82rem;color:var(--gris);margin-bottom:12px}
.breadcrumb a{color:var(--azul2);cursor:pointer;text-decoration:none}
.timerbox{display:flex;align-items:center;gap:10px;background:var(--ambar2);border:1px solid #fcd34d;border-radius:10px;padding:8px 14px;margin-bottom:14px;font-size:.85rem}
.timerbox.excedido{background:var(--rojo2);border-color:#fca5a5}
.timerbox strong{font-variant-numeric:tabular-nums;font-size:1.05rem}
.leccion-item{display:flex;align-items:center;gap:12px;padding:13px 15px;border:1px solid var(--borde);border-radius:12px;margin-bottom:10px;cursor:pointer;background:#fff;transition:.15s}
.leccion-item:hover{border-color:var(--azul2);background:var(--azul3)}
.leccion-item .check{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;background:var(--borde);color:var(--gris);flex-shrink:0}
.leccion-item.vista .check{background:var(--verde);color:#fff}
/* slides — estilo NotebookLM */
.slide-shell{max-width:840px;margin:0 auto}
@keyframes slidein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.slide{background:linear-gradient(160deg,#ffffff 0%,#f5f8ff 70%,#eef4ff 100%);border:1px solid var(--borde);border-radius:22px;padding:30px 30px 26px;min-height:380px;box-shadow:0 12px 32px rgba(30,58,138,.10);animation:slidein .35s ease;position:relative;overflow:hidden}
.slide::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--azul),var(--azul2),#60a5fa)}
.kicker{font-size:.7rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--azul2);margin-bottom:6px}
.slide h2{color:var(--azul);font-size:1.55rem;line-height:1.25;margin-bottom:16px;font-weight:800}
.slide-body>p:first-child{font-size:1.02rem;color:#334155}
.slide p{margin-bottom:10px}
.slide ul,.slide ol{margin:8px 0 8px 22px}
.slide li{margin-bottom:7px}
.nlm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:11px;margin:14px 0}
.nlm-card{background:#fff;border:1px solid var(--borde);border-radius:14px;padding:13px 14px;font-size:.89rem;line-height:1.5;box-shadow:0 2px 8px rgba(15,23,42,.06);display:flex;gap:10px;align-items:flex-start;transition:.15s}
.nlm-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(30,58,138,.12);border-color:#bfdbfe}
.nlm-ico{font-size:1.25rem;line-height:1.2;flex-shrink:0}
.nlm-card ul{margin:6px 0 0 16px}
.nlm-card li{margin-bottom:4px}
.slide-body strong{background:linear-gradient(180deg,transparent 58%,#fde68a 58%);padding:0 3px;border-radius:3px;color:var(--azul);font-weight:800}
.slide table{border-collapse:separate;border-spacing:0;width:100%;margin:12px 0;font-size:.87rem;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(15,23,42,.07)}
.slide th{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:9px 11px;text-align:left}
.slide td{border-bottom:1px solid var(--borde);padding:8px 11px;background:#fff}
.slide tr:nth-child(even) td{background:#f8fafc}
.clave{margin-top:18px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #bfdbfe;border-left:5px solid var(--azul2);border-radius:0 14px 14px 0;padding:12px 16px;font-size:.9rem;box-shadow:0 2px 8px rgba(30,58,138,.07)}
.clave b{color:var(--azul)}
.slide-prog{height:6px;background:var(--borde);border-radius:99px;overflow:hidden;margin-top:14px}
.slide-prog>div{height:100%;background:linear-gradient(90deg,var(--azul2),#60a5fa);border-radius:99px;transition:.3s}
.slide-nav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px}
.slide-dots{flex:1;text-align:center;font-size:.8rem;color:var(--gris)}
@media(max-width:620px){.slide h2{font-size:1.2rem}.nlm-grid{grid-template-columns:1fr}}
/* quiz */
.q-card{border:1px solid var(--borde);border-radius:12px;padding:16px;margin-bottom:14px;background:#fff}
.q-card.ok{border-color:var(--verde);background:#f0fdf4}
.q-card.mal{border-color:var(--rojo);background:#fef2f2}
.q-num{font-size:.72rem;font-weight:800;color:var(--gris);text-transform:uppercase;letter-spacing:.04em}
.q-preg{font-weight:600;margin:6px 0 10px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border:1.5px solid var(--borde);border-radius:9px;margin-bottom:7px;cursor:pointer;font-size:.92rem;transition:.1s}
.opt:hover{border-color:var(--azul2);background:var(--azul3)}
.opt.sel{border-color:var(--azul2);background:var(--azul3);font-weight:600}
.opt input{margin-top:3px}
.q-card input[type=text]{width:100%;padding:10px 12px;border:1.5px solid var(--borde);border-radius:9px;font-size:.95rem}
.fb{margin-top:10px;font-size:.85rem;padding:10px 12px;border-radius:9px}
.fb.ok{background:var(--verde2)}
.fb.mal{background:var(--rojo2)}
.nota-hero{text-align:center;padding:26px}
.nota-circ{width:130px;height:130px;border-radius:50%;margin:0 auto 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:800}
.nota-circ .n{font-size:2.1rem}
.tema-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.87rem}
.tema-row .tname{flex:1}
.tema-row .prog{flex:2;margin:0}
footer{text-align:center;font-size:.75rem;color:var(--gris);padding:18px}
@media(max-width:620px){
  .slide{padding:18px 15px;min-height:260px}
  header h1{font-size:.9rem}
  main{padding:12px 10px 50px}
}
/* ---------- MODO PRESENTACIÓN (deck 16:9) ---------- */
.deck{position:fixed;inset:0;background:#0a1022;z-index:200}
.deck-stage{width:1280px;height:720px;position:absolute;top:calc(50% - 26px);left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#ffffff 0%,#eef4ff 60%,#dbeafe 100%);border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:0 24px 80px rgba(0,0,0,.55)}
.deck-stage::after{content:'';position:absolute;right:-140px;bottom:-140px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(191,219,254,.5),rgba(37,99,235,.12));pointer-events:none}
.dk-slide{padding:50px 64px 40px;height:100%;display:flex;flex-direction:column;animation:slidein .3s ease}
.dk-kick{font-size:15px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--azul2);margin-bottom:10px}
.dk-slide h1{font-size:42px;color:var(--azul);line-height:1.15;margin-bottom:22px;font-weight:800}
.dk-body{flex:1;overflow:auto;font-size:19px;line-height:1.55}
.dk-body .nlm-grid{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.dk-body .nlm-card{font-size:18px;padding:18px 20px;border-radius:16px}
.dk-body .nlm-ico{font-size:26px}
.dk-body table{font-size:17px}
.dk-body strong{background:linear-gradient(180deg,transparent 58%,#fde68a 58%);padding:0 3px;border-radius:3px;color:var(--azul);font-weight:800}
.dk-clave{margin-top:14px;background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;border-radius:12px;padding:14px 20px;font-size:18px;font-weight:600}
.dk-num{position:absolute;right:22px;bottom:16px;font-size:14px;color:#94a3b8;font-weight:700}
.dk-title{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px;animation:slidein .3s ease}
.dk-title .dk-ico{font-size:84px;margin-bottom:14px}
.dk-title h1{font-size:54px;color:var(--azul);margin:10px 0 16px;font-weight:800}
.dk-title p{font-size:20px;color:var(--gris)}
.dk-hint{margin-top:18px;font-size:16px!important;color:var(--azul2)!important;font-weight:700}
.dk-prog{position:absolute;left:0;bottom:0;height:6px;background:linear-gradient(90deg,var(--azul2),#60a5fa);transition:.3s}
.deck-bar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;color:#cbd5e1;font-size:14px;z-index:210}
.dbtn{background:rgba(255,255,255,.14);border:none;color:#fff;font-size:16px;border-radius:9px;padding:8px 16px;cursor:pointer}
.dbtn:hover{background:rgba(255,255,255,.3)}

</style>
</head>
<body>
<header>
  <div style="flex:1">
    <h1>🎓 Aula SRI — Especialista de Asistencia al Ciudadano<span class="sub">Concurso de Méritos y Oposición · Zona 7 · Preparación técnica de cuarto nivel</span></h1>
  </div>
  <div id="countdown"></div>
</header>
<main id="app"></main>
<footer>Uso personal · El progreso se guarda en este dispositivo (localStorage)</footer>
<script>
const CURSOS = [{"id": "codigo-tributario", "titulo": "Código Tributario", "icono": "⚖️", "descripcion": "Estudio de nivel de maestría del Código Tributario ecuatoriano (reforma al 28 de agosto de 2025): obligación tributaria, sujetos, exenciones, extinción, facultades de la administración, procedimientos, coactiva e ilícito tributario.", "tiempoMaxMin": 240, "dia": "Día 1 — martes 14 de julio", "lecciones": [{"id": "l1", "titulo": "Fundamentos y la obligación tributaria", "duracionMin": 45, "slides": [{"titulo": "Ámbito de aplicación y concepto de tributo (Arts. 1-2)", "html": "<p>El Código regula las relaciones jurídicas provenientes de los tributos entre sujetos activos y contribuyentes o responsables.<\/p><ul><li>Se aplica a <strong>todos los tributos<\/strong>: nacionales, provinciales, municipales o locales.<\/li><li><em>Tributo<\/em>: prestación pecuniaria exigida por el Estado por la realización del hecho imponible, para satisfacer necesidades públicas.<\/li><li>Clases: <strong>impuestos, tasas y contribuciones especiales<\/strong>.<\/li><li><strong>Supremacía<\/strong>: las normas tributarias prevalecen sobre toda otra norma de leyes generales (Art. 2).<\/li><li>El Código Tributario tiene categoría de <strong>Ley Orgánica<\/strong> (Ley Reformatoria para la Equidad Tributaria, 2007).<\/li><\/ul>", "clave": "El tributo es prestación pecuniaria exigida por el Estado y se clasifica en impuestos, tasas y contribuciones especiales; el Código prevalece sobre leyes generales."}, {"titulo": "Poder tributario y reserva de ley (Arts. 3-4)", "html": "<p>Sólo por <strong>acto legislativo de órgano competente<\/strong> se pueden establecer, modificar o extinguir tributos.<\/p><ul><li>No se dictarán leyes tributarias con efecto <strong>retroactivo<\/strong> en perjuicio de los contribuyentes.<\/li><li>Las tasas y contribuciones especiales se crean y regulan <em>de acuerdo con la ley<\/em>.<\/li><li>Excepción: el <strong>Presidente de la República<\/strong> puede fijar o modificar las tarifas arancelarias de aduana.<\/li><li>Reserva de ley (Art. 4): objeto imponible, sujetos activo y pasivo, <strong>cuantía o forma de establecerla<\/strong>, exenciones y deducciones, reclamos y recursos.<\/li><\/ul>", "clave": "Solo la ley crea, modifica o extingue tributos y define sus elementos esenciales; el Presidente solo puede fijar tarifas arancelarias de aduana."}, {"titulo": "Principios del régimen tributario (Art. 5)", "html": "<p>Tras la reforma de 2021 (Ley de Desarrollo Económico), el régimen tributario se rige por <strong>9 principios<\/strong>:<\/p><ul><li>Generalidad, <strong>progresividad<\/strong>, eficiencia.<\/li><li><strong>Confianza legítima<\/strong> (incorporado en 2021) y simplicidad administrativa.<\/li><li>Irretroactividad, <strong>equidad<\/strong>, transparencia y <strong>suficiencia recaudatoria<\/strong>.<\/li><li>Se priorizarán los impuestos <strong>directos y progresivos<\/strong>.<\/li><li>Ojo: el Art. 300 de la Constitución tiene su propio listado; el Art. 5 del Código añade confianza legítima.<\/li><\/ul>", "clave": "El Art. 5 enumera nueve principios (incluida la confianza legítima desde 2021) y ordena priorizar impuestos directos y progresivos."}, {"titulo": "Facultad reglamentaria (Arts. 7, 8 y 11.1)", "html": "<p>Solo al <strong>Presidente de la República<\/strong> corresponde dictar los reglamentos para la aplicación de las leyes tributarias.<\/p><ul><li>El Director General del <strong>SRI<\/strong> dicta circulares o disposiciones generales para la aplicación de las leyes y la armonía de su administración.<\/li><li>Ningún reglamento puede <em>modificar o alterar el sentido de la ley<\/em>, crear obligaciones impositivas ni establecer exenciones.<\/li><li>Municipalidades y consejos provinciales ejercen facultad reglamentaria cuando la ley se las concede (Art. 8).<\/li><li>Las resoluciones y circulares administrativas <strong>jamás<\/strong> pueden ampliar o restringir el alcance de la ley (Art. 11.1).<\/li><\/ul>", "clave": "El reglamento es potestad exclusiva del Presidente; el SRI solo emite circulares que nunca pueden alterar el sentido de la ley."}, {"titulo": "Vigencia de la ley y cómputo de plazos (Arts. 11-12)", "html": "<p>Las leyes tributarias rigen desde su publicación en el Registro Oficial, salvo fecha posterior.<\/p><ul><li>Tributos de determinación o liquidación <strong>anual<\/strong>: la norma aplica desde el <strong>primer día del siguiente año calendario<\/strong>.<\/li><li>Tributos de períodos <strong>menores<\/strong>: desde el <strong>primer día del mes siguiente<\/strong>.<\/li><li>Plazos en <strong>años y meses<\/strong>: continuos, fenecen el día equivalente.<\/li><li>Plazos en <strong>días<\/strong>: siempre <strong>días hábiles<\/strong>.<\/li><li>Si el plazo vence en día inhábil, se prorroga al <strong>primer día hábil siguiente<\/strong>.<\/li><\/ul>", "clave": "Las normas de tributos anuales rigen desde el 1 de enero siguiente; los plazos en días son siempre hábiles y los inhábiles prorrogan al hábil siguiente."}, {"titulo": "Interpretación y normas supletorias (Arts. 13-14)", "html": "<ul><li>Las normas tributarias se interpretan con los métodos admitidos en Derecho, atendiendo a sus <strong>fines y significación económica<\/strong>.<\/li><li>Ante disposiciones contradictorias en una misma ley, prima la que más se conforme con los <strong>principios básicos de la tributación<\/strong>.<\/li><li>Las demás ramas del Derecho aplican solo como <strong>normas supletorias<\/strong>.<\/li><li>La <strong>analogía<\/strong> es admisible para colmar vacíos legales, pero <em>no puede crear<\/em> tributos, exenciones ni materias reservadas a la ley.<\/li><\/ul>", "clave": "La analogía es procedente para llenar vacíos, pero nunca para crear tributos ni exenciones (Art. 14)."}, {"titulo": "Obligación tributaria y hecho generador (Arts. 15-17)", "html": "<p><strong>Obligación tributaria<\/strong> (Art. 15): vínculo jurídico <em>personal<\/em> entre el Estado o entidades acreedoras y los contribuyentes o responsables, por el cual debe satisfacerse una prestación en <strong>dinero, especies o servicios apreciables en dinero<\/strong>, al verificarse el hecho generador.<\/p><ul><li><strong>Hecho generador<\/strong> (Art. 16): presupuesto establecido por la ley para configurar cada tributo.<\/li><li>Calificación (Art. 17): si es acto jurídico, se califica por su <strong>verdadera esencia y naturaleza jurídica<\/strong>, no por la forma o denominación elegida.<\/li><li>Si se delimita por conceptos económicos, se atiende a las <strong>relaciones económicas efectivas<\/strong>, con independencia de las formas jurídicas.<\/li><\/ul>", "clave": "La obligación tributaria es un vínculo jurídico personal que nace con el hecho generador, el cual se califica por su esencia real y no por su forma."}, {"titulo": "Nacimiento y exigibilidad (Arts. 18-20)", "html": "<p>La obligación <strong>nace<\/strong> cuando se realiza el presupuesto legal del tributo; es <strong>exigible<\/strong> desde la fecha que la ley señale. A falta de norma expresa:<\/p><ul><li>Liquidación a cargo del <strong>contribuyente<\/strong>: exigible desde el <strong>vencimiento del plazo<\/strong> para presentar la declaración.<\/li><li>Liquidación a cargo de la <strong>administración<\/strong>: exigible desde el <strong>día siguiente al de su notificación<\/strong>.<\/li><li>Las estipulaciones contractuales con terceros <strong>no modifican<\/strong> la obligación tributaria ni su sujeto (Art. 20), aunque el sujeto activo puede exigir a cualquiera de ellos si la ley no prohíbe la traslación.<\/li><\/ul>", "clave": "Nacimiento y exigibilidad no coinciden: si declara el contribuyente, la deuda es exigible al vencer el plazo declarativo; si liquida la administración, desde el día siguiente a la notificación."}, {"titulo": "Intereses a cargo del sujeto pasivo (Art. 21)", "html": "<p>La obligación no satisfecha a tiempo causa interés <strong>sin necesidad de resolución administrativa<\/strong>, desde la exigibilidad hasta la extinción.<\/p><ul><li>Tasa general: <strong>tasa activa referencial para 90 días del Banco Central del Ecuador<\/strong> (interés anual).<\/li><li>Obligaciones establecidas tras el ejercicio de las facultades de la administración (determinación): <strong>1.3 veces<\/strong> dicha tasa.<\/li><li>Se calcula por cada <strong>mes de retraso<\/strong>, con la tasa de cada trimestre, <em>sin liquidaciones diarias<\/em>.<\/li><li>La <strong>fracción de mes se liquida como mes completo<\/strong>.<\/li><li>Ejemplo: mora de 2 meses y 5 días = se cobran <strong>3 meses<\/strong> de interés.<\/li><\/ul>", "clave": "La mora genera interés automático a la tasa activa referencial BCE de 90 días (1.3 veces si la deuda proviene de determinación), y la fracción de mes cuenta como mes completo."}, {"titulo": "Intereses a cargo del sujeto activo (Art. 22)", "html": "<p>Los créditos contra el Estado por pagos <strong>en exceso o indebidos<\/strong> también generan interés a favor del contribuyente.<\/p><ul><li>Tasa (reforma junio 2025, Ley de Integridad Pública): <strong>50% de la tasa activa referencial para 90 días del BCE<\/strong>.<\/li><li>Corre desde la <strong>presentación de la solicitud<\/strong> de devolución o del reclamo, hasta la <strong>notificación<\/strong> del acto administrativo que acepta la petición.<\/li><li>Si el trámite se suspende por una <strong>determinación complementaria<\/strong> (Art. 131), no se computan intereses durante la suspensión.<\/li><li>La devolución con intereses es un <strong>derecho del sujeto pasivo<\/strong> sin necesidad de pedirlos expresamente (Art. 30.1 núm. 13).<\/li><\/ul>", "clave": "Desde 2025 el Estado paga por devoluciones el 50% de la tasa activa referencial BCE, desde la solicitud hasta la notificación de la resolución."}]}, {"id": "l2", "titulo": "Sujetos de la obligación, exenciones y domicilio", "duracionMin": 45, "slides": [{"titulo": "Sujeto activo y sujeto pasivo (Arts. 23-24)", "html": "<ul><li><strong>Sujeto activo<\/strong>: el ente público <em>acreedor<\/em> del tributo.<\/li><li><strong>Sujeto pasivo<\/strong>: persona natural o jurídica obligada al cumplimiento de la prestación tributaria, como <strong>contribuyente o responsable<\/strong>.<\/li><li>También son sujetos pasivos: <strong>herencias yacentes, comunidades de bienes<\/strong> y entidades carentes de personalidad jurídica que constituyan una <em>unidad económica o patrimonio independiente<\/em>, si la ley tributaria lo establece.<\/li><\/ul>", "clave": "Pueden ser sujetos pasivos incluso entes sin personalidad jurídica (herencias yacentes, comunidades de bienes) cuando la ley los grava como unidad económica."}, {"titulo": "Contribuyente vs. responsable (Arts. 25-26)", "html": "<table><tr><th>Contribuyente<\/th><th>Responsable<\/th><\/tr><tr><td>La ley le impone la prestación por verificar el <strong>hecho generador<\/strong><\/td><td><strong>Sin ser contribuyente<\/strong>, debe cumplir las obligaciones por disposición expresa de la ley<\/td><\/tr><tr><td><strong>Nunca pierde<\/strong> su condición aunque traslade la carga a otros<\/td><td>Obligación <strong>solidaria<\/strong> con el contribuyente<\/td><\/tr><tr><td>Soporta la carga tributaria<\/td><td>Puede <strong>repetir lo pagado<\/strong> contra el contribuyente ante la justicia ordinaria (COGEP)<\/td><\/tr><\/table>", "clave": "El responsable no realiza el hecho generador pero responde solidariamente por mandato legal, con derecho de repetición contra el contribuyente."}, {"titulo": "Responsables por representación (Art. 27)", "html": "<p>Son responsables por representación:<\/p><ul><li>Representantes legales de <strong>menores no emancipados<\/strong>; tutores y curadores de incapaces.<\/li><li><strong>Directores, presidentes, gerentes o representantes<\/strong> de personas jurídicas.<\/li><li>Quienes dirijan o administren <strong>entes colectivos sin personalidad jurídica<\/strong>.<\/li><li><strong>Mandatarios<\/strong>, agentes oficiosos o gestores voluntarios.<\/li><li><strong>Síndicos de quiebras<\/strong>, liquidadores, depositarios judiciales y administradores de bienes ajenos.<\/li><\/ul><p>Límite: la responsabilidad alcanza solo al <strong>valor de los bienes administrados<\/strong> y a las rentas producidas durante la gestión. El representante legal solo es solidario si actuó con <strong>dolo o culpa grave<\/strong> (Art. 30.7).<\/p>", "clave": "La responsabilidad por representación se limita al valor de los bienes administrados y sus rentas; el representante legal responde solo por dolo o culpa grave."}, {"titulo": "Responsables como adquirentes o sucesores (Art. 28)", "html": "<ul><li><strong>Adquirentes de bienes raíces<\/strong>: tributos del <strong>año de la transferencia y el año inmediato anterior<\/strong>.<\/li><li><strong>Adquirentes de negocios o empresas<\/strong>: tributos del año de la transferencia <strong>y los dos años anteriores<\/strong>, limitado al valor de esos bienes.<\/li><li>Sociedades que sustituyan a otras (fusión, transformación, absorción): tributos adeudados hasta la fecha del acto.<\/li><li>Sucesores a <strong>título universal<\/strong> (herederos) y a título singular (legatarios, donatarios).<\/li><li>La responsabilidad de los numerales 1 y 2 <strong>cesa en un año<\/strong> desde que se comunicó la transferencia a la administración.<\/li><\/ul>", "clave": "Quien compra un negocio responde por los tributos del año de compra y los dos anteriores; esa responsabilidad cesa al año de comunicada la transferencia."}, {"titulo": "Agentes de retención, percepción y sustitutos (Arts. 29-30)", "html": "<ul><li><strong>Agente de retención<\/strong>: por su actividad o función está en posibilidad de <em>retener<\/em> tributos (también herederos y albacea por el impuesto a los legados).<\/li><li><strong>Agente de percepción<\/strong>: obligado a <em>recaudar<\/em> tributos y entregarlos al sujeto activo.<\/li><li><strong>Sustituto<\/strong>: se coloca <em>en lugar del contribuyente<\/em> cuando la ley lo dispone (agregado en 2014).<\/li><li>Alcance (Art. 30): responsabilidad <strong>directa<\/strong> ante el sujeto activo si efectuó la retención o percepción (único obligado); <strong>solidaria<\/strong> con el contribuyente si no la efectuó total o parcialmente.<\/li><li>Responden ante el contribuyente por valores retenidos contra las normas y no entregados al ente acreedor.<\/li><\/ul>", "clave": "Si el agente retuvo, es el único obligado (responsabilidad directa); si no retuvo, responde solidariamente con el contribuyente."}, {"titulo": "Derechos de los sujetos pasivos (Art. 30.1)", "html": "<p>Catálogo incorporado en 2019; clave para Asistencia al Ciudadano:<\/p><ul><li>Trato con <strong>imparcialidad, respeto y sin discriminación<\/strong>; información correcta y veraz.<\/li><li>Formular <strong>consultas<\/strong> y presentar peticiones, reclamos y denuncias con respuesta oportuna.<\/li><li>Acceder a la información propia y a los expedientes; conocer el estado de los trámites y la <strong>identidad del servidor<\/strong> responsable.<\/li><li><strong>No proporcionar documentos ya presentados<\/strong> que estén en poder de la administración.<\/li><li>Devoluciones de pagos indebidos o en exceso <strong>con intereses sin pedirlos expresamente<\/strong>.<\/li><li>Los funcionarios que impidan estos derechos se sancionan según la <strong>LOSEP<\/strong>.<\/li><\/ul>", "clave": "El Art. 30.1 consagra 15 derechos del sujeto pasivo, incluido no volver a entregar documentos ya presentados y recibir devoluciones con intereses de oficio."}, {"titulo": "Exenciones: concepto y régimen (Arts. 31-34)", "html": "<ul><li><strong>Exención o exoneración<\/strong>: exclusión o dispensa <em>legal<\/em> de la obligación tributaria por razones de orden público, económico o social.<\/li><li>Solo mediante <strong>disposición expresa de ley<\/strong> (Art. 32), especificando requisitos, tributos, si es total o parcial, permanente o temporal.<\/li><li>Alcance (Art. 33): solo comprende tributos <strong>vigentes a la fecha de la ley<\/strong>; no se extiende a tributos futuros, salvo disposición expresa.<\/li><li>Puede ser modificada o derogada por ley posterior, pero la concedida <strong>por plazo determinado subsiste hasta su expiración<\/strong> (Art. 34).<\/li><\/ul>", "clave": "La exención solo existe por ley expresa, no alcanza tributos creados después y, si fue concedida por plazo, subsiste hasta que este expire."}, {"titulo": "Exenciones generales del Art. 35", "html": "<p>Exentos <strong>solo del pago de impuestos<\/strong> (no de tasas ni contribuciones especiales):<\/p><ul><li>El <strong>Estado<\/strong>, municipalidades, consejos provinciales, entidades de derecho público y <strong>empresas públicas<\/strong> (LOEP).<\/li><li>Empresas de <strong>economía mixta<\/strong>, en la parte del aporte público.<\/li><li>Instituciones privadas de <strong>beneficencia o educación<\/strong>, si sus bienes e ingresos se destinan a esos fines.<\/li><li><strong>Naciones Unidas, OEA<\/strong> y organismos internacionales de los que Ecuador forma parte.<\/li><li>Bajo <strong>reciprocidad internacional<\/strong>: Estados extranjeros, empresas multinacionales (parte pública) y agentes diplomáticos y consulares.<\/li><li>Estas exenciones generales <strong>NO aplican al IVA ni al ICE<\/strong>.<\/li><\/ul>", "clave": "Las exenciones generales cubren solo impuestos (nunca tasas ni contribuciones) y expresamente no aplican al IVA ni al ICE."}, {"titulo": "Prohibiciones y privilegio del crédito tributario (Arts. 36, 57-58)", "html": "<ul><li>Prohibido a los beneficiarios de exenciones <strong>tomar a su cargo<\/strong> las obligaciones del sujeto pasivo o <strong>extender<\/strong> el beneficio a no exentos; en actos mixtos, el tributo se causa en proporción a la parte no exenta.<\/li><li>El crédito tributario goza de <strong>privilegio general<\/strong> sobre todos los bienes del deudor, con prelación sobre otros créditos, <em>excepto<\/em>: <strong>pensiones alimenticias<\/strong>, créditos del <strong>IESS<\/strong>, deudas al <strong>trabajador<\/strong> (salarios, utilidades, fondos de reserva, jubilación) y créditos con <strong>prenda o hipoteca inscrita antes<\/strong> de la notificación de la determinación.<\/li><li>Prelación entre sujetos activos (Art. 58): <strong>fisco → consejos provinciales → municipalidades → organismos autónomos<\/strong>.<\/li><\/ul>", "clave": "El crédito tributario es privilegiado salvo frente a alimentos, IESS, trabajadores y garantías reales previas; entre administraciones, el fisco cobra primero."}, {"titulo": "Domicilio tributario (Arts. 59-63)", "html": "<ul><li><strong>Personas naturales<\/strong>: residencia habitual o donde ejerzan actividades económicas, donde estén sus bienes o se produzca el hecho generador.<\/li><li><strong>Extranjeros<\/strong> que perciban remuneración en Ecuador: lugar donde ejerzan funciones; si no puede precisarse, <strong>la capital de la República<\/strong>.<\/li><li><strong>Personas jurídicas<\/strong>: lugar del contrato social o estatutos; en su defecto, donde ejerzan actividades o se produzca el hecho generador.<\/li><li>Puede fijarse <strong>domicilio especial<\/strong>, pero la administración puede aceptarlo o exigir otro.<\/li><li>Domiciliados en el exterior deben instituir <strong>representante y fijar domicilio<\/strong> en el país; si lo omiten, se tiene por tales a quienes ejecuten los actos generadores.<\/li><\/ul>", "clave": "El domicilio tributario es amplio: residencia, lugar de la actividad, de los bienes o del hecho generador; para extranjeros no precisables, la capital de la República."}]}, {"id": "l3", "titulo": "Extinción de la obligación tributaria", "duracionMin": 50, "slides": [{"titulo": "Los seis modos de extinción (Art. 37)", "html": "<p>La obligación tributaria se extingue, en todo o en parte, por:<\/p><ol><li><strong>Solución o pago<\/strong><\/li><li><strong>Compensación<\/strong><\/li><li><strong>Confusión<\/strong><\/li><li><strong>Remisión<\/strong><\/li><li><strong>Prescripción de la acción de cobro<\/strong><\/li><li><strong>Transacción<\/strong> (incorporada por la reforma de noviembre de 2021)<\/li><\/ol><p>Ojo: la <em>novación<\/em> y la <em>condonación por simple resolución<\/em> NO son modos de extinción tributaria; la transacción expresamente <strong>no implica novación<\/strong> (Art. 56.4).<\/p>", "clave": "Desde 2021 existen seis modos de extinción; la transacción es el sexto y la novación no es modo de extinción tributaria."}, {"titulo": "El pago: sujetos, tiempo y lugar (Arts. 38-42)", "html": "<ul><li><strong>Por quién debe hacerse<\/strong>: contribuyentes o responsables.<\/li><li><strong>Por quién puede hacerse<\/strong>: cualquier persona a nombre de estos, con derecho de reembolso (Art. 26).<\/li><li><strong>A quién<\/strong>: al acreedor del tributo o al agente facultado por ley o reglamento.<\/li><li><strong>Cuándo<\/strong>: en el tiempo de la ley o reglamento; a falta de señalamiento, en la fecha de nacimiento de la obligación; o según convenios de pago.<\/li><li><strong>Dónde<\/strong>: donde señale la ley, en las oficinas de recaudación, donde se produjo el hecho generador o donde tenga domicilio el deudor.<\/li><\/ul>", "clave": "Cualquier persona puede pagar a nombre del deudor con derecho de reembolso; el pago se hace al acreedor o su agente facultado."}, {"titulo": "Cómo se paga e imputación (Arts. 43, 47-49)", "html": "<ul><li>Formas: efectivo, cheques, débitos bancarios, libranzas, giros, <strong>notas de crédito<\/strong> del mismo sujeto activo y dación en pago de bonos o títulos valor.<\/li><li>El <strong>cheque no certificado<\/strong> extingue la obligación <em>solo al hacerse efectivo<\/em>.<\/li><li><strong>Imputación del pago parcial<\/strong> (Art. 47): primero <strong>intereses<\/strong>, luego <strong>tributo<\/strong>, por último <strong>multas<\/strong>.<\/li><li>Varias obligaciones de un mismo tributo: se imputa a la <strong>más antigua no prescrita<\/strong>; con tributos distintos, al que <em>elija el deudor<\/em> (Art. 48).<\/li><li>Aceptación parcial (Art. 49): puede pagarse la parte no objetada y reclamar la otra; los agentes <strong>no pueden negarse<\/strong> a recibir esos pagos.<\/li><\/ul>", "clave": "El orden legal de imputación es intereses, tributo y multas, aplicado a la obligación más antigua no prescrita."}, {"titulo": "Facilidades para el pago (Arts. 46, 152-156)", "html": "<ul><li>Se conceden por <strong>resolución motivada<\/strong> previa solicitud; también para <strong>multas<\/strong>.<\/li><li>Plazo: hasta <strong>24 meses<\/strong> en dividendos periódicos; primera cuota igual al <strong>20% de la obligación<\/strong> (Art. 153).<\/li><li>Cabe una <strong>segunda facilidad por una sola vez<\/strong> con garantía suficiente.<\/li><li>Concedida la facilidad, se <strong>suspende el procedimiento de ejecución<\/strong> (Art. 154).<\/li><li>Mora en una cuota: <strong>20 días<\/strong> para pagarla (ampliables 20 más) o termina la concesión y se ejecutan garantías (Art. 156).<\/li><li>Negativa: acción contenciosa consignando el <strong>20% del saldo<\/strong> más garantía (Art. 155).<\/li><li>No proceden sobre tributos <strong>percibidos y retenidos<\/strong> por agentes ni pagos anticipados.<\/li><\/ul>", "clave": "Las facilidades llegan hasta 24 meses con cuota inicial del 20% y suspenden la coactiva, pero nunca proceden sobre valores retenidos o percibidos."}, {"titulo": "Remisión del 75% post-determinación y consignación (Arts. 49.1, 50)", "html": "<ul><li>Art. 49.1 (agregado en 2023): remisión del <strong>75% de intereses y multas<\/strong>, sin recargos, si el sujeto pasivo paga la <strong>totalidad<\/strong> de la obligación determinada dentro de los <strong>7 días<\/strong> siguientes a la notificación del acto determinativo.<\/li><li><strong>Pago por consignación<\/strong> (Art. 50): procede cuando el sujeto activo o sus agentes se <em>niegan a recibir<\/em> el pago total o parcial.<\/li><li>El depósito se hace en la cuenta que señale el Consejo de la Judicatura y se demanda ante el <strong>Tribunal Contencioso Tributario<\/strong> (Art. 290).<\/li><li>Sobre lo pagado por consignación <strong>no corren intereses<\/strong> desde la presentación de la demanda (Art. 297).<\/li><\/ul>", "clave": "Pagar el 100% del capital dentro de 7 días de notificada la determinación otorga remisión del 75% de intereses y multas."}, {"titulo": "Compensación (Arts. 51-52)", "html": "<ul><li>De <strong>oficio o a petición de parte<\/strong>, con créditos líquidos por tributos pagados <strong>en exceso o indebidamente<\/strong>, reconocidos por autoridad administrativa o el tribunal.<\/li><li>Requisitos: créditos <strong>no prescritos<\/strong> y tributos administrados por el <strong>mismo organismo<\/strong>.<\/li><li>También con <strong>créditos no tributarios<\/strong> reconocidos en acto administrativo firme o sentencia ejecutoriada contra el mismo sujeto activo.<\/li><li>Prohibido compensar: con créditos por tributos <strong>recaudados por agentes de retención o percepción<\/strong>, y deudas al Estado con <strong>títulos de deuda pública externa<\/strong>.<\/li><\/ul>", "clave": "La compensación exige créditos líquidos, no prescritos y del mismo organismo administrador; nunca con valores en poder de agentes de retención."}, {"titulo": "Confusión y remisión (Arts. 53-54)", "html": "<ul><li><strong>Confusión<\/strong>: el <em>acreedor<\/em> del tributo se convierte en <em>deudor<\/em> de la misma obligación por transmisión o transferencia de los bienes o derechos que originan el tributo (ej.: municipio hereda o expropia el inmueble que debía impuesto predial).<\/li><li><strong>Remisión<\/strong>: las deudas tributarias (capital) solo se condonan <strong>en virtud de ley<\/strong>, en la cuantía y con los requisitos que esta determine.<\/li><li>Los <strong>intereses y multas<\/strong> pueden condonarse por <strong>resolución de la máxima autoridad tributaria<\/strong>, en la cuantía y con los requisitos que la ley establezca.<\/li><\/ul>", "clave": "El capital del tributo solo se remite por ley; intereses y multas pueden condonarse por resolución de la máxima autoridad si la ley lo autoriza."}, {"titulo": "Prescripción de la acción de cobro (Art. 55)", "html": "<ul><li>Plazo único (reforma 2021): <strong>5 años<\/strong> para la obligación, la acción de cobro, intereses y multas por deberes formales.<\/li><li>Cómputo: desde que fueron <strong>exigibles<\/strong>; o desde que <strong>debió presentarse la declaración<\/strong> si fue incompleta o no se presentó.<\/li><li>Con facilidades de pago: corre <strong>por cada cuota<\/strong> desde su vencimiento.<\/li><li>Si hubo determinación: desde que el acto quedó <strong>firme<\/strong> o desde la ejecutoria de la resolución o sentencia que puso fin a la impugnación.<\/li><li>Debe ser <strong>alegada expresamente<\/strong> por quien pretende beneficiarse: el juez o autoridad <strong>no puede declararla de oficio<\/strong>.<\/li><\/ul>", "clave": "La acción de cobro prescribe en 5 años y la prescripción jamás se declara de oficio: debe alegarla el interesado."}, {"titulo": "Interrupción de la prescripción y deudas de recuperación onerosa (Art. 56 y s/n)", "html": "<ul><li>La prescripción se interrumpe por: <strong>reconocimiento expreso o tácito<\/strong> de la obligación por el deudor, o por la <strong>citación legal del auto de pago<\/strong>.<\/li><li>La citación del auto de pago <strong>no interrumpe<\/strong> si la ejecución se abandonó por <strong>más de 2 años<\/strong> (salvo afianzamiento de obligaciones discutidas).<\/li><li><strong>Obligaciones de recuperación onerosa<\/strong>: pueden extinguirse masivamente las deudas de hasta <strong>1 salario básico unificado (SBU)<\/strong> cuando ya se cumplieron los plazos de prescripción.<\/li><\/ul>", "clave": "Interrumpen la prescripción el reconocimiento del deudor y la citación del auto de pago, pero esta pierde efecto si la coactiva se abandona más de dos años."}, {"titulo": "Transacción y mediación tributaria (Arts. 56.1-56.16)", "html": "<ul><li>Puede versar sobre determinación, recaudación, <strong>intereses, recargos y multas<\/strong>, plazos y facilidades, y medidas cautelares; <em>no<\/em> sobre el alcance general de conceptos jurídicos indeterminados ni anulación de normas generales.<\/li><li>Transige la <strong>máxima autoridad<\/strong> del ente acreedor con sujetos pasivos que hayan <strong>declarado y realizado algún pago<\/strong>.<\/li><li><strong>Extraprocesal<\/strong>: mediante <strong>acta de mediación<\/strong> con mediador calificado; la primera solicitud <strong>suspende los plazos de caducidad<\/strong> hasta el acuerdo o acta de imposibilidad.<\/li><li>Con pago inmediato del <strong>100% del capital<\/strong> puede acordarse la <strong>remisión total de intereses<\/strong>.<\/li><li><strong>Intraprocesal<\/strong>: en la audiencia preliminar o única del proceso judicial.<\/li><li>El acta transaccional es <strong>definitiva, vinculante e inimpugnable<\/strong> y constituye título de crédito suficiente si se incumple.<\/li><\/ul>", "clave": "La transacción (por mediación o en juicio) permite hasta la remisión total de intereses si se paga el 100% del capital, y el acta resultante es inimpugnable."}]}, {"id": "l4", "titulo": "Administración tributaria: facultades, determinación, caducidad y deberes", "duracionMin": 50, "slides": [{"titulo": "Órganos de la administración tributaria (Arts. 64-66)", "html": "<table><tr><th>Tipo<\/th><th>Dirección<\/th><th>Ejemplo<\/th><\/tr><tr><td><strong>Central<\/strong><\/td><td>Presidente de la República, a través de los organismos que la ley establezca<\/td><td>SRI; en aduanas, la ley de la materia<\/td><\/tr><tr><td><strong>Seccional<\/strong><\/td><td><strong>Prefecto provincial o alcalde<\/strong><\/td><td>Direcciones financieras municipales<\/td><\/tr><tr><td><strong>De excepción<\/strong><\/td><td>La propia entidad pública acreedora cuando la ley le concede expresamente la gestión<\/td><td>Entidades con tributos propios<\/td><\/tr><\/table><p>La gestión comprende dos funciones separadas: <strong>determinación y recaudación<\/strong>, y <strong>resolución de reclamaciones<\/strong> (Art. 72); actúa con <strong>simplificación, celeridad y eficacia<\/strong> (Art. 73).<\/p>", "clave": "Hay tres administraciones tributarias: central (Presidente/SRI), seccional (prefecto o alcalde) y de excepción (entidad acreedora por ley expresa)."}, {"titulo": "Las facultades de la administración (Arts. 67-71)", "html": "<p>El Art. 67 (reformado en 2021) enumera <strong>seis<\/strong> facultades:<\/p><ol><li>De <strong>aplicación de la ley<\/strong><\/li><li><strong>Determinadora<\/strong> de la obligación tributaria<\/li><li><strong>Resolutiva<\/strong> (reclamos y recursos)<\/li><li><strong>Sancionadora<\/strong> (infracciones)<\/li><li>De <strong>transacción<\/strong> (agregada en 2021)<\/li><li><strong>Recaudadora<\/strong><\/li><\/ol><p>La facultad determinadora (Art. 68) establece en cada caso: <strong>hecho generador, sujeto obligado, base imponible y cuantía<\/strong>; comprende verificar, complementar o enmendar declaraciones.<\/p>", "clave": "Desde 2021 son seis facultades: aplicación de la ley, determinadora, resolutiva, sancionadora, transacción y recaudadora."}, {"titulo": "Actos administrativos: validez y firmeza (Arts. 81-84)", "html": "<ul><li>Todos los actos se expiden <strong>por escrito y motivados<\/strong>: normas o principios jurídicos aplicados y pertinencia a los hechos.<\/li><li>Gozan de presunciones de <strong>legitimidad y ejecutoriedad<\/strong>; son ejecutivos desde que están firmes o ejecutoriados (Art. 82).<\/li><li><strong>Acto firme<\/strong>: aquel contra el cual <em>no se presentó reclamo<\/em> en el plazo legal (Art. 83).<\/li><li><strong>Acto ejecutoriado<\/strong>: resolución dictada en un reclamo respecto de la cual no se prevé o no se interpuso <em>recurso ulterior<\/em> en vía administrativa (Art. 84).<\/li><li>Sin notificación, el acto <strong>no es eficaz<\/strong> respecto del interesado (Art. 85).<\/li><\/ul>", "clave": "Firme es el acto no reclamado a tiempo; ejecutoriada es la resolución de un reclamo sin recurso ulterior; sin notificación el acto es ineficaz."}, {"titulo": "La determinación y sus sistemas (Arts. 87-89)", "html": "<ul><li><strong>Determinación<\/strong>: acto o conjunto de actos para declarar la existencia del hecho generador, la base imponible y la cuantía.<\/li><li>Sistemas (Art. 88): por <strong>declaración del sujeto pasivo<\/strong>, por <strong>actuación de la administración<\/strong>, o <strong>mixto<\/strong>.<\/li><li>La declaración del sujeto pasivo es <strong>definitiva y vinculante<\/strong>.<\/li><li>Puede rectificar <strong>errores de hecho o de cálculo dentro del año siguiente<\/strong> a la presentación, siempre que la administración no haya establecido y notificado antes el error.<\/li><li>Inmuebles: se atiende al <strong>valor comercial catastral<\/strong> a la fecha del hecho generador.<\/li><\/ul>", "clave": "La declaración es definitiva y vinculante, pero admite rectificación de errores de hecho o cálculo dentro del año siguiente si el SRI no los notificó antes."}, {"titulo": "Determinación por el sujeto activo: recargo y formas (Arts. 90-93)", "html": "<ul><li>La obligación determinada por el sujeto activo causa un <strong>recargo del 20% sobre el principal<\/strong>, calculado tras imputar los pagos previos; es <strong>transigible en mediación<\/strong>.<\/li><li><strong>Directa<\/strong> (Art. 91): con la declaración, contabilidad, registros, bases de datos y cruces de información, incluso documentos de terceros.<\/li><li><strong>Presuntiva<\/strong> (Art. 92): cuando no es posible la directa por falta de declaración o documentos no aceptables; se funda en <em>hechos, indicios y circunstancias<\/em> o coeficientes legales.<\/li><li><strong>Mixta<\/strong> (Art. 93): con datos requeridos a los contribuyentes, quienes quedan <strong>vinculados<\/strong> por ellos.<\/li><\/ul>", "clave": "La determinación por el sujeto activo genera recargo del 20% y puede ser directa, presuntiva (subsidiaria) o mixta."}, {"titulo": "Caducidad de la facultad determinadora (Art. 94)", "html": "<p>Caduca <strong>sin necesidad de pronunciamiento previo<\/strong>:<\/p><table><tr><th>Supuesto<\/th><th>Plazo<\/th><th>Cómputo<\/th><\/tr><tr><td>Declaración presentada<\/td><td><strong>4 años<\/strong><\/td><td>Desde la presentación de la declaración<\/td><\/tr><tr><td>Declaración NO presentada<\/td><td><strong>6 años<\/strong><\/td><td>Desde la fecha en que debió presentarse<\/td><\/tr><tr><td>Verificar determinación del sujeto activo o mixta<\/td><td><strong>1 año<\/strong><\/td><td>Desde la notificación de tales actos<\/td><\/tr><\/table><p>El funcionario que por omisión impida la recaudación responde <strong>pecuniariamente<\/strong> en proporción a los tributos no percibidos.<\/p>", "clave": "La facultad determinadora caduca en 4 años con declaración, 6 años sin ella y 1 año para verificar determinaciones anteriores."}, {"titulo": "Interrupción de la caducidad (Art. 95)", "html": "<ul><li>Se interrumpe con la <strong>notificación legal de la orden de determinación<\/strong>.<\/li><li>La orden <strong>no produce efecto<\/strong> si la fiscalización no inicia dentro de <strong>20 días hábiles<\/strong> desde la notificación, o si iniciada se suspende por <strong>más de 15 días consecutivos<\/strong>.<\/li><li>Si al notificar la orden falta <strong>menos de 1 año<\/strong> para la caducidad: la interrupción no puede extenderse <strong>más de 1 año<\/strong>; si en ese año no se notifica el acto de determinación, caduca la facultad.<\/li><li>Si falta <strong>más de 1 año<\/strong>: el acto determinativo debe notificarse dentro de los plazos ordinarios del Art. 94.<\/li><li>Precedente 2025: igual regla para la <strong>determinación complementaria<\/strong> (1 año desde la notificación de la determinación original).<\/li><\/ul>", "clave": "La orden de determinación interrumpe la caducidad solo si la fiscalización empieza en 20 días hábiles y no se suspende más de 15 días; la extensión máxima es de un año."}, {"titulo": "Prescripción vs. caducidad: cuadro comparativo", "html": "<table><tr><th>Criterio<\/th><th>Caducidad (Art. 94)<\/th><th>Prescripción (Art. 55)<\/th><\/tr><tr><td>Qué extingue<\/td><td>La <strong>facultad determinadora<\/strong> de la administración<\/td><td>La obligación y la <strong>acción de cobro<\/strong><\/td><\/tr><tr><td>Plazos<\/td><td><strong>4 / 6 / 1 años<\/strong><\/td><td><strong>5 años<\/strong><\/td><\/tr><tr><td>Declaración<\/td><td>Opera <strong>de pleno derecho<\/strong>, sin pronunciamiento previo<\/td><td>Debe ser <strong>alegada<\/strong>; nunca de oficio<\/td><\/tr><tr><td>Se detiene por<\/td><td>Interrupción: notificación de la <strong>orden de determinación<\/strong><\/td><td>Interrupción: <strong>reconocimiento<\/strong> del deudor o <strong>citación del auto de pago<\/strong><\/td><\/tr><\/table>", "clave": "La caducidad mata la facultad de determinar y opera de pleno derecho; la prescripción mata la acción de cobro y debe ser alegada por el deudor."}, {"titulo": "Deberes formales del contribuyente y de terceros (Arts. 96-98)", "html": "<ul><li><strong>Inscribirse<\/strong> en los registros y comunicar cambios; solicitar <strong>permisos previos<\/strong>.<\/li><li>Llevar libros y registros contables <strong>en castellano y en moneda de curso legal<\/strong>, y conservarlos <em>mientras la obligación no esté prescrita<\/em>.<\/li><li><strong>Presentar declaraciones<\/strong> y cumplir deberes específicos de cada ley.<\/li><li><strong>Facilitar<\/strong> inspecciones, <strong>exhibir<\/strong> declaraciones, libros y documentos, y <strong>concurrir<\/strong> a las oficinas cuando sea requerido.<\/li><li>El incumplimiento acarrea <strong>responsabilidad pecuniaria<\/strong> (Art. 97).<\/li><li>Terceros deben comparecer como testigos e informar (Art. 98), <em>excepto<\/em>: ministros del culto, profesionales con <strong>secreto profesional<\/strong>, cónyuge o conviviente y parientes hasta <strong>4.º grado de consanguinidad y 2.º de afinidad<\/strong>.<\/li><\/ul>", "clave": "Los deberes formales incluyen inscribirse, declarar, llevar contabilidad en castellano y facilitar el control; ciertos terceros están eximidos de informar."}, {"titulo": "Deberes de la administración e información reservada (Arts. 99, 103)", "html": "<ul><li>Deberes sustanciales: ejercer potestades con arreglo al Código, <strong>motivar<\/strong> los actos, <strong>recibir toda petición o reclamo<\/strong>, expedir resolución en el tiempo debido, <strong>notificar<\/strong>, revisar de oficio sus actos y cumplir sus decisiones.<\/li><li>Los funcionarios son responsables <strong>personal y pecuniariamente<\/strong> por perjuicios dolosos al Estado o a los contribuyentes.<\/li><li>La inobservancia de leyes e instrucciones se sanciona con multa de <strong>30 a 1.500 USD<\/strong>; reincidencia: <strong>destitución<\/strong>.<\/li><li>La información de los contribuyentes es <strong>reservada<\/strong> (Art. 99), pero se difunden anualmente los nombres y valores <strong>pagados o no<\/strong> por obligaciones tributarias.<\/li><\/ul>", "clave": "La administración debe recibir todo reclamo, motivar y notificar; sus funcionarios responden con multas de 30 a 1.500 USD y destitución por reincidencia."}, {"titulo": "Notificaciones (Arts. 105-114.1)", "html": "<ul><li><strong>Formas<\/strong> (Art. 107): en persona; por boleta; correo certificado o mensajería; <strong>prensa o Gaceta Tributaria Digital<\/strong>; oficio; casilla judicial; correspondencia postal; constancia administrativa; en el establecimiento del deudor (personas jurídicas); medio electrónico.<\/li><li><strong>Notificación tácita<\/strong>: cuando el interesado realiza cualquier gestión escrita que demuestre inequívocamente su conocimiento.<\/li><li><strong>Por la prensa<\/strong>: 3 publicaciones en días distintos; surte efecto desde el <strong>día hábil siguiente a la última<\/strong>.<\/li><li>Horario: dentro de las <strong>24 horas<\/strong> de cada día; si se recibe en día u hora inhábil, surte efecto el <strong>primer día hábil siguiente<\/strong>.<\/li><li><strong>Electrónica<\/strong> (Art. 114.1): al buzón electrónico y correos señalados; mismos efectos que las demás.<\/li><li>Los plazos se cuentan desde el <strong>día hábil siguiente<\/strong> a la notificación (Art. 86).<\/li><\/ul>", "clave": "Sin notificación no hay eficacia: existen diez formas, la de prensa exige tres publicaciones y surte efecto el día hábil siguiente a la última."}]}, {"id": "l5", "titulo": "Reclamos, consultas, recursos, coactiva e ilícito tributario", "duracionMin": 50, "slides": [{"titulo": "El reclamo administrativo (Arts. 115-121)", "html": "<ul><li>Legitimados: contribuyentes, responsables o <strong>terceros afectados<\/strong> por un acto determinativo, verificación, estimación de oficio o liquidación.<\/li><li>Plazo: <strong>20 días<\/strong> desde el día hábil siguiente a la notificación, ante la autoridad de la que emanó el acto.<\/li><li>Legitimar personería: término no menor a <strong>8 días<\/strong> (representado en Ecuador) o <strong>30 días<\/strong> (en el exterior).<\/li><li>Tres o más reclamantes: <strong>procurador común<\/strong> obligatorio (Art. 117).<\/li><li>Contenido (Art. 119): autoridad, identificación y RUC o cédula, domicilio, acto impugnado con fundamentos de hecho y derecho, <strong>petición concreta<\/strong> y firmas (incluido abogado).<\/li><li>Reclamo oscuro o incompleto: <strong>10 días<\/strong> para aclararlo, o se tiene por no presentado (Art. 120).<\/li><\/ul>", "clave": "El reclamo se presenta en 20 días desde la notificación ante la misma autoridad emisora, con los seis requisitos del Art. 119."}, {"titulo": "Sustanciación y prueba del reclamo (Arts. 124-131)", "html": "<ul><li>Impulso <strong>de oficio<\/strong>; solo los reclamantes o sus abogados acceden al expediente.<\/li><li>Informes de otras instituciones: <strong>5 días<\/strong> (Art. 126).<\/li><li>Pruebas: todas las legales <em>excepto la confesión de funcionarios públicos<\/em>; la testimonial solo si no puede acreditarse de otro modo (Art. 128).<\/li><li>Plazo probatorio: el necesario, <strong>nunca mayor a 30 días<\/strong> (Art. 129).<\/li><li><strong>Audiencia<\/strong> facultativa hasta <strong>20 días antes<\/strong> de vencer el plazo para resolver (Art. 130).<\/li><li><strong>Determinación complementaria<\/strong> (Art. 131): si aparecen hechos no considerados, se suspende el trámite y el plazo para resolver; el acto complementario se impugna judicialmente <em>junto con<\/em> la resolución del reclamo.<\/li><\/ul>", "clave": "En el reclamo se admite toda prueba salvo la confesión de funcionarios, con término probatorio máximo de 30 días."}, {"titulo": "Resolución y silencio administrativo positivo (Arts. 104, 132-134)", "html": "<ul><li>Plazo general para resolver: <strong>120 días hábiles<\/strong> desde el día hábil siguiente a la presentación del reclamo o de su aclaración.<\/li><li>Excepciones: corre desde la recepción de informes solicitados por el reclamante, o desde el vencimiento de los plazos de prueba o determinación complementaria; reclamaciones <strong>aduaneras: 30 días hábiles<\/strong>.<\/li><li>La falta de resolución en el plazo = <strong>aceptación tácita<\/strong> del reclamo (silencio administrativo positivo, Art. 104).<\/li><li>El silencio no exime del deber de dictar <strong>resolución expresa<\/strong>: si esta es totalmente negativa después del plazo, <strong>no surte efecto alguno<\/strong> (Art. 134).<\/li><\/ul>", "clave": "El reclamo debe resolverse en 120 días hábiles; vencido el plazo opera el silencio administrativo positivo como aceptación tácita."}, {"titulo": "Pago indebido y pago en exceso (Arts. 122-123, 305-308)", "html": "<table><tr><th>Pago indebido (Art. 122)<\/th><th>Pago en exceso (Art. 123)<\/th><\/tr><tr><td>Tributo <strong>no establecido legalmente<\/strong>, con exención, sin hecho generador, o exigido ilegalmente o fuera de la medida legal<\/td><td>Pago <strong>en demasía<\/strong> sobre el valor que correspondía aplicando la tarifa a la base imponible<\/td><\/tr><\/table><ul><li>La acción prescribe en <strong>3 años desde la fecha del pago<\/strong>; se interrumpe con el reclamo o la demanda (Art. 305).<\/li><li>Pago en exceso: si no se devuelve en <strong>6 meses<\/strong> de la solicitud, cabe reclamo formal como pago indebido.<\/li><li>Aceptada la devolución: <strong>nota de crédito<\/strong>, cheque o compensación; reembolso en máximo <strong>60 días<\/strong> desde la ejecutoria (Art. 308); las notas de crédito son <strong>libremente transferibles por endoso<\/strong>.<\/li><\/ul>", "clave": "Pago indebido es el que nunca se debió (tributo ilegal o inexistente); pago en exceso es el que superó la medida legal; ambos prescriben en 3 años desde el pago."}, {"titulo": "Las consultas tributarias (Arts. 135-138)", "html": "<ul><li>Sujetos pasivos con <strong>interés propio y directo<\/strong>: la absolución es <strong>vinculante para la administración<\/strong>.<\/li><li>Federaciones, gremios, cámaras y entidades públicas (sobre el sentido de la ley): absolución de carácter <strong>meramente informativo<\/strong>.<\/li><li>Plazo de absolución: <strong>30 días<\/strong>; se publican en extracto en el Registro Oficial.<\/li><li>Presentar la consulta <strong>no exime<\/strong> de deberes formales ni del pago.<\/li><li>Si los datos fueron exactos, obliga a la administración <strong>desde la notificación<\/strong>; no cabe reclamo, recurso ni acción judicial contra la absolución.<\/li><li>Revocatoria (Art. 30.5): el nuevo criterio solo aplica a actos y hechos <strong>posteriores<\/strong> a la revocatoria.<\/li><\/ul>", "clave": "La consulta del interesado directo es vinculante y se absuelve en 30 días; la de gremios es solo informativa y contra la absolución no cabe recurso."}, {"titulo": "Recurso de revisión (Arts. 140, 143-148)", "html": "<ul><li>Único recurso en vía administrativa (Art. 140): <strong>revisión ante la máxima autoridad<\/strong> (Director General del SRI, prefectos, alcaldes); es potestad <strong>facultativa y extraordinaria<\/strong>, de oficio o por insinuación fundamentada.<\/li><li>Procede contra actos <strong>firmes o resoluciones ejecutoriadas<\/strong> con errores de hecho o de derecho: <em>evidente error<\/em>, documentos trascendentales posteriores, documentos nulos o falsos, testigos condenados por falso testimonio, delito de funcionarios.<\/li><li><strong>Improcedencia<\/strong> (Art. 145): asunto ya resuelto por el tribunal; más de <strong>3 años<\/strong> del acto (causales 1-4); más de <strong>30 días<\/strong> desde la sentencia penal ejecutoriada y máximo <strong>5 años<\/strong> del acto (causales 5-6); insinuación no fundamentada; asunto resuelto por la máxima autoridad.<\/li><li>Sumario de <strong>5 a 20 días<\/strong>; la resolución confirmará, invalidará, modificará o sustituirá el acto; no cabe otro recurso administrativo, sí <strong>acción contenciosa<\/strong>.<\/li><\/ul>", "clave": "La revisión es potestad extraordinaria de la máxima autoridad sobre actos firmes con error de hecho o derecho, improcedente pasados 3 años del acto."}, {"titulo": "Queja y rectificación de errores (Arts. 141-142, 146, 216, 302-304)", "html": "<ul><li><strong>Queja ante el superior jerárquico<\/strong>: por falta de atención en los plazos legales; traslado por 3 días y resolución en 5 días; sanción al funcionario negligente de <strong>40 a 400 USD<\/strong>, con destitución por reincidencia.<\/li><li>La queja <strong>no suspende<\/strong> la competencia del funcionario ni la tramitación (Art. 142).<\/li><li><strong>Queja ante el Tribunal<\/strong> (Art. 216): si el ejecutor no recibe excepciones o no suspende la ejecución; multa de <strong>20 a 400 USD<\/strong>.<\/li><li>Queja <strong>infundada<\/strong>: multa de 40 a 400 USD (Art. 304).<\/li><li><strong>Rectificación de errores aritméticos o de cálculo<\/strong> (Art. 146): en cualquier tiempo <em>dentro de los plazos de prescripción<\/em>.<\/li><\/ul>", "clave": "La queja sanciona la demora del funcionario (40-400 USD) sin suspender el trámite; los errores de cálculo se rectifican dentro del plazo de prescripción."}, {"titulo": "Título de crédito y auto de pago (Arts. 149-151, 157, 160-161)", "html": "<ul><li>Los títulos de crédito se emiten sobre actos o resoluciones <strong>firmes o ejecutoriados<\/strong> o sentencias; la falta de un requisito del Art. 150 causa su <strong>nulidad<\/strong>, excepto la fecha desde la cual corren intereses (num. 6).<\/li><li>Notificado el título, el deudor tiene <strong>8 días para el pago<\/strong>; puede formular <strong>observaciones respecto del título o del derecho para su emisión<\/strong>: el reclamo <em>suspende la coactiva<\/em> hasta su resolución (Art. 151).<\/li><li>Vencido el plazo sin pago ni facilidades, se dicta el <strong>auto de pago<\/strong>: pagar o dimitir bienes en <strong>20 días<\/strong> desde la citación.<\/li><li>Para la coactiva son hábiles <strong>todos los días excepto feriados<\/strong>; toda orden de cobro lleva implícita la facultad coactiva (Art. 160).<\/li><\/ul>", "clave": "El título de crédito da 8 días para pagar u observar (lo que suspende la coactiva); el auto de pago exige pagar o dimitir bienes en 20 días."}, {"titulo": "Medidas precautelatorias, solemnidades y embargo (Arts. 164-167)", "html": "<ul><li>El ejecutor puede ordenar sin trámite previo: <strong>secuestro, retención y prohibición de enajenar<\/strong> (el arraigo fue declarado <strong>inconstitucional<\/strong> en 2022).<\/li><li>Cesan o se reemplazan <strong>garantizando la totalidad del saldo<\/strong>; si se declaran ilegales, el ejecutor responde por daños.<\/li><li>Solemnidades sustanciales (Art. 165): legal intervención del ejecutor, legitimidad de personería, obligación de <strong>plazo vencido<\/strong>, orden de cobro y <strong>citación legal del auto de pago<\/strong>.<\/li><li>Orden de preferencia del embargo (Art. 166): <strong>dinero<\/strong>, metales preciosos, títulos y valores, joyas, frutos o rentas, bienes en prenda o hipoteca, créditos, y al final <strong>bienes raíces y empresas<\/strong>.<\/li><li>No embargables: muebles de uso indispensable, instrumentos de la profesión y maquinaria cuyo embargo parcial paralice la actividad (Art. 167).<\/li><\/ul>", "clave": "La coactiva exige cinco solemnidades sustanciales y el embargo sigue un orden que empieza por el dinero; el arraigo ya no es medida válida."}, {"titulo": "Remate y sus reglas clave (Arts. 185-207)", "html": "<ul><li>Base de posturas: <strong>75% del avalúo<\/strong> en el primer señalamiento y <strong>50%<\/strong> en el segundo (Art. 185).<\/li><li>Las posturas deben acompañar al menos el <strong>10% del valor de la oferta<\/strong>; plazos de pago máximo <strong>5 años<\/strong> (Art. 188).<\/li><li>Subasta de muebles: consignar al menos el <strong>20% de la base<\/strong> (Art. 197).<\/li><li>Prohibidos de intervenir: quienes participaron en la ejecución, funcionarios de la administración, sus cónyuges y parientes hasta <strong>4.º grado de consanguinidad y 2.º de afinidad<\/strong> (Art. 206).<\/li><li><strong>Nulidad del remate<\/strong> (Art. 207): falta de avisos, día u hora distintos, procedimiento nulo o rematista prohibido; esta última se demanda como acción directa dentro de <strong>6 meses<\/strong>.<\/li><li>El deudor puede <strong>librar sus bienes<\/strong> pagando deuda, intereses y costas antes de cerrarse el remate (Art. 205).<\/li><\/ul>", "clave": "El remate parte del 75% del avalúo (50% en segundo señalamiento), exige consignar el 10% de la oferta y es nulo si interviene persona prohibida."}, {"titulo": "Excepciones a la coactiva (Arts. 212-214)", "html": "<p>Solo caben <strong>10 excepciones<\/strong>, entre ellas:<\/p><ul><li><strong>Incompetencia<\/strong> del funcionario ejecutor e <strong>ilegitimidad de personería<\/strong> del coactivado.<\/li><li><strong>Inexistencia de la obligación<\/strong> por falta de ley o por exención legal.<\/li><li>No ser <strong>deudor directo ni responsable<\/strong>.<\/li><li><strong>Extinción total o parcial<\/strong> por los modos del Art. 37.<\/li><li>Reclamo o recurso <strong>pendiente de resolución<\/strong>; facilidades de pago en trámite o al día.<\/li><li>Demanda contenciosa <strong>presentada<\/strong> contra la resolución antecedente.<\/li><li><strong>Duplicación de títulos<\/strong> o nulidad del auto de pago o del procedimiento.<\/li><\/ul><p>Se presentan ante el ejecutor dentro de <strong>20 días<\/strong> desde la notificación del auto de pago; el ejecutor remite al tribunal en <strong>5 días<\/strong> (Art. 279).<\/p>", "clave": "Contra la coactiva solo caben las diez excepciones taxativas del Art. 212, presentadas en 20 días desde la notificación del auto de pago."}, {"titulo": "Ilícito tributario: infracciones y sanciones (Arts. 314-364)", "html": "<ul><li>Desde 2014 los <strong>delitos<\/strong> (defraudación) pasaron al <strong>COIP<\/strong>; el Código conserva <strong>contravenciones<\/strong> (violación de normas adjetivas o incumplimiento de deberes formales) y <strong>faltas reglamentarias<\/strong> (violación de reglamentos o normas secundarias) — Art. 315.<\/li><li>Para sancionarlas <strong>basta la transgresión de la norma<\/strong> (responsabilidad objetiva, Art. 316); las normas punitivas solo rigen para el futuro, salvo las <strong>más benignas<\/strong> (Art. 311).<\/li><li>Multas: contravenciones <strong>30 a 1.500 USD<\/strong>; faltas reglamentarias <strong>30 a 1.000 USD<\/strong>; el pago de la multa <strong>no exime<\/strong> del deber incumplido.<\/li><li>Otras penas (Art. 323): <strong>clausura<\/strong> (máximo <strong>3 meses<\/strong>), suspensión de actividades, incautación definitiva, suspensión o cancelación de inscripciones y patentes, suspensión (máx. <strong>30 días<\/strong>) o destitución de cargos públicos.<\/li><li>Prescripción: la <strong>acción<\/strong> en <strong>3 años<\/strong> desde cometida la infracción; las <strong>penas pecuniarias<\/strong> en <strong>5 años<\/strong> desde la ejecutoria (Arts. 340-341).<\/li><li>Procedimiento sumario: notificación previa y <strong>5 días<\/strong> de término de defensa y prueba; sanciona la propia administración mediante <strong>resolución escrita<\/strong> (Arts. 355, 363).<\/li><\/ul>", "clave": "Quedan solo contravenciones (30-1.500 USD) y faltas reglamentarias (30-1.000 USD) de responsabilidad objetiva; la acción prescribe en 3 años y la pena pecuniaria en 5."}]}], "banco": [{"tipo": "om", "pregunta": "La obligación tributaria y la acción de cobro de los créditos tributarios, sus intereses y multas por deberes formales prescriben en:", "opciones": ["3 años desde la fecha de exigibilidad", "5 años desde la fecha en que fueron exigibles o desde que debió presentarse la declaración incompleta o no presentada", "7 años cuando no se presentó la declaración", "4 años desde la presentación de la declaración"], "correcta": 1, "feedback": "El Art. 55 (reformado en 2021) fija un plazo único de 5 años, contado desde la exigibilidad o desde que debió presentarse la declaración si fue incompleta o no se presentó. No confundir con la caducidad del Art. 94 (4 años) ni con el antiguo plazo de 7 años, eliminado por la reforma de 2021.", "tema": "Prescripción"}, {"tipo": "om", "pregunta": "Un contribuyente presentó su declaración de impuesto a la renta del ejercicio 2020 en abril de 2021. ¿En qué plazo caduca la facultad determinadora del SRI respecto de esa obligación?", "opciones": ["En 4 años contados desde la presentación de la declaración", "En 6 años contados desde la presentación de la declaración", "En 5 años contados desde la exigibilidad", "En 3 años contados desde el hecho generador"], "correcta": 0, "feedback": "Conforme al Art. 94, cuando el sujeto pasivo presentó su declaración, la facultad determinadora caduca en 4 años desde la fecha de presentación. El plazo de 6 años aplica solo si no presentó la declaración, y el de 5 años corresponde a la prescripción de la acción de cobro (Art. 55), no a la caducidad.", "tema": "Caducidad"}, {"tipo": "om", "pregunta": "El SRI notifica un acta de determinación con una obligación no declarada. ¿Qué interés de mora se aplica a esa obligación?", "opciones": ["La tasa activa referencial para 90 días del BCE", "1.3 veces la tasa activa referencial para 90 días del BCE", "1.5 veces la tasa pasiva referencial del BCE", "El 50% de la tasa activa referencial para 90 días del BCE"], "correcta": 1, "feedback": "Según el Art. 21, las obligaciones tributarias establecidas luego del ejercicio de las facultades de la Administración (determinación) generan interés anual de 1.3 veces la tasa activa referencial para 90 días del BCE. La tasa simple (1x) aplica a la mora ordinaria y el 50% corresponde a los intereses a cargo del sujeto activo (Art. 22).", "tema": "Intereses"}, {"tipo": "om", "pregunta": "Desde la reforma de junio de 2025, los créditos contra el sujeto activo por pagos indebidos o en exceso generan un interés equivalente a:", "opciones": ["La misma tasa activa referencial para 90 días del BCE", "1.3 veces la tasa activa referencial", "El 50% de la tasa activa referencial para 90 días del BCE", "La tasa pasiva referencial del BCE"], "correcta": 2, "feedback": "El Art. 22, sustituido por la Ley Orgánica de Integridad Pública (junio 2025), fija el interés a cargo del sujeto activo en el 50% de la tasa activa referencial para 90 días del BCE, desde la presentación de la solicitud o reclamo hasta la notificación del acto que acepta la petición.", "tema": "Intereses"}, {"tipo": "om", "pregunta": "Un contribuyente adeuda 1.000 USD de tributo, 200 USD de intereses y 300 USD de multas, y realiza un pago parcial de 600 USD. Según el Art. 47, el pago se imputa:", "opciones": ["500 al tributo y 100 a intereses", "200 a intereses y 400 al tributo", "300 a multas, 200 a intereses y 100 al tributo", "Proporcionalmente a los tres rubros"], "correcta": 1, "feedback": "El Art. 47 ordena imputar los pagos parciales primero a intereses, luego al tributo y por último a las multas. Por ello se cubren íntegramente los 200 USD de intereses y los 400 USD restantes se aplican al tributo; las multas quedan al final.", "tema": "Extinción - pago"}, {"tipo": "om", "pregunta": "La obligación tributaria determinada por el sujeto activo causa un recargo sobre el principal del:", "opciones": ["10%", "15%", "20%", "25%"], "correcta": 2, "feedback": "El Art. 90 establece un recargo del 20% sobre el principal, calculado después de imputar los pagos previos efectuados antes de la emisión del acto de determinación. Dicho recargo es susceptible de transacción en mediación.", "tema": "Determinación"}, {"tipo": "om", "pregunta": "El plazo general para que la administración tributaria resuelva un reclamo es de:", "opciones": ["90 días hábiles", "120 días hábiles desde el día hábil siguiente a la presentación", "120 días calendario desde la presentación", "180 días hábiles desde la notificación del acto"], "correcta": 1, "feedback": "El Art. 132 fija 120 días hábiles contados desde el día hábil siguiente al de la presentación del reclamo o de su aclaración o ampliación. Las reclamaciones aduaneras se resuelven en 30 días hábiles. Vencido el plazo sin resolución opera la aceptación tácita (Art. 104).", "tema": "Reclamos"}, {"tipo": "om", "pregunta": "El plazo para presentar un reclamo administrativo contra un acto determinativo de obligación tributaria es de:", "opciones": ["10 días desde la notificación", "15 días hábiles desde la emisión del acto", "20 días contados desde el día hábil siguiente al de la notificación", "30 días desde el día hábil siguiente a la notificación"], "correcta": 2, "feedback": "El Art. 115 concede 20 días contados desde el día hábil siguiente al de la notificación para presentar el reclamo ante la autoridad de la que emanó el acto. El mismo plazo de 20 días rige para las excepciones a la coactiva (Art. 214), pero desde la notificación del auto de pago.", "tema": "Reclamos"}, {"tipo": "om", "pregunta": "En materia de facilidades de pago, la resolución que las concede puede otorgar un plazo de hasta:", "opciones": ["12 meses, con cuota inicial del 10%", "24 meses, con primera cuota igual al 20% de la obligación", "36 meses, con primera cuota del 25%", "48 meses, previa garantía suficiente"], "correcta": 1, "feedback": "El Art. 153 (sustituido en 2021) permite conceder hasta 24 meses para el pago en dividendos periódicos, siendo la primera cuota igual al 20% de la obligación tributaria. Solo cabe una segunda facilidad por una sola vez, con garantía suficiente.", "tema": "Facilidades de pago"}, {"tipo": "om", "pregunta": "¿Cuál de los siguientes NO es un modo de extinción de la obligación tributaria según el Art. 37?", "opciones": ["La transacción", "La confusión", "La novación", "La remisión"], "correcta": 2, "feedback": "El Art. 37 enumera seis modos: pago, compensación, confusión, remisión, prescripción de la acción de cobro y transacción (esta última agregada en 2021). La novación no es modo de extinción tributaria; incluso el Art. 56.4 aclara que la transacción no implica novación.", "tema": "Extinción"}, {"tipo": "om", "pregunta": "Cuando distintos sujetos activos son acreedores de un mismo sujeto pasivo por diferentes tributos, el orden de prelación es:", "opciones": ["Municipalidades, consejos provinciales, fisco, organismos autónomos", "Fisco, consejos provinciales, municipalidades y organismos autónomos", "Fisco, municipalidades, consejos provinciales y organismos autónomos", "Organismos autónomos, fisco, municipalidades y consejos provinciales"], "correcta": 1, "feedback": "El Art. 58 fija la prelación de acreedores: primero el fisco, luego los consejos provinciales, después las municipalidades y finalmente los organismos autónomos.", "tema": "Privilegios del crédito"}, {"tipo": "om", "pregunta": "El recurso de revisión por evidente error de hecho o de derecho (causal 1 del Art. 143) es improcedente cuando desde la fecha del acto o resolución han transcurrido más de:", "opciones": ["1 año", "3 años", "5 años", "6 meses"], "correcta": 1, "feedback": "El Art. 145 numeral 2 dispone que no procede la revisión cuando han transcurrido 3 años desde que se dictó el acto o resolución, en los casos de las causales 1 a 4 del Art. 143. Para las causales 5 y 6 rige el plazo de 30 días desde la ejecutoria de la sentencia, con tope de 5 años desde la notificación del acto.", "tema": "Recursos"}, {"tipo": "om", "pregunta": "Las contravenciones tributarias se sancionan con multa pecuniaria dentro del rango de:", "opciones": ["30 a 1.000 USD", "30 a 1.500 USD", "50 a 2.000 USD", "40 a 400 USD"], "correcta": 1, "feedback": "El Art. 349 fija para las contravenciones una multa no inferior a 30 USD ni superior a 1.500 USD. Las faltas reglamentarias tienen un techo menor: 30 a 1.000 USD (artículo innumerado posterior al 351). El rango de 40 a 400 USD corresponde a la sanción del funcionario en la queja (Art. 142).", "tema": "Infracciones y sanciones"}, {"tipo": "om", "pregunta": "La acción para perseguir y sancionar las contravenciones y faltas reglamentarias prescribe en:", "opciones": ["5 años desde que fueron cometidas", "3 años desde que fueron cometidas", "3 años desde que la administración las descubre", "5 años desde la ejecutoria de la resolución sancionatoria"], "correcta": 1, "feedback": "El Art. 340 dispone que las acciones por contravenciones y faltas reglamentarias prescriben en 3 años contados desde que fueron cometidas. Distinto es el plazo del Art. 341: las penas pecuniarias ya impuestas prescriben en 5 años desde la ejecutoria de la resolución o sentencia.", "tema": "Infracciones y sanciones"}, {"tipo": "om", "pregunta": "Emitido un título de crédito, se notifica al deudor concediéndole para el pago un plazo de:", "opciones": ["5 días", "8 días", "15 días", "20 días"], "correcta": 1, "feedback": "El Art. 151 concede 8 días para el pago desde la notificación del título de crédito. Dentro de ese plazo el deudor puede presentar reclamo con observaciones sobre el título o el derecho para su emisión, lo que suspende la coactiva hasta su resolución. Los 20 días corresponden al auto de pago (Art. 161).", "tema": "Procedimiento coactivo"}, {"tipo": "om", "pregunta": "Citado con el auto de pago, el coactivado quiere oponerse alegando que la obligación se extinguió por prescripción. ¿Qué vía y plazo tiene?", "opciones": ["Presentar excepciones ante el ejecutor dentro de 20 días desde la notificación del auto de pago", "Presentar reclamo administrativo dentro de 8 días", "Interponer recurso de revisión dentro de 3 años", "Presentar excepciones ante el Tribunal dentro de 30 días"], "correcta": 0, "feedback": "La extinción total o parcial de la obligación es la excepción 5 del Art. 212. Conforme al Art. 214, las excepciones se presentan ante el funcionario ejecutor dentro de 20 días contados desde el día hábil siguiente a la notificación del auto de pago, y este remite el expediente al Tribunal (Art. 279).", "tema": "Procedimiento coactivo"}, {"tipo": "om", "pregunta": "Una obligación fue exigible el 15 de marzo y se paga el 25 de mayo del mismo año (2 meses y 10 días de mora). Según el Art. 21, el interés se liquida por:", "opciones": ["2 meses, despreciando la fracción", "2 meses más la parte proporcional de 10 días", "3 meses, porque la fracción de mes se liquida como mes completo", "70 días de mora con liquidación diaria"], "correcta": 2, "feedback": "El Art. 21 ordena calcular el interés por cada mes de retraso sin lugar a liquidaciones diarias, y la fracción de mes se liquida como mes completo. Por tanto, 2 meses y 10 días de mora se liquidan como 3 meses.", "tema": "Intereses"}, {"tipo": "om", "pregunta": "La acción de pago indebido o de pago en exceso prescribe en:", "opciones": ["3 años contados desde la fecha del pago", "5 años contados desde la fecha del pago", "3 años contados desde la notificación del acto de determinación", "6 meses desde la presentación de la solicitud"], "correcta": 0, "feedback": "El Art. 305 establece que la acción de pago indebido o de pago en exceso prescribe en 3 años contados desde la fecha del pago, y la prescripción se interrumpe con la presentación del reclamo o de la demanda. Los 6 meses del Art. 123 son el plazo de la administración para devolver antes de que proceda el reclamo formal.", "tema": "Pago indebido"}, {"tipo": "vf", "pregunta": "El juez o la autoridad administrativa pueden declarar de oficio la prescripción de la acción de cobro cuando verifican que transcurrieron más de cinco años.", "correcta": false, "feedback": "Falso. El Art. 55 inciso final dispone que la prescripción debe ser alegada expresamente por quien pretende beneficiarse de ella; el juez o autoridad administrativa no puede declararla de oficio. Esta es una diferencia esencial con la caducidad (Art. 94), que opera sin pronunciamiento previo.", "tema": "Prescripción"}, {"tipo": "vf", "pregunta": "Las exenciones generales del Art. 35 del Código Tributario se aplican también al impuesto al valor agregado (IVA) y al impuesto a los consumos especiales (ICE).", "correcta": false, "feedback": "Falso. El inciso final del Art. 35 dispone expresamente que las exenciones generales de ese artículo no son aplicables al IVA ni al ICE. Además, dichas exenciones cubren solo impuestos, no tasas ni contribuciones especiales.", "tema": "Exenciones"}, {"tipo": "vf", "pregunta": "Cuando el pago se efectúa mediante cheque no certificado, la obligación tributaria se extingue únicamente al hacerse efectivo
