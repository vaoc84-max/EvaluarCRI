comprobantes impresos para contingencias.<\/li><li>Quien usa máquinas registradoras debe contar <strong>obligatoriamente<\/strong> con facturas o notas de venta autorizadas para entregarlas cuando el cliente pida identificarse.<\/li><\/ul>", "clave": "Tres vías de autorización: imprenta autorizada, sistema computarizado y máquina registradora calificada (Art. 5)."}, {"titulo": "Vigencia de un año: las tres condiciones (Art. 6)", "html": "<p>La autorización tendrá vigencia de <strong>hasta un año<\/strong> cuando el sujeto pasivo cumpla:<\/p><ol><li>Haber presentado sus <strong>declaraciones y anexos<\/strong> y pagado lo declarado (o estar al día en cuotas de facilidades de pago).<\/li><li><strong>No tener deuda firme pendiente<\/strong> por tributos administrados por el SRI, multas e intereses (se exceptúan convenios de facilidades de pago y recursos de revisión).<\/li><li>Que la información del <strong>RUC sea correcta<\/strong> al ser comprobada por la Administración Tributaria.<\/li><\/ol><p>Los documentos se mantienen vigentes dentro del plazo autorizado aunque existan impugnaciones judiciales o administrativas pendientes (actos no firmes).<\/p>", "clave": "Vigencia de hasta 1 año si hay declaraciones al día, sin deuda firme y RUC correcto (Art. 6)."}, {"titulo": "Vigencia reducida de tres meses y ampliación (Art. 6)", "html": "<ul><li>Si el sujeto pasivo <strong>no hubiere presentado y pagado<\/strong> alguna declaración, el SRI autoriza la impresión con vigencia de <strong>hasta 3 meses<\/strong>.<\/li><li>Dentro de ese plazo el contribuyente debe regularizar <strong>todas sus obligaciones pendientes<\/strong>.<\/li><li>El plazo puede ampliarse <strong>hasta 12 meses<\/strong> en casos debidamente justificados, conforme las condiciones que establezca el SRI.<\/li><\/ul><p><em>Caso de ventanilla:<\/em> un contribuyente con declaraciones pendientes pregunta por qué su autorización salió por 3 meses y no por 1 año: es el efecto directo del Art. 6.<\/p>", "clave": "Con declaraciones pendientes la autorización dura hasta 3 meses, ampliable a 12 en casos justificados (Art. 6)."}, {"titulo": "Autorización electrónica: por cada comprobante (Art. 6 y Disp. Sexta y Décima)", "html": "<ul><li>La autorización de documentos mediante <strong>mensajes de datos firmados electrónicamente<\/strong> es <strong>por cada comprobante<\/strong> y se <strong>valida en línea<\/strong> (Art. 6, inciso final).<\/li><li>La Disposición General <strong>Sexta<\/strong> habilita la modalidad electrónica conforme a la Ley de Comercio Electrónico: los documentos electrónicos cumplen los mismos requisitos, llevan <strong>firma electrónica<\/strong> y tienen igual valor y efectos jurídicos.<\/li><li>Disposición General <strong>Décima<\/strong> (DE 1414, ene-2013): los autorizados a emitir electrónicamente <strong>no están obligados a emitir ni entregar los documentos de manera física<\/strong>.<\/li><\/ul>", "clave": "En modalidad electrónica la autorización es por comprobante y se valida en línea; no se exige entrega física (Art. 6, Disp. Décima)."}, {"titulo": "Suspensión de la autorización y sus efectos (Art. 7)", "html": "<p>El SRI puede <strong>suspender la vigencia de la autorización<\/strong>, previa notificación al contribuyente, cuando este:<\/p><ul><li>No haya presentado sus <strong>declaraciones o anexos<\/strong>;<\/li><li>No haya <strong>pagado<\/strong> las obligaciones declaradas;<\/li><li>Tenga información del <strong>RUC no verificable<\/strong> por la Administración;<\/li><li>Siendo emisor por sistemas computarizados, incumpla los requerimientos derivados de esa autorización.<\/li><\/ul><p>Efecto crucial: los comprobantes emitidos <strong>durante la suspensión NO sustentan crédito tributario ni costos o gastos<\/strong>. El SRI pone a disposición de la ciudadanía mecanismos para verificar la vigencia de los comprobantes.<\/p>", "clave": "Comprobante emitido en suspensión = sin crédito tributario ni costos/gastos para el adquirente (Art. 7)."}, {"titulo": "Establecimientos gráficos: requisitos para ser autorizados (Art. 44)", "html": "<p>El SRI autoriza a cada establecimiento gráfico que cumpla:<\/p><ul><li>Actividad económica de <strong>impresión de documentos<\/strong> registrada en el RUC;<\/li><li>Ser <strong>propietario o arrendatario exclusivo<\/strong> de la maquinaria (offset, tipográfico u otros autorizados), mantenida en los establecimientos declarados;<\/li><li>Declaraciones presentadas, anexos y pagos al día;<\/li><li>Información del RUC verificada;<\/li><li>Línea telefónica, fax y correo electrónico registrados en el RUC;<\/li><li>Acceso a sistemas de cómputo e internet.<\/li><\/ul><p>El SRI puede autorizar imprentas en lugares sin esos medios de comunicación y publica la consulta de establecimientos gráficos autorizados.<\/p>", "clave": "La imprenta autorizada debe tener la impresión como actividad en el RUC y maquinaria propia o arrendada en exclusiva (Art. 44)."}, {"titulo": "Obligaciones de los establecimientos gráficos (Art. 45)", "html": "<ul><li>Tramitar ante el SRI la <strong>solicitud de autorización<\/strong> de cada trabajo de impresión;<\/li><li><strong>Verificar la identidad y los datos<\/strong> del contribuyente solicitante en el RUC e imprimir los datos de la autorización;<\/li><li>Imprimir y conservar en <strong>orden cronológico<\/strong> las autorizaciones, firmadas por el dueño o representante de la imprenta y por el sujeto pasivo;<\/li><li>Imprimir los documentos <strong>con los requisitos reglamentarios<\/strong>;<\/li><li>Declarar al SRI la información sobre los trabajos realizados y expedir <strong>facturas<\/strong> por sus servicios de impresión;<\/li><li>Informar al SRI modificaciones de equipos o establecimientos, y el <strong>hurto, robo, extravío o destrucción<\/strong> de documentos impresos no entregados al cliente.<\/li><\/ul>", "clave": "La imprenta verifica identidad, imprime conforme a la autorización y reporta sus trabajos al SRI (Art. 45)."}, {"titulo": "Prohibiciones de las imprentas y sanciones (Arts. 46-47)", "html": "<p>Los establecimientos gráficos autorizados <strong>no podrán<\/strong>, entre otros:<\/p><ul><li>Imprimir documentos a contribuyentes <strong>sin autorización<\/strong> del SRI;<\/li><li><strong>Reponer<\/strong> documentos robados, extraviados o deteriorados del contribuyente;<\/li><li><strong>Ceder a terceros o subcontratar<\/strong> el trabajo de impresión;<\/li><li>Imprimir documentos <strong>no solicitados expresamente<\/strong> o en número <strong>mayor al autorizado<\/strong>;<\/li><li>Imprimir comprobantes autorizados previamente a <strong>otro establecimiento gráfico<\/strong> (se denuncia al representante);<\/li><li>Entregar tardíamente o con errores la información de trabajos realizados.<\/li><\/ul><p>El incumplimiento se sanciona conforme al <strong>Código Tributario<\/strong> (Art. 47). Solo las imprentas autorizadas pueden usar el logotipo del SRI con la leyenda de establecimiento gráfico autorizado (Disp. General Octava).<\/p>", "clave": "La imprenta nunca repone documentos robados ni subcontrata la impresión (Art. 46)."}, {"titulo": "Uso temporal de documentos ya impresos (Art. 48)", "html": "<p>Procede el uso temporal de comprobantes cuya impresión fue autorizada previamente cuando:<\/p><ul><li>Se cambia la <strong>dirección<\/strong> de la matriz o de un establecimiento, declarada en el RUC;<\/li><li>Se modifica el <strong>nombre comercial o de fantasía<\/strong>, registrado en el RUC;<\/li><li>Los documentos se emplean en <strong>ferias, eventos o exposiciones temporales<\/strong> (consignando la ubicación en los documentos);<\/li><li>Se cambian <strong>nombres, apellidos, denominación o razón social<\/strong>, declarados en el RUC;<\/li><li>Otros casos que autorice expresamente el SRI.<\/li><\/ul><p><em>Clave de asistencia:<\/em> el requisito transversal es que el cambio esté previamente <strong>declarado o registrado en el RUC<\/strong>.<\/p>", "clave": "El uso temporal procede en cambios registrados en el RUC y en ferias o eventos temporales (Art. 48)."}]}, {"id": "l3", "titulo": "Requisitos preimpresos y de llenado", "duracionMin": 30, "slides": [{"titulo": "Requisitos preimpresos comunes (Art. 18)", "html": "<p>Facturas, notas de venta, liquidaciones de compra, notas de crédito y notas de débito deben contener preimpreso:<\/p><ul><li><strong>Número y fecha (día, mes y año) de la autorización<\/strong> de impresión otorgada por el SRI;<\/li><li><strong>RUC del emisor<\/strong> y sus apellidos y nombres, denominación o razón social conforme al RUC (puede añadirse nombre comercial);<\/li><li><strong>Denominación del documento<\/strong>;<\/li><li><strong>Numeración de 15 dígitos<\/strong>;<\/li><li>Dirección de la <strong>matriz<\/strong> y del establecimiento emisor cuando corresponda;<\/li><li><strong>Fecha de caducidad<\/strong> (día, mes y año) según la autorización del SRI;<\/li><li>Datos completos del <strong>establecimiento gráfico<\/strong> que imprimió (RUC, nombres y número de autorización);<\/li><li>Destinatarios de los ejemplares: original ADQUIRENTE, copia EMISOR.<\/li><\/ul>", "clave": "Todo comprobante físico lleva preimpresos autorización, RUC, numeración, caducidad y datos de la imprenta (Art. 18)."}, {"titulo": "La numeración de 15 dígitos y los puntos de emisión (Arts. 18.5 y 26)", "html": "<p>Estructura <strong>999-999-999999999<\/strong>:<\/p><table><tr><th>Bloque<\/th><th>Dígitos<\/th><th>Significado<\/th><\/tr><tr><td>Primero<\/td><td><strong>3<\/strong><\/td><td>Número del establecimiento según el RUC<\/td><\/tr><tr><td>Segundo<\/td><td><strong>3<\/strong><\/td><td>Código del punto de emisión dentro del establecimiento<\/td><\/tr><tr><td>Tercero<\/td><td><strong>9<\/strong><\/td><td>Número secuencial<\/td><\/tr><\/table><ul><li>Pueden omitirse los ceros a la izquierda del secuencial, pero deben <strong>completarse los nueve dígitos<\/strong> antes de reiniciar numeración.<\/li><li>Cada punto de emisión inicia con el número <strong>001<\/strong> en cada establecimiento (Art. 26).<\/li><li>El SRI puede ampliar por resolución el número de dígitos de los puntos de emisión.<\/li><\/ul>", "clave": "Numeración 3-3-9: establecimiento, punto de emisión y secuencial de nueve dígitos (Art. 18, num. 5)."}, {"titulo": "Leyendas obligatorias según el tipo de contribuyente (Art. 18, nums. 10-15)", "html": "<table><tr><th>Contribuyente<\/th><th>Leyenda preimpresa<\/th><\/tr><tr><td>Contribuyente especial<\/td><td>&quot;Contribuyente Especial&quot; + número de resolución<\/td><\/tr><tr><td>Incluido en RIMPE<\/td><td>&quot;Contribuyente Régimen RIMPE&quot;<\/td><\/tr><tr><td>Negocio popular RIMPE<\/td><td>&quot;Contribuyente Negocio Popular - Régimen RIMPE&quot; (excluye la leyenda RIMPE general)<\/td><\/tr><tr><td>PN/sucesión obligada a llevar contabilidad<\/td><td>&quot;Obligado a Llevar Contabilidad&quot;<\/td><\/tr><tr><td>Agente de retención designado<\/td><td>&quot;Agente de Retención&quot; + número de resolución<\/td><\/tr><tr><td>Gran contribuyente<\/td><td>&quot;Gran Contribuyente&quot; + resolución, en comprobantes <strong>electrónicos<\/strong> (num. 15, DE 99 de dic-2023)<\/td><\/tr><\/table><p>Si el contribuyente pierde la calidad que motivó la leyenda, debe <strong>dar de baja<\/strong> los documentos; los vigentes al momento de la designación pueden ajustarse mediante <strong>sello<\/strong> u otra forma de impresión.<\/p>", "clave": "Las leyendas de régimen o calidad son preimpresas y su pérdida obliga a dar de baja los documentos (Art. 18)."}, {"titulo": "Requisitos de llenado de la factura (Art. 19)", "html": "<ul><li><strong>Identificación del adquirente<\/strong> (nombres, RUC, cédula o pasaporte) cuando requiera sustentar costos, gastos o crédito tributario.<\/li><li>Si no la requiere y la transacción <strong>no supera los US$ 50,00<\/strong>, puede consignarse la leyenda <strong>&quot;CONSUMIDOR FINAL&quot;<\/strong>, omitiendo el detalle de los numerales 4 al 7 (subtotal, descuentos, IVA y propina).<\/li><li>Descripción del bien o servicio con cantidad y unidad de medida; obligatorio consignar <strong>códigos, número de serie o de motor<\/strong> cuando los bienes los tengan.<\/li><li>Precio unitario, subtotal sin impuestos, descuentos, <strong>IVA con su tarifa<\/strong>, ICE por separado cuando proceda e importe total.<\/li><li>La <strong>propina legal<\/strong> (Decreto Supremo 1269) de hoteles, bares y restaurantes calificados <strong>no integra la base imponible del IVA<\/strong>.<\/li><li>Fecha de emisión, número de guías de remisión cuando corresponda y <strong>firma del adquirente<\/strong> como constancia de entrega.<\/li><li>Cada factura se totaliza y cierra individualmente; si tiene varias páginas, se numera cada una indicando el total.<\/li><\/ul>", "clave": "Hasta US$ 50 se puede facturar como CONSUMIDOR FINAL sin identificar al comprador (Art. 19, num. 1)."}, {"titulo": "Llenado de la nota de venta y comparación con la factura (Art. 21)", "html": "<table><tr><th>Elemento de llenado<\/th><th>Factura (Art. 19)<\/th><th>Nota de venta (Art. 21)<\/th><\/tr><tr><td>IVA<\/td><td>Desglosado con tarifa<\/td><td><strong>Incluido en el precio<\/strong><\/td><\/tr><tr><td>Identificación del cliente<\/td><td>Obligatoria salvo consumidor final hasta <strong>US$ 50<\/strong><\/td><td>Solo si el cliente requiere sustentar costos y gastos: RUC o cédula y nombre, <strong>por cualquier monto<\/strong><\/td><\/tr><tr><td>Firma del adquirente<\/td><td>Sí, como constancia de entrega<\/td><td>No exigida<\/td><\/tr><tr><td>Propina legal<\/td><td>No integra base del IVA<\/td><td>No integra base del IVA<\/td><\/tr><\/table><p>La nota de venta también exige descripción del bien o servicio, importe total con impuestos y fecha de emisión, y debe totalizarse y cerrarse individualmente.<\/p>", "clave": "En la nota de venta el precio incluye impuestos y el cliente se identifica solo si sustentará gastos (Art. 21)."}, {"titulo": "Llenado de la liquidación de compra (Art. 22)", "html": "<ul><li><strong>Datos del proveedor<\/strong>: apellidos y nombres, cédula o pasaporte, domicilio con datos de ubicación, consignando <strong>provincia, ciudad y lugar<\/strong> donde se realizó la operación.<\/li><li>Descripción del bien o servicio con cantidad y unidad de medida (códigos, serie o motor cuando existan).<\/li><li>Precios unitarios, <strong>subtotal sin IVA<\/strong>, IVA con su tarifa e <strong>importe total con impuestos<\/strong>.<\/li><li>Fecha de emisión.<\/li><li>Cierre y totalización individual; en sistemas computarizados con varias páginas, numerar cada página con el total.<\/li><\/ul><p>Recuerde el vínculo con el Art. 13: sin la <strong>retención del 100% del IVA<\/strong> y del porcentaje de renta, declarada y pagada, la liquidación no sustenta crédito ni gasto (excepto compras vía empleado, literal d).<\/p>", "clave": "La liquidación identifica plenamente al proveedor y el lugar de la operación (Art. 22)."}, {"titulo": "Tiquetes de máquina registradora: requisitos y tecnología (Arts. 23 y 43)", "html": "<ul><li>Requisitos del tiquete (Art. 23): RUC, nombre y domicilio del emisor; <strong>número secuencial autogenerado de al menos 4 dígitos<\/strong>; <strong>marca, modelo y número de serie<\/strong> de la máquina; número de autorización del SRI; descripción (en letras o códigos); importe; <strong>fecha Y hora de emisión<\/strong>; la denominación &quot;Tiquete&quot; es opcional.<\/li><li>Las máquinas deben ser de <strong>&quot;programa cerrado&quot;<\/strong>, sin posibilidad de alterar tiquetes, copia, cinta de auditoría ni reportes de ventas (Art. 43).<\/li><li>Impresión <strong>simultánea<\/strong> de original y copia; la copia constituye la <strong>cinta testigo o de auditoría<\/strong> (los reportes o resúmenes de venta NO lo son).<\/li><li>Los cambios a la información consignada al solicitar la autorización se reportan dentro de los <strong>8 días<\/strong> siguientes.<\/li><\/ul>", "clave": "El tiquete exige fecha y hora, y la máquina debe ser de programa cerrado con cinta testigo (Arts. 23 y 43)."}, {"titulo": "Boletos de espectáculos públicos (Art. 24)", "html": "<ul><li>Obligatoriamente <strong>preimpresos por establecimiento gráfico autorizado<\/strong> o por sistemas computarizados autorizados.<\/li><li>Contienen: número y fecha de autorización, RUC y nombres del emisor, denominación <strong>&quot;Boleto&quot;<\/strong>, numeración de <strong>15 dígitos<\/strong>, fecha de caducidad, datos del establecimiento gráfico e <strong>importe total incluido impuestos<\/strong>.<\/li><li>Cada punto de emisión corresponde a la <strong>localidad<\/strong> autorizada por el organismo competente.<\/li><li>Al no identificar al adquirente, no sustentan crédito tributario ni costos y gastos (Art. 14).<\/li><li>Si los boletos no se utilizan en el espectáculo autorizado, procede su <strong>baja<\/strong> (Art. 49, num. 14).<\/li><\/ul>", "clave": "El boleto lleva numeración de 15 dígitos e importe total con impuestos, y no identifica al adquirente (Art. 24)."}, {"titulo": "Formas de impresión y llenado (Art. 42)", "html": "<ul><li>Los documentos físicos se imprimen por <strong>establecimientos gráficos autorizados<\/strong>, sistemas computarizados o máquinas registradoras autorizadas; se emiten <strong>secuencialmente<\/strong> y se llenan en forma manual, mecánica o computarizada.<\/li><li>Copias con <strong>papel carbón, carbonado o autocopiativo químico<\/strong>; en sistemas computarizados pueden emitirse sin papel carbón si la copia es simultánea o consecutiva. Las copias deben ser <strong>idénticas al original<\/strong>.<\/li><li>Diferencias entre original y copia, o copia inexistente: el SRI puede <strong>denunciar al Ministerio Público<\/strong>.<\/li><li><strong>Impresión térmica<\/strong>: solo para emisores por sistemas computarizados autorizados, si el documento se conserva <strong>legible por 7 años<\/strong>.<\/li><li>Sin <strong>borrones, tachones ni enmendaduras<\/strong>: los documentos con defectos de llenado se anulan y archivan con original y copias.<\/li><\/ul>", "clave": "Las copias deben ser idénticas al original y los documentos defectuosos se anulan y archivan (Art. 42)."}, {"titulo": "Sustento de crédito tributario y de costos y gastos (Arts. 9-10)", "html": "<p><strong>Crédito tributario de IVA<\/strong> (Art. 9): son válidas las <strong>facturas<\/strong>, las <strong>liquidaciones de compra<\/strong> y los documentos del Art. 4, siempre que:<\/p><ul><li>Se identifique al comprador con su <strong>RUC<\/strong>, nombre o razón social;<\/li><li>El IVA conste <strong>por separado<\/strong>;<\/li><li>Se cumplan los demás requisitos reglamentarios.<\/li><\/ul><p><strong>Costos y gastos para impuesto a la renta<\/strong> (Art. 10): comprobantes válidos que permitan la <strong>identificación precisa del adquirente<\/strong>. También sustentan gasto los documentos por <strong>cuotas o aportes a condominios<\/strong> (identificando condominio con RUC y dirección, y al pagador), que deben ser <strong>preimpresos y prenumerados<\/strong>.<\/p>", "clave": "Crédito tributario exige identificar al comprador con RUC e IVA desglosado por separado (Art. 9)."}]}, {"id": "l4", "titulo": "Documentos complementarios, retenciones, guías de remisión, baja y anulación", "duracionMin": 30, "slides": [{"titulo": "Notas de crédito (Arts. 15 y 25)", "html": "<p>Se emiten para <strong>anular operaciones, aceptar devoluciones y conceder descuentos o bonificaciones<\/strong>.<\/p><ul><li>Deben consignar la <strong>denominación, serie y número<\/strong> del comprobante de venta que modifican.<\/li><li>El adquirente (o quien la reciba a su nombre) consigna en original y copia su <strong>nombre, RUC o cédula y fecha de recepción<\/strong>.<\/li><li>Las <strong>facturas comerciales negociables<\/strong> que hayan sido efectivamente negociadas <strong>no pueden modificarse<\/strong> con notas de crédito.<\/li><li>Llenado (Art. 25): identificación del adquirente, comprobante que se modifica, <strong>razón de la modificación<\/strong>, valor modificado, ICE e IVA cuando procedan, valor total con impuestos y fecha de emisión.<\/li><\/ul>", "clave": "La nota de crédito anula, acepta devoluciones o concede descuentos, citando el comprobante que modifica (Art. 15)."}, {"titulo": "Notas de débito (Art. 16)", "html": "<p>Se emiten para:<\/p><ul><li>El cobro de <strong>intereses de mora<\/strong>;<\/li><li><strong>Recuperar costos y gastos<\/strong> incurridos por el vendedor con posterioridad a la emisión del comprobante de venta;<\/li><li>El cobro de tributos u otros recargos complementarios cuando lo disponga el SRI por resolución general.<\/li><\/ul><p>Al igual que las notas de crédito:<\/p><ul><li>Consignan denominación, serie y número del comprobante de venta al que se refieren;<\/li><li>No pueden modificar <strong>facturas comerciales negociables<\/strong> ya negociadas;<\/li><li>Comparten los requisitos de llenado del Art. 25 y se emiten en original y copia.<\/li><\/ul>", "clave": "La nota de débito cobra intereses de mora y recupera costos posteriores a la venta (Art. 16)."}, {"titulo": "Guía de remisión: concepto y obligados (Arts. 27-28)", "html": "<p>La guía de remisión <strong>sustenta el traslado de mercaderías por cualquier motivo dentro del territorio nacional<\/strong> y acredita el <strong>origen lícito<\/strong> de la mercadería cuando su información es veraz y concuerda con lo trasladado.<\/p><p>Obligados a emitirla (casos destacados del Art. 28):<\/p><ul><li>El <strong>importador o agente de aduanas<\/strong>; el <strong>exportador<\/strong> hacia el puerto de embarque;<\/li><li>Movilización <strong>entre establecimientos del mismo contribuyente<\/strong>;<\/li><li>El <strong>proveedor<\/strong> si entrega en el sitio del adquirente; el <strong>adquirente<\/strong> si retira del establecimiento del proveedor;<\/li><li>Devoluciones, consignaciones, ferias, y traslados para <strong>reparación o mantenimiento<\/strong>;<\/li><li>Combustibles y derivados: solo <strong>PETROCOMERCIAL<\/strong> o sujetos de control designados;<\/li><li><strong>Supletoriamente, la operadora de transporte<\/strong> cuando el remitente carezca de establecimiento de emisión en el punto de partida o no haya emitido la guía.<\/li><\/ul>", "clave": "La guía de remisión sustenta todo traslado interno y acredita el origen lícito de la mercadería (Art. 27)."}, {"titulo": "Llenado de la guía de remisión (Art. 30)", "html": "<ul><li>Identificación del <strong>destinatario<\/strong> (RUC, cédula o pasaporte, nombres) y del <strong>remitente<\/strong> cuando la emite el transportista o destinatario;<\/li><li><strong>Dirección del punto de partida y del destino<\/strong>, y fechas de <strong>inicio y terminación<\/strong> del traslado;<\/li><li>Identificación del <strong>conductor<\/strong> y <strong>número de placas<\/strong> del vehículo (si hay varios medios de transporte, se consignan todos con sus conductores);<\/li><li>Descripción detallada de las mercaderías (puede ir en <strong>anexo<\/strong>) y <strong>motivo del traslado<\/strong>;<\/li><li>Datos del comprobante de venta, salvo: venta itinerante, consignación, traslado entre establecimientos propios, exhibiciones, o cuando el precio se determina al transferir;<\/li><li>Combustibles: se agregan las <strong>rutas establecidas<\/strong> y el código del establecimiento del destinatario; fuera de ruta, la mercadería se considera sin sustento y es <strong>incautada<\/strong>.<\/li><\/ul>", "clave": "La guía identifica destinatario, conductor, placas, rutas y motivo del traslado (Art. 30)."}, {"titulo": "Reglas de traslado, caso especial e interrupciones (Arts. 34-37)", "html": "<ul><li>Las guías se emiten <strong>en forma previa al traslado<\/strong>, sin tachones, y deben ser <strong>portadas por cada unidad de transporte<\/strong> (Art. 36).<\/li><li>Adquirente <strong>consumidor final<\/strong>: basta la tenencia del <strong>comprobante de venta<\/strong>; no requiere guía.<\/li><li><strong>Caso especial (Art. 34)<\/strong>: si el proveedor entrega en el sitio del adquirente, el comprobante de venta puede amparar el transporte, emitiendo una copia adicional con la leyenda <strong>&quot;sustitutiva de guía de remisión&quot;<\/strong>, sin valor tributario adicional.<\/li><li>Emisores itinerantes: leyenda <strong>&quot;Emisor Itinerante&quot;<\/strong> en lugar de los datos del destinatario (Art. 35).<\/li><li>Interrupciones (Art. 37): retorno, cambio de destino, llegada en fecha distinta o cambio de transporte se hacen constar <strong>en la propia guía<\/strong> con el motivo.<\/li><li>Las guías quedan en poder del <strong>destinatario<\/strong>, archivadas secuencialmente (Art. 36, num. 5).<\/li><\/ul>", "clave": "La guía se emite antes del traslado y una copia del comprobante puede sustituirla en entregas del proveedor (Arts. 34 y 36)."}, {"titulo": "Comprobantes de retención: requisitos (Arts. 39-40)", "html": "<p>Preimpresos (Art. 39): autorización, RUC y nombres del emisor, denominación <strong>&quot;comprobante de retención&quot;<\/strong>, numeración de <strong>15 dígitos<\/strong>, dirección, caducidad, datos de la imprenta y destinatarios (original: <strong>SUJETO PASIVO RETENIDO<\/strong>; copia: <strong>AGENTE DE RETENCIÓN<\/strong>), más las leyendas de calidad del emisor.<\/p><p>Llenado (Art. 40):<\/p><ul><li>Identificación del retenido (nombres y RUC, cédula o pasaporte);<\/li><li><strong>Impuesto retenido<\/strong>: Renta, IVA o ISD; comprobante de venta que motiva la retención;<\/li><li><strong>Base, porcentaje aplicado y valor retenido<\/strong>; ejercicio fiscal; fecha; <strong>firma del agente de retención<\/strong>;<\/li><li>Convenio para evitar la doble tributación cuando corresponda: el comprobante se emite <strong>siempre<\/strong>, incluso con tarifa <strong>0%<\/strong> o cuando el convenio exima de la retención;<\/li><li>La información puede <strong>consolidarse mensualmente<\/strong> por sujeto retenido en pagos intermediados por instituciones financieras.<\/li><\/ul>", "clave": "Con convenio de doble tributación el comprobante de retención se emite siempre, aun con tarifa 0% (Art. 40)."}, {"titulo": "Archivo y conservación: el plazo de 7 años (Art. 41)", "html": "<ul><li>Los comprobantes de venta, documentos complementarios y comprobantes de retención se conservan durante un plazo mínimo de <strong>7 años<\/strong> (inciso reformado por DE 99, dic-2023).<\/li><li>Los emisores <strong>electrónicos<\/strong> mantienen obligatoriamente el <strong>archivo magnético<\/strong> de todos los documentos en la forma que determine el SRI, disponible ante cualquier requerimiento.<\/li><li>Coherencia normativa: la impresión térmica exige legibilidad por <strong>7 años<\/strong> (Art. 42) y los documentos <strong>anulados<\/strong> se conservan <strong>7 años<\/strong> (Art. 50).<\/li><\/ul>", "clave": "Regla de oro de archivo: 7 años, en papel legible o en archivo magnético (Art. 41)."}, {"titulo": "Baja de documentos: plazo y motivos (Art. 49)", "html": "<p>La declaración de baja se presenta ante el SRI en el <strong>plazo máximo de 15 días hábiles<\/strong> desde el hecho. Motivos principales (14 numerales):<\/p><ul><li><strong>Vencimiento<\/strong> del plazo de vigencia; <strong>cierre<\/strong> del establecimiento o del punto de emisión; <strong>cese<\/strong> de operaciones;<\/li><li><strong>Deterioro, robo, hurto o extravío<\/strong>; fallas técnicas generalizadas;<\/li><li>Pérdida de la calidad de <strong>contribuyente especial<\/strong> o de obligado a llevar contabilidad; <strong>cambio de régimen impositivo<\/strong>;<\/li><li>Cambios de nombres, razón social o dirección registrados en el RUC;<\/li><li><strong>Suspensión<\/strong> de la autorización por el SRI;<\/li><li>Falta de retiro de los trabajos de impresión luego de <strong>3 meses<\/strong> (la baja la solicita la propia imprenta);<\/li><li>Impresión sin solicitud del contribuyente (con denuncia); boletos <strong>no utilizados<\/strong> en el espectáculo.<\/li><\/ul>", "clave": "La baja se declara en máximo 15 días hábiles desde el hecho que la motiva (Art. 49)."}, {"titulo": "Robo, extravío y destrucción de los documentos dados de baja (Art. 49)", "html": "<ul><li><strong>Robo o hurto<\/strong>: se presenta la <strong>denuncia<\/strong> penal, que debe detallar el tipo de documento y su numeración; la sola denuncia <strong>no exime<\/strong> al sujeto pasivo de sus responsabilidades.<\/li><li><strong>Extravío<\/strong>: el contribuyente da <strong>aviso escrito<\/strong> a la autoridad, detallando la totalidad de los documentos.<\/li><li>El sujeto pasivo <strong>destruye<\/strong> los documentos dados de baja que estén en su poder; su numeración <strong>no podrá volver a utilizarse<\/strong>.<\/li><li>La declaración de baja <strong>no exime de responsabilidad por la circulación posterior<\/strong> de los documentos si no se acató la destrucción; el incumplimiento se sanciona conforme al Código Tributario y la LRTI.<\/li><\/ul>", "clave": "La denuncia por robo no exime de responsabilidad; los documentos de baja se destruyen y su numeración no se reutiliza (Art. 49)."}, {"titulo": "Anulación de documentos emitidos con errores (Art. 50)", "html": "<ul><li>Los comprobantes de venta, documentos complementarios y comprobantes de retención emitidos <strong>con errores<\/strong> y anulados deben conservarse por <strong>7 años<\/strong>.<\/li><li>Se archivan en <strong>original junto con todas las copias<\/strong>, ordenados <strong>cronológicamente<\/strong>.<\/li><li>Diferencia clave para ventanilla:<br><\/li><\/ul><table><tr><th>Figura<\/th><th>Cuándo aplica<\/th><th>Efecto<\/th><\/tr><tr><td><strong>Baja<\/strong> (Art. 49)<\/td><td>Documentos <strong>no utilizados<\/strong> (vencidos, deteriorados, robados, cambio de datos)<\/td><td>Declaración al SRI en <strong>15 días hábiles<\/strong> + destrucción<\/td><\/tr><tr><td><strong>Anulación<\/strong> (Art. 50)<\/td><td>Documentos <strong>emitidos con errores<\/strong><\/td><td>Conservación de original y copias por <strong>7 años<\/strong><\/td><\/tr><\/table>", "clave": "Baja para documentos no utilizados; anulación para emitidos con error, conservando todo 7 años (Arts. 49-50)."}]}], "banco": [{"tipo": "om", "pregunta": "Un contribuyente calificado como negocio popular del Régimen RIMPE acude a ventanilla y pregunta qué comprobante de venta le corresponde emitir por sus ventas. ¿Cuál es la respuesta correcta?", "opciones": ["Factura con IVA desglosado", "Nota de venta", "Liquidación de compra de bienes y prestación de servicios", "Tiquete de máquina registradora sin autorización adicional"], "correcta": 1, "feedback": "El Art. 12 (sustituido por DE 304, dic-2021) dispone que emitirán y entregarán notas de venta exclusivamente los contribuyentes considerados negocios populares incluidos en el Régimen RIMPE.", "tema": "Tipos de comprobantes"}, {"tipo": "om", "pregunta": "Un proveedor presenta su factura a un agente de retención el lunes. ¿Dentro de qué plazo debe estar disponible para la entrega el comprobante de retención?", "opciones": ["Dentro de los 5 días hábiles siguientes a la presentación del comprobante de venta", "Dentro de las 48 horas siguientes al pago", "Dentro de los 15 días hábiles siguientes al mes de la transacción", "Hasta la fecha de la declaración mensual del IVA"], "correcta": 0, "feedback": "El Art. 8 establece que el comprobante de retención se emite al momento del pago o acreditación en cuenta (lo que ocurra primero) y estará disponible para la entrega al proveedor dentro de los cinco días hábiles siguientes al de presentación del comprobante de venta.", "tema": "Comprobantes de retención"}, {"tipo": "om", "pregunta": "Un contribuyente que presentó todas sus declaraciones, no tiene deudas firmes y cuya información del RUC es correcta solicita autorización para imprimir facturas. ¿Qué período de vigencia le corresponde?", "opciones": ["Hasta seis meses", "Hasta un año", "Hasta dos años", "Vigencia indefinida mientras mantenga el RUC activo"], "correcta": 1, "feedback": "El Art. 6 fija un período de vigencia de hasta un año cuando el sujeto pasivo cumple las tres condiciones: declaraciones presentadas y pagadas, sin deuda firme pendiente y con información correcta en el RUC.", "tema": "Autorización y vigencia"}, {"tipo": "om", "pregunta": "Un ciudadano no ha presentado una declaración de IVA y solicita autorización de impresión de comprobantes. ¿Qué vigencia autorizará el SRI?", "opciones": ["Ninguna, se niega la autorización hasta regularizar", "Hasta un año con multa", "Hasta tres meses, plazo en el cual debe cumplir todas sus obligaciones pendientes", "Hasta treinta días improrrogables"], "correcta": 2, "feedback": "Según el Art. 6, cuando el sujeto pasivo no hubiere presentado y pagado alguna declaración, el SRI autoriza la impresión con vigencia de hasta tres meses, ampliable hasta doce meses en casos debidamente justificados.", "tema": "Autorización y vigencia"}, {"tipo": "om", "pregunta": "Una empresa ecuatoriana contrata a una sociedad extranjera sin domicilio ni establecimiento permanente en Ecuador para un servicio de consultoría. ¿Qué documento debe emitirse para sustentar la transacción?", "opciones": ["Factura emitida por la sociedad extranjera", "Nota de venta a nombre de la empresa ecuatoriana", "Liquidación de compra de bienes y prestación de servicios emitida por la empresa ecuatoriana", "Nota de débito por el valor del servicio"], "correcta": 2, "feedback": "El Art. 13, literal b), dispone que se emiten liquidaciones de compra por servicios prestados por sociedades extranjeras que no posean domicilio ni establecimiento permanente en el país, identificadas con su nombre o razón social.", "tema": "Liquidaciones de compra"}, {"tipo": "om", "pregunta": "Un cliente recibió un tiquete de máquina registradora, pero necesita sustentar el gasto para su impuesto a la renta. ¿Qué debe hacer el emisor?", "opciones": ["Negarse, porque el tiquete ya fue emitido", "Canjear el tiquete por una factura o nota de venta de manera inmediata", "Emitir una nota de crédito y luego una factura en 72 horas", "Entregar una copia certificada del tiquete con sello"], "correcta": 1, "feedback": "El Art. 14 señala que los tiquetes no sustentan crédito tributario ni costos y gastos; si el adquirente lo requiere, podrá exigir a cambio la factura o nota de venta, estando el emisor obligado a realizar el cambio de manera inmediata.", "tema": "Tiquetes y boletos"}, {"tipo": "om", "pregunta": "¿Cuál de los siguientes NO es un motivo válido para emitir una nota de crédito?", "opciones": ["Anular una operación", "Aceptar una devolución", "Conceder un descuento o bonificación", "Cobrar intereses de mora al cliente"], "correcta": 3, "feedback": "El Art. 15 reserva las notas de crédito para anular operaciones, aceptar devoluciones y conceder descuentos o bonificaciones. El cobro de intereses de mora corresponde a la nota de débito (Art. 16).", "tema": "Documentos complementarios"}, {"tipo": "om", "pregunta": "Un vendedor incurrió en costos de transporte adicionales después de emitir la factura y quiere recuperarlos del cliente. ¿Qué documento debe emitir?", "opciones": ["Nota de crédito", "Nota de débito", "Nueva factura anulando la anterior", "Guía de remisión valorada"], "correcta": 1, "feedback": "Conforme al Art. 16, las notas de débito se emiten para el cobro de intereses de mora y para recuperar costos y gastos incurridos por el vendedor con posterioridad a la emisión del comprobante de venta.", "tema": "Documentos complementarios"}, {"tipo": "om", "pregunta": "En la numeración 002-003-000000125 de una factura, ¿qué representan los tres primeros dígitos (002)?", "opciones": ["El punto de emisión dentro del local", "El número del establecimiento conforme consta en el RUC", "El código de la provincia de emisión", "El número de la autorización del SRI"], "correcta": 1, "feedback": "El Art. 18, numeral 5, establece la numeración de quince dígitos: los tres primeros corresponden al número del establecimiento según el RUC, los tres siguientes al punto de emisión y los nueve finales al secuencial.", "tema": "Requisitos preimpresos"}, {"tipo": "om", "pregunta": "Un consumidor final compra por US$ 42 y no desea identificarse. ¿Cómo puede emitirse la factura?", "opciones": ["No puede emitirse sin identificación", "Con la leyenda CONSUMIDOR FINAL, por no superar los US$ 50", "Solo con el número de cédula del cajero", "Con la leyenda VENTA MENOR y sin fecha de emisión"], "correcta": 1, "feedback": "El Art. 19, numeral 1, permite consignar la leyenda CONSUMIDOR FINAL cuando la transacción no supera los US$ 50,00 y el cliente no requiere sustentar costos, gastos ni crédito tributario, omitiendo además los numerales 4 al 7.", "tema": "Requisitos de llenado"}, {"tipo": "om", "pregunta": "Un contribuyente cerró su local comercial. ¿En qué plazo debe presentar la declaración de baja de sus comprobantes no utilizados?", "opciones": ["8 días hábiles", "15 días hábiles", "30 días calendario", "3 meses"], "correcta": 1, "feedback": "El Art. 49 exige presentar la declaración de baja ante el SRI en el plazo máximo de quince días hábiles cuando se produzcan hechos como el cierre del establecimiento, vencimiento de vigencia, robo, deterioro o cese de operaciones.", "tema": "Baja y anulación"}, {"tipo": "om", "pregunta": "¿Durante qué plazo mínimo deben conservarse los comprobantes de venta, documentos complementarios y comprobantes de retención?", "opciones": ["3 años", "5 años", "7 años", "10 años"], "correcta": 2, "feedback": "El Art. 41 (reformado por DE 99, dic-2023) dispone la conservación durante el plazo mínimo de 7 años; el mismo plazo aplica a la legibilidad de la impresión térmica (Art. 42) y a los documentos anulados (Art. 50).", "tema": "Archivo y conservación"}, {"tipo": "om", "pregunta": "El remitente de una mercadería carece de establecimiento de emisión en el punto de partida y no emitió la guía de remisión. ¿Quién debe emitirla supletoriamente?", "opciones": ["El destinatario final", "La operadora de transporte", "El SRI de oficio", "La Corporación Aduanera Ecuatoriana"], "correcta": 1, "feedback": "El Art. 28, inciso final (sustituido por DE 1287, ene-2017), dispone que supletoriamente la guía de remisión deberá ser emitida por la operadora de transporte cuando el remitente carezca de establecimiento de emisión en el punto de partida o no la haya emitido.", "tema": "Guías de remisión"}, {"tipo": "om", "pregunta": "Una inmobiliaria cuyo giro es la venta de inmuebles consulta cuándo debe entregar el comprobante de venta. ¿Cuál es la respuesta según el reglamento?", "opciones": ["Siempre al celebrar la escritura pública", "Siempre al recibir el primer pago", "En la fecha en que se perciba el ingreso o en la que se celebre la escritura pública, lo que ocurra primero", "Dentro de los 30 días posteriores a la inscripción en el Registro de la Propiedad"], "correcta": 2, "feedback": "El Art. 17, literal d), señala que cuando el giro del negocio sea la transferencia de bienes inmuebles, el comprobante se entrega en la fecha en que se perciba el ingreso o en la que se celebre la escritura pública, lo que ocurra primero.", "tema": "Oportunidad de entrega"}, {"tipo": "om", "pregunta": "Un banco realiza varias transacciones mensuales con un mismo proveedor y emite un solo comprobante de retención consolidado. ¿Cuándo debe estar disponible ese comprobante?", "opciones": ["Dentro de los cinco primeros días del mes siguiente", "Dentro de los cinco días hábiles siguientes a cada transacción", "El último día hábil del mismo mes", "Dentro de los quince días del mes siguiente"], "correcta": 0, "feedback": "El Art. 8 permite a las instituciones del sistema financiero emitir un solo comprobante de retención por cliente o proveedor cuando realicen más de una transacción por mes, disponible para la entrega dentro de los cinco primeros días del mes siguiente.", "tema": "Comprobantes de retención"}, {"tipo": "om", "pregunta": "¿En qué plazo deben estar a disposición del contribuyente los comprobantes de retención del Impuesto a la Salida de Divisas?", "opciones": ["Dentro de los 2 días hábiles siguientes a la fecha de retención", "Dentro de los 5 días hábiles siguientes a la fecha de retención", "Dentro de los 10 días calendario siguientes al mes de retención", "El mismo día de la transferencia, sin excepción"], "correcta": 0, "feedback": "El Art. 8, inciso final, dispone que los comprobantes de retención del ISD deberán estar a disposición de los contribuyentes dentro de los dos días hábiles siguientes a la fecha de retención.", "tema": "Comprobantes de retención"}, {"tipo": "om", "pregunta": "Un contribuyente denuncia que le robaron su talonario de facturas y pide a la imprenta que le reponga los mismos documentos. ¿Qué debe responder la imprenta autorizada?", "opciones": ["Que puede reponerlos presentando la denuncia", "Que no puede reponer documentos robados, extraviados o deteriorados; el contribuyente debe darlos de baja y solicitar nueva autorización", "Que solo puede reponerlos con autorización del establecimiento gráfico original", "Que debe esperar 6 meses desde la denuncia"], "correcta": 1, "feedback": "El Art. 46, numeral 2, prohíbe a los establecimientos gráficos reponer documentos del contribuyente que le hubieren sido robados, extraviados o deteriorados; el contribuyente debe dar de baja los documentos conforme al Art. 49.", "tema": "Establecimientos gráficos"}, {"tipo": "vf", "pregunta": "Los trabajadores en relación de dependencia están obligados a emitir comprobantes de venta por sus remuneraciones.", "correcta": false, "feedback": "Falso. El Art. 8 dispone expresamente que los trabajadores en relación de dependencia no están obligados a emitir comprobantes de venta por sus remuneraciones.", "tema": "Obligación de emisión"}, {"tipo": "vf", "pregunta": "Los comprobantes emitidos mientras dure la suspensión de la autorización sustentan crédito tributario si el comprador actuó de buena fe.", "correcta": false, "feedback": "Falso. El Art. 7 establece que no sustentarán crédito tributario ni costos o gastos los comprobantes emitidos mientras dure la suspensión de la autorización, sin excepción por buena fe; por eso el SRI ofrece mecanismos de verificación de vigencia.", "tema": "Autorización y vigencia"}, {"tipo": "vf", "pregunta": "La obligación de emitir comprobantes de venta nace incluso en transferencias a título gratuito y en operaciones gravadas con tarifa 0% de IVA.", "correcta": true, "feedback": "Verdadero. El Art. 8 señala que la obligación nace con ocasión de la transferencia de bienes aun a título gratuito o autoconsumo, y de la prestación de servicios, incluso en operaciones con tarifa cero de IVA.", "tema": "Obligación de emisión"}, {"tipo": "vf", "pregunta": "Las facturas comerciales negociables que hayan sido efectivamente negociadas pueden modificarse mediante notas de crédito.", "correcta": false, "feedback": "Falso. Los Arts. 15 y 16 disponen que las facturas con carácter de comercial negociables que en efecto sean negociadas no podrán ser modificadas con notas de crédito ni con notas de débito.", "tema": "Documentos complementarios"}, {"tipo": "vf", "pregunta": "En las transferencias de combustibles líquidos derivados de hidrocarburos y gas licuado de petróleo se debe emitir comprobante de venta por cualquier valor.", "correcta": true, "feedback": "Verdadero. El Art. 8 ordena emitir comprobantes de venta por cualquier valor en las transferencias de combustibles líquidos derivados de hidrocarburos y gas licuado de petróleo.", "tema": "Obligación de emisión"}, {"tipo": "vf", "pregunta": "Una liquidación de compra emitida a un proveedor con RUC en estado ACTIVO a la fecha de la transacción sirve para sustentar crédito tributario de IVA.", "correcta": false, "feedback": "Falso. El Art. 13, inciso final, dispone que las liquidaciones de compra emitidas a contribuyentes con RUC en estado ACTIVO no servirán para sustentar crédito tributario de IVA ni costos o gastos deducibles.", "tema": "Liquidaciones de compra"}, {"tipo": "vf", "pregunta": "A cada punto de emisión se asigna un número secuencial que inicia con el 001 en cada establecimiento.", "correcta": true, "feedback": "Verdadero. El Art. 26 dispone que a cada punto de emisión se asignará un número secuencial que se iniciará con el 001, en cada establecimiento, según las necesidades operativas del contribuyente.", "tema": "Requisitos preimpresos"}, {"tipo": "vf", "pregunta": "La guía de remisión puede emitirse una vez iniciado el traslado, siempre que se complete antes de la entrega de la mercadería.", "correcta": false, "feedback": "Falso. El Art. 36, numeral 1, exige que las guías de remisión sean emitidas en forma previa al traslado de mercaderías, en forma nítida, sin tachones ni enmendaduras, y portadas por cada unidad de transporte.", "tema": "Guías de remisión"}, {"tipo": "vf", "pregunta": "Los sujetos pasivos autorizados a emitir comprobantes electrónicamente mediante mensajes de datos no están obligados a emitir y entregar esos documentos de manera física.", "correcta": true, "feedback": "Verdadero. La Disposición General Décima (agregada por DE 1414, ene-2013) exime a los emisores electrónicos de la obligación de emitir y entregar físicamente los comprobantes de venta, retención y documentos complementarios.", "tema": "Emisión electrónica"}, {"tipo": "completar", "pregunta": "El comprobante de retención estará disponible para la entrega al proveedor dentro de los ____ días hábiles siguientes al de presentación del comprobante de venta.", "respuestas": ["cinco", "5"], "feedback": "El Art. 8 fija el plazo de cinco días hábiles siguientes a la presentación del comprobante de venta para que el comprobante de retención esté disponible para su entrega al proveedor.", "tema": "Comprobantes de retención"}, {"tipo": "completar", "pregunta": "Cuando el sujeto pasivo no hubiere presentado y pagado alguna declaración, el SRI autorizará la impresión de los documentos con un plazo de vigencia de hasta ____ meses.", "respuestas": ["tres", "3"], "feedback": "El Art. 6 dispone la vigencia reducida de hasta tres meses para contribuyentes con declaraciones pendientes, plazo ampliable hasta doce meses en casos debidamente justificados.", "tema": "Autorización y vigencia"}, {"tipo": "completar", "pregunta": "La declaración de baja de comprobantes se presenta ante el SRI en el plazo máximo de ____ días hábiles desde que se produce el hecho que la motiva.", "respuestas": ["quince", "15"], "feedback": "El Art. 49 establece el plazo máximo de quince días hábiles para presentar la declaración de baja por vencimiento, cierre, robo, deterioro, cese de operaciones y demás motivos enumerados.", "tema": "Baja y anulación"}, {"tipo": "completar", "pregunta": "Los comprobantes de venta, documentos complementarios y comprobantes de retención deberán conservarse durante el plazo mínimo de ____ años.", "respuestas": ["siete", "7"], "feedback": "El Art. 41 (reformado por DE 99, dic-2023) fija el plazo mínimo de conservación en 7 años, aplicable también a los documentos anulados según el Art. 50.", "tema": "Archivo y conservación"}, {"tipo": "completar", "pregunta": "Emitirán y entregarán notas de venta exclusivamente los contribuyentes considerados como ____ incluidos en el Régimen RIMPE.", "respuestas": ["negocios populares", "negocio popular"], "feedback": "El Art. 12 (sustituido por DE 304, dic-2021) reserva la emisión de notas de venta exclusivamente a los negocios populares incluidos en el Régimen RIMPE.", "tema": "Tipos de comprobantes"}, {"tipo": "completar", "pregunta": "La ____ de remisión es el documento que sustenta el traslado de mercaderías por cualquier motivo dentro del territorio nacional.", "respuestas": ["guia", "guias"], "feedback": "El Art. 27 define la guía de remisión como el documento que sustenta el traslado de mercaderías dentro del territorio nacional y acredita el origen lícito de la mercadería.", "tema": "Guías de remisión"}, {"tipo": "completar", "pregunta": "Si la transacción con un consumidor final que no requiere sustentar gastos no supera los US$ ____, podrá consignarse en la factura la leyenda CONSUMIDOR FINAL.", "respuestas": ["50", "cincuenta", "50,00", "50.00"], "feedback": "El Art. 19, numeral 1, permite la leyenda CONSUMIDOR FINAL cuando la transacción no supera los US$ 50,00, omitiendo los datos de los numerales 4 al 7.", "tema": "Requisitos de llenado"}, {"tipo": "completar", "pregunta": "Las notas de débito se emitirán para el cobro de intereses de ____ y para recuperar costos y gastos incurridos por el vendedor con posterioridad a la emisión del comprobante de venta.", "respuestas": ["mora"], "feedback": "El Art. 16 destina las notas de débito al cobro de intereses de mora, a la recuperación de costos y gastos posteriores a la venta y al cobro de tributos o recargos que disponga el SRI por resolución.", "tema": "Documentos complementarios"}]}, {"id": "reglamento-lrti", "titulo": "Reglamento para la Aplicación de la LRTI", "icono": "📘", "descripcion": "Estudio operativo del RALRTI enfocado en asistencia al ciudadano: calendario tributario por noveno dígito del RUC, rebaja por gastos personales, retenciones en la fuente, crédito tributario y devoluciones de IVA, y régimen RIMPE.", "tiempoMaxMin": 180, "dia": "Día 3 — jueves 16 de julio", "lecciones": [{"id": "l1", "titulo": "Declaraciones y plazos según el noveno dígito del RUC", "duracionMin": 40, "slides": [{"titulo": "El calendario tributario: la consulta más frecuente en ventanilla", "html": "<p>La pregunta número uno del contribuyente es <strong>¿hasta cuándo debo declarar?<\/strong> El RALRTI organiza todos los vencimientos alrededor del <strong>noveno dígito del RUC<\/strong> (o cédula/pasaporte).<\/p><ul><li><strong>Art. 70<\/strong>: la declaración del Impuesto a la Renta se presenta en la forma y contenido que defina el Director General del SRI mediante resolución.<\/li><li><strong>Art. 72<\/strong>: fija los plazos anuales del Impuesto a la Renta (sociedades y personas naturales).<\/li><li><strong>Art. 102<\/strong>: plazos mensuales para declarar retenciones en la fuente.<\/li><li><strong>Art. 158<\/strong>: plazos mensuales y semestrales del IVA.<\/li><li>El Especialista de Asistencia al Ciudadano debe dominar estas tablas de memoria.<\/li><\/ul>", "clave": "Todos los vencimientos del RALRTI giran en torno al noveno dígito del RUC (Arts. 72, 102 y 158)."}, {"titulo": "La lógica de la tabla: día 10 más 2 por cada dígito", "html": "<p>Todas las tablas del noveno dígito siguen el mismo patrón aritmético, lo que facilita memorizarlas:<\/p><ul><li>Dígito <strong>1<\/strong> vence el día <strong>10<\/strong>; cada dígito adicional suma <strong>2 días<\/strong>.<\/li><li>Dígito <strong>9<\/strong> vence el día <strong>26<\/strong> y el dígito <strong>0<\/strong> cierra el calendario el día <strong>28<\/strong>.<\/li><li>Fórmula práctica: día de vencimiento = 8 + (2 x dígito), y para el 0 se toma 28.<\/li><\/ul><table><tr><th>Noveno dígito<\/th><th>Día<\/th><th>Noveno dígito<\/th><th>Día<\/th><\/tr><tr><td>1<\/td><td><strong>10<\/strong><\/td><td>6<\/td><td><strong>20<\/strong><\/td><\/tr><tr><td>2<\/td><td><strong>12<\/strong><\/td><td>7<\/td><td><strong>22<\/strong><\/td><\/tr><tr><td>3<\/td><td><strong>14<\/strong><\/td><td>8<\/td><td><strong>24<\/strong><\/td><\/tr><tr><td>4<\/td><td><strong>16<\/strong><\/td><td>9<\/td><td><strong>26<\/strong><\/td><\/tr><tr><td>5<\/td><td><strong>18<\/strong><\/td><td>0<\/td><td><strong>28<\/strong><\/td><\/tr><\/table>", "clave": "Dígito 1 = día 10; cada dígito suma 2 días; dígito 0 = día 28."}, {"titulo": "Impuesto a la Renta de personas naturales: vence en marzo", "html": "<p>Según el <strong>Art. 72 numeral 2<\/strong>, para personas naturales y sucesiones indivisas el plazo <strong>inicia el 1 de febrero<\/strong> del año siguiente y vence en <strong>marzo<\/strong>:<\/p><table><tr><th>Noveno dígito<\/th><th>Vencimiento<\/th><\/tr><tr><td>1<\/td><td><strong>10 de marzo<\/strong><\/td><\/tr><tr><td>2<\/td><td><strong>12 de marzo<\/strong><\/td><\/tr><tr><td>3<\/td><td><strong>14 de marzo<\/strong><\/td><\/tr><tr><td>4<\/td><td><strong>16 de marzo<\/strong><\/td><\/tr><tr><td>5<\/td><td><strong>18 de marzo<\/strong><\/td><\/tr><tr><td>6<\/td><td><strong>20 de marzo<\/strong><\/td><\/tr><tr><td>7<\/td><td><strong>22 de marzo<\/strong><\/td><\/tr><tr><td>8<\/td><td><strong>24 de marzo<\/strong><\/td><\/tr><tr><td>9<\/td><td><strong>26 de marzo<\/strong><\/td><\/tr><tr><td>0<\/td><td><strong>28 de marzo<\/strong><\/td><\/tr><\/table><p>Se atiende al noveno dígito del <strong>RUC, cédula o pasaporte<\/strong>, según el caso.<\/p>", "clave": "Personas naturales: plazo desde el 1 de febrero, vence del 10 al 28 de marzo según noveno dígito (Art. 72.2)."}, {"titulo": "Impuesto a la Renta de sociedades: vence en abril", "html": "<p>Según el <strong>Art. 72 numeral 1<\/strong>, para las sociedades el plazo <strong>inicia el 1 de febrero<\/strong> y vence en <strong>abril<\/strong>, según el noveno dígito del RUC:<\/p><table><tr><th>Noveno dígito<\/th><th>Vencimiento<\/th><\/tr><tr><td>1<\/td><td><strong>10 de abril<\/strong><\/td><\/tr><tr><td>2<\/td><td><strong>12 de abril<\/strong><\/td><\/tr><tr><td>3<\/td><td><strong>14 de abril<\/strong><\/td><\/tr><tr><td>4<\/td><td><strong>16 de abril<\/strong><\/td><\/tr><tr><td>5<\/td><td><strong>18 de abril<\/strong><\/td><\/tr><tr><td>6<\/td><td><strong>20 de abril<\/strong><\/td><\/tr><tr><td>7<\/td><td><strong>22 de abril<\/strong><\/td><\/tr><tr><td>8<\/td><td><strong>24 de abril<\/strong><\/td><\/tr><tr><td>9<\/td><td><strong>26 de abril<\/strong><\/td><\/tr><tr><td>0<\/td><td><strong>28 de abril<\/strong><\/td><\/tr><\/table><p>Regla mnemotécnica para ventanilla: <strong>naturales en marzo, sociedades en abril<\/strong>, mismos días.<\/p>", "clave": "Sociedades: vencimiento del 10 al 28 de abril según noveno dígito (Art. 72.1)."}, {"titulo": "IVA mensual y retenciones en la fuente: el mes siguiente", "html": "<p>El <strong>Art. 158<\/strong> (IVA) y el <strong>Art. 102<\/strong> (retenciones de renta) usan la misma tabla: se declara el período y se paga <strong>el mes siguiente<\/strong>, del día <strong>10 al 28<\/strong> según el noveno dígito.<\/p><ul><li>Están obligados a declarar IVA <strong>mensualmente<\/strong> quienes transfieren bienes o prestan servicios gravados con tarifa distinta de 0% y quienes actúan como <strong>agentes de retención de IVA<\/strong>.<\/li><li>Los agentes de retención de renta declaran <strong>mensualmente<\/strong> los valores retenidos y los pagan en el mes siguiente (Art. 102).<\/li><li>La obligación se cumple <strong>aunque no existan ventas, compras ni retenciones<\/strong> en el período (Art. 158), salvo excepciones puntuales.<\/li><li>La declaración presentada en cero y luego sustituida con valores reales genera <strong>multa<\/strong> y la declaración en cero se considera <strong>no presentada<\/strong>.<\/li><\/ul>", "clave": "IVA mensual y retenciones: se pagan el mes siguiente, del 10 al 28 según noveno dígito (Arts. 158 y 102)."}, {"titulo": "IVA semestral: quiénes y cuándo", "html": "<p>El <strong>Art. 158<\/strong> permite declaración <strong>semestral<\/strong> de IVA a:<\/p><ul><li>Quienes transfieren bienes o prestan servicios gravados <strong>únicamente con tarifa 0%<\/strong>.<\/li><li>Quienes están sujetos a la <strong>retención total<\/strong> del IVA causado.<\/li><li>Los contribuyentes que el SRI establezca por resolución general.<\/li><\/ul><table><tr><th>Semestre<\/th><th>Mes de declaración<\/th><\/tr><tr><td>Enero a junio<\/td><td><strong>Julio<\/strong><\/td><\/tr><tr><td>Julio a diciembre<\/td><td><strong>Enero<\/strong><\/td><\/tr><\/table><p>Importante: si el sujeto pasivo semestral debe actuar como <strong>agente de retención de IVA<\/strong>, sus declaraciones pasan a ser obligatoriamente <strong>mensuales<\/strong>. Si actuó como agente de retención de manera ocasional, retorna a la periodicidad semestral desde el semestre inmediato posterior.<\/p>", "clave": "IVA semestral (tarifa 0% o retención total): enero-junio se declara en julio y julio-diciembre en enero (Art. 158)."}, {"titulo": "Reglas especiales: sector público, Galápagos y feriados", "html": "<p>Tres reglas especiales que el asistente debe explicar con precisión:<\/p><ul><li><strong>Instituciones del Estado y empresas públicas<\/strong> reguladas por la LOEP: pueden declarar hasta el <strong>día 20 del mes siguiente<\/strong>, sin atender al noveno dígito (Arts. 72, 103 y 158).<\/li><li><strong>Domicilio principal en Galápagos<\/strong>: pueden declarar hasta el <strong>28 del mes siguiente<\/strong>, sin atender al noveno dígito.<\/li><li><strong>Feriados y descanso obligatorio<\/strong>: el vencimiento se traslada al <strong>siguiente día hábil<\/strong>; pero si el traslado cambia de mes, la fecha se <strong>adelanta al último día hábil<\/strong> del mes de vencimiento.<\/li><\/ul><p>Esta última regla evita que un feriado de fin de mes desplace la obligación al mes siguiente.<\/p>", "clave": "Estado hasta el día 20, Galápagos hasta el 28; feriado traslada al día hábil siguiente salvo cambio de mes, en cuyo caso se adelanta."}, {"titulo": "Declaración tardía, sustitutiva y en cero", "html": "<p>Consecuencias que se deben advertir al contribuyente (Arts. 72 y 158):<\/p><ul><li>Declaración fuera de plazo: se pagan <strong>intereses y multas<\/strong> liquidados en la misma declaración, conforme el Código Tributario y la LRTI.<\/li><li>Las mismas sanciones aplican al pago tardío de <strong>retenciones en la fuente<\/strong>.<\/li><li>Declaración presentada <strong>en cero<\/strong> y luego sustituida con valores reales: se calcula la <strong>multa<\/strong> en la sustitutiva y la original se considera <strong>como no presentada<\/strong>.<\/li><li>Los cónyuges declaran por separado sus ingresos independientes; la actividad empresarial común la declara el cónyuge que la administra (<strong>Art. 71<\/strong>).<\/li><\/ul>", "clave": "Declarar tarde genera intereses y multas autoliquidados; la declaración en cero sustituida se tiene por no presentada (Arts. 72 y 158)."}, {"titulo": "Casos prácticos de ventanilla", "html": "<p>Aplique las reglas a consultas reales:<\/p><ol><li>Persona natural, RUC 17xxxxxx<strong>5<\/strong>001, pregunta cuándo declara renta: hasta el <strong>18 de marzo<\/strong> (Art. 72.2).<\/li><li>Compañía con noveno dígito <strong>9<\/strong>: renta hasta el <strong>26 de abril<\/strong> (Art. 72.1).<\/li><li>Profesional con servicios gravados que declara IVA mensual, dígito <strong>2<\/strong>: hasta el <strong>12 del mes siguiente<\/strong> (Art. 158).<\/li><li>Comerciante de productos exclusivamente tarifa 0%: declara <strong>semestralmente<\/strong>, en julio y enero.<\/li><li>Contribuyente de Galápagos: cualquiera de las anteriores hasta el <strong>28<\/strong>, sin atender al dígito.<\/li><li>Ministerio (institución del Estado): hasta el <strong>día 20<\/strong> del mes siguiente.<\/li><\/ol>", "clave": "Ante cada consulta: identificar tipo de contribuyente, impuesto y noveno dígito antes de responder el plazo."}]}, {"id": "l2", "titulo": "Gastos personales y deducciones", "duracionMin": 45, "slides": [{"titulo": "Naturaleza jurídica: rebaja del impuesto causado, no deducción", "html": "<p>El <strong>Art. 34 del RALRTI<\/strong> regula los gastos personales. Punto conceptual de nivel maestría:<\/p><ul><li>Desde la reforma de 2021-2023, los gastos personales <strong>no reducen la base imponible<\/strong>: otorgan una <strong>rebaja del Impuesto a la Renta causado<\/strong>.<\/li><li>La rebaja se aplica <strong>antes de imputar créditos tributarios<\/strong> a los que haya lugar.<\/li><li>Para el cálculo se considera el valor de la <strong>Canasta Familiar Básica vigente al mes de enero<\/strong> del ejercicio fiscal que se liquida.<\/li><li>Solo cuentan gastos realizados <strong>en el territorio ecuatoriano<\/strong>.<\/li><li>En el <strong>Régimen Especial de Galápagos<\/strong>, la canasta se multiplica por el índice <strong>IPCEG<\/strong> (Índice de Precios al Consumidor Espacial de Galápagos).<\/li><\/ul>", "clave": "Los gastos personales generan una rebaja del IR causado, calculada con la Canasta Familiar Básica de enero (Art. 34)."}, {"titulo": "Los seis rubros de gastos personales", "html": "<p>El Art. 34 reconoce gastos realizados en Ecuador por estos conceptos:<\/p><table><tr><th>Rubro<\/th><th>Ejemplos del reglamento<\/th><\/tr><tr><td><strong>Vivienda<\/strong><\/td><td>Arriendo, alícuotas de condominio, intereses hipotecarios, predial, servicios básicos<\/td><\/tr><tr><td><strong>Salud<\/strong><\/td><td>Honorarios médicos, medicinas, lentes, prótesis, medicina prepagada<\/td><\/tr><tr><td><strong>Alimentación<\/strong><\/td><td>Compra de alimentos y alimentos preparados<\/td><\/tr><tr><td><strong>Vestimenta<\/strong><\/td><td>Cualquier tipo de prenda de vestir<\/td><\/tr><tr><td><strong>Turismo<\/strong><\/td><td>Turismo nacional en establecimientos registrados con licencia anual<\/td><\/tr><tr><td><strong>Educación<\/strong><\/td><td>Incluye <strong>arte y cultura<\/strong>: matrícula, pensión, útiles, uniformes<\/td><\/tr><\/table><p>El contribuyente puede elegir libremente <strong>el o los rubros<\/strong> que use para el cálculo de la rebaja.<\/p>", "clave": "Seis rubros: vivienda, salud, alimentación, vestimenta, turismo y educación (que incluye arte y cultura)."}, {"titulo": "Vivienda y salud: detalles que generan dudas", "html": "<p><strong>Vivienda<\/strong> (solo respecto de la vivienda habitual): arriendo y expensas; <strong>intereses de préstamos hipotecarios<\/strong> para adquisición, construcción, ampliación o remodelación (prueba: certificado de la institución financiera); impuesto predial, contribuciones y servicios básicos; sueldos de trabajadores del hogar afiliados al IESS con obligaciones al día.<\/p><p><strong>Salud<\/strong>:<\/p><ul><li>Honorarios de médicos y profesionales con título; servicios de clínicas, hospitales, laboratorios y farmacias.<\/li><li>Medicamentos, insumos, <strong>lentes y prótesis<\/strong>; medicina prepagada y primas de seguros médicos.<\/li><li>El <strong>deducible no reembolsado<\/strong> del seguro privado.<\/li><li>Gastos por <strong>enfermedades catastróficas, raras o huérfanas<\/strong> debidamente certificadas por la autoridad sanitaria: tienen cálculo especial.<\/li><li>Novedad: <strong>gastos médicos y de alimentación de mascotas<\/strong> a cargo del sujeto pasivo también son gastos personales.<\/li><\/ul>", "clave": "Vivienda solo por el inmueble habitual; salud incluye deducible no reembolsado, enfermedades catastróficas y hasta gastos de mascotas."}, {"titulo": "Educación, pensiones alimenticias y otros conceptos transversales", "html": "<p><strong>Educación, arte y cultura<\/strong>: matrícula y pensión en todos los niveles (inicial a superior), cursos aprobados por la autoridad, útiles y textos, uniformes, centros de cuidado infantil, educación especial para personas con discapacidad, y consumo de artes vivas, plásticas, literarias, musicales y artesanías de artesanos calificados.<\/p><ul><li>La educación superior es deducible también por <strong>dependientes incluso mayores de edad<\/strong> que no perciban ingresos.<\/li><li>Las <strong>pensiones alimenticias<\/strong> fijadas en acta de mediación o resolución judicial pueden incluirse <strong>en cualquiera de los rubros<\/strong>.<\/li><li>Los <strong>intereses de préstamos quirografarios<\/strong> con el sistema financiero nacional también se imputan a cualquier rubro.<\/li><li>Condición general: el gasto <strong>no debe haber sido objeto de reembolso<\/strong> de ninguna forma.<\/li><\/ul>", "clave": "Pensiones alimenticias e intereses quirografarios entran en cualquier rubro; nada reembolsado es deducible (Art. 34)."}, {"titulo": "Cargas familiares: reglas de oro", "html": "<p>Los comprobantes pueden estar a nombre del contribuyente <strong>o de sus cargas familiares<\/strong> registradas. Reglas clave del Art. 34:<\/p><ul><li><strong>Nunca dos contribuyentes<\/strong> pueden declarar a la misma persona como carga en el mismo período fiscal.<\/li><li>Hijos sin discapacidad: cargas hasta el año en que cumplan <strong>21 años<\/strong>.<\/li><li>Los <strong>padres<\/strong> pueden registrarse como cargas con su <strong>consentimiento expreso<\/strong>; los padres jubilados dependientes que no perciben ingresos gravados sí califican.<\/li><li>La carga que percibe ingresos gravados deja de serlo, <strong>salvo<\/strong> que estos no superen <strong>un salario básico unificado<\/strong> del ejercicio.<\/li><li>Basta incurrir en gastos de una carga para considerarla como tal <strong>todo el ejercicio fiscal<\/strong>.<\/li><li>Dependencia = el contribuyente cubre <strong>prácticamente la totalidad<\/strong> de los gastos personales de la carga.<\/li><\/ul>", "clave": "Cargas: hijos hasta 21 años, padres con consentimiento, ingresos de la carga de hasta 1 SBU; nunca duplicadas entre contribuyentes."}, {"titulo": "Requisitos formales: anexo y sustento", "html": "<p>Para aplicar la rebaja el contribuyente debe cumplir formalidades:<\/p><ul><li>Presentar <strong>obligatoriamente el anexo de gastos personales<\/strong> en la forma que establezca el SRI por resolución (Art. 34).<\/li><li>Sustentar los gastos en <strong>comprobantes de venta<\/strong> válidos, a nombre propio o de las cargas registradas.<\/li><li>El cálculo especial por <strong>enfermedades catastróficas, raras o huérfanas<\/strong> exige certificación o aval de la autoridad sanitaria nacional.<\/li><li>El <strong>Art. 35 numeral 1<\/strong> recuerda: los gastos personales que sobrepasen los límites de la LRTI y el reglamento son <strong>no deducibles<\/strong>.<\/li><\/ul>", "clave": "Sin anexo de gastos personales y comprobantes válidos no hay rebaja (Art. 34)."}, {"titulo": "Proyección de gastos y retención mensual al trabajador (Art. 104)", "html": "<p>El empleador retiene el IR de sus trabajadores <strong>mensualmente<\/strong> con este procedimiento:<\/p><ol><li>Suma todas las remuneraciones proyectadas del año, <strong>excepto décima tercera y décima cuarta<\/strong>.<\/li><li>Resta el <strong>aporte individual al IESS<\/strong> (o cajas Militar/Policial) y aplica deducciones por tercera edad o discapacidad.<\/li><li>Aplica la tabla de IR de personas naturales para obtener el impuesto proyectado.<\/li><li>Resta la <strong>rebaja por proyección de gastos personales<\/strong> y divide el resultado <strong>para 11<\/strong>: esa es la alícuota mensual a retener.<\/li><\/ol><ul><li>La retención se practica desde los pagos de <strong>febrero<\/strong>; en <strong>enero el empleador se abstiene de retener<\/strong>.<\/li><li>El trabajador presenta su <strong>proyección de gastos personales en febrero<\/strong> de cada año, con cargas familiares y cálculo por enfermedades catastróficas si aplica.<\/li><\/ul>", "clave": "Retención laboral: impuesto proyectado menos rebaja, dividido para 11; sin retención en enero y proyección presentada en febrero (Art. 104)."}, {"titulo": "Comprobante del empleador como declaración del trabajador", "html": "<p>El <strong>Art. 96<\/strong> simplifica la vida del trabajador en relación de dependencia:<\/p><ul><li>El comprobante de retención entregado por el empleador <strong>se constituye en la declaración del trabajador<\/strong> cuando percibe ingresos de <strong>un solo empleador<\/strong> y no usa rebaja de gastos personales, o usándola <strong>no tiene valores que reliquidar<\/strong>.<\/li><li>Si el trabajador cesa antes del cierre del ejercicio, el empleador entrega el comprobante dentro de los <strong>30 días<\/strong> siguientes a la terminación laboral; el nuevo empleador lo usa para continuar el cálculo.<\/li><li>Si el trabajador tiene <strong>dos o más empleadores<\/strong> u otras rentas (arriendos, ejercicio profesional, rendimientos financieros), debe presentar <strong>obligatoriamente<\/strong> su declaración de IR.<\/li><\/ul>", "clave": "Un solo empleador y sin valores que reliquidar: el comprobante de retención hace las veces de declaración (Art. 96)."}, {"titulo": "Gastos no deducibles (Art. 35) y casos de ventanilla", "html": "<p>El <strong>Art. 35<\/strong> enumera gastos no deducibles: gastos personales sobre los límites legales, depreciaciones en exceso, pérdidas de bienes no generadores de renta, joyas y bienes de uso personal, donaciones no permitidas, <strong>multas e intereses por mora tributaria<\/strong>, costos sin comprobantes válidos y costos sin las retenciones efectuadas.<\/p><p>Casos prácticos:<\/p><ol><li>Contribuyente pregunta si deduce el arriendo de su local comercial como gasto personal de vivienda: <strong>no<\/strong>, vivienda aplica solo al inmueble de <strong>vivienda habitual<\/strong>.<\/li><li>Padre que paga universidad de su hija de 23 años dependiente sin ingresos: <strong>sí<\/strong> es gasto de educación superior por dependiente.<\/li><li>Gastos del hijo de 20 años declarados por ambos padres: <strong>improcedente<\/strong>, una sola carga por contribuyente y período.<\/li><li>Multa de tránsito como gasto: <strong>no deducible<\/strong> (Art. 35.6).<\/li><\/ol>", "clave": "Multas, gastos sin comprobante y gastos personales sobre el límite jamás se deducen (Art. 35)."}]}, {"id": "l3", "titulo": "Retenciones en la fuente y crédito tributario", "duracionMin": 45, "slides": [{"titulo": "Agentes de retención y sujetos a retención", "html": "<p>El <strong>Art. 92<\/strong> define quiénes actúan como agentes de retención del IR (calificados por el SRI, entidades emisoras de tarjetas de crédito, organizadores de loterías, quienes emiten liquidaciones de compra, entre otros). El <strong>Art. 93<\/strong> señala los sujetos a retención:<\/p><ul><li>Personas naturales, <strong>sucesiones indivisas<\/strong> y sociedades, incluidas las empresas públicas no reguladas por la LOEP.<\/li><li>Las personas naturales que actúan como agentes solo retienen en pagos <strong>relacionados con su actividad generadora de renta<\/strong>.<\/li><li><strong>Art. 94<\/strong>: no procede retención sobre <strong>ingresos exentos<\/strong> (Art. 9 LRTI).<\/li><li><strong>Art. 92.1<\/strong>: las instituciones financieras bajo la Superintendencia de Bancos y las telefónicas móviles se practican una retención mensual del <strong>1,75%<\/strong> sobre sus ingresos gravados (1,5% para petroleras); los <strong>grandes contribuyentes<\/strong> aplican autorretención (Art. 92.2) según la tasa impositiva efectiva que fije el SRI.<\/li><\/ul>", "clave": "Los porcentajes generales los fija el SRI por resolución; el reglamento fija la retención mensual del 1,75% a financieras y telefónicas (Art. 92.1)."}, {"titulo": "Momento de la retención (Art. 95)", "html": "<p>Regla esencial para asesorar a agentes de retención:<\/p><ul><li>La retención se realiza <strong>al momento del pago o crédito en cuenta, lo que suceda primero<\/strong>.<\/li><li>Se entiende efectuada dentro del plazo de <strong>cinco días<\/strong> de presentado el comprobante de venta.<\/li><li><strong>Crédito en cuenta<\/strong> = momento del <strong>registro contable<\/strong> del comprobante de venta.<\/li><li>El agente deposita los valores retenidos en una entidad autorizada, en la forma y plazos del reglamento.<\/li><\/ul>", "clave": "Se retiene al pago o crédito en cuenta, lo primero que ocurra, dentro de 5 días del comprobante (Art. 95)."}, {"titulo": "Comprobantes de retención: plazos y efectos", "html": "<p>Reglas de emisión que generan consultas frecuentes:<\/p><ul><li><strong>Art. 97<\/strong>: el agente debe entregar el comprobante de retención dentro del plazo máximo de <strong>cinco días<\/strong> de recibido el comprobante de venta.<\/li><li><strong>Art. 96<\/strong>: al terminar la relación laboral antes del cierre del ejercicio, el empleador entrega el comprobante en <strong>30 días<\/strong>.<\/li><li><strong>Art. 110<\/strong>: las instituciones financieras pueden emitir <strong>un solo comprobante mensual<\/strong> por las retenciones a un mismo contribuyente.<\/li><li><strong>Art. 99<\/strong>: los agentes llevan registros contables de las retenciones y un archivo cronológico de comprobantes y declaraciones.<\/li><\/ul>", "clave": "Comprobante de retención: 5 días desde el comprobante de venta (Art. 97); 30 días al cesar la relación laboral (Art. 96)."}, {"titulo": "Reglas especiales de retención en pagos internos", "html": "<p>Parágrafo IV del RALRTI, casos típicos de asesoría:<\/p><ul><li><strong>Art. 111<\/strong>: en transferencias gravadas con IVA o ICE, la retención de renta se calcula <strong>sin incluir esos impuestos<\/strong>, si están discriminados en la factura.<\/li><li><strong>Art. 112<\/strong>: honorarios profesionales sin relación de dependencia: retención <strong>sobre el total pagado<\/strong>; no hay retención sobre reembolsos de gastos.<\/li><li><strong>Art. 113<\/strong>: si una misma factura contiene bienes o servicios con distintos porcentajes y los valores <strong>no están separados<\/strong>, se aplica <strong>el porcentaje más alto<\/strong>.<\/li><li><strong>Art. 114<\/strong>: no se retiene en pagos por <strong>transporte de pasajeros o transporte internacional de carga<\/strong> a compañías de aviación o marítimas.<\/li><li><strong>Art. 105<\/strong>: no se retiene sobre ingresos exentos del trabajador: aportes al IESS, <strong>pensiones jubilares<\/strong>, viáticos del sector público y gastos de viaje del sector privado.<\/li><\/ul>", "clave": "Factura con valores no separados: se aplica el porcentaje de retención más alto (Art. 113)."}, {"titulo": "Declaración y pago de retenciones (Arts. 100 a 103)", "html": "<p>Los agentes de retención cumplen así:<\/p><ul><li><strong>Declaración mensual obligatoria<\/strong> incluso en períodos sin retenciones (Art. 100). Excepción: empleadores cuyos únicos trabajadores no superan la fracción básica gravada con tarifa 0.<\/li><li>Con sucursales o agencias, la declaración se presenta <strong>consolidada<\/strong> (Art. 101).<\/li><li>Pago en el mes siguiente según el <strong>noveno dígito<\/strong>: del día <strong>10 al 28<\/strong> (Art. 102); Galápagos hasta el 28.<\/li><li>Las <strong>Instituciones del Estado<\/strong> y empresas públicas exentas declaran y pagan hasta el <strong>día 20<\/strong> del mes siguiente (Art. 103).<\/li><li>Declarar retenciones tarde genera <strong>intereses, multas<\/strong> y demás sanciones.<\/li><\/ul>", "clave": "Retenciones: declaración mensual aun sin movimientos, pago del 10 al 28 del mes siguiente según noveno dígito (Arts. 100-102)."}, {"titulo": "El comprobante de retención como sustento del crédito tributario de renta", "html": "<p><strong>Art. 98<\/strong>: únicamente los comprobantes de retención en la fuente <strong>originales o copias certificadas<\/strong>, emitidos conforme a la ley, justifican el crédito tributario.<\/p><ul><li>El contribuyente lo usa para <strong>compensar con el IR causado<\/strong> en su declaración anual.<\/li><li>Debe conservar los documentos por el período del <strong>Código Tributario<\/strong>.<\/li><li>Si los créditos superan el impuesto causado, puede presentar <strong>solicitud de pago en exceso<\/strong>, reclamo de pago indebido o arrastrar el crédito a ejercicios posteriores.<\/li><\/ul>", "clave": "Solo comprobantes de retención originales o copias certificadas sustentan el crédito tributario de renta (Art. 98)."}, {"titulo": "Crédito tributario de IVA: 100% o proporcional (Art. 153)", "html": "<p>El <strong>Art. 153<\/strong> regula el crédito por IVA pagado en compras e importaciones. Tienen derecho al <strong>100%<\/strong> quienes se dedican a:<\/p><ul><li>Producción o comercialización de bienes gravados con tarifa <strong>distinta de 0%<\/strong>.<\/li><li>Prestación de servicios gravados con tarifa distinta de 0%.<\/li><li>Comercialización de <strong>paquetes de turismo receptivo<\/strong> a no residentes.<\/li><li>Venta directa de bienes y servicios tarifa 0% <strong>a exportadores<\/strong>.<\/li><li><strong>Exportación<\/strong> de bienes y servicios.<\/li><\/ul><p>Quienes venden en parte con tarifa 0% y en parte con tarifa distinta de 0% aplican el <strong>factor de proporcionalidad<\/strong>, salvo que su contabilidad permita diferenciar inequívocamente las adquisiciones destinadas a cada tipo de venta.<\/p>", "clave": "Crédito del 100% para ventas gravadas y exportaciones; ventas mixtas usan factor de proporcionalidad (Art. 153)."}, {"titulo": "Límites temporales y casos sin derecho a crédito", "html": "<p>Reglas complementarias del crédito de IVA:<\/p><ul><li>El crédito puede usarse o pedirse en devolución hasta dentro de <strong>cinco años<\/strong> desde la exigibilidad de la declaración; vencido el plazo, se carga al gasto (Art. 153).<\/li><li><strong>Art. 155<\/strong>: el sujeto pasivo usa como crédito <strong>la totalidad de las retenciones de IVA<\/strong> que le practicaron.<\/li><li><strong>Art. 156<\/strong>: solo los comprobantes de retención de IVA válidos sustentan ese crédito; se conservan por <strong>siete años<\/strong>.<\/li><li><strong>Art. 157<\/strong> - sin derecho a crédito: compras destinadas exclusivamente a producir bienes o servicios <strong>tarifa 0%<\/strong> (va al costo o gasto); IVA <strong>reembolsado<\/strong> de cualquier forma; y pagos de más de <strong>USD 1.000<\/strong> a un mismo proveedor en el mes <strong>sin usar el sistema financiero<\/strong>.<\/li><\/ul>", "clave": "Crédito de IVA caduca en 5 años; compras sobre USD 1.000 sin bancarizar pierden el crédito (Arts. 153 y 157)."}, {"titulo": "Casos prácticos de retenciones y crédito", "html": "<p>Consultas tipo concurso:<\/p><ol><li>Empresa recibe factura de un profesional el 3 del mes; pregunta hasta cuándo entregar el comprobante de retención: <strong>5 días<\/strong> desde recibido el comprobante (Art. 97).<\/li><li>Factura incluye bienes con retención 1,75% y servicios con 2,75% sin separar valores: se retiene <strong>el porcentaje más alto<\/strong> sobre todo (Art. 113).<\/li><li>Ferretería paga USD 1.500 en efectivo a un mismo proveedor en el mes: <strong>pierde el crédito tributario de IVA<\/strong> por falta de bancarización (Art. 157.4).<\/li><li>Agente sin retenciones en el mes pregunta si declara: <strong>sí<\/strong>, la declaración es obligatoria (Art. 100).<\/li><li>Contribuyente con retenciones de IVA sufridas: las usa como crédito <strong>en su totalidad<\/strong> (Art. 155).<\/li><\/ol>", "clave": "Dominar plazos (5 días), porcentaje más alto, bancarización sobre USD 1.000 y declaración en cero obligatoria."}]}, {"id": "l4", "titulo": "Devoluciones de IVA y Régimen RIMPE", "duracionMin": 50, "slides": [{"titulo": "Mapa de devoluciones de IVA y la solicitud (Art. 178)", "html": "<p>El Capítulo V del Título II regula las devoluciones de IVA. Toda solicitud debe ser <strong>escrita, en los formatos del SRI<\/strong>, y contener (Art. 178):<\/p><ul><li>Autoridad ante quien se presenta; nombres y <strong>cédula o RUC<\/strong> del solicitante.<\/li><li>Fundamentos de derecho y petición concreta: <strong>mes, base imponible y valor de IVA<\/strong> solicitado.<\/li><li>Domicilio tributario y para notificaciones; forma de pago o acreditación en cuenta; firma.<\/li><li>Presentada la solicitud de un período, <strong>no se aceptan nuevas peticiones<\/strong> del mismo período, salvo declaraciones sustitutivas y solo por adquisiciones no consideradas antes.<\/li><\/ul><p>Beneficiarios principales: <strong>adultos mayores, personas con discapacidad, exportadores<\/strong>, proveedores directos de exportadores, operadores de turismo receptivo, constructores de vivienda de interés
